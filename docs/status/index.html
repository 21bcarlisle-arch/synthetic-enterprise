<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Synthetic Enterprise — Latest Status</title>
<meta http-equiv="refresh" content="120">
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    max-width: 760px;
    margin: 2rem auto;
    padding: 0 1rem;
    line-height: 1.5;
    color: #1a1a1a;
  }
  code, pre { background: #f4f4f4; padding: 0.15em 0.35em; border-radius: 4px; }
  pre { padding: 0.75em; overflow-x: auto; }
  a { color: #0969da; }
  #status { margin-top: 1.5rem; }
  .meta { color: #666; font-size: 0.9em; }
</style>
</head>
<body>
<p class="meta">
  Live status page — fetches and renders
  <a href="LATEST.md">LATEST.md</a> from <code>main</code> on load.
  Auto-refreshes every 2 minutes. Raw markdown:
  <a href="https://raw.githubusercontent.com/21bcarlisle-arch/synthetic-enterprise/main/docs/status/LATEST.md">raw.githubusercontent.com</a>.
</p>
<div id="status">Loading latest status…</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
  fetch("https://raw.githubusercontent.com/21bcarlisle-arch/synthetic-enterprise/main/docs/status/LATEST.md?t=" + Date.now())
    .then(function (res) {
      if (!res.ok) throw new Error("HTTP " + res.status);
      return res.text();
    })
    .then(function (markdown) {
      document.getElementById("status").innerHTML = marked.parse(markdown);
    })
    .catch(function (err) {
      document.getElementById("status").textContent =
        "Failed to load LATEST.md: " + err.message +
        " — see https://raw.githubusercontent.com/21bcarlisle-arch/synthetic-enterprise/main/docs/status/LATEST.md directly.";
    });
</script>
</body>
</html>
