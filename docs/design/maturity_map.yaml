  file_scope: [background/naive_organ.py]
  simplifications: ["2026-07-13 REGISTERED (THE_NAIVE_ORGAN.md, director-decided, P1 QUEUE rank HIGH). The director corrected the advisor's claim that the naive outside question is the irreplaceable HUMAN contribution: 'That doesn't require a human, far from it. This can be part of the process.' Mechanises COLD_EYES's own principle (VANTAGE not capability) pointed at the SYSTEM (its claims, state, stuck-ness) rather than at artefacts. SEVEN mechanisable triggers, each a real catch from this weekend, fire the organ on observable conditions: (1) flat metric while system reports healthy; (2) a TERMINAL-STATE claim ('exhausted'/'nothing to do'/'complete'/'no candidates'/'blocked') -- MUST independently check raw data (caught 'map exhausted' with 31 open atoms); (3) an INHERENCE claim ('physics'/'inherent'/'cannot be parallelised') -- fact or unchecked assumption? (caught 'build must be narrow' -- worktrees existed all along, cf H10); (4) a first-principles claim about a fast-moving external field made without checking published practice (cf G3 Finding 1); (5) sustained work in one category while the goal metric does not move (caught harness-grooming vs company backlog -- the treadmill); (6) claim-vs-data contradiction on any observable surface; (7) the same class of fix applied N times -- is the class defined correctly? DESIGN (the discipline that makes it work): DELIBERATELY AMNESIAC -- no memory, no accumulated context, no codebase, no CLAUDE.md, no access to the system's rationalisations (a naive agent that accumulates context stops being naive and inherits the assumptions it exists to break) -- the structural INVERSE of director_twin.py's isolation, and enforced the same process way (separate invocation, no context carryover, PROVE it). Inputs ONLY: the goal, observable state (metrics, raw data files, the map AS DATA), and the system's own CLAIMS -- never its reasoning. Output = QUESTIONS not fixes (land in digest + Director door + back to the agent as findings to answer WITH EVIDENCE; 'no, that was true because X' is a fine answer, 'that's just how it is' is not). Opus-tier (a good naive question is judgment). ANTI-CAPTURE: never tuned by the system it questions, never learns house norms, never told which questions were 'unhelpful' -- its hit-rate is a diagnostic for US, not a training signal for IT (this is Law-B-shaped, same as the twin's no-learn rule). Does NOT replace PURPOSE: it can ASK 'should this company optimise for EV?' but cannot CARE -- the Epoch-4 fitness function and every values decision stay the director's (he is the only one who WANTS). DoD: organ live with the 7 triggers wired, firing on real conditions; questions logged + answered with evidence; amnesia enforced structurally (prove no context carryover); hit-rate tracked; questions+answers surfaced in digest and on the site; SEED TEST -- replay this weekend and independently rediscover >=3 of the 7 catches. loop_stage idle: DISCOVER/FRAME (design the trigger detectors, the amnesia-isolation mechanism, the seed replay) workable NOW; BUILD ranks HIGH for the next slot (twin-approvable within the open epoch per canon v2 3a -- a self-audit organ, not a one-way door)."]
  expert_hour: {status: not_attempted, last: null, findings: []}
