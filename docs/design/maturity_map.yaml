eal and current (2026): 74% of UK consumers pay by direct debit, 13% standard credit, 13% prepayment; standard credit carries a HIGHER price cap specifically because it 'reflects the additional costs and risks in servicing' that payment-method cohort -- i.e. the REAL regulator's own price-cap methodology already treats payment-method cohorts as structurally different-risk populations by regulatory design, not an assumption this atom would be inventing. A real Ofgem statement found ('a generalised shift... to direct debit has reduced the numbers of customers who fell into arrears') is exactly the kind of surface-level correlation this atom's own trap warns against over-reading as pure causation without accounting for the migration-driven selection effect. No BUILD code, no level change.", "2026-07-13 FRAME pass sharpens the prior pass's own finding with a more precise root cause (self-refill draw, DISCOVER/FRAME only per epoch gating, no BUILD code). Read simulation/household_segments.py::payment_channel_for_customer() in full rather than trusting the prior pass's 'two pipelines never cross-referenced' framing at face value: it is a PURE function of (customer_id, fuel) via a deterministic hash-seeded RNG, with its own docstring stating it is 'stable for the account's WHOLE TENURE' -- zero dependency on payment history, arrears, or dd_fail state anywhere in its signature or body. This means the real gap is NOT that two pipelines compute related state without cross-referencing each other (implying a wiring fix could reconcile them) -- it is that payment_channel currently has NO MECHANISM to change at all, ever, for any customer, regardless of payment outcome. The confound this atom exists to model (failing payers drop OFF direct debit, landing their bad debt in the cash/credit cohort) structurally REQUIRES payment_channel to be a time-varying state that responds to a real dd_fail event -- but today it is a fixed archetype assigned once and never revisited. This reframe