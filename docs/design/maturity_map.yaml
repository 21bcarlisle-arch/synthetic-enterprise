5_TOURNAMENT_FITNESS_MORTALITY_FRAME.md): 5 candidate fitness-function options (pure EV as a named strawman/risk-demonstration only, through EV-hard-gated-on-compliance, multi-objective Pareto, balanced-scorecard weighted-sum, constraint-satisfaction-with-EV-as-tiebreaker) x 4 candidate mortality rules (threshold cull, instant-death-on-hard-breach, tournament/pairwise selection, elitism+diversity preservation), independently combinable, each with named risks/trade-offs -- explicitly does not recommend or default toward any combination. Named the concrete in-repo exploit surface a naive EV-only search would find (B2's own under-provisioning-for-expensive-segments incentive; the obligations register being checked-and-reported today but not load-bearing against a search process; customer-harm signals existing only as diagnostics a blind search has no reason to avoid). level_current stays 0, loop_stage stays idle -- FRAME output does not self-promote BUILD eligibility (MATURITY_MAP.md section 9 rule 8).", "2026-07-13 DISCOVER pass, real anchors + exploit-surface refinement, NOT a fitness-function choice (self-refill draw, DISCOVER/FRAME only per epoch gating -- the director's own 2026-07-12 reservation of the fitness-function SELECTION stands untouched; this pass only strengthens the options catalog and the risk analysis with real grounding, chooses nothing). Real anchors for the prior pass's 5x4 options catalog, from established practice rather than invented: the 'multi-objective Pareto' fitness option maps directly onto NSGA-II (Non-dominated Sorting Genetic Algorithm II), the standard real multi-objective evolutionary algorithm (elitist, Pareto-ranking + crowding-distance diversity preservation) -- a real, well-established technique this atom's own Pareto option can cite by name rather than describing generically. The 'elitism+diversity preservation' mortality-rule option is itself a real, named GA technique (elitism preserves the best performer(s) unconditionally across generations; diversity/niching preservation, e.g. fitness sharing, prevents premature convergence on one local optimum) -- both already correctly named in the prior pass's catalog, now anchored to their real source technique. Real PE/turnaround-firm analogue for 'hard constraint' mortality thresholds: covenant-based portfolio triage (debt service coverage ratio floors, minimum liquidity covenants, EBITDA leverage ratio ceilings) is standard real distressed-asset practice -- a real-world precedent for 'instant-death-on-hard-breach' as a genuine, not invented, mortality-rule shape. Exploit-surface REFINEMENT (checked directly, not re-asserted): company/compliance/obligations_register.py is MORE load-bearing than the prior pass's blanket 'checked-and-reported today but not load-bearing' characterisation -- confirmed via grep it has 3 real callers including company/billing/pre_bill_validation.py, a genuine PREVENTIVE gate for Tier-1 (bill-accuracy) obligations specifically. But this is a real, precise, narrower finding than 'the gate exists': pre_bill_validation.py validates the OUTPUT of a given run/policy (is this specific bill correct), not the CONFIGURATION a tournament search would be choosing between (is this company-variant's whole strategy compliant) -- a per-bill preventive gate does not structurally prevent a search process from selecting forward a company-variant whose overall STRATEGY is exploitative while each individual bill still passes the existing gate. This sharpens, not contradicts, the prior pass's own real concern: the exploit surface is not 'no gates exist at all' (an overstatement corrected here) but 'existing gates operate at the wrong level (per-transaction) for what a tournament-mortality mechanism would need (per-strategy)' -- a materially more precise problem statement for whoever eventually designs the mortality rule's hard-constraint layer. No fitness function chosen, no level change, no BUILD code."]
