doors would still see seams; consistent with the prior ''held at 2'', L3 not claimed). 3 of the 4 blocking defects were the SAME orphaned-at-commit CLASS (R10/R11 no-orphan-transition) that the code comments claimed to have closed for company/proof/world/method/method_casebook but had only patched instance-by-instance: simplified.json (deployed showed 168 notes / 48 capabilities while the real register is 292/93 -- the ''consolidated register, nothing filtered'' door was HIDING ~42% of itself), provisional_plan.json (2 days stale on the director page), system_status.json (6 days stale -- the action-needed queue). FIXED DURABLY (class-closure, not 3 more path lines): git_commit_push now commits the WHOLE site/data/*.json surface, with a mutation-verified regression test (neuter the glob -> test fails). 4th defect (substance/honesty contradiction): the Method door rendered ''6 permanent rules'' (generate_method_data.RULES frozen at R1-R6) while the same site''s Casebook showed 14 and CLAUDE.md defines R1-R15 -- FIXED: RULES extended to the full R1-R15 each with description + forging-incident grounded in the real retros/CLAUDE.md; rendered pixel now reads ''15 permanent rules'' (verified offline via site/method/_render_harness.mjs), two pinned ''==6'' tests updated to ==15. simplified/provisional_plan/system_status/method .json regenerated. Doors 3 (Company), 5 (World), 8 (Cross-cutting) graded PASS by the Expert Hour; Door 4 (Proof) PASS with a non-blocking note (its render-harness covers only the gap panels, not predictions/timeline/holds, so the ''render-harness coverage complete'' claim is overstated for that door -- QUEUED, not fixed here). REMAINING to L3 (genuine wall, not a stall, NOT a one-way door): (a) R11 live-pixel verification on the deployed poesys.net doors -- unavailable in a headless no-network turn; (b) a fresh Expert-Hour RE-review of the now-fixed doors 6/7; (c) director''s-eyes / cold-eyes acceptance per the Door-4 delegation precedent. None close