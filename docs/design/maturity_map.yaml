  file_scope: [tests/controls, site/data, background]
  simplifications: ["2026-07-13 REGISTERED (JUDGING_THE_JUDGES.md Part 1, director P1 -- directly answers H12's honest residual that LLM-judge verdict QUALITY is un-mutation-testable). You cannot inject a defect to prove a JUDGMENT was bad, but a judge is not un-attackable. FOUR approaches: (1) OUTCOME CORRELATION (strongest + nearly free) -- a judge whose PASSES later FAIL is a bad judge; the trust/predictions ledger ALREADY tracks defects-found-post-close, sitting uncomputed -- wire per-judge/per-task-class (verdicts passed) vs (defects later found) = the empirical error rate, validate judgment by CONSEQUENCE; (2) CONSISTENCY -- same input repeated -> same verdict? flip rate; a judge that flips on identical evidence is noise; (3) INDEPENDENCE -- differently-primed judges agree? systematic disagreement is a finding about the judge; (4) GOLD SET seeded from the DIRECTOR's own Expert Hours (C1 SME-as-Household bill, thesis/hedge chart, bad-debt smell, meter-read mismatch) -- a judge that misses what the director caught is weak, with a number. STANDING RULE (into CLAUDE.md, R15 extension): where a control cannot be mutation-tested it must be OUTCOME-tested; no verdict-producing organ escapes measurement. Build fork dispatched (outcome-correlation first). loop_stage build: closes the H12 LLM-judge coverage residual.", "2026-07-13 BUILT L0->L2 (worktree fork, commit 35d2f78, merged 8b0452fc; verified 34 judge-validation+trust-ledger tests pass, epistemic PASS). Closes H12's LLM-judge un-mutation-testable residual by OUTCOME-testing (R15 extension). background/judge_validation.py: (1) OUTCOME CORRELATION -- trust_ledger.record_post_close_defect() attaches a later-found defect to the earlier PASS (the linkage that was missing), outcome_error_rates() = passes-that-later-proved-defective/total-passes per judge/class (currently 0.0 over 1 verdict, accrues over runs); (2) GOLD SET from 4 real director Expert-Hour catches (C6 SME-as-Household, hedging volatility leak, bad-debt smell, C1 meter-read mismatch), score_judge_against_gold() -> recall + named misses, rubber-stamp scores 0.0/oracle 1.0 (scorer discriminates), each detectable_by tied to a real control; (3+4) consistency flip-rate + independence disagreement-rate defined+tested. Published site/data/judge_validation.json. HONEST L2 not L3: the metrics are built but the real NUMBERS accrue LIVE -- outcome error rate meaningful only as verdicts+post-close links accrue over runs; real-Opus consistency/independence + LLM gold-set recall need live judge invocations (like the naive organ's real-Opus residual + the twin's fidelity metric). L3 = the accrued live evidence + wiring record_post_close_defect into the real close/Expert-Hour/director-catch path. loop_stage build. SURFACED a real regression (fixed separately): the control-audit fixes correctly changed behaviour (KL-4 empty-reads now fires, internal_audit checker_unavailable), which broke 10 tests/background/test_sanity_daemon.py tests that encoded the OLD theatre-silent contract -- a fix fork dispatched to update them to the new fail-closed contract (the daemon is MORE correct; production runs on real data so no over-fire)."]
