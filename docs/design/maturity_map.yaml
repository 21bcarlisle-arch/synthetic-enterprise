ry confirmation found: Octopus Energy has publicly stated it met the Ofgem capital buffer target -- a real, concrete example this atom's eventual build could cite. Capacity Market/RO overlap with F3 and the B2 ROCE relationship remain genuinely unresolved.", "2026-07-13 DISCOVER addendum, closes the F3 overlap gap (self-refill draw, internal code check, no external research needed, no BUILD code). Checked directly whether F3_obligations_register's own domain_invariants.py already covers Capacity Market/RO registration duties: zero references to Capacity Market or Renewables Obligation anywhere in company/compliance/ -- confirmed NO overlap exists today. Separately, found this project's codebase ALREADY has real Capacity Market code -- company/market/flexibility_potential.py + flexibility_revenue_book.py -- but confirmed by reading it directly that this models a COMPLETELY DIFFERENT real-world CM mechanism: the company EARNING Capacity Market revenue as a flexibility/DSR participant (~GBP75/kW/yr for committed flexibility), not the SUPPLIER-SIDE registration/settlement-levy OBLIGATION this atom's own text means ('Capacity Market/RO registration obligations that attach to holding a licence at all'). Same three-letter acronym, two genuinely distinct real mechanisms (a generator/DSR-side revenue opportunity vs. a supplier-side compliance cost) -- this project's existing CM code is NOT this atom's scope and does not need reconciling with it. This closes the F3-overlap open item cleanly: no overlap, no conflict, both real and both already correctly separate. Remaining open item: the B2_opex_cost_to_serve/ROCE relationship.", "2026-07-13 DISCOVER addendum, closes the final open item -- ALL FOUR named honest gaps now resolved (self-refill draw, internal code check, no BUILD code). Read company/finance/segment_capital.py directly to confirm the B2 relationship: B2's own segment ROCE is a genuinely DIFFERENT concept from this atom's own licence-level Minimum Capital Requirement, confirming (not just re-asserting) the distinction the registration already claimed. B2 measures PER-SEGMENT capital efficiency against a DIRECTOR-SET hurdle rate (working capital = directly-attributable segment receivables; credit/settlement exposure and collateral = portfolio-level figures allocated pro-rata by revenue share, explicitly documented as an allocation not a bottom-up measurement) -- an internal pricing/cross-subsidy-visibility diagnostic, R12-governed (never tuned to a target). This atom's own Minimum Capital Requirement is a REGULATORY, portfolio-wide, absolute floor (Ofgem's own external requirement) with zero code-level interaction or shared computation with B2's segment-ROCE mechanism -- confirmed genuinely independent, not merely asserted to be. All four named open items from this atom's own DISCOVER trail (Capacity Market/RO overlap, Capital Target milestone mechanics, SLC 4C criteria, B2 relationship) are now closed with real evidence; the one still-unresolved item is the honest GBP115-vs-GBP130 Capital Target figure discrepancy, which needs the primary FRC decision document, not further code-reading."]
