  simplifications: ["2026-07-13 REGISTERED (RETRO_WHY_WE_MISSED_IT.md, director-requested 'let's remember this learning', QUEUE -- these are IP, not housekeeping). Five method findings + a meta-finding, each a general law with its evidence: (F1) SEARCH THE FIELD WHEN YOU HIT A WALL -- any structural wall = an immediate check of published practice BEFORE theorising ('we are stuck on X' is the strongest signal someone published the answer to X); the epoch-boundary harness re-check is too slow for a field turning over monthly. (F2) A REVIEW ONLY ANSWERS THE QUESTION YOU ASKED -- when a review comes back clean, ask what it did NOT ask; add a standing 'what was out of scope, and why?' section to every review artefact. (F3) FIRST-PRINCIPLES REASONING IS NOT EVIDENCE (R9, advisor edition) -- a confident derivation about a fast-moving field is a HYPOTHESIS, verify against published reality before acting ('BUILD is inherently narrow / physics' was wrong in a checkable way). (F4) BOTTLENECKS ARE ONIONS -- empty draw->cap1->livelock->BUILD-gated->map-contention, each fix revealed the next; the first diagnosis of a slow system is almost never the real one. (F5) THE ARCHITECTURE WORK AND THE VELOCITY WORK ARE THE SAME WORK -- when a structural fix keeps getting deferred as 'architecture', check whether it also caps throughput; if so it is now, not later. (META) THE OUTSIDE QUESTION IS THE HIGHEST-VALUE INPUT -- every one of the last five structural findings came from the DIRECTOR's naive-sounding question, not the machine's self-audit or the advisor's analysis; protect the director's ability to ask naive questions -- the human seat that cannot be automated away. DoD: findings recorded in the method/casebook lane (site Method door); F1 wired as a real trigger (structural wall -> published-practice check, before theorising) WITH a test it fires; F2 added as a required section in every review-artefact template. DISCOVER/FRAME workable now."]
