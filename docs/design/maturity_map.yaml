  simplifications: ["2026-07-11 REGISTERED (EPOCH2_RATIFIED.md immediate effect 1): director-ratified NEW W-lane, three amendments to THE_VALUE_CYCLE_FRAMING.md (banking-as-swappable-interface worry). Built adapter-SHAPED behind an interface mirroring the real protocol -- submission windows, multi-day cycle, AUDDIS-style mandate setup, ARUDD-style failure returns with reason codes, ADDACS amendments; cash lands when the rails say, making the banked clock (D2_three_clocks/C2) honest -- 'rails ARE late-arriving truth, a limb of the spine, not an adjacent system.' Full typed/versioned hardening of this seam is Epoch-3 work (added to the wall's adapter inventory). loop_stage=idle: M2 build (this atom included) starts only after the M2 entry-gate payments-maturity-audit verdict AND M1's exit test both land -- not before, per EPOCH2_RATIFIED.md immediate effect 4.", "2026-07-11 'RAILS SIM FIRST' BUILT, level 0->1 (advisor steer ADVISOR_STEER_M2_OPEN.md: 'audit reporting unlocks M2 BUILD... Open M2 build: rails sim first'). WebSearch-verified real Bacs mechanics before building, not assumed: 3-working-day processing cycle (Pay.UK's own Bacs System Principles guide); AUDDIS confirms/rejects mandate setup on Day 2; ARUDD reports a failed collection up to 2 working days AFTER collection day, never instantly (the actual 'cash lands when the rails say' physics); real reason codes (ARUDD 0='Refer to Payer' -- the real dominant insufficient-funds-class code -- 1/2/3; AUDDIS 1/2/3/5), sourced from AccessPaySuite/Hafiz Didarali Bacs reason-code references. Deliberately does NOT duplicate the existing calibrated behavioural failure-probability model (simulation/arrears_engine.py::payment_outcome(), stress-tier-anchored, R13-compliant) -- this module only adds realistic TIMING and REASON CODES around an already-decided success/failed outcome, structurally guarded by a test proving the module contains no probability constants of its own. Reason-code selection is deterministic to the documented dominant code, NOT rng-randomised across the full code set -- no sourced real-world frequency split between codes exists, and fabricating one would make rare codes (Payer Deceased) appear unrealistically often. NOT yet done: wiring this into the live company/billing/direct_debit.py collection flow (still synchronous/instant today) -- a separate, larger integration step, per the framing's own sequencing ('rails sim first, THEN estimated billing -> catch-up rebilling -> settlement timetable -> DD cash engine'). 21 new tests, epistemic PASS (pure stdlib module, zero company/saas coupling).", "2026-07-11 RAILS TIMING WIRED INTO THE LIVE DD FLOW, level 1->2 (director in-console approval: 'M2 next step approved: wire rails timing into the live DD flow'). Real finding before building (R4): grepped the whole codebase for company/billing/direct_debit.py's DirectDebitBook/record_attempt/DDPaymentAttempt and found ZERO callers anywhere -- entirely unwired, the same 'paper compliance' class the M2 audit already named for 18 OTHER billing/collections modules. The genuinely live DD-relevant flow is simulation/arrears_engine.py::payment_outcome(), called from compute_emergent_bad_debt()/compute_debt_recovery() -- but those compute REAL ground-truth bad-debt/recovery figures flowing into net_margin_gbp/treasury_cash_balance_gbp, exactly the class of code M1's own precedent already established extreme caution around; a same-day timing change there would shift which calendar year a write-off lands in, silently altering historical financial figures. Deliberately NOT touched. Instead built new simulation/dd_collection_book.py: populates the previously-unwired DirectDebitBook with REAL Bacs-timed collection records, using the SAME unchanged payment_outcome() decision (identical RNG seed and call sequence as compute_emergent_bad_debt()) layered with bacs_rails.py's realistic timing/reason codes -- a new, real, company-observable artefact where none existed before, zero existing numbers changed (confirmed via git status: arrears_engine.py and direct_debit.py both untouched, import-only integration). Caught and fixed a real bug before it shipped: initially shared one rng between payment_outcome() and resolve_submission()'s lag-day draw, which would have desynced every outcome after the first resolved bill from the real ground truth -- fixed with a separate, independently-seeded rng for the rails-timing layer, proven by a dedicated regression test replaying the exact same payment_outcome() sequence independently and asserting an exact match. 9 new tests, epistemic PASS, full arrears_engine test suite (74 tests) still green.", "2026-07-12 EXPERT HOUR RUN, verdict NEEDS_WORK (fresh-context phase-close-evaluator, no memory of the build) -- an attempted L2->L3 build (mandate SETUP/AMENDMENT wired through the same rails-timing pattern as collections) did NOT earn L3, correctly held at level 2. Concrete findings, all from reading the actual code: (1) DECISIVE -- simulation/dd_collection_book.py has ZERO callers from any real run pipeline (confirmed by grep), only exercised by its own tests -- fails 'lives in time' (L3's own bar), phase-close rule 0b (evidence on a business surface), and R1 (consumer-verified); this alone caps the atom below L3 regardless of the wiring's own quality. Registered as the next real step, not attempted same-pass (a live-pipeline integration this late in a session, into a ~500s historical-replay run, was judged too risky to rush). (2) FIXED: the amendment trigger originally compared a single bill's raw amount against the mandate's stored amount, firing on almost every seasonal swing -- modelling on-demand billing, not smoothed Variable DD. Now compares against a rolling MEDIAN (not mean -- a mean is dragged by a single outlier, a median correctly ignores one anomalous bill while still moving once a majority of a trailing 12-bill window reflects a genuine sustained change) over a trailing window, and amends TO the median,