  simplifications: ["2026-07-13 REGISTERED (A3_GO_AND_MAP_CONTENTION.md item 2, director-decided QUEUE, high rank). The real velocity cap on BUILD parallelism: N concurrent forks each read-edit-write the single maturity_map.yaml to record their level, and tree_lock serialises the git COMMIT but NOT the read-edit-write, so two forks lost-update each other's level bump. INTERIM MECHANISM already in force (THREE_LANES.md Lane 1): the orchestrator is the sole map writer -- forks touch only their code file_scope and report level back -- which removes the contention at the cost of a serial map-record step. This atom's BUILD makes that safe-by-construction rather than by-convention: options to design/choose between -- (a) each atom writes its own evidence/level to a per-atom status file (docs/design/atom_status/<id>.yaml) and the map is GENERATED from them (map stays the single readable source, no shared write); (b) an append-only journal of level transitions replayed into a view; (c) a lock-for-map-writes-only short critical section extending tree_lock. Requirement (director): map stays single source of truth, NO lost updates, PROVEN by a test that runs two disjoint BUILD atoms in parallel and asserts both level bumps survive. loop_stage idle: sequencing is a re-rank call, DISCOVER/FRAME workable now per epoch gating.", "2026-07-13 FRAME DESIGN LANDED (Lane-3 discovery fork, doc-only, docs/design/WORKTREE_AND_MAP_CONTENTION_DESIGN.md). Mechanism CHOSEN with reasons: option (a) per-atom write-inbox files docs/design/atom_status/<id>.yaml -- each fork writes ONLY its own file (disjoint paths => lost-update impossible with NO lock), and a build-time tools/merge_atom_status.py folds each landed inbox's level_current/evidence/simplification into the hand-authored maturity_map.yaml, run once serially by the integrator. Map stays the single readable source of truth for the draw; forks NEVER open it for writing; the interim 'orchestrator-sole-writer' convention becomes structural