  simplifications: ['2026-07-13 REGISTERED (WEATHER_PHYSICS_HIERARCHY.md, director P1, QUEUE -- DISCOVER/FRAME workable now, BUILD gated to Epoch 3 with W1_2_generate_futures). the CORE physics primitive. Architectural steer (director: the mechanism is ours): model a latent BLOCKING-HIGH weather regime (hidden-Markov / persistence state) that jointly drives cold + low-wind + high-pressure, so COLD-AND-STILL arises MECHANISTICALLY, not from a fitted Gaussian correlation that under-weights tail dependence. Cold-and-still is THE single most important GB power correlation -- draw temp and wind independently and the supplier-killing winter tail never occurs and every hedge looks fine (a lie). Solar anti-correlated with heating demand seasonally+diurnally; wind droughts persist days. DoD: temporal autocorrelation present; the joint cold-still tail demonstrated (SHOW the tail); winter-tail report compared to a real GB worst week (if our worst week is milder than reality, physics still wrong). loop_stage idle: FRAME design authored this session (docs/design/WEATHER_PHYSICS_HIERARCHY_DESIGN.md); BUILD opens in Epoch 3. Anchoring rule (anti-marking-own-homework): GENERATOR anchors (real historical weather/demand) and VALIDATOR anchors (independent published sub-national consumption stats / regional degree-days / published system demand) MUST be different sources; the company never validates against SIM ground truth.', '2026-07-15 DISCOVER pass, decisive uncredited-capability finding (self-refill draw, DISCOVER/FRAME only, no BUILD code). Read sim/weather_engine.py directly rather than trusting this atom''s level_current=0/greenfield registration -- the CORE mechanism this atom describes is ALREADY BUILT, uncredited: fit_national_macro_model() fits a regime-switching, mean-reverting AR1 model over the JOINT national temp/wind/cloud series with a 2x2 regime transition matrix and regime-specific innovation covariance (cov_standard vs cov_stressed) -- temporal autocorrelation (phi per var) AND a stressed-regime jump mechanism already exist; the same built-but-uncredited pattern found this session for W2_3/B4. THREE PRECISE REMAINING GAPS vs this atom''s OWN DoD, none greenfield: (1) the stressed-regime TRIGGER keys on WIND residual ALONE (abs(wind_resid) > 90th pctile), NOT the JOINT cold+low-wind condition -- so cold-and-still arises only through the innovation covariance''s temp/wind correlation, not as an explicit mechanistic regime; W1_3''s thesis (cold-and-still must arise MECHANISTICALLY) argues the regime state should be jointly classified -- a real design gap. (2) NO ''SHOW the tail'' artefact and NO winter-tail-vs-real-GB-worst-week comparison exists (DoD requires both); Dunkelflaute physics live SEPARATELY in sim/scenario/bimodal_generator.py on the PRICE side, not wired to this weather regime -- a coupling gap. (3) anchoring rule at risk: the engine calibrates AND would validate on the same 4-location real series (marking-own-homework); an independent validator anchor (published GB degree-days / NESO system demand) is not yet wired. FLAG (sole-map-writer respected, no self-write): level_current=0 appears MIS-REGISTERED given the built regime-switching engine -- candidate re-level to the orchestrator/director; honest remaining scope is the joint-tail regime trigger + tail demonstration/validation + independent validator anchor, not a from-scratch build. No level change, no BUILD code.', '2026-07-16 DISCOVER/FRAME (Lane-3, H17 draw): framing artifact written; central physics = temporal autocorrelation + joint temp/wind/solar structure (Dunkelflaute tail). C-S2 RNG substream discipline flagged as critical. Pairs with W1_4 (regional aggregation-consistency invariant). BUILD gated on W1_2. Level unchanged (0).', '2026-07-16 FRAME (Lane-3 H17, doc-only, NO LEVEL MOVE, L0): docs/design/NATIONAL_WEATHER_SIGNAL_FRAME.md. RECONCILIATION FLAG: the core mechanism (regime-switching AR1 + Cholesky joint temp/wind/cloud, fitted on 3,446 real days, sim/weather_engine.py) already EXISTS and is calibrated -- atom may be under-rated at 0; a VERIFY pass is owed, not claimed here. Design commits to extend-not-rebuild and names 3 precise gaps: (1) the stressed-regime trigger is wind-only, not the jointly cold+still Dunkelflaute the director''s steer requires; (2) no ''show the tail'' Dunkelflaute artefact / winter-vs-real-worst-week comparison exists; (3) calibration anchor and validation anchor are the same source (marking-own-homework). Solar specified as a derived (not independently-drawn) variable; C-S2 named RNG substream; 3-check mutation validation (autocorrelation length, spell-duration distribution, independent joint-tail rate).', '2026-07-16 VERIFY re-level 0->1 (Lane-3 H17 ORCHESTRATOR turn, executing the re-level explicitly deferred to the orchestrator by the 2026-07-15 and 2026-07-16 DISCOVER passes, both of which flagged level_current=0 as MIS-REGISTERED under sole-map-writer discipline). Grounded by reading sim/weather_engine.py in full plus callers and tests: the core mechanism is BUILT, WIRED and TESTED, not greenfield -- fit_national_macro_model/simulate_national_macro implement a regime-switching mean-reverting AR1 model over the JOINT national temp/wind/cloud series (2x2 regime transition matrix, regime-specific innovation covariance, Cholesky joint innovations), calibrated against real Open-Meteo data over 3446 days; wired into simulation/demand_model.py + run_phase2b.py + run_phase3c_calibration.py (the real sim run path, not orphaned); covered by 27 tests in tests/sim/test_weather_engine.py plus control-mutation coverage. Per the rubric L1 = been BUILT in any form, overwhelmingly met, so L0 was a genuine under-registration (the map own lane summary already reads W1 as L1). Held at L1, NOT higher: L2 needs advisor ratification and three real gaps stay open (stressed-regime trigger keys on wind residual alone not the joint cold-and-still condition; no show-the-tail Dunkelflaute artefact or winter-vs-real-worst-week comparison; calibration and validation share one anchor = marking own homework); L3 needs the coupled-triad company-vs-truth gap plus a director Expert Hour. No BUILD code this turn; loop_stage stays idle (Epoch 3 gated).', '2026-07-16 Lane-3 H17 RE-DRAW (doc-only, no BUILD code -- EPOCH_GATING Rule 1). FRAME already saturated (existing docs/design/frame/W1_3_national_weather_signal_FRAME.md); level HELD at 1, no honest FRAME-stage move possible (target requires BUILD-gated code). BUILD-unblock gate: Epoch-3 BUILD-open + build latent blocking-high persistence regime, gap-measured vs company, C-S5 timescale declared. weather_engine.py Pass 1 exists; coupled-triad gap is the block. See LANE3_H17_BUILD_GATE_SURVEY_20260716.md for the full 6-atom gate table.']
