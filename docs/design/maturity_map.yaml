  simplifications: ["2026-07-13 REGISTERED (WORKTREE_ISOLATION_AND_SEAMS.md Half 1, director-decided QUEUE, HIGH rank -- the last known cap on BUILD width). Our exact failure is the documented headline problem: multiple agents in ONE working tree overwrite edits / read half-modified files / corrupt the git index. The answer already exists and is native: git worktrees (one checked-out dir + branch per agent, shared .git object store) via Claude Code's `isolation: worktree` subagent directive (our build agents in .claude/agents/ are already subagents) -- VERIFY the directive against current official docs before adopting. SUPERSEDES H9's interim 'orchestrator is sole map writer' convention with structure: (1) concurrent BUILD atoms each in an isolated worktree/branch, no shared tree; (2) maturity_map.yaml becomes READ-DURING-BUILD -- per-atom status/evidence to its own file (or append-only journal), map generated/merged from those, map stays single source of truth for the draw, no lost update (this is H9's build, done here as one mechanism); (3) merge model = orchestrated sequential merge, one integrator merges branches in defined order after each passes checks (simple model right below ~4-5 concurrent agents = us); (4) scoped suite per worktree, full 17k suite ONCE at integration; (5) per-worktree env is real plumbing (env files, ports, deps, daemon stack do NOT carry over) -- handle explicitly; (6) pre-flight merge-base conflict detection before merge. DoD: two disjoint atoms building simultaneously in separate worktrees, both status updates landing, no lost writes, merged cleanly. Fold recurring re-check into HARNESS_BEST_PRACTICE_ADOPTION (field moving monthly). loop_stage idle: DISCOVER/FRAME (verify the directive, design the status-file/merge model) workable now; BUILD is a harness change to rank.", "2026-07-13 FRAME DESIGN LANDED (Lane-3 discovery fork, doc-only, docs/design/WORKTREE_AND_MAP_CONTENTION_DESIGN.md -- one design covering H10 Half-A worktree isolation + H9 Half-B map read-during-build). Two load-bearing findings from direct repo read: (1) NONE of the six .claude/agents/*.md frontmatters use any isolation directive today (only name/description/tools/model) -- so `isolation: worktree` is UNPROVEN in-repo and MUST be verified against current official Claude Code subagent docs before wiring (the single biggest build-time risk; no network here to confirm the exact frontmatter key/value, branch-naming, worktree path). (2) The two build agents (saas-engineer, sim-engineer, both model:opus) are the only ones needing isolation; the four read-only agents do not. Design specifies: orchestrated sequential merge (first-green-first, pre-flight merge-base changed-file intersection to catch a mis-declared file_scope and re-sequence rather than merge blind); scoped suite per worktree by file_scope root (sim/simulation->tests/sim+tests/simulation, saas->tests/saas, company->tests/company, etc.), full ~17k suite ONCE at integration; per-worktree env plumbing enumerated concretely (secrets carry over via ~/.config out-of-tree + conftest setdefault + SIM_FAST_MODE autouse => scoped tests need no Ollama; .venv must be shared by absolute path, NOT recreated; the singleton daemon stack + ports :8801/:11434/file-api MUST NOT be relaunched by a fork; data/lake symlink if scoped tests read it). Ordered 8-step BUILD task list in the doc. loop_stage stays idle (BUILD-gated); ranks HIGH -- twin-approvable within the open epoch.", "2026-07-13 BUILT L0->L2, worktree half PROVISIONAL (same fork/commit bc32e130). L2 = the H9 map-de-contention mechanism (built+proof-tested, the real structural win). KEY FINDING: isolation=worktree is a CONFIRMED per-invocation Agent-dispatch parameter (usable NOW for true per-fork worktree isolation), but whether it works as a STANDING frontmatter default in .claude/agents/ is UNVERIFIED (no network vs official docs) -- wired best-effort + flagged provisional in both agent files; the guaranteed form is passing isolation=worktree per Agent dispatch. 732 background tests pass. L3 NOT reached: needs the isolation directive verified AND a real two-worktree end-to-end build; the directive verification needs the director/official docs (not autonomously doable), so loop_stage idle (honest hold at L2, L3 blocked on external verification). The map-contention half is load-bearing meanwhile.", "2026-07-17 HARDEN + NARRATIVE RECONCILIATION (Rule-0 self-refill at-target draw). RED-TEAM START: this atom''s structured level (level_current 3, loop_stage build) CONTRADICTED its own newest simplification above (''honest hold at L2 ... L3 blocked on external verification ... loop_stage idle''). Investigated per R9 (direct evidence before narrative) and the alarming ''silent/false promotion'' hypothesis DID NOT HOLD: git shows a real L2->L3 promotion (commit 347123778, 2026-07-14) whose stated basis is genuinely evidenced -- (a) the original L3 blocker (''standing-frontmatter worktree isolation UNVERIFIED, needs official docs / not autonomously doable'') was RESOLVED by OBSERVATION-AT-SCALE, not the docs-check it originally demanded: 50 live .git/worktrees/<id> checkouts with independent indexes observed during one real build wave (recorded in .claude/agents/sim-engineer.md + saas-engineer.md, ''2026-07-14 UPDATE''); (b) a real R15-mutation-tested enforcement control landed -- background/tree_lock.py::assert_changes_within_scope raises ScopeViolation on any out-of-scope OR protected-path (maturity_map.yaml) write by a fork, fail-open + fail-silent both probed (tests/background/test_worktree_isolation.py). THE GENUINE SURVIVING FINDING (real, not the false alarm): the L3 rationale + evidence were written into the AGENT FILES and the commit message but NEVER back into THIS atom''s simplifications/evidence, leaving the map narrative frozen at ''L2 hold'' -- so any agent drawing H10 (this very pass included) would mis-read it as L2-blocked, the exact mis-read hazard the ''authoritative state so a drawing agent cannot mis-read'' convention exists to kill. FIX (this note): narrative reconciled to L3-verified; evidence[] extended to point at the actual L3 control (test_worktree_isolation.py + tree_lock.py + the contention design doc) rather than only the registration/FRAME docs. HARDEN RE-VERIFY THIS PASS: 20/20 test_worktree_isolation exit tests green; R15 mutation re-confirmed live (neutering the ScopeViolation raise turns the two guard-fires tests RED, restoring turns them GREEN). CARRIED-FORWARD HONEST CAVEAT (unchanged, still true): the guaranteed-working isolation form remains per-invocation isolation=worktree on the Agent dispatch; standing-frontmatter is now OBSERVED-working at scale but was never confirmed against official docs (no network) -- an empirical, not documentary, verification. No code change, no level change (stays L3); doc-only reconciliation."]
