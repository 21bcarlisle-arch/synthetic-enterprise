  simplifications: ["2026-07-13 REGISTERED (JUDGING_THE_JUDGES.md Part 2, director P1, R13 CURRICULUM -- the DIRECTOR decides the numbers, the agent only FRAMES, never tunes the weights toward a gap number). The harm-cost weights turn the belief-vs-truth GAP (can't-pay/won't-pay 2x2) into a SCORE. HARM = true-can't-pay classified won't-pay (aggressive collections vs someone who cannot pay: ability-to-pay + Consumer Duty breach, vulnerability harm, Ofgem enforcement, licence risk). LOSS = true-won't-pay classified can't-pay (soft on a strategic non-payer: bad debt, moral hazard). Shape: heavily asymmetric toward harm-avoidance BUT NOT infinite -- both failure modes must remain lethal (infinite harm-weight => never pursue => bad debt kills the company the other way; a weighting that makes one real death impossible has removed a truth from the world). Framing fork dispatched (docs/design/HARM_COST_WEIGHTS_DECISION.md: anchor sets both directions with sources, recommended ratio, implied policy at extremes, and THE FLIP-POINT -- at what harm:loss ratio the optimal policy flips pursue->forbear, the pitch number). Placeholders stay until the director signs; this atom BLOCKS on his decision (a genuine director-reserved curriculum call, to be surfaced once the framing lands). loop_stage idle: framing is agent-workable, the DECISION is the director's.", "2026-07-13 FRAMING DONE L0->L1 (framing fork, commit aff291ef, docs/design/HARM_COST_WEIGHTS_DECISION.md). Recommended R=H/L~8:1 (band 5:1-10:1); decision rule pursue iff classifier confidence >= R/(R+1) ~89pct; FLIP-POINT R*=p/(1-p) [CORRECTED 2026-07-13: earlier inverted (1-p)/p mixed p=cant-pay in the formula with p=wont-pay in the confidence bar], headline: at p=0.5 (ambiguous account) R*=1 so above any harm-weighting the coin-flip account is forborne -- pursuit must be EARNED by confidence. Placeholder H1 (per-wrongful-case redress + licence-loss tail prob) needs a director/networked figure (repo has only the £90m British Gas aggregate). Now BLOCKS on the director signing the ratio (registered as [ACTION NEEDED]). R13/R12 honoured -- never tuned toward a gap number, ships provisional.", "2026-07-13 DIRECTOR SIGNED (DIRECTOR_ANSWER_HARM_WEIGHTS.md): R=8:1, band 5:1-10:1, versioned (R13 curriculum). [ACTION NEEDED] A7_harm_cost_weights_ratio RESOLVED. FORMULA CORRECTED after an advisor catch -- p=P(wont-pay), PURSUE iff p>R/(R+1), flip R*=p/(1-p); the earlier (1-p)/p was an inverted convention-mix. NO code carried the inversion (the C9 decision gate is unbuilt); the corrected gate + the p=0.9/0.1 mutation-test requirement are baked into C9_cantpay_wontpay_classifier. Full curriculum record, the 2 named simplifications (heavy-tailed harm; vulnerability-scaling), and the H1 anchor live on A6_coupled_triad_gap_metric. A7 -> L1 (framing done + director-signed)."]
