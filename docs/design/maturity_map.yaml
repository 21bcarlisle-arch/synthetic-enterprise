  name: "Scheduled housekeeping: a standing cadence+threshold sweep (maintenance-lane function) that inventories and clears cruft — stale worktrees, dead branches, staging droppings, unbounded logs, orphaned tmux, local/origin drift — reversible-by-default, never touching in-flight work"
  lane: H_harness
  value_stream: close_to_learn
