on + H9 Half-B map read-during-build). Two load-bearing findings from direct repo read: (1) NONE of the six .claude/agents/*.md frontmatters use any isolation directive today (only name/description/tools/model) -- so `isolation: worktree` is UNPROVEN in-repo and MUST be verified against current official Claude Code subagent docs before wiring (the single biggest build-time risk; no network here to confirm the exact frontmatter key/value, branch-naming, worktree path). (2) The two build agents (saas-engineer, sim-engineer, both model:opus) are the only ones needing isolation; the four read-only agents do not. Design specifies: orchestrated sequential merge (first-green-first, pre-flight merge-base changed-file intersection to catch a mis-declared file_scope and re-sequence rather than merge blind); scoped suite per worktree by file_scope root (sim/simulation->tests/sim+tests/simulation, saas->tests/saas, company->tests/company, etc.), full ~17k suite ONCE at integration; per-worktree env plumbing enumerated concretely (secrets carry over via ~/.config out-of-tree + conftest setdefault + SIM_FAST_MODE autouse => scoped tests need no Ollama; .venv must be shared by absolute path, NOT recreated; the singleton daemon stack + ports :8801/:11434/file-api MUST NOT be relaunched by a fork; data/lake symlink if scoped tests read it). Ordered 8-step BUILD task list in the doc. loop_stage stays idle (BUILD-gated); ranks HIGH -- twin-approvable within the open epoch."]
