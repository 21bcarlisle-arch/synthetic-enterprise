ode). Follows directly from the active-defect finding above -- once the residential events are gated to segment=='resi', something must generate SME/I&C economic state instead; this pass frames what. Checked which of Household's fields are genuinely segment-agnostic vs residential-only: property_type (already has COMMERCIAL_OFFICE/COMMERCIAL_WAREHOUSE values), epc_rating, heating_system, insulation, solar/battery/EV all legitimately apply to a commercial premises' physical characteristics -- confirmed real commercial customer records (C5/C6) already populate these correctly. Only bedrooms (already None for commercial, correctly) and the DEMOGRAPHIC-flavoured drivers of income_stress are residential-specific. FRAME recommendation: do NOT build a wholly separate BusinessProperty/company dataclass -- keep the ONE shared Household dataclass (matching this atom's own name, 'distress TWIN', implying mirrored structure not an alien mechanism), and have simulation/life_events.py::generate_life_events() branch INTERNALLY on household segment: the existing 5 residential events for segment=='resi', a new sector-shock/insolvency-hazard event set (anchored to this atom's own real sector-concentration data: construction 17%/wholesale-retail 15%/accommodation-food 14% of UK insolvencies) for segment in ('SME','I&C'), both still writing into the SAME income_stress-shaped state variable if its existing 3-level granularity (LOW/MODERATE/HIGH) proves sufficient, or a segment-conditional richer enum only if the previously-named third hidden state ('vacant, landlord-liable') proves genuinely necessary -- start with the cheaper reuse, extend only if the FRAME/BUILD pass finds real evidence the 3-level model can't represent the business case. This is the same 'one architecture, not two' principle already applied to several sibling atoms this session, now resolving both this atom's own open architecture question and the active-defect fix's own 'what replaces it' question as one coherent de