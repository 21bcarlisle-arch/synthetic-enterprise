 ''must take all reasonable steps to identify customers in vulnerable situations'' from day-to-day interactions, not wait for self-disclosure -- ''customers rarely flag vulnerability proactively'', reinforcing this atom''s own C/F framing that detection is a genuine company-side inference task, not a lookup. [L] Real, current, quantified stakes anchor: Ovo Energy was required to pay GBP11.5m over failings in support for vulnerable customers -- a real, named, current enforcement precedent for exactly the ''missed detection is a harm event'' framing this atom''s own registration already asserts, not a hypothetical. Real primary source named for the eventual FRAME/BUILD pass to consult directly (not yet read in full this pass): Energy UK''s 2025 Vulnerability Commitment Good Practice Guide. Honest gap, not resolved here: no specific quantified confidence/threshold mapping (e.g. ''N consecutive missed payments implies X% probability of illness vs divorce vs simple hardship'') was found -- the real anchors ground WHICH signals are legitimate, not HOW to combine them into a detector; that remains real FRAME/BUILD work, correctly deferred.', '2026-07-13 IDLE-HOLE FIX, loop_stage harden->idle (self-refill drew this exact atom 15+ turns running, confirmed by direct inspection: recomputed the real harden-tier candidate pool and found this atom was THE ONLY valid candidate, matching the exact H7_skills_and_rules idle-hole class fixed earlier this session -- guaranteed reselection, not landing on it by chance). Root cause here is a NEW variant of the same structural class: not a stale dependency, not a session-lifecycle block, but a genuinely correct atom whose only remaining step (designing a vulnerability-detection heuristic from real, now well-anchored signals) is a substantial, deliberate BUILD/design effort this project''s own discipline says should not be rushed into on a single self-refill draw -- three consecutive DISCOVER/FRAME passes have already thoroughly grounded t