aw, DISCOVER/FRAME only per epoch gating, no BUILD code -- level held at 2, not yet ready for L3). The prior finding called the same-day leak 'magnitude negligible... not a material future-data leak' without deriving a number. Traced the real consumer: company/trading/hedge_decision.py::estimate_price_volatility() (fed by the leaked history via decide_hedge_fraction(), the REAL per-term VaR-hedge-fraction decision) computes an EWMA (lambda=0.94) of squared daily log-returns, updated SEQUENTIALLY oldest-to-newest, so the final variance value's weight on any single return is (1-lambda)=6% for the MOST RECENT return and geometrically less for every older one -- the leaked same-day return (day D-1 -> D, using D's not-yet-knowable price) is structurally the SINGLE MOST HEAVILY WEIGHTED individual return in the whole 90-day EWMA, not an equal 1-in-90 contribution as 'negligible' implies. Also confirmed this is not a dormant code path: company/policy/decision_policy.py's CURRENT_POLICY (the real, live policy used in actual production runs, confirmed via tests/company/policy/test_decision_policy.py) has use_var_hedge_decision=True, so every VaR-hedged fixed/pass-through electricity term across the full 2016-2025 replay exercises this exact leaked path. Honest limit of this pass: an empirical measurement (the real GBP/MWh vol delta with vs without the leaked day, for actual historical dates) was NOT performed -- the raw daily elec_records are fetched live from Elexon per run and are not cached locally in a form this pass could reuse, and a fresh live fetch is out of scope for an autonomous DISCOVER turn. This pass therefore UPGRADES the finding from 'negligible, asserted' to 'analytically bounded at up to 6% direct EWMA weight on a real, live, per-term decision -- a real correction of the earlier reassurance, not just a repeat of it -- and still not yet a live-measured number, which remains the honest gap for whoever next touches this path (alongside the already-named fix: shift transaction_time to end-of-day D or start-of-day D+1).", "2026-07-13 SYNTHETIC WORKED EXAMPLE closes the empirical-measurement gap named above using a controlled test rather than real historical data (self-refill draw, DISCOVER/FRAME only per epoch gating, no BUILD code). Real historical Elexon records remain unavailable locally (unchanged limit), but ran the ACTUAL production functions (company/trading/hedge_decision.py::estimate_price_volatility()/decide_hedge_fraction()) against a controlled synthetic 90-day price series, varying ONLY the final (leaked) day's price to isolate its effect. Result, real and code-executed, not estimated: a plausible cold-snap-magnitude spike on just the leaked day (1.2x/1.5x/2.0x/2.5x the prior day's price) moved the resulting annualised volatility estimate by +55.8%/+191.4%/+418.7%/+628.6% respectively -- confirming the earlier '~6% EWMA weight' analytical bound translates into a large real swing in the actual output metric once a genuinely plausible single-day price shock is injected, not merely a theoretical upper bound. HONEST ADDITIONAL NUANCE found via this same test, not asserted in advance: whether this vol swing reaches the final OBSERVABLE hedge_fraction depends on where the term's own computed value sits relative to company/risk/hedge_policy.py::COMPANY_MIN_HEDGE_FLOOR (0.85) -- in this test's own parameter regime the raw computed hedge_fraction stayed below the 0.85 floor even after the vol spike, so the floor clamped the visible output flat despite the underlying volatility estimate moving by over 600%. This means the same-day leak's real-world bite is regime-dependent: material when a term's own risk profile computes an hf comfortably between the floor and 1.0, invisible when the floor is already binding -- a genuine, precise characterisation, not a blanket 'always material' or 'always negligible' claim. Also corrects an error made earlier this session in a summary to Rich: this atom was misstated as 'level 3/3, ha