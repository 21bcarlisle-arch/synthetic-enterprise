  file_scope: [background, tools, tests, docs/design]
  simplifications: ['2026-07-16 H17 Lane-3 DISCOVER/FRAME (fork, doc-only, no BUILD code — EPOCH_GATING Rule 1). AUTHORED as a proposal atom (the agent may author candidates, never BUILD until opened) to convert a twice-evaporated prose meta-finding into a drawable mechanism atom (MAKE_IT_STICK: prose-only decays). DEFECT (observed, R9): background/supervisor.py::_idle_discover_frame_draw re-drew the SAME set of FRAME-saturated BUILD-gated atoms THREE times in one day (caab8d8c1, 3d20b846d, this turn) — each a no-op on the drawn atoms (all carry complete FRAME docs, all already list the LANE3_H17_BUILD_GATE_SURVEY in evidence, all HELD below target for a BUILD-gated reason). Re-emitting FRAMEs is the churn SELF_INTERRUPT_DISCIPLINE + R12 forbid. CLASS not instance: a DIAL defect (Rule 0 — empty feasible set within the FRAME stage for these atoms), not a WALL. The remedy was filed as survey-doc prose at occurrences 1 and 2 and evaporated both times because prose is not a drawable unit of work; n=3 is the trigger to register it. MECHANISM (BUILD-gated, not built here): (1) a frame_saturated marker (new optional field / frame_stage sub-map carrying since-commit + the one-line BUILD-unblock gate) set when a FRAME turn produces no new evidence and no level move; (2) _idle_discover_frame_draw filters out marked atoms whose BUILD-gate is still closed, preferring un-saturated idle atoms, and returns None-with-reason if EVERY idle atom is saturated (a true empty FRAME-lane feasible set, not a spin); (3) the marker auto-clears when the BUILD-gate opens or new evidence/level lands (a cache, never a permanent hold — no orphan transition, R11). R15 DoD: mutation test both directions — FIRES (skips the saturated pair, hands the un-saturated third), QUIET (auto-clears + re-enters the draw when a gate opens, must not starve a ready atom), plus the all-saturated returns-None case. SIMPLICITY GUARD honoured (reuse map fields, no new registry). BUILD-unblock gate: Epoch-2 BUILD-open (harness/supervisor infra in the open epoch) via director_twin.py::route_blocking_decision — reversible (git reverts, draw falls back to current behaviour), NOT a one-way door. Level HELD at 0 (proposal-atom FRAME is not a build). See docs/design/frame/H23_frame_saturation_draw_marker_FRAME.md.', '2026-07-16 H17 Lane-3 DISCOVER/FRAME (fork, doc-only, NO BUILD code — EPOCH_GATING Rule 1). OCCURRENCE 4 (recursive, R9 observed): the idle self-refill re-drew H23 ITSELF for FRAME work while H23 is already FRAME-saturated by its own definition (complete FRAME doc + level held 0<2 for a BUILD-gated reason) — the exact defect H23 exists to prevent, now landing on the fix atom (root cause confirmed on disk: supervisor.py::_idle_discover_frame_draw has no saturation notion). Per SELF_INTERRUPT+R12 a second FRAME doc would be churn, so NONE written. DISPOSITION: routed the reversible BUILD-open to the standing approver (EPOCH_GATING canon v2 §3a) — twin APPROVED, high confidence, DEFERS_TO_DIRECTOR:no, NEEDS_DIRECTOR:false (director_twin_log.jsonl @ 2026-07-16T17:57:36.291267+00:00; not a §3 one-way door, reversible by git revert). REMAINING LANDING TRANSITION (not doable from a fork — F1 forbids map edits; inbox schema carries no loop_stage): flip H23.loop_stage idle→buildable so the BUILD draw (_maturity_map_draw_concurrent excludes loop_stage==idle) picks it up; until then occurrence 5 is possible (recorded loudly, MAKE_IT_STICK). ADJACENT FINDINGS QUEUED (R9, not fixed — SELF_INTERRUPT, out of file_scope): background/one_way_door.py::classify_action false-positives (A) on negation phrasing (''no real money'' matches \breal money\b) and (B) when the current epoch is named by number (''currently-open epoch 2'' matches open\s+epoch\s*\d, the pattern the 2026-07-16 fix narrowed for OPENING a new epoch) — each caused a spurious [ACTION NEEDED] before clean re-phrasing let the twin answer; spurious H23 register entry cleared (action_needed.clear_item, no director decision). Proposed atom H24_oneway_classifier_false_positives with both repros as FIRES/QUIET fixtures. Level HELD at 0 — nothing built this turn.', '2026-07-16 H17 Lane-3 ORCHESTRATOR turn (map integrator — prior H17 turns edit the map directly to fold, e.g. commit 82b9c6039). OCCURRENCE 5 of the recursion: the idle self-refill re-drew SIX FRAME-saturated BUILD-gated atoms (H18, W1_2, B4, B5, W4_2, W1_3) — every one already carrying a complete FRAME doc and already listing docs/design/frame/LANE3_H17_BUILD_GATE_SURVEY_20260716.md in its evidence, all HELD below target for a BUILD-gated reason. No honest FRAME-stage output remained, so NO new FRAME docs were written (SELF_INTERRUPT_DISCIPLINE + R12 anti-churn; a seventh/eighth duplicate FRAME is the treadmill). LANDING TRANSITION EXECUTED — occurrence 4 named it precisely (''flip H23.loop_stage idle→build so the BUILD draw picks it up'') and said a fork could not do it; this integrator turn did: flipped H23.loop_stage idle→build so background/supervisor.py::_maturity_map_draw_concurrent (which excludes loop_stage==idle via _is_valid_candidate) now selects H23 for the Lane-1 BUILD draw and the remedy actually gets built — ending the recursion at the MECHANISM level (MAKE_IT_STICK: a prose-only ''occurrence N recorded'' entry evaporated four times; a build-lane flip does not). Authority: the twin already APPROVED this exact BUILD-open (director_twin_log.jsonl @ 2026-07-16T17:57:36, canon v2 §3a standing approver, CONFIDENCE high, DEFERS_TO_DIRECTOR:no, verbatim ''Nothing here is director-reserved''); the flip is reversible (git reverts to loop_stage:idle and the draw falls back to current behaviour), Epoch-2 is open, depends_on:[] met, NOT a one-way door. Rule 0 (PRIME DIRECTIVE): a 6-atom empty FRAME feasible set is a DIAL defect, not a hold — yielded the scope-restriction dial to take the one genuine unblocking action, exactly the mechanised widen-scope-until-work-exists path. No level move (0→0: opening for BUILD is not itself a build); NO BUILD code written this turn. provenance stays ''proposal'' until the BUILD turn lands the marker+guard+R15 mutation test and levels it 0→2.', '2026-07-16 H17 LANE-1 BUILD (fork, F1 inbox). BUILT the marker+guard+R15 mutation test; level 0->2 (real, tested mechanism code, VERIFY pass on the live map). MECHANISM landed in background/supervisor.py: (1) _atom_has_frame_doc(atom) -- intrinsic saturation signal: True iff an `evidence` entry under docs/design/frame/ whose filename contains FRAME resolves to an existing file under PROJECT_DIR (checks real disk, R7; the filename-FRAME requirement excludes a shared SURVEY listed as evidence so an atom carrying only the survey still reads un-saturated). (2) _is_frame_saturated(atom) = explicit bool `frame_saturated` override if present (force-skip/force-offer -- the R11 escape so state is a cache, never a permanent hold) ELSE the intrinsic check. (3) draw-skip guard wired into BOTH _idle_discover_frame_draw (single) and _idle_discover_frame_draw_concurrent (the PRODUCTION path via _self_refill_draw): hard-skip saturated atoms with NO fallback (unlike the stall soft-deprioritise) -- prefer un-saturated idle atoms; if EVERY idle atom is saturated, return None/[] with a logged reason (a TRUE empty FRAME feasible set, Rule 0, reported idle-with-reason) rather than re-handing a saturated atom (the exact 5x-in-one-day re-hand this atom fixes). DESIGN CHOICE vs the FRAME doc''s proposed `frame_saturated: {since, gate}` sub-map: made saturation INTRINSIC/computed (has-FRAME-doc) rather than a marker a turn must remember to SET -- MAKE_IT_STICK: a setter that a turn can forget decays (this finding evaporated as prose four times); a computed check cannot, and it reuses the existing `evidence` field (SIMPLICITY GUARD, no new registry/setter). Auto-clear on BUILD-gate-open is automatic: gate-open flips loop_stage off `idle`, the atom leaves the idle pool (existing filter) and re-enters via the BUILD draw. R15 mutation test tests/background/test_frame_saturation_draw_marker.py (11 tests, all green) covers BOTH directions + all-saturated + a guard-removed regression control: FIRES (saturated pair never handed while an un-saturated atom exists, 50-draw assertion, both draw entry points), QUIET (a re-opened atom re-enters -- loop_stage->build picked by _maturity_map_draw_concurrent, AND the explicit `frame_saturated:false` R11 escape re-offers a frame-doc''d atom), ALL-SATURATED (returns None/[], never a re-hand), plus unit tests of the disk-existence check + the survey-is-not-a-FRAME distinction + explicit-override-both-ways + a mock-patched guard-off mutation proving the test fails if the guard is reverted. VERIFIED end-to-end on the LIVE map: the concurrent idle draw now hands genuinely un-FRAMEd atoms (A8, W1_5, C13, W1_7, W1_10) and skips ALL ~10 saturated atoms incl. H18/W1_2/B4/B5/W4_2/W1_3/W1_4 -- recursion broken, the DISCOVER/FRAME lane re-pointed at ~18 idle atoms with real FRAME work. Full suite: tests/background/test_supervisor.py 143 green (no regression in the two touched draw functions), epistemic verifier PASS (510 files, harness-infra change only, no company/sim seam). Authority: twin APPROVED this BUILD-open (director_twin_log.jsonl @ 2026-07-16T17:57:36, canon v2 SS3a, reversible/not a one-way door). provenance should flip proposal->built at fold (inbox schema does not carry provenance).', '2026-07-16 QUEUED FINDING (H17 Lane-3 fork, SELF_INTERRUPT_DISCIPLINE -- registered NOT fixed on sight; no supervisor.py/guard edit this turn). The frame-saturation guard''s `_atom_has_frame_doc` has a residual FALSE-NEGATIVE: it only recognises a per-atom FRAME doc under `docs/design/frame/` (the `startswith(''docs/design/frame/'')` filter). But several idle BUILD-gated atoms carry a COMPLETE per-atom FRAME doc under `docs/design/` DIRECTLY (non-canonical path) and are therefore mis-read as un-saturated and re-offered to the idle DISCOVER/FRAME draw indefinitely -- the exact treadmill this atom exists to stop, just relocated to a different atom set. CONFIRMED live this turn: `_self_refill_draw()` currently offers G4_unified_failure_register (has a full FRAME at docs/design/UNIFIED_FAILURE_REGISTER.md, per its own simplification[1] 2026-07-16) and W1_10_ev_heatpump_geography (has a full FRAME at docs/design/W1_10_FRAME.md, per its own simplification 2026-07-16 ''FRAME LANDED'') as un-saturated DISCOVER/FRAME candidates, when both are genuinely FRAME-complete. TWO documented remedies, either is low-risk and BOTH are H23/map-writer work (a Lane-3 doc fork cannot do them: F1 bars editing the map, and broadening a draw CONTROL is H_harness BUILD, not DISCOVER/FRAME): (a) set the guard''s own documented explicit override `frame_saturated: true` on G4 and W1_10 (the docstring names this exact escape for ''a FRAME doc under a non-standard name'') -- cheapest, but a per-atom manual step that must be remembered (MAKE_IT_STICK: a setter decays); or (b) broaden `_atom_has_frame_doc` to also recognise an atom''s OWN FRAME doc under `docs/design/` (e.g. an evidence entry whose filename contains the atom id AND ''FRAME'', existing on disk) -- computed, cannot decay, but must guard against a false-POSITIVE (a partial design doc marking an atom saturated prematurely), so it needs a mutation test (a genuinely-unframed atom with only a shared survey/design doc must still read un-saturated -- the existing survey-vs-FRAME distinction must survive). Recommend (b) with the mutation test, since (a) is the decay-prone prose-setter the whole H23 finding warns against. No level change to H23 (stays at its BUILT level); this is a scope note for the next H23 BUILD turn.', '2026-07-16 H17 LANE-1 BUILD (fork, F1 inbox) -- closed the residual FALSE-NEGATIVE registered as this atom''s own queued finding (simplification note[4], SELF_INTERRUPT). DEFECT (observed, R9): background/supervisor.py::_atom_has_frame_doc keyed saturation on the `docs/design/frame/` path PREFIX, so ~11 idle BUILD-gated atoms carrying a COMPLETE per-atom FRAME doc directly under `docs/design/` (the older non-canonical path -- W1_10 docs/design/W1_10_FRAME.md, H20 docs/design/H20_PARALLEL_MAINTENANCE_LANE_FRAME.md, H21 docs/design/H21_SELF_CONTAINED_ESCALATION_FRAME.md, ...) read as un-saturated and were re-handed to the idle DISCOVER/FRAME draw indefinitely -- the exact treadmill this atom exists to stop, just relocated to a different atom set. FIX: broadened the prefix from `docs/design/frame/` to `docs/design/` (any depth); the `FRAME`-in-FILENAME gate is unchanged, so shared surveys (LANE3_..._BUILD_GATE_SURVEY, no FRAME) and DISCOVER-stage docs (..._DISCOVER.md, no FRAME) are still correctly NOT counted -- a genuinely-unframed atom is never falsely marked saturated. Computed, cannot decay (MAKE_IT_STICK: chose the broadened intrinsic check over the decay-prone per-atom `frame_saturated: true` setter -- remedy (b) of note[4], not (a)). SAFE on the live map: verified every non-canonical *_FRAME.md is owned by exactly ONE atom (no shared FRAME-named doc outside frame/), so no false-positive via a shared doc. R15 mutation test tests/background/test_frame_saturation_draw_marker.py extended +5 tests (16 total, all green): non-canonical-path FRAME doc reads saturated (the fix); a DISCOVER-stage doc under docs/design/ still reads un-saturated (false-positive guard, C13 case); FIRES integration on BOTH draw entry points; a guard-mutation control that restores the narrow pre-fix prefix and asserts the atom IS then re-handed (fails if the fix is reverted). VERIFIED on the LIVE map: post-fix idle draw now SKIPS W1_10/H20/H21 (saturated=True) and re-points at genuinely un-framed atoms (H8, A4, C4, plus C13/W1_5 which have real FRAME work); G4_unified_failure_register REMAINS a residual false- negative (its FRAME doc docs/design/UNIFIED_FAILURE_REGISTER.md carries neither FRAME nor its id/slug in the filename -- out of reach of any safe filename heuristic) and still needs the documented `frame_saturated: true` explicit override, a one-line MAP-WRITER step a Lane-3/BUILD fork cannot do (F1). Full suite tests/background/ test_supervisor.py 143 green (no regression in the two touched draw functions), epistemic verifier PASS (510 files, harness-infra only). Level HELD at 2 (H23 was already at target; this is a correctness/HARDEN increment closing a residual leak, not a level move). Authority: H23 is loop_stage=build, twin-APPROVED for BUILD-open (director_twin_log.jsonl @ 2026-07-16T17:57:36, canon v2 SS3a, reversible/not a one-way door), Epoch-2 open; Rule 0 (PRIME DIRECTIVE) authorised yielding the genuinely churn-saturated Lane-3 FRAME dial to land this registered mechanism fix (empty/churning feasible set is a DIAL defect, take the work that exists).', '2026-07-16 DEPLOYMENT GAP (R2, observed with evidence -- NOT self-fixable this turn): the running background/executor_daemon.py (PID 704593) started 19:27:11, SEVEN minutes BEFORE the frame-saturation guard itself landed (commit d2f1b420a @ 19:34:02), so it holds the PRE-GUARD supervisor module in memory and keeps dispatching headless turns a STALE draw of the path-convention-saturated 6 (H17/W1_2/B4/B5/W4_2/W1_3) -- exactly the doorbell THIS turn was handed (R7: verified against live code, which correctly excludes them). This fix (and the original guard) are ''committed != running'' until that daemon is RESTARTED. A fork CANNOT safely restart the daemon that owns its own process mid-turn (killing PID 704593 risks losing this turn''s pushed result via the broken stdout pipe), so this is flagged for the interactive session / next daemon lifecycle, not actioned here -- the honest R2 deployment step, decoupled from the code fix which is landed and pushed.', '2026-07-16 H23 occurrence-11 ROOT-CAUSED + terminally fixed (R2 mechanised, MAKE_IT_STICK). Evidence: executor_daemon PID 704593 launched 18:27Z, imported the draw code (find_work/_is_frame_saturated); the saturation-detection fix d91b03424 landed 19:36Z; the daemon kept dispatching claude -p turns off its STALE in-process import for ~104min, re-offering already-FRAME-saturated atoms (all 6 in this turn''s draw -- H20/W1_2/B4/B5/W4_2/W1_3 -- verified saturated in current code, which the live guard correctly excludes). NOT a detection-logic gap (current code is right) and NOT a fold-lag (evidence folded hours earlier): a stale-code daemon holding an in-memory import, so a fresh map read alone can''t cure it -- only a process re-exec. Occurrences 1-10 diagnosed+QUEUED; per R3 (two-strike->redesign) the queued ''fork-side saturation re-check'' is now BUILT as the self-staleness re-exec guard, converting the decayed ''restart the daemon after a draw-logic change'' exhortation into a mechanism. SIMPLIFICATION (R10): fingerprint is over a fixed 4-module watchlist (the draw/loop/gate/launcher hot path), not the whole import graph; a change to a transitively-imported helper outside that set would not trip it -- acceptable because the recurring defect has always been in these four.']
