 now compares against an independently-computed real baseline instead of a loose bound. 6 new/changed tests, epistemic PASS. level_current correctly stays at 2 -- the fixes are real and worth keeping, but do not themselves close the two structural L3 blockers (pipeline wiring, genuine register consolidation).", "2026-07-12 SECOND EXPERT HOUR REVIEW, narrow finding fixed same session: a real product-mechanic incoherence in the rendered surface itself (phase-close rule 0c, reading one instance as a human) -- the mandate's own smoothed/re-estimated monthly_amount_gbp read as if it were a Fixed-DD instalment amount, directly above a collection table where every real attempt was the raw, varying bill total, with no code path connecting the two. This corresponds to no real UK DD product: a genuine smoothed Fixed DD collects the fixed amount and tracks seasonal variation as a running balance; a genuine Variable DD collects the real bill each cycle with no fixed mandate figure gating anything. The code always collected the real bill amount (submit_collection() uses the bill's own total_amount_gbp, never mandate.monthly_amount_gbp) -- i.e. this always WAS Variable DD -- but neither the docstring nor the site surface said so. FIXED BY LABELLING, deliberately not re-engineering (the reviewer's own specified remedy option (b)): site/supplier/index.html's copy and portfolio KPI now state explicitly this is Variable DD, the mandate figure is an 'estimated reference level' that never sizes or gates a collection (only decides when an ADDACS re-estimation notice fires), and the KPI is relabelled 'Est. Reference Total' away from the misleading 'Monthly Collection'. No change to which cash amount is actually collected -- ground truth stays exactly as compute_emergent_bad_debt() computed it. This product-choice registration is the entry itself (R10: nothing may be simplified silently).", "2026-07-12 REGISTER-CONSOLIDATION BLOCKER, investigated and partially closed: the second Expert Hour review suggested a future migration should move DirectDebitBook's callers onto company/billing/dd_mandate_register.py::DDMandateRegister, given its cleaner as_of point-in-time discipline. Investigated directly rather than deferred again: that direction is not a clean migration -- DDMandateRegister has NO attempt-tracking concept at all (its own docstring: 'this module tracks the mandate, not individual payments'), so migrating onto it would still need a second, bolted-on structure for collection attempts, not actually eliminating the duplication. FIXED instead, the other direction: DirectDebitMandate gained last_status_change_date, and cancel_mandate()/reinstate_mandate() gained optional as_of parameters that stamp it -- folding DDMandateRegister's real advantage into the module that already has a live caller and already tracks attempts, additive and backward-compatible (no as_of passed = identical behaviour to before). dd_mandate_register.py's own docstring corrected with this finding and a go-forward retirement recommendation (not carried out this pass -- deleting real historical work is a bigger, more consequential step than enriching the live module, left as an explicit future action). The duplication is NOT fully resolved (dd_mandate_register.py itself is not deleted, still exists, still unused) but the underlying REASON it mattered -- DirectDebitBook lacking a real point-in-time discipline -- is now closed. 6 new tests, epistemic PASS.", "2026-07-12 THIRD PASS: the last named L3 blocker (mandate setup not genuinely gating the collection it precedes) fixed. The prior reasoning for leaving this open twice -- 'risks changing ground-truth arrears/bad-debt outcomes' -- was re-examined precisely rather than re-asserted, and found to conflate two independent things: payment_outcome()'s success/fail decision (compute_emergent_bad_debt()'s own ground truth) is drawn from the shared rng BEFORE any date logic runs and takes no date as an input at all, so gating a collection's own due_date can never change which bills succeed or fail; and this module's own dates feed nothing but a business-surface rendering (extract_dd_rails()), never the ledger/cash-timing pipeline that computes any actually-published financial figure. FIXED: a brand-new mandate's first collection due_date is now max(bill's own due_date, mandate's own AUDDIS confirmation date) -- genuinely gated, matching what a real Bacs integration requires. Verified against the REAL full pipeline run (not just unit tests, ~580s, all 3 real end-to-end tests still pass) with this change in place, in addition to 3 new/rewritten unit tests covering the gate itself, the outcome-independence safety property, and that an already-established mandate's second+ collection is NOT further gated. All named L3 blockers from both prior Expert Hour reviews are now addressed: pipeline wiring (closed pass 2), product-mechanic labelling (closed pass 2), register consolidation (closed pass 3, prior entry), and mandate-setup gating (closed this entry). Next real step: a fresh, non-self-graded Expert Hour review of the FULL current state before any level claim."]
