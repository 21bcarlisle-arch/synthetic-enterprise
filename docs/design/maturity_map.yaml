  name: "FRAME-saturation draw marker: the idle-DISCOVER/FRAME self-refill must not re-hand a FRAME-saturated BUILD-gated atom (no honest FRAME-stage output left) — skip it in favour of a genuinely un-FRAMEd idle atom, re-offer only when its BUILD-gate opens; mutation-tested both directions"
