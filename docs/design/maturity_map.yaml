rmed genuinely un-anchorable via this method, not merely unsearched. Recommendation for the eventual FRAME pass: treat this as a real open question needing either a more specialised source (e.g. a debt-advice-sector practitioner survey, not a consumer-facing guide) or an explicit director-set curriculum assumption (R13), rather than a further DISCOVER search.", "2026-07-13 FRAME pass, architecture (self-refill draw, DISCOVER/FRAME only per epoch gating, no BUILD code). All four prior passes anchored external research; none checked internal code for the natural integration point, so this pass does. simulation/household.py's Household dataclass already carries a single field for this exact concept -- income_stress: IncomeStress (LOW/MODERATE/HIGH), 'updated by life events (job_loss, income_recovery, new_baby, retirement)' per its own comment -- and simulation/household_demand.py's HouseholdDemandRegister (already real, wired, per-customer, date-aware via household_at_date()/income_stress_at_date()) is the live consumer. Confirmed via direct read: NO income band, essential-cost floor, discretionary margin, savings buffer, or debt-priority stack exists anywhere in Household today -- income_stress is a coarse 3-level categorical proxy only, genuinely NOT the atom's own registered richer quantitative state. FRAME conclusion: this atom's real build should EXTEND Household (new fields alongside income_stress, not a new parallel register) and should treat income_stress as a correlated input, not an independent draw -- the same life events that move IncomeStress today (job_loss, retirement, and this session's own new illness/divorce additions from W2_5) are real, natural trigger points for the essential-cost-floor/discretionary-margin state to shift too, keeping the two atoms' shared substrate coherent rather than building two independent economic-state tracks that could silently diverge. This is the same 'one architecture, not two' principle already applied to several sibling atoms this session. file_scope for the eventual BUILD should include simulation/household.py and simulation/household_demand.py alongside the already-registered company/compliance/crisis_bad_debt_validator.py. Does not attempt the within-priority-tier ordering question again -- the prior pass's own recommendation (a specialised source or an explicit director-set R13 assumption) stands unrepeated."]
