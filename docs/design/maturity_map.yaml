  simplifications: ["2026-07-13 REGISTERED (INVARIANT_LIBRARY_REDTEAM.md top-1, HIGH -- a live Tier-1 control giving FALSE assurance). saas/bill_generator.py:158 computes vat = subtotal * vat_rate(segment); pre_bill_validation.py:60-68 re-derives the rate by dividing back and checks it against vat_rate_for_segment(segment) (domain_invariants.py:395-406) -- BOTH sides are the same function of the same segment field, so the check passes for every bill the generator can emit and STRUCTURALLY CANNOT catch its own named C6 SME-as-Household mislabel class (the exact R10 absurdity class it was built for). FIX (class, per R10): re-base the expected VAT/segment on an INDEPENDENT observable signal (e.g. consumption band / meter profile / tariff registration) so a mislabelled segment produces a MISMATCH the gate catches, not a tautology. loop_stage idle: DISCOVER/FRAME the independent-signal choice now; BUILD is a real compliance fix to rank.", "2026-07-13 FIXED L0->L2, target REACHED (worktree fork, commit a7c74147, merged to main 42a1fcc6; orchestrator-verified 72 compliance/billing tests pass, epistemic PASS). The tautology is broken: new consumption_implied_vat_rate() + check_vat_consistent_with_consumption() + VAT_SEGMENT_MATCHES_CONSUMPTION invariant re-base the expected VAT on METERED CONSUMPTION (independent of the segment label), wired into validate_bill() alongside the retained arithmetic check. Proven non-tautological: check_vat(resi,0.05) still returns True (arithmetic control blind to the mislabel) BUT check_vat_consistent_with_consumption(resi,electricity,0.05,2346.8kWh/mo) returns False -> validate_bill emits an SME-as-Household mislabel reason on the identical bill the old control passed. NO false positives: 0 of 1588 real bills newly held; legit domestic / correct I&C-SME / small-SME-on-domestic-consumption / real electric-heated-resi-max all pass. HONEST one-directional strength (documented, not papered): strong catching an I&C-scale load billed at domestic 5%; WEAK in reverse (a domestic customer over-charged at 20% is undetectable from consumption alone -- a genuine microbusiness legitimately consumes domestic volumes) -- the reverse needs a premises/MPAN-profile signal not in the bill data today (residual, named). target 2 met, loop_stage idle."]
