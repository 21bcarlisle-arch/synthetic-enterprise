  simplifications: ["2026-07-12 REGISTERED, NOT BUILT (AFFORDABILITY_AS_SIM_PHYSICS.md director addendum item 6). Hidden SIM state is a 2x2: ABILITY (the budget, W2_4-W2_6) x WILLINGNESS (attitudinal -- strategic/deliberate late- or non-payment DESPITE ability). Same missed payment, four truths; the company CANNOT observe the quadrant -- it must CLASSIFY under uncertainty from engagement signals, plan adherence, disclosure (the CLASSIFICATION capability is company-side, a C/F atom in effect; the hidden truth is generated here on the W2 side). Mis-classification physics both ways: can't-pay treated as won't-pay = customer harm + compliance breach (ability-to-pay rules exist for that quadrant); won't-pay treated as can't-pay = losses + moral hazard. Harness scores the company's classification accuracy vs hidden truth (answer-key pattern, same shape as the DD-attribution validation in W2_10). Anchor willingness incidence to Ofgem debt research / industry sources where possible -- tag [L] and VERIFY before encoding. Build in M3.", "2026-07-12 DISCOVER pass, anchoring found (docs/market_research/willingness_classification_incidence.md), BUILD still NOT started (epoch 3, not yet current). Headline: the can't-pay/won't-pay framing is a live, contested UK political issue right now, not a settled classification question -- Ofgem's interim CEO was publicly criticised (Utility Week, 2026) for a 'reductive' can't-pay/won't-pay framing, and the End Fuel Poverty Coalition's own position is 'it's a can't-pay crisis, not a won't-pay one.' Implication for the eventual build: do NOT anchor willingness incidence to a naive/arbitrary split (e.g. 50/50) -- real advocacy and regulatory framing both point to can't-pay as the dominant quadrant; an inflated won't-pay incidence would misrepresent the real population and be politically loaded in the same way the real regulator is currently being challenged on. Quantified anchor found, WITH CAVEAT: StepChange H1 2024 data -- 41% of clients responsible for energy bills had arrears, 47% of that subgroup had a 'negative budget' (income below basic costs) -- real and sourced, but StepChange's client base is self-selected/already-distressed, NOT the general customer population this project's own draws model; this anchors ability-constrained incidence within a distressed sub-population, not the whole book, and must not be encoded as a whole-population parameter without that adjustment. Regulatory confirmation: SLC 27.8 requires suppliers to assess ability-to-pay and offer affordable repayment; Ofgem's 2025 Debt Relief Scheme is live, current, unresolved policy work -- reinforcing this is a genuine live uncertainty for the company to classify under, not a solved problem. Honest open gap (R10): no precise, quotable won't-pay incidence percentage was found this pass -- remains for the eventual BUILD/FRAME to either find via a more targeted search (e.g. StepChange's full 'Plugging the Gap' report) or explicitly acknowledge as un-anchorable, requiring a director-set curriculum assumption instead (R13).", "2026-07-13 SECOND SEARCH, gap confirmed genuinely unresolved, two new real anchors found (self-refill draw, no BUILD code). A second, more targeted search for a precise can't-pay/won't-pay split still did not find one -- confirmed genuinely un-anchorable via this method after two real attempts, not merely unsearched. New real anchors found along the way: 55% of StepChange clients with dual-fuel bill responsibility were in arrears (March 2023, an updated/higher figure than the 41% H1-2024 figure already registered -- both real, from the same sub-population, at different points in time, worth keeping both since the real rate clearly moves); 5.3 million people live in households in debt to their energy supplier (Citizens Advice) -- a real, current, WHOLE-POPULATION-scale denominator anchor, distinct from the StepChange client-only figures. Recommendation for the eventual FRAME pass, not decided here: attempt a direct