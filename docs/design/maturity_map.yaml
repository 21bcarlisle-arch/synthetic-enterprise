des_future_dates, company/interfaces/test_point_in_time_view.py). Half 2 (restatement versions correctly) had only ever been exercised generically at the BitemporalEventLog level, never through get_price_history_as_of() -- the actual pathway estimate_price_volatility() consumes -- an explicitly flagged gap in the prior entry above. New test_restatement_versions_correctly_through_price_history added closing that gap: records an initial price, then a later-transaction_time restatement for the same date with a different value; asserts a decision_time before the restatement's transaction_time sees the OLD value and a decision_time after sees the NEW value, both via get_price_history_as_of() itself. Result: PASS -- tests/company/interfaces/test_point_in_time_view.py (25 tests, was 24) + full related suites (company/interfaces + company/trading + simulation run_phase2b + simulation hedged_settlement, 780 tests total) all pass, epistemic verifier PASS (493 files scanned, no violations). Both exit-test halves now structurally true AND tested through the real hedge-decision pathway.", "2026-07-12 EXPERT HOUR RUN, PASS (fresh-context phase-close-evaluator agent, no memory of the build, reviewing the L2 claim independently against the real diff/code/tests rather than the registered prose). Personally verified: (1) the dual-time-axis is real, not a stub; (2) both real call sites in simulation/run_phase2b.py are genuinely migrated and the old _price_history_as_of() wrapper is truly retired, not left as dead code; (3) both exit-test halves pass for real and assert what's claimed; (4) the M4 settlement-generation deferral is a real recorded director decision, not an unstated assertion. One low-severity adversarial finding recorded in expert_hour.findings above (same-day-price visibility boundary case) -- not a blocker, a genuine undocumented side effect for the next real touch of this path.", "2026-07-13 FRAME pass quantifies the Expert Hour finding's real severity (self-refill draw, DISCOVER/FRAME only per epoch gating, no BUILD code -- level held at 2, not yet ready for L3). The prior finding called the same-day leak 'magnitude negligible... not a material future-data leak' without deriving a number. Traced the real consumer: company/trading/hedge_decision.py::estimate_price_volatility() (fed by the leaked history via decide_hedge_fraction(), the REAL per-term VaR-hedge-fraction decision) computes an EWMA (lambda=0.94) of squared daily log-returns, updated SEQUENTIALLY oldest-to-newest, so the final variance value's weight on any single return is (1-lambda)=6% for the MOST RECENT return and geometrically less for every older one -- the leaked same-day return (day D-1 -> D, using D's not-yet-knowable price) is structurally the SINGLE MOST HEAVILY WEIGHTED individual return in the whole 90-day EWMA, not an equal 1-in-90 contribution as 'negligible' implies. Also confirmed this is not a dormant code path: company/policy/decision_policy.py's CURRENT_POLICY (the real, live policy used in actual production runs, confirmed via tests/company/policy/test_decision_policy.py) has use_var_hedge_decision=True, so every VaR-hedged fixed/pass-through electricity term across the full 2016-2025 replay exercises this exact leaked path. Honest limit of this pass: an empirical measurement (the real GBP/MWh vol delta with vs without the leaked day, for actual historical dates) was NOT performed -- the raw daily elec_records are fetched live from Elexon per run and are not cached locally in a form this pass could reuse, and a fresh live fetch is out of scope for an autonomous DISCOVER turn. This pass therefore UPGRADES the finding from 'negligible, asserted' to 'analytically bounded at up to 6% direct EWMA weight on a real, live, per-term decision -- a real correction of the earlier reassurance, not just a repeat of it -- and still not yet a live-measured number, which remains the honest gap for whoever next touches this path (alongside the already-named fix: shift transaction_time to end-of-day D or start-of-day D+1).", "2026-07-13 SYNTHETIC WORKED EXAMPLE closes the empirical-measurement gap named above using a controlled test rather than real historical data (self-refill draw, DISCOVER/FRAME only per epoch gating, no BUILD code). Real historical Elexon records remain unavailable locally (unchanged limit), but ran the ACTUAL production functions (company/trading/hedge_decision.py::estimate_price_volatility()/decide_hedge_fraction()) against a controlled synthetic 90-day price series, varying ONLY the final (leaked) day's price to isolate its effect. Result, real and code-executed, not estimated: a plausible cold-snap-magnitude spike on just the leaked day (1.2x/1.5x/2.0x/2.5x the prior day's price) moved the resulting annualised volatility estimate by +55.8%/+191.4%/+418.7%/+628.6% respectively -- confirming the earlier '~6% EWMA weight' analytical bound translates into a large real swing in the actual output metric once a genuinely plausible single-day price shock is injected, not merely a theoretical upper bound. HONEST ADDITIONAL NUANCE found via this same test, not asserted in advance: whether this vol swing reaches the final OBSERVABLE hedge_fraction depends on where the term's own computed value sits relative to company/risk/hedge_policy.py::COMPANY_MIN_HEDGE_FLOOR (0.85) -- in this test's own parameter regime the raw computed hedge_fraction stayed below the 0.85 floor even after the vol spike, so the floor clamped the visible output flat despite the underlying volatility estimate moving by over 600%. This means the same-day leak's real-world bite is regime-dependent: material when a term's own risk profile computes an hf comfortably between the floor and 1.0, invisible when the floor is already binding -- a genuine, precise characterisation, not a blanket 'always material' or 'always negligible' claim. Also corrects an error made earlier this session in a summary to Rich: this atom was misstated as 'level 3/3, hardened' in one prior turn's response -- the true, current state (confirmed here directly) is level_current=2, level_target=3, unchanged; that claim conflated this atom with H7_skills_and_rules (which genuinely did reach 3/3 this session). Flagging the error per R9 rather than letting it stand uncorrected. level_current stays 2, honestly -- this pass strengthens the evidence trail, it does not itself close the L3 gap (still needs the transaction_time fix, which is BUILD code).", "2026-07-13 BUILD OPENED (loop_stage idle->build) by DIRECTOR_TWIN approval -- the director delegated BUILD-within-the-open-epoch to the twin in-console (DIRECTOR_CANON.md v2 section 3a); ask_twin returned APPROVED, confidence high, for all six ranked Epoch-2 candidates (director_twin_log.jsonl entry 2026-07-13T07:33:20). Now BUILD-eligible for the supervisor's BUILD-tier draw. W1 built first; the rest concurrent where file_scopes are disjoint.", "2026-07-13 BUILD, level 2->3: closed the same-day-price boundary leak this atom's own Expert Hour finding named, and quantified real by the two prior DISCOVER/FRAME passes (up to 6% direct EWMA weight, real +55.8%-628.6% synthetic-worked-example volatility swings). Fix: company/interfaces/point_in_time_view.py::build_price_bitemporal_log() now sets each daily record's transaction_time to midnight of valid_date+1 (was: midnight of valid_date itself) -- date D's price becomes 'known' only at midnight of D+1, so a decision at midnight(D) correctly EXCLUDES D's own daily-mean price while still seeing D-1 and earlier, matching sim/risk_engine.py::calculate_sigma_recent()'s existing strictly-before window (end_date = ref_date - 1). Only transaction_time changed -- valid_time and the daily-mean aggregation are untouched. Docstring corrected to state the new rationale, replacing the old text that explicitly documented same-day visibility as an accepted simplification. Proven, not asserted: new test_same_day_price_not_visible_at_midnight_but_prior_day_is (te