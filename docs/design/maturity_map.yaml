  simplifications: ["2026-07-12 REGISTERED, NOT BUILT (AFFORDABILITY_AS_SIM_PHYSICS.md item 1, director-decided). The core of the adjudicated finding: arrears are currently propensity-shaped; in reality they are the OUTPUT of a household budget meeting a price shock. This atom is that hidden SIM state -- income band (ONS-anchored income distributions/deciles), an essential-cost floor, discretionary margin, a savings buffer, and a debt stack with PRIORITY-OF-DEBTS ordering (rent/mortgage, council tax, food before energy -- anchored to debt-advice-sector priority-vs-non-priority-debt practice, e.g. StepChange/Citizens Advice guidance). Financial state joins the archetype reality the per-run population draw (W2_2) varies. WALL DISCIPLINE (record verbatim, AFFORDABILITY item 4): the SIM knows the budget; the company sees ONLY missed payments, broken plans, and what the customer discloses -- affordability is INFERRED through interfaces, never read. Anchors named, none encoded yet. Build in M3 with the population draw. LAW A/R12: never tune the budget distributions to hit a bad-debt number.", "2026-07-12 DISCOVER pass (self-refill draw, no BUILD code). Income/margin anchored with real, current (2026) data: median UK household disposable income ~GBP3,225/month; critically, the aggregate 'GBP261/month left after essentials' figure masks real distributional structure -- the bottom 20% of earners face essential expenditure EXCEEDING income by GBP71/month, a genuinely NEGATIVE discretionary margin before any energy shock is applied, not merely a thin one. Essential-cost floor anchored directly and quantitatively: JRF/Trussell's Essentials Guarantee research gives GBP120/week (single adult) / GBP205/week (couple) for 2026/27; Universal Credit's April-2026 standard allowance (GBP98/GBP154) sits BELOW that floor by GBP22/GBP51 per week -- a real, policy-driven, structural shortfall for a material real UK population, independent of any energy price shock. IMPORTANT CORRECTION FOUND, not just confirmed (checked directly against Citizens Advice/StepChange rather than assumed): the atom's own registered debt-priority ordering ('rent/mortgage, council tax, food before energy') is NOT well supported -- real debt-advice-sector guidance classifies ENERGY AS a priority debt bracketed WITH rent/mortgage/council tax/HMRC (same tier, due to disconnection risk), not ranked below them; 'food' is not a debt-stack entry at all in this framework (no creditor relationship for future food purchases) and is better modelled as ongoing essential spending competing for the same discretionary pool. No precise within-priority-tier secondary ordering was found (a real, named open gap). Savings-buffer anchor not yet researched this pass (named gap, not skipped silently). No BUILD code, no level change. Full findings: docs/market_research/household_budget_w2_4.md.", "2026-07-12 DISCOVER addendum, closes the savings-buffer gap named above (self-refill draw, no BUILD code). Real, current FCA Financial Lives data, income-band-segmented: households earning under GBP15,000/year -- 22% have NO savings at all, over a third have less than GBP1,000. Households over GBP50,000/year -- only a small share lack savings, more than half hold over GBP10,000. Decisive finding: the savings buffer strongly CO-VARIES with income band -- should be modelled as a joint distribution, not two independently-drawn parameters. Population-wide baseline for sanity-checking: 1 in 10 UK adults have zero cash savings, a further 21% have less than GBP1,000. Additional real anchor: FCA estimates ~8.9 million UK adults in 'serious financial difficulty' (missed a bill payment in the last 6 months) -- connects this atom's hidden-budget-state concept directly to a real, sourceable population-scale calibration target. All five named components (income band, essential-cost floor, discretionary margin, savings buffer, priority-of-debts) are now real-anchored; only the within-priority-tier secondary ordering remains genuinely open. No BUILD code, no level change.", "2026-07-13 SECOND SEARCH on the within-priority-tier ordering, still genuinely unresolved (honest, not abandoned). A second targeted search surfaced a real terminology tension worth registering, not resolving by picking whichever framing is convenient: some casual/summary sources use 'priority bills' loosely to mean 'food, energy, rent, council tax' together (essential must-pay COSTS), while the precise StepChange/Citizens Advice DEBT framework (already found) distinguishes formal priority DEBTS (a creditor relationship: rent, council tax, energy, HMRC) from ongoing SPENDING like food (no creditor relationship for a future purchase) -- both framings are real, from real sources, but answer different questions; this atom's own debt-stack concept should use the precise (debt-framework) sense, not the casual one, per the correction already registered above. No source found gives a strict tie-breaking order WITHIN the priority-debt tier (rent vs energy vs council tax when money is insufficient for all three) after two real, targeted search attempts -- confirmed genuinely un-anchorable via this method, not merely unsearched. Recommendation for the eventual FRAME pass: treat this as a real open question needing either a more specialised source (e.g. a debt-advice-sector practitioner survey, not a consumer-facing guide) or an explicit director-set curriculum assumption (R13), rather than a further DISCOVER search.", "2026-07-13 FRAME pass, architecture (self-refill draw, DISCOVER/FRAME only per epoch gating, no BUILD code). All four prior passes anchored external research; none checked internal code for the natural integration point, so this pass does. simulation/household.py's Household dataclass already carries a single field for this exact concept -- income_stress: IncomeStress (LOW/MODERATE/HIGH), 'updated by life events (job_loss, income_recovery, new_baby, retirement)' per its own comment -- and simulation/household_demand.py's HouseholdDemandRegister (already real, wired, per-customer, date-aware via household_at_date()/income_stress_at_date()) is the live consumer. Confirmed via direct read: NO income band, essential-cost floor, discretionary margin, savings buffer, or debt-priority stack exists anywhere in Household today -- income_stress is a coarse 3-level categorical proxy only, genuinely NOT the atom's own registered richer quantitative state. FRAME conclusion: this atom's real build should EXTEND Household (new fields alongside income_stress, not a new parallel register) and should treat income_stress as a correlated input, not an independent draw -- the same life events that move IncomeStress today (job_loss, retirement, and this session's own new illness/divorce additions from W2_5) are real, natural trigger points for the essential-cost-floor/discretionary-margin state to shift too, keeping the two atoms' shared substrate coherent rather than building two independent economic-state tracks that could silently diverge. This is the same 'one architecture, not two' principle already applied to several sibling atoms this session. file_scope for the eventual BUILD should include simulation/household.py and simulation/household_demand.py alongside the already-registered company/compliance/crisis_bad_debt_validator.py. Does not attempt the within-priority-tier ordering question again -- the prior pass's own recommendation (a specialised source or an explicit director-set R13 assumption) stands unrepeated."]
