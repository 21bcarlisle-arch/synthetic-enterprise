al cross-navigation gap found by auditing every door 3-8''s <nav>: none of the 9 built-door pages (company, proof, world, method, method-casebook, simplified, director, glossary, tours) linked to all the others -- e.g. Director was not linked from ANY other page site-wide (a true orphan page, found by grepping for ''director/"'' across site/), and Casebook/Simplified/Tours/Glossary/Director were each missing from several door navs. Standardised all 9 door navs (+ site/index.html, which was also missing a Director link) to a consistent set covering every door 3-8, preserving each page''s own href convention and active-state. Pure nav markup change -- no rendered data values touched, confirmed by the full site/ suite staying green before and after.', 'Evidence-link spot-check (binding rule 1, ''every claim links to its evidence''): verified site/data/company.json''s evidence_url (margin_bridge.json), site/data/world.json''s 4 evidence_urls (dashboard.json, sim_data.json, state/population_anchoring.json) all resolve to real files on disk; verified all 11 distinct retrospective URLs referenced from site/data/proof.json''s timeline+retro_library and site/data/method.json''s retro_library have a matching file in docs/retrospectives/ (the source the GitHub Pages mirror is built from -- the live URL itself is unfetchable, no network in this autonomous fork); verified site/data/glossary.json''s 14 distinct see_url values all point to real site/<door>/ paths.', 'Ran python3 -m pytest site/ -q for the full site suite: 121 passed, 6 skipped (skips are the pre-existing ''door renders no <table>'' skip condition on doors without tables -- not a new gap). Ran python3 -m tools.epistemic_verifier: PASS, 477 files scanned, no barrier violations (site/ changes are rendering-layer only and cannot touch the sim/company barrier this verifier checks).', 'HONEST STATUS -- level HELD at 2, not moved to 3, same reasoned position as every prior SITE1 session (see the atom''s existing simplifications history for 2026-07-13/07-16). This session materially closed the biggest remaining per-door DoD gap (2 of 9 built-door dirs, method and simplified, had ZERO render-harness test before this turn -- now every door-3-8 directory has one, all passing against real data) and fixed real cross-cutting last-mile defects (Door 8: simplified''s missing mobile pass, and Director being an orphan page linked from nowhere). What still blocks the 2->3 move, unchanged from prior sessions and outside this fork''s reach: (1) R11 live-pixel verification against the ACTUALLY DEPLOYED poesys.net -- this fork has no network and no push; the render-harness tests prove fidelity to the LOCAL site/data/*.json, not that the live site matches it. (2) SITE_CONSTITUTION.md''s own explicit Final DoD line: ''a genuine Expert Hour (director + skeptic-veteran) across all doors'' -- a human-involved review gate, not autonomously completable (PROCEED_BY_DEFAULT category 6, values/review decisions are the director''s by right). Per this task''s own instruction to under-claim rather than over-claim, and per the map''s own prior consistent judgment on this exact atom, level stays 2.', 'background/process_run_complete.py (R10 class-closure: commit whole site/data/*.json surface)', 'tests/background/test_process_run_complete.py::test_git_commit_push_commits_whole_generated_site_data_surface (R15-verified: fails when the glob is removed)', tools/generate_method_data.py (RULES extended R1-R6 -> R1-R15), '2026-07-16 H17 cold-eyes RE-review (fork): walked rendered content of all doors 3-8 via the offline render harnesses against real site/data/*.json. Found + fixed a BLOCKING internal contradiction: the Method door showed 15 rules (R1-R15) but the Proof door (Door 4) and Method-Casebook door (Door 6) both showed ''14 permanent rules (R1-R14)'', omitting R15 (controls-must-fail) -- and the Proof page even renders a whole ''Controls That Cannot Fail -- the kill-list (R15)'' section while its own rules ledger claimed R15 did not exist. Durable R10 class-fix (JSON-only would revert, process_run_complete.py regenerates both): added the R15 entry to tools/generate_proof_data.py and tools/generate_method_casebook_data.py, fixed the stale R1-R14 comments, regenerated both JSONs. Rendered-pixel verified: casebook rules-intro now shows ''15 permanent rules (R1-R15)''; rule_count is data-driven len(RULES) so it cannot silently drift again. Gate green: pytest site/ 121 passed/6 skipped, pytest tests/tools/ 1255 passed/4 skipped, tools.epistemic_verifier PASS (510 files).']
