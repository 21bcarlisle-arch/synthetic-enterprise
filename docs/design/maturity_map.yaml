  simplifications: ["2026-07-13 REGISTERED (CONTROLS_THAT_CANNOT_FAIL.md, director P0, rank HIGHEST -- prompted by the F5 VAT-tautology red-team finding). Doctrine (now R15 in CLAUDE.md): a control that CANNOT FAIL is worse than none -- it manufactures confidence. For EVERY control (invariant/Tier-1 gate/validator/evaluator/daemon/health-check): MUTATION-TEST it -- inject the exact defect it exists to catch, it MUST fire; a control that does not fire on its named defect is theatre (delete/rebuild). Audit for the 3 KILLER PATTERNS: TAUTOLOGY (checked value derived from the same source it checks -- the VAT case, an independence violation), FAIL-OPEN (passes on missing/zero/empty/malformed -- e.g. subtotal<=0 skips the gate), FAIL-SILENT (passes when the CHECKER ITSELF is unavailable -- the Qwen backstop returning clean when Ollama is down = every autonomous run; an unavailable check is a FAILED check, must ALARM on absence). DoD: every control mutation-tested with results published; kill list with COUNTS (N tested, M fired, K theatre) published on The Proof door + site/data/; R15 standing rule in CLAUDE.md (DONE); any level-promotion/Expert-Hour/green-suite that rested on a theatre control RE-OPENED (retro-apply); F6/F7 closed as part of the CLASS not as instances. Report the theatre count honestly, however embarrassing. Pitch: auditing our own controls and finding our flagship Tier-1 check could not fail is one of the strongest artefacts this project will produce (every real supplier has tautological/fail-open/fail-silent controls nobody audits -- exactly why regulators keep finding the same harms after the same controls passed). First mutation-test fork dispatched (harness + inventory + kill list on the compliance/billing/verifier/backstop core). loop_stage build: this is the highest-ranked BUILD on the map -- nothing is graded reliably until it lands.", "2026-07-13 BUILT L0->L2, KILL LIST PUBLISHED (worktree fork, commit e16f00de, merged to main e86601052; orchestr