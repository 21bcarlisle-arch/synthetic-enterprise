airness principle. No BUILD code; no level change.", "2026-07-13 FRAME pass (self-refill draw, DISCOVER/FRAME only per epoch gating, no BUILD code). Checked whether real prior art already exists under a different name before assuming greenfield (the recurring mis-registration pattern found elsewhere this session) -- confirmed genuinely NOT: grepped company/billing/*.py (60+ modules) and company/compliance/*.py for statutory/8pts/11.75/late-payment-interest/segment-conditioned-rate logic, zero hits. The blank registration is honest; this is real greenfield, not another orphaned-module case. Found the right architecture to build it in, though: company/compliance/domain_invariants.py already has an EXACT working template for this atom's own shape -- vat_by_segment (VAT_RESIDENTIAL/VAT_SME as separate RateInvariant instances, a vat_rate_for_segment(segment) dispatcher, a check_vat(segment, actual_rate) checker, wired into a real consumer at company/billing/pre_bill_validation.py). This atom's own three named sub-scopes map onto the identical shape: (1) statutory business late-payment interest -- a RateInvariant per segment (business=11.75% current, resi=0/excluded) exactly mirroring VAT_RESIDENTIAL/VAT_SME; (2) domestic late-charge exclusion -- a boolean-style invariant (has direct precedent in this library's existing non-rate checks); (3) payment-conditioned tariff eligibility (DD-discount/good-payer gating) -- needs its own new shape (not a rate, a policy predicate), but should still live in this same module for the same reason W2_6's late-payment findings already anchor here (segment_debt_tnc and sme_distress_twin are named siblings). FRAME decision: extend domain_invariants.py (not a new standalone file) -- 'one architecture, not two,' matching the principle already applied to D2/G2/W3_2 this session. file_scope should be set to company/compliance/domain_invariants.py + company/billing/pre_bill_validation.py (the real wiring point, same as VAT) when this atom is BUI