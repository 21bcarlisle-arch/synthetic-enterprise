  file_scope: [background, tools, docs/design]
  simplifications: ['2026-07-16 REGISTERED from SCHEDULED_HOUSEKEEPING.md (director-decided, P1, a standing function OF H20_parallel_maintenance_lane). Today cleanup is REACTIVE (only when something breaks) — the worst model: TWO incidents this weekend (the frozen test_health_check wedging the publish pipeline for 2h; the ~32-commit local/origin divergence silently blocking pushes) were both "old cruft nobody swept until it broke something". Provably accumulating: ~64 stale worktrees, recurring cross-machine divergence, .local-uncommitted-*.bak droppings, run_complete marker batches, stale test assertions. Fix: a recurring sweep (SRE toil discipline) on a cadence PLUS a threshold trigger (e.g. >N worktrees), inventorying+clearing worktrees/branches/staging/logs/orphaned-processes/local-origin-drift. GUARDRAILS (deleting the wrong thing is worse than cruft): reversible-by-default (archive/move to history, NEVER hard-delete); never touch in-flight work (sweep only PROVABLY abandoned — merged/idle-past-threshold/orphaned; file-scope/tree-lock aware); ambiguous (a map atom, a maybe-wanted branch) => FLAG for director review, never auto-vanish (and never escalate these as one-way doors — reversible, so per the predicate fix a flag is not a door); transition-only reporting (R5) so the sweep is not itself noise. First run clears the ~64 stale worktrees safely and DETECTS local/origin drift before it blocks pushes. DoD check: run with an in-flight worktree present — it prunes the abandoned ones and leaves the active one untouched.', '2026-07-16 FRAME (first design doc): scheduled housekeeping sweep design — cadence+threshold trigger, inventory categories, the per-category provably-abandoned predicate, reversible-by-default + flag-ambiguous guardrails, the in-flight-worktree-untouched DoD test, relationship to H20. Doc-only, no BUILD code (EPOCH_GATING R1). Level HELD at 0 (BUILD-gated).', '2026-07-16 Lane-3 (H17 re-draw, occurrence-6 of the FRAME-saturated re-hand): level HELD at 0 (BUILD-gated, EPOCH_GATING R1 — no BUILD code). No new FRAME written — H22 already carries a complete FRAME doc (17KB, committed 6029eefbe). Root cause of its recurring re-draw: the FRAME doc lived at docs/design/H22_SCHEDULED_HOUSEKEEPING_FRAME.md (one dir above convention), so H23_frame_saturation_draw_marker''s intrinsic check (_atom_has_frame_doc requires the docs/design/frame/ prefix) never recognised H22 as saturated and re-handed it every idle draw. Fix: relocated the doc to the convention path docs/design/frame/H22_scheduled_housekeeping_FRAME.md (git mv) and appended that path to evidence so the intrinsic guard now reads H22 as FRAME-saturated once this inbox folds — closing the occurrence-6 leak with no per-atom marker to remember (MAKE_IT_STICK: a computed check, not a setter). The old evidence path entry is now dead (fold is append-only); harmless (_atom_has_frame_doc skips non-existent paths) and is exactly the staging/doc cruft H22 itself is designed to sweep.']
