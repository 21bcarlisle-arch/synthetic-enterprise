ine to act on' individually was collectively the exact failure. Fixed: daemon markers excluded from the instruction-channel check entirely (_real_staged_instructions()/_is_daemon_marker()); the self-refill draw is now UNCONDITIONAL (runs and gets appended to the reason even when a real doorbell already fired, not only as a fallback reached when nothing else exists); find_work() now returns (reason, map_exhausted) so a genuine CANNOT-draw (every atom blocked/complete) can be escalated distinctly from an ordinary didn't-draw-this-cycle; an idle-turn counter instruments the 'nothing to do' state directly (target zero, no longer silent). 16 new tests, 92 total in tests/background/test_supervisor.py pass, epistemic verifier PASS. Level held at 3 (already at target) -- this is a same-mechanism regression fix, not a new capability, but registered honestly per this project's own R10 discipline (an absurdity-class defect closes by extending the invariant/test coverage, not a silent instance fix)."]
