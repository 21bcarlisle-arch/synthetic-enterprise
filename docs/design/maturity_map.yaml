  simplifications: ["director-confirmed known gap", "2026-07-11 M3 DISCOVER+FRAME (docs/design/M3_DISCOVER_FRAME.md): population draw is genuinely greenfield -- CUSTOMERS is still a fixed list literal, _payment_rng is a single fixed seed (42+7919), zero draw_population/generate_population code found anywhere. Not currently a live epistemic violation (no seed exists yet for company code to read) but a real future risk if a draw module were placed carelessly (e.g. in saas/, which the portal already imports directly). BUILD deferred pending director/advisor sequencing.", "2026-07-12 DISCOVER addendum (self-refill draw, no BUILD code): confirmed directly what the current fixed CUSTOMERS literal's real segment mix actually is (saas/customers.py) -- 15 resi / 4 SME / 5 I&C (24 total) -- the concrete marginal distribution any real per-run draw mechanism would need to preserve, not an abstract 'vary the population' instruction. External research grounds the mechanism choice in an established statistical tradition (population synthesis/microsimulation, not invented for this project): Iterative Proportional Fitting (IPF, established since 1940) is the standard technique for drawing a synthetic population matching known marginal distributions (e.g. this project's real segment/tariff proportions) while allowing genuine unit-level variation -- with known, real limitations directly relevant to sizing the eventual build: cloning-based IPF variants lose real heterogeneity (repeats existing customer shapes rather than generating genuinely new ones) and scale poorly as more attributes are matched jointly. A newer family (MCMC-based synthesis) is the alternative real practice where more attribute realism is needed. Named next FRAME question (not decided here): does this atom need IPF-grade marginal-matching rigour (defensible if segment/tariff proportions must exactly track the real book), or is a simpler weighted-bootstrap-with-replacement over the existing 24 real customer shapes sufficient for the stated goal ('vary the population run to run') -- a real sizing/scope call for the next FRAME pass, not decided unilaterally here.", "2026-07-13 FRAME pass answers the named question above (self-refill draw, DISCOVER/FRAME only per epoch gating, no BUILD code). Read saas/customers.py directly rather than reasoning about IPF vs bootstrap in the abstract, and found a fact that reframes the whole question: CUSTOMERS is not a parametrically-generated table at all -- every one of the 24 entries is individually hand-authored with real narrative depth (named locations, specific tariff_type overrides for flex/pass-through mechanisms, specific write-off/vulnerability/life-event histories keyed to that exact customer_id). Confirmed via grep the real blast radius of touching this: 370 files under tests/company/saas/simulation reference specific customer_ids (C1, C3, C5, C_IC1, etc.) directly -- billing-tab tests, the year-spotlight dashboard's named-customer panels (phase-close checklist 0b requires a real named customer per phase), W2_5_life_event_stream's per-customer event stream, ledger write-off history, all keyed to these exact IDs surviving run to run. Neither IPF nor plain bootstrap-of-existing-rows was ever the right frame: IPF assumes an attribute-generation model to reweight, which doesn't exist here (there is no generator, only hand-written literals), and a full per-run REPLACEMENT population (new synthetic customer_ids each run) would break all 370 dependent references -- a real, wide blast radius, not a hypothetical one. FRAME decision: the eventual BUILD should be ADDITIVE, not REPLACIVE -- keep the existing 24 hand-authored customers as a fixed narrative core (preserving every downstream reference), and draw a per-run SYNTHETIC population on top of it (new customer_ids, e.g. G-prefixed or similar, generated from segment-proportion-matched attribute distributions derived from the real 24's own mix: 15/4/5 resi/SME/I&C) to deliver the atom's real