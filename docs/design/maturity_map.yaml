sis-bad-debt) + wire the kill list onto the LIVE Proof door (R11 pixel) + KL-2 (epistemic-verifier coverage gaps: missing-file reads clean, only line-start imports matched -- an AST scan, folds into W4_2_verifier_timing_extension). loop_stage build: continue to full coverage.", "2026-07-13 PASS 2, mutation coverage extended (worktree fork, commit ad482600, merged 490c1bcab; verified 49 pass+1 xfail, epistemic PASS). CUMULATIVE: 27 controls mutation-tested / 26 FIRED / 1 THEATRE (check_vat, mitigated by F5). Extended to the deterministic apparatus: compliance trackers, R14 basis-labels + dashboard-consistency + population-consistency gates, health_check (run + stale-code), the change-detection gate. Found 5 MORE gaps registered as F8 (KL-4 population_sanity empty-reads fail-silent; KL-5 ConsumerDuty GREEN-on-empty-register; KL-6 social_obligation self-status tautology, mitigated; KL-7 green_claims 100pct-compliant-on-zero-obligations fail-open; KL-8 _check_consistency fail-silent+open on missing run_insights, the R11 orphan class). FIXED 0 this pass -- an HONEST QUEUE-by-default call: unlike pass 1 isolated single-caller fixes, every gap here is a multi-caller semantics change (consumer_duty.overall_rag has 14+ callers), so per SELF_INTERRUPT_DISCIPLINE they are registered not fixed-on-sight. Two pass-2 controls PASSED as fail-CLOSED (health_check tmux/ps-both-unavailable alarms; change-detection processes on unreadable dedup memory) -- no change needed. HONEST L2 not L3 (fork concurs, partial overall): DETERMINISTIC apparatus now near-fully covered (L3-grade for that), but genuinely uncovered/named -- the LLM-JUDGE verdict quality (phase-close-evaluator/epistemic-verifier: only read-only structure asserted, no fixed prompt->NEEDS_WORK oracle = an INHERENT limit, R10 named simplification not a gap), the DAEMON SCHEDULING LOOPS (cadence/cooldown/backoff), and the regulatory ACCUMULATOR-register tail. L3 = cover the daemon loops + accumulator tail + wire the kill list 