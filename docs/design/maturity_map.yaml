lt ''UK'') on RateInvariant/RangeInvariant/YearlyRangeInvariant (item 2 of the steer -- so a future non-UK invariant can''t silently fire against UK output) and a new StructuralInvariant class + BACK_BILLING_CAP_RESPECTED entry, enforced via check_back_billing_cap_respected() wired into company/billing/pre_bill_validation.py''s pre-bill Tier-1 gate (item 1(c) -- independently re-derives the 12-month test from the bill''s own catchup fields rather than trusting the assessment step''s own flag). 20 new tests across 4 files (domain_invariants, pre_bill_validation, ledger, run_phase4c_on_phase2b), all passing; epistemic verifier PASS. level_current reverts to 2 per the steer''s explicit instruction pending a fresh Expert-Hour pass re-verifying the fix against real data (not yet run this session) -- the fix is built and unit-tested but not yet re-hardened through the full loop.', '2026-07-12 RE-HARDENED, level 2->3, via TWO independent fresh-context Expert-Hour passes (self-refill dial-weighted draw, deliberately NOT self-graded -- self-checking a self-correction would repeat the exact bias this review convention exists to avoid). PASS 1 (phase-close-evaluator, no memory of the build): confirmed the two named red-team findings (write-off magnitude, fail-open on malformed data) were genuinely fixed, but found TWO NEW gaps on its own independent HARDEN pass. Gap A: check_back_billing_cap_respected() called datetime.fromisoformat() on catchup_period_start/period_end/period_end with no guard -- a PRESENT-but-malformed date string (not just a missing one) raised an uncaught ValueError that propagated through validate_bills() and aborted an ENTIRE batch, taking down every other genuinely-fine bill in the same call (the exact ''uncaught exception kills the loop'' class CLAUDE.md''s key-learnings names). Gap B: BACK_BILLING_CAP_RESPECTED''s source field claimed ''domestic/microbusiness'' coverage, but back_billing.py is domestic-only by its own design and docstring -- citing wid