endency can go stale with no periodic re-examination. Built background/health_check.py::_check_stale_dependencies() (wired into the routine health-check cycle, matching the pixel-verification-capability pattern from earlier tonight) to surface every non-idle atom blocked by an unmet dependency on every cycle, so a future stale block gets NOTICED via routine observability rather than requiring another director escalation and manual archaeology to discover.', '2026-07-12 BUILT, level 0->2: step 1 (estimated billing) prices an ESTIMATED-read bill on the estimate (simulate_read()''s own trailing-confirmed-actuals figure) at the real contracted rate -- rescales the true settlement records by est/true ratio (_estimated_settlement_records) so commodity/non-commodity/standing-charge/VAT all derive correctly from generate_bill(), collapsing the unit-rate divergence (was up to 57% off in the old world) to exactly zero; every bill gains billing_basis + the true-vs-billed pair via _annotate_billing_basis. Step 2 (catch-up rebilling) resolves a run of consecutive estimated bills the moment a real read arrives (or the existing MAX_CONSECUTIVE_ESTIMATED_PERIODS forced-catch-up fires): sums each period''s already-fully-priced true-vs-billed delta (_resolve_catchup), routes an undercharge through company/billing/back_billing.py''s BackBillingAssessment (reason=ESTIMATED_READ_CORRECTED -- built earlier, never wired until now) for the Ofgem SLC 31A 12-month cap, and folds the chargeable/credited amount onto the resolving bill''s own total_amount_gbp with bill_shock_pct/clarity_score correctly recomputed against the corrected total (a real catch-up bill IS a genuine bill-shock event, matching this project''s own non-rational-customer-reaction fidelity thread). Overcharges (credit owed) are never capped -- the SLC 31A cap protects consumers from late supplier demands, it does not let a supplier withhold a refund. Business-surface evidence (CLAUDE.md 0b): the full bill list (with these new fields) already flows unmodified through saas/reporting/annual_report.py''s existing ''bills'' passthrough into docs/reports/run_output_latest.json, so tools/generate_billing_ledger.py and tools/generate_invoice_data.py needed only additive field mapping (catchup_applied/direction/adjustment/written_off/cap_applied), not new plumbing -- confirmed live on site/data/customers/C3g.json after a real regeneration (see evidence). Found and fixed one real second-order bug while reading actual output by eye (R4/R10): an overcharge credit can make total_amount_gbp <= 0, which the payment-outcome simulation (built assuming a positive amount owed) rendered as a nonsensical ''successful direct_debit payment'' of a negative sum -- and because the account-ledger view negates a payment''s amount to compute its balance effect, that fabricated payment silently cancelled the very credit the negative invoice had just applied. Fixed in tools/generate_billing_ledger.py: a credit invoice (amount<=0) records no payment event at all (real suppliers carry a credit forward, they don''t ''collect'' a negative amount) -- the invoice_raised entry alone correctly reduces the running balance. NOT yet done (why level_current stops at 2, not 3): no Expert-Hour pass yet (expert_hour.status below); the two-implementation duplication between this atom''s per-bill GBP-delta cap logic and company/billing/smart_meter_reconciliation.py''s still-unwired annual-AQ-reconciliation cap (a DIFFERENT real mechanism, deliberately not reused here -- see _resolve_catchup''s own docstring) is registered, not consolidated; de-duplicating build_monthly_bills'' own second independent simulate_read() call (already flagged by the step-1 author) remains open.', '2026-07-12 EXPERT HOUR RUN (fresh-context UK billing-ops-veteran persona, no memory of the build), verdict MIXED with 2 findings that blocked the level-3 claim until fixed, both fixed same session (level 2->3, real_world_twin now genuinely met per the map''s own L3 bar ''passed the full loop incl. HARDEN''). (1) Churn/succession mid an estimated run was CONFIRMED on real data (C3/C3g/C5/C6 all end their real billing history on 4-11 consecutive estimated bills, no resolving actual read ever arrives) -- the accumulated true-vs-billed delta simply vanished, an unregistered simplification (R10-class issue per this project''s own rule: an unregistered simplification is itself a defect). Fixed: build_monthly_bills(records, churned_ids) forces a churning account''s own LAST bill to resolve on a final read (Ofgem SLC 21B: final bill at supply end), same real mechanism company/billing/account_closure.py''s own (separately still-unwired) receive_final_read() models -- constructed directly as a MeterReadEvent(status=''actual'', forced_catch_up=True) rather than reusing simulate_read()''s own probabilistic roll, since a real closure genuinely does obtain a final read. Verified: forced this via a real diagnostic (fed the SAME cached settlement records through both the pre-Expert-Hour code and the fixed code) and confirmed exactly 2 new resolved catch-ups appear (C3 2020-06-29, C5 2020-12-29), nothing else changes. (2) Zero direct unit tests existed for _resolve_catchup()''s cap/proration/materiality math or the overcharge-never-capped rule -- only indirect coverage via full-run integration and one by-eye instance. Fixed: 7 direct tests added (undercharge no-cap, undercharge capped-with-proration, overcharge-never-capped-even-when-old, materiality flag, negative-zero normalisation, empty-run, plus 2 build_monthly_bills-level tests for the materiality gate and churn-forced resolution). Two MINOR findings also fixed same session (not level-3-blocking but genuine, found by the same skeptical read): CATCHUP_MATERIALITY_THRESHOLD_GBP was computed (is_material) but never actually consulted -- an immaterial (<GBP5) correction was still stamped onto the bill as a real event; fixed by gating catchup application on is_material. A credit invoice 