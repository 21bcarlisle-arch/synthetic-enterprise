- id: G6_method_lens_audit
  name: "Audit our harness against the mature PROCESS/delivery disciplines (Lean/Kanban/ToC/SRE/Agile), not just the novel-AI ones: name what we have, adopt known refinements, surface unhit gaps"
  lane: H_harness
  value_stream: close_to_learn
  epoch: 2
  level_current: 1
  level_target: 1
  loop_stage: idle
  dial_inherited: 3
  size: M  # 2026-07-16 G5 sizing (basis in EFFORT_SIZING_DESIGN.md)
  provenance: proposal
  evidence: [docs/staging/done/METHOD_AUDIT_AGAINST_DELIVERY_DISCIPLINES.md, docs/design/METHOD_LENS_AUDIT.md, site/method-casebook/index.html, tools/generate_method_casebook_data.py]
  file_scope: [docs/design, site, CLAUDE.md]
  simplifications: ['2026-07-15 AUTHORED AS PROPOSAL (METHOD_AUDIT_AGAINST_DELIVERY_DISCIPLINES.md, director-raised, disposition QUEUE -- a standing LENS/audit, not a feature; registered, drawn for DISCOVER, generates proposal-atoms for the map). Diagnosis (why we kept rediscovering old knowledge by injury): every best-practice review this week scoped itself to ''best practice for AI agent harnesses'' (worktrees/hooks/headless orchestration/context mgmt = the TOOLING layer), but most of what bit us lives in the PROCESS layer (sizing, decomposition, WIP limits, flow, estimate-vs-actual, readiness/done gates) -- decades old, INDEPENDENT of what does the work. We scoped our search to the novel-AI universe and skipped the mature software-delivery universe, for a problem that is mostly a DELIVERY problem with AI as the executor. Evidence -- our hard-won discoveries are named patterns we could have read: ''oversized item must be split'' = story sizing/INVEST; ''limit WIP, flow beats utilization'' = Kanban; ''the real constraint is invisible until you remove the fake ones'' = Theory of Constraints / Five Focusing Steps; ''estimate-vs-actual is calibration not a stick'' = #NoEstimates/capacity planning; ''Definition of Ready/Done'' = our ad-hoc level gates unnamed; ''blameless post-mortem + repeat-cause register'' = SRE incident practice (our G4 re-derives it). The task: a deliberate pass mapping our incident-lessons/mechanisms against established delivery disciplines (SDLC/PDLC, Lean, Kanban, Scaled/general Agile, ToC, SRE, queue theory) to (a) NAME what we have, (b) adopt the refinements those fields worked out, (c) surface what they solved that we HAVEN''T hit yet. Two questions it must answer: what does mature delivery do that we don''t (proactive, not by next injury); which ''novel'' findings are named patterns with known refinements (adopt the mature version). GUARDRAILS: we are ONE director + AI executors, not many human teams -- adopt the PRINCIPLE, reject the CEREMONY (take flow/sizing/constraint insight, leave stand-ups/story-points-as-currency/ritual); everything adopted is a DIAL not a target (anti-goal-seek stands); output is PROPOSAL-atoms for the director to rank, not unilateral process imposition. Amends FINDING 1 (''search published practice when you hit a wall'') to include the non-AI delivery disciplines, not just published AGENT practice (CLAUDE.md edit is part of the DoD, made when this atom is worked, not at registration). Meta-fix behind G5_effort_sizing_discipline (sizing is one instance); also strengthens G4 failure register + the naive organ (both currently pointed only at AI-shaped failure modes). DoD: audit run as a DISCOVER pass; mapping table (our lesson/mechanism <-> established pattern <-> refinement-we''re-missing) surfaced on the Method door; proposal-atoms generated for genuine gaps + queued for director rank; Finding 1 amended; guardrails recorded. loop_stage idle: this IS DISCOVER-lane work, immediately drawable now per epoch gating (doc-only, no BUILD/level move); it turns REACTIVE discovery (learn by injury) into PROACTIVE adoption (learn by reading).', '2026-07-16 FIRST ADOPTED FLOW PATTERN (PER_ATOM_INTEGRATION_NOT_WAVES.md, director-decided, QUEUE-high -- the first concrete Kanban/flow finding this lens predicted, surfaced live by the director watching 4 verified forks idle while waiting on a slow 5th). STREAM, DON''T BATCH: integrate at the smallest independently-verifiable unit (usually ONE atom), NOT at a wave boundary -- each fork rebases->gates->merges the instant IT is green, a slow/failing fork blocks ONLY ITSELF (escalates per the door rule, proceed-and-log if reversible), and the external-truth gate (verifier + suite + write-landed) runs on EVERY individual merge, not once per batch. This is the classic batch-boundary flow killer (a wave moves at the speed of its slowest member) that Kanban exists to remove. ALREADY PARTLY MECHANISED: F1''s per-cycle _default_fold (executor_governor.run_loop folds each landed inbox at the TOP of each cycle) IS per-atom streaming for the unwatched loop -- F1 was the enabler (atomic in-commit map-write makes independent merges safe; without it concurrent level-writes race), ''same insight arriving twice''. GUARDRAIL (do not over-rotate): per-atom is right for INDEPENDENT atoms; genuinely coupled changes still land together -- the rule is ''smallest unit that is independently verifiable'', usually one atom, occasionally a coupled pair; maximise parallelism THAT STAYS VERIFIED (throughput is bounded by verification, never raw fork count; never drop a gate to go wider). Orchestrator practice adopted from this wave forward: do not wait for a wave; fold+gate each atom as it lands. This is the executor-integration half of the DoD; the remaining half (the headless loop already streams via F1) is inherited.', '2026-07-16 BUILT L0->L1, target REACHED (DISCOVER pass, doc-only fork, file_scope docs/design + site/method-casebook + tools/generate_method_casebook_data.py only). docs/design/METHOD_LENS_AUDIT.md maps 6 established disciplines (Lean, Kanban, Theory of Constraints, SRE, Agile/INVEST, queue theory) against this repo''s real mechanisms -- grounded in F1/F2, the multi-atom draw, PER_ATOM_INTEGRATION_NOT_WAVES (this lens''s own first-predicted Kanban finding, already landed), G4_unified_failure_register, G5_effort_sizing_discipline, and H9_map_write_serialisation -- naming for each discipline what we already have (with its established-pattern name) and the refinement we''re missing. Reject-ceremony/adopt-principle table (section 2) and dial-not-target guardrail (R12 extended to process metrics: WIP count, cycle time, error budget, toil %, estimate-vs-actual are all diagnostics, never targets) recorded. Surfaced live on the Method door: site/method-casebook/index.html new ''Method Lens'' section, data wired through tools/generate_method_casebook_data.py::METHOD_LENS, site/data/method_casebook.json regenerated and verified (6 mapping rows, 4 proposals, 2 guardrails present in the live JSON). Render-side tests added to site/method-casebook/test_method_casebook_door.py (per-discipline render assertion, per-proposal render assertion, R15 mutation-independence test) -- all pass (7/7 including the 4 pre-existing). Four genuine-gap proposal-atoms generated and clearly labelled in the doc section 3 for the orchestrator to register (NOT written into maturity_map.yaml by this fork, out of file_scope): G7_wip_and_cycle_time_dashboard (Kanban WIP+cycle-time+Little''s-Law dashboard), G8_constraint_identification_ritual (ToC standing constraint-identification query), G9_error_budget_and_toil_tracking (SRE error budget + toil %), G10_definition_of_ready_gate (Agile DoR gate at FRAME wired to director-twin BUILD-open call). HONEST PARTIAL: the brief''s original DoD also calls for a CLAUDE.md Finding-1 amendment (non-AI delivery disciplines); NOT done here -- CLAUDE.md measured at 34,766 chars against the 35,000 hard limit before starting, and this fork''s file_scope explicitly excludes CLAUDE.md per the task brief, which itself named this deferral. Exact amendment text staged in METHOD_LENS_AUDIT.md section 4 as an orchestrator follow-on. epistemic_verifier PASS (509 files, 0 violations).']
