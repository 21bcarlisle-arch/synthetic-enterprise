n of exactly the settlement-vs-billed clock divergence this atom''s own two-pipelines finding names. Re-read the actual code to confirm the divergence still lives where it was found: _section_gross_margin_bridge() (Phase BE) reads data[''management_accounts''] (company.finance.management_accounts -- the ledger/billed-clock pipeline); _section_net_margin_bridge() (Phase NT) reads data[''margin_bridge_series''] (built via margin_attribution.py''s build_margin_bridge_series() over years[] -- the settlement-clock pipeline). Both sections are still adjacent, still unlabelled, still liable to disagree for the same reason D2/E2 already found and explained (missing non-commodity revenue recognition on the settlement clock for fixed-tariff records). Precise next BUILD step (not vague, not yet built): add a basis/cross-reference note to BOTH sections -- same basisNote()/number-passport pattern E2''s BUILD pass already shipped to site/supplier, site/project, site/customers -- pointing each section at its own clock name and at site/data/margin_bridge.json''s reconciliation, rather than leaving two disagreeing figures side by side unexplained in the same generated report. depends_on cleared; loop_stage build (real, independently-actionable work now exists).', '2026-07-12 L3 EARNED, level 2->3, live-verified (self-refill draw, real BUILD dispatched, R1/R11): built the exact annotation named as the next step -- both _section_gross_margin_bridge() (Phase BE) and _section_net_margin_bridge() (Phase NT) in saas/reporting/annual_report.py gained a one-paragraph clock-basis note, purely additive (no numeric change), each naming its own clock and cross-referencing the other section + tools/generate_margin_bridge.py''s reconciliation for why the two can diverge. Verified before publishing: tests/saas/reporting/test_phase_be_margin_bridge.py (15 tests) + tests/saas/test_phase_nt_margin_bridge.py (19 tests) + the full saas/reporting/ suite (898 tests) all pass unchanged; epistemic verifier