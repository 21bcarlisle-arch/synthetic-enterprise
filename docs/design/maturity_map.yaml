next step named above, consuming D3's own fields rather than recomputing anything independently. saas/ledger.py gained: (1) make_revenue_restatement_event(bill) -- a zero-cash memo event (same pattern as the existing back_billing_write_off_event), fired whenever catchup_applied is True, naming the restated_gbp/direction/periods_covered so a restatement is auditable, not indistinguishable from ordinary revenue; wired into build_ledger() and summarised in derive_pnl() as revenue_restated_gbp/revenue_restatement_count. (2) unbilled_revenue_accrual(bills) -- a real, pure function computing the portfolio's OUTSTANDING unbilled-revenue accrual: for each customer, an estimated-basis bill is 'outstanding' unless a LATER bill's own catchup_period_start/catchup_period_end range (D3's own already-computed field, reused not re-derived) covers its period -- exactly the real accounting concept a supplier's accrual ledger would carry until the true-up lands. Verified against real live data (R1/R11): docs/reports/run_output_latest.json's real 1588 bills produce GBP572,920.61 outstanding accrual across 71 bills (dominated by C_IC3g, a large I&C account -- plausible given its consumption volume) and GBP7,276.01 restated across 147 corrections this run (consistent with, though not identical to, D3's own earlier-run figures -- expected Monte Carlo variation, not a red flag). Published on a real business surface (rule 0b): new _section_unbilled_revenue_accrual() in saas/reporting/annual_report.py, wired into the report build order right after the Net Margin Bridge -- regenerated the real report and read the section by eye (phase-close 0c), confirmed sane output including a real per-customer top-10 table. 18 new tests (10 in tests/saas/test_ledger.py covering the event's zero-cash-memo property + derive_pnl summarisation + the accrual function's outstanding/resolved/multi-customer logic; 8 in tests/saas/reporting/test_e3_unbilled_revenue_accrual.py covering the report section). Full saas