  simplifications: ['2026-07-16 BUILT L0->L2 (director P0 WALL, mechanised not just understood -- caught decaying as behaviour: understood then violated by two in-window escalations, so understanding != done). Merges ESCALATION_IS_NTFY_NEVER_WINDOW.md (the pane is NOT a channel the director monitors -> a window-ask is a SILENT STALL) + ROUTE_AROUND_BEFORE_STOPPING.md (decompose the wall, do reversible parts via throwaway worktree/branch/idempotent, escalate ONLY the irreducible core async). MECHANISM: executor_governor.run_loop used to break on status==escalated (halt whole loop); now NTFYs the core (async, _alert_wall->send_ntfy, non-blocking) and KEEPS DRAWING other atoms; same wall re-drawn -> NTFY once + idle-backoff. 3 mutation tests (keeps-drawing reverting-break-fails-it; ntfy-once+backoff; channel-is-ntfy no-input-path). CLAUDE.md P0 WALL encoded (removed expired SPIKE_WEEKEND to fit 35k). Mechanism landed dd81f2cca; this registers the atom.', '2026-07-16 H17 HARDEN (L2->L2, red-team of this atom''s OWN core invariant ''the loop NTFYs the irreducible core''): found + fixed a SILENT-DROP defect — the cousin of the silent-stall this atom exists to kill. A WALL keeps the loop DRAWING, so TWO DISTINCT one-way doors can be open at once; _alert_wall keyed every wall to the CONSTANT action_needed item `executor-wall_escalated`, so the fire-once gate SILENTLY SWALLOWED the second distinct door (director only ever heard the first; both shared one reply-PIN too). Reproduced empirically before fixing (R9). FIX: _alert_wall derives the item id from the escalated atom_reason (sha1[:8]) so each distinct door gets its own escalation, its own fire-once/daily gate, and its own reply-PIN; singleton STOP kinds (map_unreconciled/repeated_failure HALT the loop) keep the constant id. Second, related defect: run_loop''s backoff/dedup used a SCALAR last_escalated_reason (immediate-previous only), so two distinct walls cycling A,B,A,B — the only drawable work being two doors — never equalled the previous reason and thus re-alerted every cycle AND never backed off (a hot busy-loop). Replaced with a SET of seen walls: NTFY once per newly-seen distinct wall, back off on any re-seen wall, clear on real progress. 2 R15 mutation tests, each proven to FAIL on the reverted mechanism (constant item_id -> distinct-walls test fails; scalar last-reason -> alternating-walls test fails) and pass on the fix. Blast radius green: test_executor_governor (28), test_action_needed, test_executor_daemon, test_build_executor, test_daemon_loop_mutation, test_map_reconciliation, test_publish_gate_alert (126 total). file_scope: background/executor_governor.py + its test only.', '2026-07-16 H17 HARDEN (L2->L2, red-team of this atom''s OWN core invariant ''the loop NTFYs the irreducible core''): found + fixed a SILENT-DROP defect (the cousin of the silent-stall this atom exists to kill). A WALL keeps the loop DRAWING, so TWO DISTINCT one-way doors can be open at once; _alert_wall keyed every wall to the CONSTANT action_needed item executor-wall_escalated, so the fire-once gate SILENTLY SWALLOWED the second distinct door (director heard only the first; both shared one reply-PIN). Reproduced empirically first (R9). FIX: _alert_wall derives the item id from the escalated atom_reason (sha1[:8]) so each distinct door gets its own escalation, fire-once/daily gate, and reply-PIN; singleton STOP kinds keep the constant id. Second related defect: run_loop backoff used a SCALAR last_escalated_reason (immediate-previous only), so distinct walls cycling A,B,A,B re-alerted every cycle and never backed off (hot busy-loop); replaced with a SET seen-latch (NTFY once per newly-seen wall, back off on re-seen, clear on progress). 2 R15 mutation tests, each proven to FAIL on the reverted mechanism and pass on the fix. Blast radius green (126 tests across executor_governor/action_needed/executor_daemon/build_executor/daemon_loop_mutation/map_reconciliation/publish_gate_alert). file_scope: background/executor_governor.py + its test.']
