- id: A6_coupled_triad_gap_metric
  name: "The coupled triad: SIM depth -> company copes through the wall -> harness measures the belief-vs-truth GAP (the gap is the score)"
  lane: A_strategy_governance
  value_stream: close_to_learn
  epoch: 2
  level_current: 3
  level_target: 3
  loop_stage: build
  dial_inherited: 3
  size: L  # 2026-07-16 G5 sizing (basis in EFFORT_SIZING_DESIGN.md)
  provenance: proposal
  evidence: ["docs/staging/done/THE_COUPLED_TRIAD.md"]
  file_scope: [docs/design, background/supervisor.py, tools]
  simplifications: ["2026-07-13 BUILT to L2 (BUILD_THE_BACKLOG P0, worktree fork, background/gap_metric.py, 25 tests + 39 incl gate). WRITE side of the coupled triad: 4 metric families (classification cost-weighted cant/wont-pay 2x2 with the R13 signed 8:1 harm constant read-never-tuned; attribution error; belief TV-distance; detection-rate + FN-harm), no-skill-normalised (0=perfect/wall-leak, 1=blind), writes coupled_gap_ledger.json (ledger still {} -- no fabricated gaps). Wall-clean (harness holds theta+belief; never leaks theta to company). L3 REMAINS: live wiring into a real run + the Proof-door gap panel + a per-pair non-degenerate gap measured. Unblocks all twins C6-C12 gap measurement. || 2026-07-13 REGISTERED (THE_COUPLED_TRIAD.md, director-decided, P1 rank HIGH, QUEUE -- changes what 'done' MEANS on the map, applied to level definitions + the draw, not a one-off build). THE GAP IS THE SCORE. Problem: the W-lane (world) and company lanes advance as INDEPENDENT ladders -- a world mechanism can hit its target while the supplier has never once been tested against it; depth nobody has to cope with is scenery, not physics. Fix (structural): every capability is a 3-part loop -- (1) SIM adds depth; (2) the COMPANY must DISCOVER + COPE through the wall only (missed payments, broken plans, disclosure, observable behaviour -- never told, and ALLOWED to be wrong); (3) the HARNESS measures the belief-vs-truth GAP (hidden SIM truth vs company belief/action). Falling gap = learning; no gap = cheating (read the answer); static gap = not adapting (a finding). TWO BINDING RULES (going into CLAUDE.md): no SIM/world atom reaches L3 ('fails like reality') until the company has been tested against it and the gap measured; no company capability is complete until it has faced a world that can defeat it. GAP as a first-class metric alongside levels, per coupled pair (classification accuracy for cant-pay/wont-pay 2x2; attribution error for the DD confound; belief error for the population draw; detection-rate + false-negative-harm for self-rationing), reported every digest + on The Proof door. RUN AT SMALL SCALE NOW (this IS the Epoch-4 tournament engine -- the arms race between a deepening world and a coping company -- not deferred): couple the affordability cluster W2_4..W2_10 to their company-side twins and draw as triads. Draw consequence: coupled atoms drawn as pairs/triads; a world atom's promotion BLOCKS on its company-response test existing. Design fork dispatched (docs/design/COUPLED_TRIAD_DESIGN.md: the gap-metric formula + the W2_4-W2_10 coupling table + the level-definition amendment + the draw-coupling mechanism). loop_stage idle: DISCOVER/FRAME (the design) now; BUILD ranks HIGH -- it re-defines the score itself.", "2026-07-13 DIRECTOR SIGNED THE HARM-COST WEIGHTS (R13 curriculum, his call, recorded; DIRECTOR_ANSWER_HARM_WEIGHTS.md). R = HARM/LOSS = 8:1, band 5:1-10:1, versioned; changes ONLY by his explicit re-signature, NEVER tuned toward a gap number (Law B/R13). Rationale on record: the shape is right -- heavily harm-averse but BOUNDED so both real deaths stay possible (licence/enforcement death from harm; insolvency death from bad debt); direct costs are comparable (bad-debt ~few-hundred-pounds/case; British Gas redress ~700/case), so 8:1 prices the TAIL (enforcement, mass remediation, licence risk). DECISION RULE (standardised to p=P(wont-pay)): PURSUE iff p > R/(R+1); at R=8, p>0.889; flip-point R*=p/(1-p); at ambiguous p=0.5, R*=1, so above any harm-weighting the coin-flip account is FORBORNE -- pursuit is EARNED by confidence. TWO NAMED SIMPLIFICATIONS (R10, director-flagged, do not block): S1 harm is HEAVY-TAILED not a point estimate -- most wrongful pursuits cost little, a few trigger enforcement/mass-remediation/existential licence risk; a scalar collapses that distribution; model the tail when the affordability cluster matures. S2 harm must SCALE WITH VULNERABILITY -- wrongly pursuing a comfortable-but-disorganised household is not pursuing someone on the PSR who then self-disconnects; the scalar does not yet distinguish; couples naturally to W2_8_self_rationing + the PSR. H1 anchor RESOLVED: use the 90m British Gas aggregate as the DIRECT per-case anchor (~700/case); treat licence-loss as a SCENARIO not a probability (cannot estimate the tail of a near-never event; a fabricated probability is worse than an honest scenario). FINDING for The Proof door (director: feature it): at even odds ANY harm-aversion means forbear -- pursuit must be earned by confidence; regulation implicitly demands this, no supplier can articulate it, we put a number on it."]
  expert_hour: {status: not_attempted, last: null, findings: []}
  real_world_twin: "measuring how wrong a supplier's model of its own customers is, and whether that error is shrinking as the world changes"
  depends_on: []

