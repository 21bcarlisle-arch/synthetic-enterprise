ur review suggested a future migration should move DirectDebitBook's callers onto company/billing/dd_mandate_register.py::DDMandateRegister, given its cleaner as_of point-in-time discipline. Investigated directly rather than deferred again: that direction is not a clean migration -- DDMandateRegister has NO attempt-tracking concept at all (its own docstring: 'this module tracks the mandate, not individual payments'), so migrating onto it would still need a second, bolted-on structure for collection attempts, not actually eliminating the duplication. FIXED instead, the other direction: DirectDebitMandate gained last_status_change_date, and cancel_mandate()/reinstate_mandate() gained optional as_of parameters that stamp it -- folding DDMandateRegister's real advantage into the module that already has a live caller and already tracks attempts, additive and backward-compatible (no as_of passed = identical behaviour to before). dd_mandate_register.py's own docstring corrected with this finding and a go-forward retirement recommendation (not carried out this pass -- deleting real historical work is a bigger, more consequential step than enriching the live module, left as an explicit future action). The duplication is NOT fully resolved (dd_mandate_register.py itself is not deleted, still exists, still unused) but the underlying REASON it mattered -- DirectDebitBook lacking a real point-in-time discipline -- is now closed. 6 new tests, epistemic PASS.", "2026-07-12 THIRD PASS: the last named L3 blocker (mandate setup not genuinely gating the collection it precedes) fixed. The prior reasoning for leaving this open twice -- 'risks changing ground-truth arrears/bad-debt outcomes' -- was re-examined precisely rather than re-asserted, and found to conflate two independent things: payment_outcome()'s success/fail decision (compute_emergent_bad_debt()'s own ground truth) is drawn from the shared rng BEFORE any date logic runs and takes no date as an input at all, so gating a collection's own due_date can never change which bills succeed or fail; and this module's own dates feed nothing but a business-surface rendering (extract_dd_rails()), never the ledger/cash-timing pipeline that computes any actually-published financial figure. FIXED: a brand-new mandate's first collection due_date is now max(bill's own due_date, mandate's own AUDDIS confirmation date) -- genuinely gated, matching what a real Bacs integration requires. Verified against the REAL full pipeline run (not just unit tests, ~580s, all 3 real end-to-end tests still pass) with this change in place, in addition to 3 new/rewritten unit tests covering the gate itself, the outcome-independence safety property, and that an already-established mandate's second+ collection is NOT further gated. All named L3 blockers from both prior Expert Hour reviews are now addressed: pipeline wiring (closed pass 2), product-mechanic labelling (closed pass 2), register consolidation (closed pass 3, prior entry), and mandate-setup gating (closed this entry). Next real step: a fresh, non-self-graded Expert Hour review of the FULL current state before any level claim."]
