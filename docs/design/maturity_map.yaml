  provenance: proposal
  evidence: [docs/observability/experiment-cycle-profile.md, docs/staging/done/COMPOUNDING_WORK_FIRST.md, 'tools/tournament_runner.py (self-calibrating worker cap, 2026-07-16)', 'tests/tools/test_tournament_runner.py (real E2E measurement, TOURNAMENT_RUNNER_E2E=1)', 'tools/tournament_runner.py::run_tiered_tournament + benchmark_tiered (Lever 3 TIERED TESTS: a cheap SCREEN tier culls the bottom candidates before the expensive FULL tier runs; fail-closed R15, deterministic C-S2, per-tier RSS hint for the in-process calibration hazard)', 'tests/tools/test_tournament_runner.py (tiered-tests: unit + R15 mutation-style guards + opt-in E2E measurement TOURNAMENT_RUNNER_E2E=1)', docs/design/frame/A8_experiment_loop_speed_FRAME.md]
  file_scope: [tools, background, tests]
  simplifications: ['2026-07-13 REGISTERED (COMPOUNDING_WORK_FIRST.md P0, director-decided -- the ONE new atom the director explicitly authorised past the moratorium, because it makes every other atom cheaper). THE UNREGISTERED PRECONDITION OF EPOCH 4: at ~500s/full-sim-run single-threaded, a 10,000-life evolutionary tournament = ~58 days; feasibility (10k lives in a week) needs ~60s/life = ~8-10x too slow today (docs/observability/experiment-cycle-profile.md). MEASURE-FIRST done (R4). Biggest lever, owned by ARCH1: a typed wall interface lets the company be tested against a MOCKED interface instead of a full sim run -- inner loop 500s -> seconds. Secondary: parallel sim, deterministic-stage caching, tiered test selection, reduced-fidelity fast-mode. NON-NEGOTIABLE (fail-closed, mechanical): a fast/mock run may NEVER publish, promote an atom, or feed the board pack; cycle time is a diagnostic never gamed by deleting tests (R15 stands). loop_stage build.', '2026-07-16 BUILD (fork, file_scope tools/tournament_runner.py + its own tests only): the L2->L3 lever actually owned by THIS atom, not ARCH1''s -- ARCH1''s typed mock (RecordedSimInterface) remains UNWIRED into any run path (docs/design/MAP_TRUTH_RECONCILIATION.md: zero run-path callers as of 2026-07-15), so composing with it is not yet available. Before this change, unlocking real parallelism required a HUMAN to already know the true per-life RSS and pass it as per_life_rss_bytes -- with no such measurement, the conservative 6 GB default degrades memory_safe_worker_cap to a single worker even when the real footprint is far smaller. Built: run_tournament() now runs a small PROBE wave (default 1 life) under the conservative cap, MEASURES the real child RSS via resource.getrusage(RUSAGE_CHILDREN) (an actual number, not a guess), and recomputes the worker cap for the remaining lives from that measurement. An explicit caller workers= is honoured verbatim (calibration never overrides an instruction); serial=True always stays pure serial. MEASURED, real, reproducible before/after (2026-07-16, this box: 16 cores, ~10 GB avail; two GENUINELY FRESH `python3 -m tools.tournament_runner run --lives 4 --end-year 2016` subprocess invocations, same 6 GB starting guess in both): UNCALIBRATED (--no-calibrate) -> workers=1, wall_clock_s=165.10 (serial, 4x ~22-46s lives). CALIBRATED (default) -> probe measured 783,654,912 bytes (~0.73 GB, matching the documented ~0.77 GB/life figure), recomputed to workers=3 for the remaining 3 lives, wall_clock_s=47.18. Real delta: 1->3 workers, 3.5x wall-clock reduction, ZERO manual per-life-mb tuning; fitness/determinism unaffected (both variants produced byte-identical total_net_gbp across their lives -- verified in the E2E test). 30 tests added/passing (21 fast + 3 skipped-by-default E2E made to run + kept), full tests/tools + tests/background: 2027 passed, 1 pre-existing failure UNRELATED to this change (test_generate_dashboard_mgmt.py:: test_mgmt_accounts_in_dashboard_json, a dashboard/insights consistency gate on docs/reports/run_output_latest.json -- confirmed via `git stash` that it fails identically on the pre-edit committed code, so it predates and is independent of this change; out of this atom''s file_scope (tools/generate_dashboard_data.py), not touched). Epistemic verifier PASS (509 files scanned). NAMED LIMITATION (R10, found by real measurement, not asserted): ru_maxrss is a per-process MONOTONIC high-water mark. It gives an accurate delta for the FIRST life reaped by a given process (the real CLI shape -- a fresh `python3 -m tools.tournament_runner run ...` process per tournament invocation) and for every life run by a FRESH ProcessPoolExecutor worker (each forked worker has its own zeroed counter -- measured directly: the 3 parallel workers above each independently reported ~773 MB). It does NOT reliably re-measure a life run sequentially after a similar-or-larger one IN THE SAME process (the watermark is already at/above the new peak -- observed directly: lives 2-4 of an all-serial run showed near-zero deltas after life 1 correctly measured ~0.77 GB). A caller invoking run_tournament() repeatedly inside one long-lived process (rather than the CLI''s fresh-process-per-invocation shape -- e.g. a future H17 in-process frontend) would only calibrate on its first ever call; later calls fail closed to the caller''s per_life_rss_bytes rather than mis-measuring -- never a false low number, but a real remaining gap for that usage shape, flagged for whoever wires H17/tournament_runner together. HONESTY: level_current left UNCHANGED (stays 2). This closes a real, measured, secondary lever within A8''s own scope, but the atom''s own registered simplification names the MOCK COMPOSITION (owned by ARCH1) as the biggest lever for the ~8-10x feasibility gap, and that dependency is still unwired -- this increment alone does not close that gap, only a genuine, bounded, honestly-disclosed slice of it. No explicit L3 DoD text exists for this atom to check off; per the honesty wall, level_current is left at 2 rather than claimed.', '2026-07-16 H17 draw (Lane-1 BUILD re-draw): level HELD at 2 -- a genuine dependency WALL, not a stall. Fresh verification this turn (R7, grounded not asserted): company/interfaces/sim_interface.py::build_sim_interface() DOES honor SIM_RECORDED_TRACE -> RecordedSimInterface, but grep -rn build_sim_interface company/ saas/ sim/ tools/ returns ZERO run-path callers, and saas.reporting.annual_report (what each tournament life subprocess runs) constructs no SimInterface at all. So the mock is unwired at the CALLER end: setting SIM_RECORDED_TRACE on a life subprocess is currently a no-op. Wiring it = refactoring the annual_report/sim run path to obtain its exogenous world through the SimInterface seam -- a cross-cutting saas/company/sim change owned by ARCH1/company, OUTSIDE A8''s tools/tests file_scope. A8''s own biggest-lever (mock composition) is thus still blocked on that ARCH1 wiring; the in-scope secondary lever (self-calibrating worker cap / parallelism) was already landed earlier today (2026-07-16). No honest in-scope L2->3 move exists this turn. This is a TECHNICAL dependency, not a one-way door -- no escalation; documented and the loop keeps drawing other lanes (H17 FRAME landed this turn). Unblocks when: build_sim_interface() is wired into the annual_report run path (ARCH1_internal_seams BUILD), after which A8 can capture-once + replay-per-life for the ~8-10x feasibility win.', '2026-07-16 H17 Lane-1 BUILD: LANDED the third named A8 in-scope lever (TIERED TESTS) and level HELD at 2 (honest, not bumped). Found this lever ALREADY BUILT but UNCOMMITTED in the working tree from a prior turn (tools/tournament_runner.py +262, its tests +246, ` M` unstaged) -- invisible and at risk (R2). Verified before landing rather than trusting the claim (R1): its opt-in E2E test had NEVER been run and FAILED on first execution -- math.ceil(6 * survive_fraction=0.34) = 3 survivors, but the test asserted 2 (the author''s own comment intended "top third = 2 of 6" but mischose the fraction; 2/6 = 0.333, so 0.34 tips ceil to 3). The run_tiered_tournament math.ceil semantics ("survivors >= this fraction", max(1,...)) is correct and matches the passing unit tests -- the defect was the E2E''s illustration parameter, not the code. FIX: E2E survive_fraction 0.34 -> 0.33 (yields exactly 2 survivors / 4 culled, honouring the documented intent AND better illustrating the lever''s point: cull the MAJORITY cheaply), code semantics unchanged. RE-RAN GREEN: tiered E2E 1 passed in 202.83s -- screen culled 4 of 6, full tier ran ONLY the 2 survivors (full_summary lives_total=2), tiered total_wall < naive_wall assertion held (a real, load-varying speedup, exact seconds not pinned by design). Fast suite 31 passed / 4 skipped; blast-radius tests/tools + tests/background 2131 passed / 5 skipped, zero regressions; epistemic verifier PASS (510 files). FAIL-CLOSED (R15) proven by mutation-style tests: survive_fraction outside (0,1] refused; a screen-FAILED life can never be promoted to the full tier however generous the fraction; the publish-path output-dir guard fires. Determinism (C-S2): survivor selection is a pure (score desc, life_id asc) sort, no RNG. HONEST LEVEL RATIONALE (held at 2): A8''s headline is closing the ~8-10x Epoch-4 feasibility gap. The BIGGEST lever (mock-interface / RecordedSimInterface composition) is still BLOCKED on ARCH1 wiring -- re-verified this turn: saas/reporting/annual_report.py (what each life subprocess runs) has zero SimInterface/build_sim_interface references, so SIM_RECORDED_TRACE is a no-op on the real run path; wiring it is a cross-cutting saas/company/sim change OUTSIDE A8''s tools/background/tests file_scope. Of A8''s OWN in-scope secondary levers, parallelism/self-calibration (lever 2, landed earlier today) and tiered tests (lever 3, this pass) are now built + mutation-tested, but deterministic-stage caching remains unbuilt and the headline ~8-10x gap is NOT closed by tiering alone (tiering cuts N for the expensive tier; it does not turn a 500s full life into seconds). So this is a genuine, measured, in-scope slice -- not the atom''s completion. loop_stage stays build; unblocks toward L3 when ARCH1 wires build_sim_interface into the annual_report run path (mock composition win) and/or deterministic-stage caching lands.', '2026-07-16 H17 Lane-1 BUILD re-draw (fork, file_scope tools/background/tests): LEVEL HELD at 2 and DISPOSITION CHANGE recommended -> park loop_stage build -> idle pending ARCH1. Fresh R7 verification this turn (grounded, not asserted): `grep -rn build_sim_interface saas/ company/ sim/ tools/ simulation/` returns only the DEFINITION (company/interfaces/sim_interface.py) and a DOCSTRING mention in tools/tournament_runner.py:86 -- ZERO real run-path callers; and saas/reporting/annual_report.py (what every tournament life subprocess actually runs) still has ZERO SimInterface refs, so SIM_RECORDED_TRACE remains a no-op on the real run path -- UNCHANGED since the three prior 2026-07-16 turns. A8''s THREE in-scope levers are now settled: (1) self-calibrating worker cap / parallelism LANDED (commit earlier 2026-07-16), (2) tiered SCREEN->FULL tests LANDED (87f84f4a8, folded 65136bc04), (3) deterministic-stage caching is NOT an in-scope lever -- caching a shared deterministic prefix across lives requires saas.reporting.annual_report to accept/read a cache input, a run-path change OUTSIDE A8''s tools/background/tests file_scope, exactly like the mock-composition lever. The remaining ~8-10x headline feasibility win (mock composition + caching) is thus WHOLLY out of A8''s file_scope and blocked on ARCH1_internal_seams wiring build_sim_interface into the annual_report run path. A persistent in-process worker pool (avoid per-life interpreter startup) was considered and REJECTED: it would trade away the subprocess isolation that guarantees C-S2 per-life RNG determinism and clean RUSAGE_CHILDREN measurement -- a correctness-wall regression, not a clean win (SIMPLICITY GUARD). CONCLUSION: with all in-scope levers exhausted and every remaining lever out-of-scope + ARCH1-blocked, keeping loop_stage=build guarantees phantom BUILD re-draws with no possible in-scope move -- a dials defect (Rule 0). RECOMMEND: orchestrator flip loop_stage build -> idle; re-open to BUILD only once ARCH1 wires build_sim_interface into the annual_report run path, after which A8 can capture-once + replay-per-life for the real feasibility win. Not a one-way door (a technical dependency); no escalation. No code change this turn -- documentation + disposition only.', '2026-07-16 H17 orchestrator DISPOSITION EXECUTED: loop_stage build -> idle (park). This EXECUTES the park recommended by the two immediately-prior grounded turns (f4836e813 + its predecessor) rather than re-deriving it a THIRD time (R3 two-strike: a mechanism that produces the same "empty feasible set" on every draw must be changed, not re-run). ROOT CAUSE of the phantom re-draw: merge_atom_status folds only level_current/append_evidence/append_simplification -- NOT loop_stage -- so a fork''s park recommendation is structurally incapable of taking effect; the map kept loop_stage=build and the BUILD draw kept re-selecting A8 with no possible in-scope move (proven this turn: this was the 2nd redraw with an identical grounded-empty result). MAKE_IT_STICK: converting the park from a prose recommendation into the actual map dial the draw reads is the mechanism that stops it. Fresh R7 verification this turn (independent, grounded): grep build_sim_interface across saas/company/sim/tools/simulation returns only the definition + a tournament_runner docstring (ZERO run-path callers); saas/reporting/annual_report.py has ZERO SimInterface refs; ARCH1_internal_seams sits at L2 unwired. A8''s two in-scope levers (self-calibrating worker cap, tiered SCREEN->FULL tests) are both LANDED; the remaining ~8-10x headline win (mock composition + deterministic-stage caching) is WHOLLY out of A8''s tools/background/tests file_scope and blocked on ARCH1 wiring build_sim_interface into the annual_report run path. This is a reversible DIAL change, NOT a wall or one-way door (a technical dependency): re-open A8 to BUILD (loop_stage idle -> build) the moment ARCH1 wires build_sim_interface into the annual_report run path, after which A8 captures-once + replays-per-life for the real feasibility win. A8 remains fully DISCOVER/FRAME-workable while parked (EPOCH_GATING). SYSTEMIC FINDING queued (SELF_INTERRUPT_DISCIPLINE, not fixed on sight): merge_atom_status cannot fold a disposition/loop_stage change, so every fork-level park recommendation requires a separate orchestrator map edit -- register as a harness atom (extend the inbox schema + fold to carry an optional loop_stage transition, R15-mutation-tested).', '2026-07-16 H17 Lane-3 DISCOVER/FRAME: first consolidated FRAME doc for A8 (docs/design/frame/A8_experiment_loop_speed_FRAME.md). Level HELD at 2 (DISCOVER/FRAME never moves an idle/BUILD-gated atom''s level). Fills the named framing gap the atom''s own log flagged -- "No explicit L3 DoD text exists for this atom to check off": the FRAME supplies an explicit, checkable L2->L3 Definition-of-Done (D1 feasibility measured <=~60s/life; D2 mock lever actually wired+consumed via the SimInterface seam; D3 byte-identical fitness fail-closed R15; D4 determinism across serial/ parallel/tiered C-S2; D5 coupled-triad closed on the real Epoch-4 tournament shape) plus an anti-DoD list, so the next A8 BUILD closes against a written bar instead of re-deriving "what is done" a 5th time. Also consolidates the lever inventory: levers 1 (self-calibrating worker cap) + 2 (tiered SCREEN->FULL tests) LANDED and in-scope; levers 3 (mock composition) + 4 (deterministic-stage caching) OUT of A8''s tools/tests file_scope and BLOCKED on ARCH1_internal_seams. ARCH1 dependency re-verified UNWIRED this turn (R7): grep build_sim_interface across saas/company/sim/tools returns only the definition + a tournament_runner docstring (zero run-path callers); saas/reporting/annual_report.py has zero SimInterface refs, so SIM_RECORDED_TRACE stays a no-op on the real run path. Not a one-way door (technical dependency); no escalation. No BUILD code, no map edit (F1).']
