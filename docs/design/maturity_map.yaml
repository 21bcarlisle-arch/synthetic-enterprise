  simplifications: ["2026-07-13 BUILT to L2 (BUILD_THE_BACKLOG P0, fork, profile B). Re-scope: L2 = verified standalone draw (realised 0.992 acq/yr over 3000 seeds; own SHA-256 substream, siblings byte-identical; 23+110 tests, epistemic PASS). The earlier L2-director-reserved hold now applies to L3 (live-run wiring + C6 book-mix coupling), still unbuilt. || director-confirmed known gap", "2026-07-11 M3 DISCOVER+FRAME (docs/design/M3_DISCOVER_FRAME.md): population draw is genuinely greenfield -- CUSTOMERS is still a fixed list literal, _payment_rng is a single fixed seed (42+7919), zero draw_population/generate_population code found anywhere. Not currently a live epistemic violation (no seed exists yet for company code to read) but a real future risk if a draw module were placed carelessly (e.g. in saas/, which the portal already imports directly). BUILD deferred pending director/advisor sequencing.", "2026-07-12 DISCOVER addendum (self-refill draw, no BUILD code): confirmed directly what the current fixed CUSTOMERS literal's real segment mix actually is (saas/customers.py) -- 15 resi / 4 SME / 5 I&C (24 total) -- the concrete marginal distribution any real per-run draw mechanism would need to preserve, not an abstract 'vary the population' instruction. External research grounds the mechanism choice in an established statistical tradition (population synthesis/microsimulation, not invented for this project): Iterative Proportional Fitting (IPF, established since 1940) is the standard technique for drawing a synthetic population matching known marginal distributions (e.g. this project's real segment/tariff proportions) while allowing genuine unit-level variation -- with known, real limitations directly relevant to sizing the eventual build: cloning-based IPF variants lose real heterogeneity (repeats existing customer shapes rather than generating genuinely new ones) and scale poorly as more attributes are matched jointly. A newer family (MCMC-based synthesis) is the alternative real practice where more attribute realism is needed. Named next FRAME question (not decided here): does this atom need IPF-grade marginal-matching rigour (defensible if segment/tariff proportions must exactly track the real book), or is a simpler weighted-bootstrap-with-replacement over the existing 24 real customer shapes sufficient for the stated goal ('vary the population run to run') -- a real sizing/scope call for the next FRAME pass, not decided unilaterally here.", "2026-07-13 FRAME pass answers the named question above (self-refill draw, DISCOVER/FRAME only per epoch gating, no BUILD code). Read saas/customers.py directly rather than reasoning about IPF vs bootstrap in the abstract, and found a fact that reframes the whole question: CUSTOMERS is not a parametrically-generated table at all -- every one of the 24 entries is individually hand-authored with real narrative depth (named locations, specific tariff_type overrides for flex/pass-through mechanisms, specific write-off/vulnerability/life-event histories keyed to that exact customer_id). Confirmed via grep the real blast radius of touching this: 370 files under tests/company/saas/simulation reference specific customer_ids (C1, C3, C5, C_IC1, etc.) directly -- billing-tab tests, the year-spotlight dashboard's named-customer panels (phase-close checklist 0b requires a real named customer per phase), W2_5_life_event_stream's per-customer event stream, ledger write-off history, all keyed to these exact IDs surviving run to run. Neither IPF nor plain bootstrap-of-existing-rows was ever the right frame: IPF assumes an attribute-generation model to reweight, which doesn't exist here (there is no generator, only hand-written literals), and a full per-run REPLACEMENT population (new synthetic customer_ids each run) would break all 370 dependent references -- a real, wide blast radius, not a hypothetical one. FRAME decision: the eventual BUILD should be ADDITIVE, not REPLACIVE -- keep the existing 24 hand-authored customers as a fixed narrative core (preserving every downstream reference), and draw a per-run SYNTHETIC population on top of it (new customer_ids, e.g. G-prefixed or similar, generated from segment-proportion-matched attribute distributions derived from the real 24's own mix: 15/4/5 resi/SME/I&C) to deliver the atom's real_world_twin goal ('book composition varies run to run') without any one-way-door risk to already-built mechanisms. This also resolves the IPF-vs-bootstrap question as moot at this scale (N=24 core, small per-run addition) -- a straightforward weighted categorical draw over segment/tariff/region proportions is sufficient; IPF-grade joint-marginal matching would be over-engineering for a population this size. Next FRAME/BUILD question (not decided here, epoch-gated): what attribute distributions (consumption band, payment method, region) the synthetic add-on customers should draw from, and how many per run is realistic (a real supplier's book grows/shrinks by a small fraction per period, not a full reshuffle).", "2026-07-13 FRAME pass answers the named next question with real anchors and a decisive internal finding (self-refill draw, DISCOVER/FRAME only per epoch gating, no BUILD code). Attribute distributions: docs/market_research/ASSUMPTIONS.md already anchors Direct Debit payment-method share (72% electricity / 75% gas, DESNZ Quarterly Energy Prices June 2026) and company/compliance/domain_invariants.py's TDCV_ELEC/GAS_LOW/MEDIUM/HIGH RangeInvariants already anchor consumption bands -- both real, current, already-coded, reusable as-is for the synthetic add-on customers' draw distributions. Region has no existing real population-level distribution in this codebase (an honest gap, not silently assumed). Sizing question ('how many per run'): checked saas/customers.py's own real acquisition_date field for every one of the 24 hand-authored customers directly rather than assuming an even cadence -- 20 of 24 were acquired in 2016 (the founding cohort), a further 4 trickle in across 2017-2020 (one per year, 2019 has two), and ZERO new customer acquisitions exist anywhere from 2021 through 2025 -- the book has been completely static for the entire second half of the ten-year replay. This is a real, decisive, quantified finding that reframes the sizing question from an abstract 'how many' into a concrete, scoped target: the synthetic per-run draw's most valuable and clearly-bounded first job is filling this exact gap (continuing new-customer acquisitions through 2021-2025 at a plausible rate matching the hand-authored cast's own established 2017-2020 trickle cadence), not an unscoped 'vary everything' goal. This also gives the eventual BUILD a natural, falsifiable success criterion: does the post-build book show acquisitions continuing through 2025, not stopping dead in 2020.", "2026-07-13 BUILD OPENED (loop_stage idle->build) by DIRECTOR_TWIN approval -- the director delegated BUILD-within-the-open-epoch to the twin in-console (DIRECTOR_CANON.md v2 section 3a); ask_twin returned APPROVED, confidence high, for all six ranked Epoch-2 candidates (director_twin_log.jsonl entry 2026-07-13T07:33:20). Now BUILD-eligible for the supervisor's BUILD-tier draw. W1 built first; the rest concurrent where file_scopes are disjoint.", "2026-07-13 BUILT L0->L1 (sim-engineer fork, commit 1debe9e7 pushed; orchestrator-verified per R1: 19/19 tests pass, epistemic_verifier PASS 498 files, grep-confirmed zero company/saas imports in the new module). New simulation/population_draw.py: an ADDITIVE per-run stochastic draw (per the atom's own FRAME decision -- keeps the 24 hand-authored core untouched so all 370 dependent customer_id references survive, R13 no-baseline-edit) that draws a synthetic SYN-* cohort filling the FRAME-found gap (the book stops acquiring at 2020; zero acquisitions 2021-2025), continuing acquisitions through 2021-2025 at the cast's own 2017-2020 trickle cadence. Architectural constraints all honoured an