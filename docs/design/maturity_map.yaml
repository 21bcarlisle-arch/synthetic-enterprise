ot confabulated): three linked ongoing licence conditions SLC 4A (operational capability) / 4B (financial responsibility principle -- mutualised-cost management, the SoLR/RO/FiT socialisation mechanism) / 4C (ongoing fit-and-proper, SMR&I role-holders, introduced 2021); a REAL quantified Minimum Capital Requirement (Capital Floor GBP0, Capital Target GBP130/dual-fuel-equivalent domestic customer, decided 26 July 2023, phased via milestone assessments); CCB ring-fencing is a DIRECTED power (Ofgem may tell a supplier to ring-fence), not a blanket universal rule -- a company-specific regulatory state, not a constant; licence applications currently carry a 6-month processing timescale (Ofgem guidance updated 27 Feb 2026), confirming this is a live, current-day gate not a historical 2021-22 artefact only. level_current correctly stays 0 (DISCOVER does not move levels, MATURITY_MAP.md section 3). Honest open items registered, not silently dropped (R10): Capacity Market/RO registration duties not independently re-verified this pass and may overlap with F3_obligations_register (boundary needs an explicit FRAME decision, not an assumption); Capital Target milestone-assessment dates/mechanics unresolved (would need the FRC decision PDF itself, not the summary webpage); detailed SLC 4C assessment criteria unresolved; relationship to the company''s existing segment-capital/ROCE modelling (B2_opex_cost_to_serve) not yet framed -- licence-level Minimum Capital Requirement is an absolute floor, distinct from segment ROCE, must not be conflated when this atom eventually frames its own target-level definitions. loop_stage stays idle (BUILD still gated to Epoch 5, per the director''s own instruction).', '2026-07-12 DISCOVER addendum, closes one named open item (self-refill draw, no BUILD code): SLC 4C''s assessment criteria, previously flagged unresolved, now found and real. SLC 4C''s fit-and-proper obligation is deliberately BROAD, not board/exec-only: it covers anyone with ''significant managerial responsibility or influence'' (SMR&I) -- for a real supply business this explicitly includes heads of finance, risk, operations, technology, data, compliance, trading/hedging, strategy, and marketing/CRM, and can extend to external advisors or consultants with effective decision-making authority, not just directly-employed staff. Implication for this atom''s own eventual framing: a real go/no-go SLC 4C assessment would need to model role-holder coverage across this WIDE set, not just a company''s board -- a materially larger scope than ''are the directors fit and proper'' alone. Remaining open items (Capacity Market/RO registration overlap with F3, Capital Target milestone mechanics, B2 relationship) still genuinely unresolved, not addressed this pass.', '2026-07-13 DISCOVER addendum, closes the milestone-assessment mechanics gap (self-refill draw, no BUILD code). Real finding: milestone assessments are CUSTOMER-COUNT-triggered, not date-based -- a licensed supplier must pause new domestic customer onboarding on EACH relevant gas/electricity licence at the 50,000 and 200,000 customer thresholds, with an Ofgem assessment of operational capacity required before onboarding can resume. This is a concrete, real mechanism directly relevant to this project''s own population-draw/growth atoms (W2_2) if this atom is ever built out: a real supplier''s own growth trajectory is gated by regulatory review at named customer-count milestones, not smooth. HONEST DISCREPANCY FOUND, not silently resolved: this pass''s source states the Capital Target as GBP115/dual-fuel-equivalent customer, while the earlier-registered figure (above, sourced from the 26 July 2023 FRC decision) was GBP130 -- the two figures may reflect different points in a phased ramp, a since-revised figure, or source imprecision; registered as a genuine, unresolved discrepancy needing the primary FRC decision document itself (not a summary webpage) to settle, not picked between arbitrarily. Real, current, named industry confirmation found: Octopus Energy has publicly stated it met the Ofgem capital buffer target -- a real, concrete example this atom''s eventual build could cite. Capacity Market/RO overlap with F3 and the B2 ROCE relationship remain genuinely unresolved.', '2026-07-13 DISCOVER addendum, closes the F3 overlap gap (self-refill draw, internal code check, no external research needed, no BUILD code). Checked directly whether F3_obligations_register''s own domain_invariants.py already covers Capacity Market/RO registration duties: zero references to Capacity Market or Renewables Obligation anywhere in company/compliance/ -- confirmed NO overlap exists today. Separately, found this project''s codebase ALREADY has real Capacity Market code -- company/market/flexibility_potential.py + flexibility_revenue_book.py -- but confirmed by reading it directly that this models a COMPLETELY DIFFERENT real-world CM mechanism: the company EARNING Capacity Market revenue as a flexibility/DSR participant (~GBP75/kW/yr for committed flexibility), not the SUPPLIER-SIDE registration/settlement-levy OBLIGATION this atom''s own text means (''Capacity Market/RO registration obligations that attach to holding a licence at all''). Same three-letter acronym, two genuinely distinct real mechanisms (a generator/DSR-side revenue opportunity vs. a supplier-side compliance cost) -- this project''s existing CM code is NOT this atom''s scope and does not need reconciling with it. This closes the F3-overlap open item cleanly: no overlap, no conflict, both real and both already correctly separate. Remaining open item: the B2_opex_cost_to_serve/ROCE relationship.', '2026-07-13 DISCOVER addendum, closes the final open item -- ALL FOUR named honest gaps now resolved (self-refill draw, internal code check, no BUILD code). Read company/finance/segment_capital.py directly to confirm the B2 relationship: B2''s own segment ROCE is a genuinely DIFFERENT concept from this atom''s own licence-level Minimum Capital Requirement, confirming (not just re-asserting) the distinction the registration already claimed. B2 measures PER-SEGMENT capital efficiency against a DIRECTOR-SET hurdle rate (working capital = directly-attributable segment receivables; credit/settlement exposure and collateral = portfolio-level figures allocated pro-rata by revenue share, explicitly documented as an allocation not a bottom-up measurement) -- an internal pricing/cross-subsidy-visibility diagnostic, R12-governed (never tuned to a target). This atom''s own Minimum Capital Requirement is a REGULATORY, portfolio-wide, absolute floor (Ofgem''s own external requirement) with zero code-level interaction or shared computation with B2''s segment-ROCE mechanism -- confirmed genuinely independent, not merely asserted to be. All four named open items from this atom''s own DISCOVER trail (Capacity Market/RO overlap, Capital Target milestone mechanics, SLC 4C criteria, B2 relationship) are now closed with real evidence; the one still-unresolved item is the honest GBP115-vs-GBP130 Capital Target figure discrepancy, which needs the primary FRC decision document, not further code-reading.', '2026-07-16 L1 CONSOLIDATION (doc-only, no BUILD code, epoch-5 BUILD gating unaffected -- loop_stage stays idle). Produced docs/design/F5_LICENCE_READINESS_REGISTER.md: a single structured, cited readiness register turning this atom''s already-complete DISCOVER trail (docs/market_research/ofgem_licence_readiness.md + five map simplifications addenda) into 11 auditable rows (SLC 4A/4B/4C, Minimum Capital Requirement floor/target, milestone assessments, CCB ring-fencing, licence application process, CM/RO overlap check, B2 ROCE relationship, F4 authz boundary), each tagged MET/GAP/NOT-APPLICABLE-YET/OPEN-DISCREPANCY with its real citation. No new research performed -- pure consolidation of existing findings, matching the L1 target (''consolidating its ALREADY-COMPLETE DISCOVER into a concrete L1 deliverable'')