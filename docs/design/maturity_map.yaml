  file_scope: []
  simplifications: ['2026-07-15 STEP-1 RSS PROFILE LANDED (measurement only, no level move, no migration -- docs/design/ARCH1_STEP1_RSS_PROFILE.md). The R4 gate the BUILD_SCOPING ''real path'' required BEFORE any migration: split the ~674 MB non-output RSS into replayable-exogenous vs live-endogenous to BOUND the achievable win. Method: single-process boundary checkpoint (monkeypatched RiskCommitteeMonitor.__init__ = the exo->endo seam) on a 2016 truncated life; RSS via /proc/self/status (no memray/psutil in-env). Reproduced peak 737.7 MB / non-output 675.7 MB first-hand (matches prior 674 + tournament_runner 0.77 GB@2016). DECOMPOSITION of the 737.7 MB peak: ~375 MB (51%) interpreter+libraries (pymc ~208 + pytensor ~111 -- FIXED, window-invariant, NOT addressable by the trace mock); ~197 MB (27%) up-front EXOGENOUS world DATA (SSP price history 134 + HH smart-meter consumption 48 + weather/cloud 11 -- the replayable target); ~156 MB (21%) loop working set (mixed); 62 MB (8%) output. DECISIVE SCALING FACT: tournament_runner''s own 0.77 GB@2016 -> 5.67 GB@full-9.5yr means the ~375 MB library floor is only 7% of the full-window RSS while the ~5.3 GB of growth (93%) is almost entirely the exogenous world scaling with the window (endogenous book stays kilobytes). VERDICT: at the fidelity window that matters (full), exogenous DOMINATES -> the migration IS JUSTIFIED, FRAME premise holds; BUT a truncated-window profile UNDERSTATES the win (at 1yr the fixed pymc/pytensor floor masks it: exogenous only 27%). L1 evidence must therefore be measured at/toward the FULL window, and the mock''s achievable floor is sub-GB (~375 MB libs + small trace + endogenous + output), NOT near-zero -- it collapses the exogenous scaling, not the floor. SECONDARY LEVER, noted NOT actioned (register as candidate, twin to rank): ~319 MB of the fixed floor is pymc+pytensor imported eagerly in the run_phase4c chain (importing sim.risk_committee alone is 0.4 MB -- transitive); if SIM_FAST_MODE skips the Bayesian model, lazy-importing them shaves ~300 MB off every life''s floor, ORTHOGONAL to ARCH1. level_current STAYS 0 (measurement moves no level); the migration (step 2) is NOT started. || 2026-07-13 RE-RANKED to BUILD, thin-started (COMPOUNDING_WORK_FIRST.md P0). Compounding law: work that SHORTENS THE FEEDBACK LOOP goes first regardless of narrative-epoch. Decompose by JOURNEY not technical layer (onboarding, metering, billing, payments&collections, pricing&hedging, settlement, service, vulnerability, regulatory-reporting) -- stable interfaces because the messages (meter read, bill, payment, mandate, settlement run) are industry-standardised. The internal seams ARE the go-live seams (build the integration boundary once; get parallelism + modularity + the wall external contract from one work) AND enable the A8 mock-interface fast loop. DO NOT big-bang the 9 seams. Cut where the next work lands: the affordability cluster touches billing, payments&collections, service -- cut those 3 first, build the cluster against them, seams ACCRETE in front of the work. || 2026-07-13 REGISTERED (WORKTREE_ISOLATION_AND_SEAMS.md Half 2, director-decided QUEUE, Epoch 3). Worktrees solve FILE-SYSTEM collisions but NOT LOGICAL dependencies: two agents both reaching into hedged_settlement.py still collide in MEANING at the merge. The fix is the doctrine we already have (the sim/company epistemic wall enforced by hooks + tests, not a network) applied INWARD -- typed interfaces between billing / pricing / settlement / collections, enforced the same way (''walled interfaces''). KEY ROADMAP CONSEQUENCE (record it): the architecture work and the velocity work are THE SAME WORK -- Epoch-3 internal seams are not only the go-live boundary, they are what makes concurrent building SAFE, so they cap throughput now and are not merely ''later''. Also discharges the monolith obligation: a monolith stays modular only by DISCIPLINE (microservices enforce it through pain); we chose the monolith and have not yet paid that bill -- internal seams are how we pay it. Epoch-3 gated for BUILD, but DISCOVER/FRAME is available NOW and should be RANKED accordingly (thinking is never gated) -- this is the Lane-3 discovery work to progress alongside builds.', '2026-07-13 DISCOVER/FRAME LANDED (Lane-3 fork, doc-only, no level move, commit 14dff83d): docs/design/GO_LIVE_SEAM_AND_INTERNAL_SEAMS_DESIGN.md. Key decision: ONE async-shaped envelope (WallRequest/WallResponse, frozen, correlation-id = idempotency key, NOT_KNOWABLE_YET as a first-class status, valid_time/observed_at split lifted from bitemporal_event_log.py) serves BOTH the outer sim/company go-live wall AND the four inner seams (pricing->billing->collections, settlement->billing) -- same shape at two radii, so C-S3 + A3''s ''schema can''t represent pending latency'' are the same law, built once. Internal-seam enforcement clones tools/epistemic_verifier.py''s git-diff scan with a FORBIDDEN_CROSS_DOMAIN import table; R14 basis-label becomes a structural schema gate. This is why architecture work = velocity work (two agents can''t collide in meaning if the only shared artefact is a versioned typed contract). Biggest open Q for Epoch-3 open: async-migration cost -- migrate call sites incrementally vs a sync convenience wrapper (lean wrapper per SIMPLICITY GUARD), and how to stop the wrapper becoming the default so the async shape actually gets exercised. Epoch-3 BUILD stays gated until epoch-2 exit test passes.', '2026-07-14 FRAME LANDED (Lane-3, doc-only, no level move, docs/design/ARCH1_FRAME.md): scoped ARCH1''s HIGHEST-RETURN slice = a TYPED MOCK at the outer sim/company seam (A8''s owned lever, A8 depends_on ARCH1). Design: a third SimInterface impl (RecordedSimInterface) that REPLAYS a recorded EXOGENOUS observable trace (market/weather/regulatory -- the ~5.67 GB the company can''t see anyway, per experiment-cycle-profile.md) while the cheap ENDOGENOUS book loop runs live -> per-life RSS collapses -> tournament_runner''s memory cap stops throttling parallelism (memory-bound -> core-bound). Composes with A8 via ONE env var (SIM_RECORDED_TRACE) + the EXISTING per_life_rss_bytes parameter -- ZERO edit to tools/tournament_runner.py (disjoint file_scope, itself a proof of the seam doctrine). WALLS preserved: mock is a seam impl (epistemic wall intact, epistemic_verifier unchanged); replay is blindfold-gated (observed_at>as_of -> NOT_KNOWABLE_YET, mutation-tested, R15 FAIL-OPEN forbidden) and draws ZERO RNG (determinism strictly safer, C-S2 substream). NAMED CLASS SIMPLIFICATION (R10): the fixed exogenous world breaks the price->churn->volume feedback for ENDOGENOUS observables -- licensed for inner-loop RANKING only, NEVER publish (R15 fail-closed), with the mock-vs-full GAP measured per COUPLED_TRIAD. C-S5 exception: fixed-world endogenous approximation. C-S1/C-S3/C-S4 all conformant (arrival-order tolerant, envelope-shaped async, append-only log). Proposed file_scope: [company/interfaces, tools/observable_trace_capture.py, tests/interfaces]. Levels: L1=wall-safe single life at sub-GB RSS; L2 (TARGET)=composes with A8, workers>1 measured + gap measured; L3=gap-characterised auto-fallback (beyond target). BUILD-ready; twin can open. NOTE: this FRAME scopes ONLY the outer-seam mock; the four INNER domain seams remain the broader ARCH1 (GO_LIVE_SEAM_AND_INTERNAL_SEAMS_DESIGN.md), a later slice.', '2026-07-16 DISCOVER finding (Lane-3, doc-only, NO LEVEL MOVE, honest hold at 0). ROOT-CAUSE of why the map still reads level 0 despite the RecordedSimInterface outer-seam mock being built + committed (fe87611a4, 33 interface tests green, blindfold/publish-refusal gates mutation-tested): the L2 mechanism exists but the FRAME''s MEASURED-L2 DoD (docs/design/ARCH1_FRAME.md §8-L2, lines 118-122: a real before/after tournament run with workers>1 and reduced wall-clock, PLUS a measured mock-vs-full COUPLED_TRIAD gap figure) cannot be produced yet, because the actual life-run subprocess -- `python3 -m saas.reporting.annual_report` (tools/tournament_runner.py:17) -- does NOT construct its exogenous world through SimInterface at all. Verified by direct read: saas/reporting/annual_report.py (407KB, 9190 lines) has ZERO SimInterface / build_sim_interface references; it builds the weather/price/settlement world inline. build_sim_interface()''s only real caller is company/portal/app.py (the portal, not a tournament life). So SIM_RECORDED_TRACE never activates in a real run: the FRAME premise ''the life sees the exogenous world through the seam'' is not yet true of the run path. CONSEQUENCE FOR SCOPING the measured-L2 slice: it is NOT a thin wiring hook -- it requires routing annual_report.py''s exogenous-world access (the ~5.67 GB/life the mock is meant to replace) through SimInterface, a large refactor of the monolith that also touches saas/ + tools/tournament_runner.py (A8''s file_scope) => contended with A8, multi-turn, and needs a real (>=truncated-toward-full-window) measurement run to verify. Recommend BUILD decompose measured-L2 as its own opened slice with A8-serialisation, not folded into the mechanism build. The L2-mechanism (mock + capture tool + gap function + memory_safe_worker_cap unit-proof) remains load-bearing meanwhile; level stays 0 until the empirical run evidence exists (no shortcut -- R1 consumer-verified, R15 controls-must-fail).', '2026-07-16 BUILD 0->2 (H17 Lane-1): typed internal seam between PRICING/BILLING/SETTLEMENT/COLLECTIONS declared (company/interfaces/internal_seams.py: Domain enum, DOMAIN_PATHS map, 4 versioned directed seam messages PriceCardIssued/SettlementPosition/OverdueInvoiceReferred/CollectionsOutcome) + a fail-closed static verifier (tools/internal_seam_verifier.py) enforcing the boundary the same way the epistemic wall is enforced. R15: mutation-tested -- a planted pricing->billing internal import is flagged; removing a baseline entry re-fires the detector; unparseable file raises (fail-closed) not passes. PASS on