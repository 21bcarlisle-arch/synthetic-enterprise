e_scopes. So LANE-1 BUILD at 1-3 concurrent (each fork: own worktree + own atom-status inbox + one contract) is READY; the only remaining constraint is physics -- integration + full suite serialise at the end behind a green-suite gate, and BUILD stays narrow by nature. Minor open gap (non-blocking): whether isolation=worktree works as a STANDING .claude/agents frontmatter default is unverified (per-invocation works). Umbrella level still 1 -- remaining to L3: deploy the systemd units + the sub-step-7 derived-artifact sandbox + the governance live run (all director-triggered or careful).', '2026-07-17 DISCOVER/FRAME: deploy runbook landed (docs/design/OPS1_DEPLOY_RUNBOOK.md). Drawn for DISCOVER while parked; rather than manufacture theatre on a done atom, produced the one genuinely-missing artifact -- the director-facing L2->L3 deploy procedure (regenerate units -> install_schedule.sh -> gated per-daemon systemctl restart -> verify: boot-SHA drift empty + reconcile clean + health green + console-marker sanctified -> bump L3 + un-park), with rollback (reversible: revert + reinstall) and the IaC reconstruct-from-repo note. Closes the no-documented-deploy gap; the deploy itself stays the director trigger.']
