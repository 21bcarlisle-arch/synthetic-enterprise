- id: G11_activity_cost_utilisation
  name: "Activity-based cost + utilisation: attribute elapsed-time AND tokens to a PRODUCTIVE/WASTE activity taxonomy from existing git/token/deadman data; surface productive-%, cost-of-self-maintenance, rework-rate, value-per-problem, idle-on-director on the Method door"
  lane: H_harness
  value_stream: close_to_learn
  epoch: 2
  level_current: 3
  level_target: 3
  loop_stage: idle
  dial_inherited: 3
  provenance: proposal
  size: L
  evidence: [docs/staging/done/ACTIVITY_COST_AND_UTILISATION.md, tools/activity_cost.py, tools/generate_activity_cost_data.py, site/data/activity_cost.json, site/method/_render_activity_cost_harness.mjs, tests/tools/test_activity_cost.py, tests/tools/test_activity_cost_accuracy.py]
  file_scope: [background, tools, site, docs/design]
  simplifications: ['2026-07-16 REGISTERED from ACTIVITY_COST_AND_UTILISATION.md (director-raised, P1). Answers "is the machine spending resources on PRODUCT or on ITSELF?" — currently a feeling, made a decomposition. Two resources tracked SEPARATELY (elapsed time = utilisation denominator; tokens = cost denominator; they diverge and the divergence is signal). Taxonomy: PRODUCTIVE/product, PRODUCTIVE/discovery (investment), WASTE/self-repair, WASTE/idle, WASTE/hit-limit, WASTE/rework, WASTE/idle-waiting-on-director. Metrics: productive-%, cost-of-self-maintenance (must trend DOWN or the harness is a treadmill), rework-rate, value-per-problem, idle-on-director. Build from data that ALREADY exists (git timestamps, commit-class tags, the 20-turn/window token meter, deadman/health logs) — a REPORTING layer, not new instrumentation. GUARDRAIL (prominent, same law as G5 sizing): utilisation is a DIAGNOSTIC never a TARGET — 40% productive-and-correct beats 90% busy-and-wrong; never tune the machine to make the number look good (corrupts the actuals). Sibling to G5 (effort remaining) + G6 (method lens) + G7 (WIP/flow, already L1); with G5 gives a live forecast (productive velocity / remaining sized effort). Surfaces on the Method door.', '2026-07-16 BUILD L0->L2 (SITE lane-2). Reporting layer over EXISTING data (git history + token-log.md + action_needed_register.json), no new instrumentation. tools/activity_cost.py classifies 4083 real commits into the full 7-class PRODUCTIVE/WASTE taxonomy via a documented ordered ruleset (rework/hit-limit/director/level-transition/fix-domain-split/discovery/product/file-domain-fallback -> unattributed), attributes elapsed TIME (git commit clock, inter-commit gap capped at 30min, excess->WASTE/idle) and TOKENS (token-log headings) SEPARATELY -- the divergence is the signal. All 5 metrics computed + surfaced on the Method door in a new Activity-Cost section (separate activity_cost.json fetch) and PIXEL-VERIFIED live (productive-time 40.7% / cost 74.6% / divergence -33.9pp / self-maint 7% time & 25.4% tokens / rework 0.3% / value-per-problem 6.89 / idle-on-director 2 open). GUARDRAIL ''DIAGNOSTIC never a TARGET'' in docstring + JSON + rendered banner. FAIL-HONEST proven: empty history/tokens->insufficient_data, missing register->no_register, unclassifiable commit->unattributed (excluded from every denominator, never fabricated 0). Generator wired into process_run_complete.py regen + commit-list (R11 no-orphan-transition). 23 pure-fn tests + 6 door render/R15 tests green (node present, real not skipped); no regressions (84 total incl siblings). HELD AT L2 not self-certified L3: the classifier''s FRAMING choices (esp. Auto-process-run-complete=PRODUCT, the fix product-vs-plumbing split) materially move productive-% yet are unreviewed design judgment, and classifier accuracy is not validated against a hand-labelled commit sample (no ground truth). REMAINS for L3: (1) cold-eyes/expert-hour review of the taxonomy-mapping framing; (2) accuracy check vs a hand-labelled sample; (3) token attribution is coarse (session-level headings, ~34 entries) -- a stronger token->activity source would tighten the cost denominator.', '2026-07-16 H17 HARDEN (cold-eyes Expert-Hour fork): PROMOTED L2->L3. FRAMING VERDICT on the two named choices: (a) ''Auto-process-run-complete = PRODUCT'' is DEFENSIBLE -- it is the product OPERATING and publishing its settlement output (a real supplier''s billing run producing statements is product output, not overhead); flagged as the highest-LEVERAGE call (the single largest PRODUCT contributor and the one place the classifier is generous), but sound. (b) The fix product-vs-plumbing split (fix touching product-domain files = product, else self-repair, decided by file-domain plurality) is PRINCIPLED; its only weakness is a plurality-flip when a product build also touches tooling/observability files (declared below). CRITICAL cold-read finding: the skeptic question ''does any rule flatter its own productive-%?'' -- NO, the opposite. A stratified 64-commit hand-labelled audit found the classifier ERRS CONSERVATIVE (under-counts productive), and found a real CLASS-level defect (R10): keyword false-positives contaminated the rare WASTE classes -- [ADVISOR-STAGED] policy/directive docs whose PROSE quotes ''revert''/''two-strike''/''escalation''/''quota''/''one-way door'' were mis-billed as WASTE/rework|hit-limit|idle-on-director, and energy-domain terms in product subjects (''Ombudsman escalation'') + plumbing fixes (''fix escalation gap'') were stolen into idle-on-director. DURABLE CLASS-FIX made at the classifier (not instance patches): (1) a staging-directive guard FIRST -- a commit whose files are all under docs/staging/ is framing INVESTMENT classified by location, never by the policy prose it quotes; (2) director-block now requires the word ''director'' AND a block cue, and is checked AFTER the fix rule so a plumbing fix that merely mentions the director is self-repair (the honest metric source for idle-on-director is the escalation register, not commit subjects); (3) hit-limit tightened to actual-interruption markers so BUILDING/FIXING usage-limit handling is self-repair, not a hit-limit event. Effect: rework-rate 0.3%->0.08% (11->3 commits), idle-on-director commit-count 29->1, hit-limit 6->0, productive-time only 40.7->41.8% (+1.1pp -- fix justified per-commit by reading them, direction incidental, headline barely moved; 331 commits now route via the staging_directive rule, most already productive). ACCURACY CONTROL BUILT (clears REMAINS-2): tests/tools/test_activity_cost_accuracy.py -- a repeatable, hand-labelled fixture of 64 real commits stratified across all classes, labelled INDEPENDENTLY of the classifier by reading subject+files against the taxonomy. Post-fix agreement: COARSE (productive/waste/unattributed -- the axis the headline depends on) 93.8% >= 0.90 threshold; FINE (full 7-class) 85.9% >= 0.80 threshold. Thresholds differ on purpose (coarse held high because it drives the headline; fine held lower because product<->discovery and which-waste-bucket sub-fuzz do not move the headline). R15 mutation-PROVABLE FAIL: a degenerate all-product classifier, an all-waste classifier, and a corrupted-label fixture all drop below threshold (proven by passing mutation tests); fail-CLOSED on missing git history (unresidable sha = failed check, never skipped); every miss must be a documented residual (undocumented-disagreement test guards against new error modes). This CLEARS REMAINS (1) framing-reviewed+durably-improved and (2) accuracy validated. RESIDUAL DECLARED SIMPLIFICATIONS (R10, all CONSERVATIVE or productive<->productive, none self-flattering): product features named ''...Register''/''Coverage Sprint'' route to discovery (productive<->productive, headline unaffected); product builds touching mostly tooling/observability files flip to self-repair (conservative under-count); and REMAINS-(3) token attribution stays coarse (session-level headings, 7 parsed / 17 unparsed of 24 entries) -- accepted as a named residual R10 simplification at L3, fail-honest (unparsed excluded, never fabricated). Tests: 34 pre-existing + 3 new class-fix unit tests + 8 accuracy/mutation tests = 45 green (site/method door render R11-verified against the regenerated activity_cost.json). VERDICT: framing sound (durably improved), accuracy control passes with margin -> L3. PROCEED per the SITE1 delegate precedent (678aead8e): a reversible cold-eyes review gate delegated to this fork, NOT a one-way door, no escalation; demotes freely if the orchestrator disagrees. maturity_map.yaml untouched (F1); no commit/push (orchestrator integrates).']
  expert_hour: {status: not_attempted, last: null, findings: []}
  real_world_twin: "an activity-based-costing view of an engineering org: value output vs overhead/rework"
  depends_on: [G5_effort_sizing_discipline, G7_wip_cycle_time_dashboard]
