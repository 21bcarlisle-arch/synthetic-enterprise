  file_scope: [docs/design, background, tools, CLAUDE.md]
  simplifications: ['2026-07-15 AUTHORED AS PROPOSAL (EFFORT_SIZING_DISCIPLINE.md, director-raised, disposition QUEUE -- registered as a proposal atom, drawn in dial order, does NOT preempt the ARCH1 build or the loop work). The gap: the loop/timer/deadman machinery is RUNTIME TOLERANCE for unknown duration (coping), not PLANNING -- nothing estimates effort BEFORE work starts, and maturity levels (L0-L5) describe MATURITY not EFFORT (an L0->L2 atom could be 20min or 3 days). This is standard pre-discovery/discovery T-shirt sizing, missing. Fits THIS project unusually well because we have ACTUALS: every level transition is git-timestamped, so sizing can be CALIBRATED not argued. Three uses: (1) DECOMPOSITION TRIGGER -- XL is a signal to decompose BEFORE building, mechanised (several weekend stalls were one atom far too big: ARCH1, the executor); (2) honest REMAINING-EFFORT -- below-target counts atoms as if equal; sized, you get the number that actually forecasts, reported beside the count; (3) estimate-vs-actual as a LEARNING SIGNAL -- chronic underestimates in a lane mean that lane is poorly understood; also feeds loop throughput (accurate sizing + accurate map state KEEP THE LOOP FED, the --once finding). GUARDRAIL (non-negotiable, same law as every diagnostic here): sizing is a DIAL not a WALL -- informs decomposition/prioritisation, NEVER a target or completion gate; the moment ''estimated M'' becomes ''must finish in M'' it reintroduces the deadline pressure that manufactures self-certified L3s (anti-goal-seek R12 applied to effort). Requirements (mechanism is the builder''s): S/M/L/XL size field set at FRAME with a one-line basis; calibration computed from git-timestamped actuals (observed cost distribution per size per lane, surface when actual blows past band as a SIGNAL); XL->decompose soft-gate on size not time; remaining-effort in the digest; estimate-vs-actual tracked per lane; dial-not-gate guardrail recorded in CLAUDE.md. This is one instance of the broader METHOD LENS proposal (G6_method_lens_audit) -- sizing is one named process discipline; the lens finds the rest. loop_stage idle: DISCOVER/FRAME (design the size field, the calibration query over git actuals) workable NOW per epoch gating; BUILD gated pending director/twin rank.', '2026-07-16 BUILD CALIBRATION half only (L0->L1, honest partial per brief''s own guardrail): tools/effort_calibration.py mines git-timestamped level transitions from docs/design/maturity_map.yaml''s commit history (this repo''s own established ''<atom-id> -> L<n>'' commit-subject convention) and computes REAL observed cost distributions per lane -- run against this repo''s actual history: 51 transitions parsed, 16 durations computed across 5 lanes (e.g. H_harness n=6 mean=24.42h median=27.91h; W2_customer_generator n=6 mean=2.19h median=0.27h), reproducible via `python3 -m tools.effort_calibration --json`. calibration_by_size() is wired and tested but returns {status: no_size_data_yet} since no atom carries a `size` field yet -- activates automatically once FRAME starts setting it, no code change needed. docs/design/EFFORT_SIZING_DESIGN.md specifies the remaining SIZING half as a schema PROPOSAL (not applied here -- this fork''s file_scope excludes maturity_map.yaml, a MAP edit reserved for the orchestrator): the size:S/M/L/XL field + one-line size_basis, band anchors derived from the real calibration output above, the XL->decompose soft gate (fires at FRAME, on size not on time), and the dial-not-a-gate guardrail (R12 anti-goal-seek applied to effort -- an estimated M must never become ''must finish in M''). CLAUDE.md guardrail line NOT added in this fork (file at ~34,800/35,000 char hard limit; explicitly the orchestrator''s follow-on per task brief). 22 new tests (tests/tools/test_effort_calibration.py): pure-function commit-parsing coverage (short-code derivation, H1-vs-H10 boundary, bundled multi-atom commits like the real ''C9->L3+W2_7->L3, C10->L3+W2_8->L3'' pattern, embedded-from-level text), duration-computation edge cases (no-anchor first transition, same-commit/non-positive gaps dropped), lane/size aggregation, an end-to-end synthetic-git-repo test, and one live sanity check against this repo''s own real history. L2 remains open (honest): size field not yet live on real atoms, XL soft-gate not yet enforced, remaining-effort not yet in the digest, estimate-vs-actual not yet tracked, guardrail not yet in CLAUDE.md itself -- see EFFORT_SIZING_DESIGN.md section 6.', "2026-07-16 BUILD L2 MECHANISM half (the map-data half -- real `size:` values on real atoms -- is the orchestrator's, per brief; not done here). Four functions added to tools/effort_calibration.py, all additive and read-only (never mutate maturity_map.yaml, never block anything -- DIAL not a WALL, R12 anti-goal-seek): (1) expected_hours_for_atom() -- the honest fallback chain used by both functions below: a real per-size calibrated actual (once any atom has one) > the starting SIZE_BAND_ANCHOR_HOURS anchor (S=1h/M=12h/L=28h, derived from this repo's own real per-lane distribution) > a real per-lane calibrated actual (for atoms with no size yet) > unknown (never guessed as zero). XL never receives an hours figure (basis 'xl_decompose_signal') -- sizing it would reward leaving it undecomposed. (2) remaining_effort_report() -- sums expected hours over below-target atoms (level_current < level_target), reporting n_sized/n_unsized honestly alongside the total so \"0 sized yet\" degrades visibly rather than silently. (3) estimate_vs_actual_by_lane() -- pairs each lane's real calibrated actual against an estimate built from its size-tagged atoms' anchors, reporting delta_hours + direction (under/overestimated) per lane, or 'insufficient_data' rather than a fabricated delta when either side is empty. A LEARNING SIGNAL about the lane, never a stick against an atom (design doc section 5). (4) xl_decompose_flags() -- the XL -> decompose SOFT GATE: flags (never blocks) a BUILD-eligible atom sized XL that has neither a recorded child (another atom's depends_on pointing at it) nor an explicit size_basis exception. background/effort_digest.py (new, thin render layer only -- all computation stays in tools/effort_calibration.py) surfaces all three L2 views as an 'EFFORT SIZING' block in LATEST.md, wired into the live publish cycle via a new run_effort_digest_step() in background/process_run_complete.py (same block-managed-between-HTML- markers pattern, and same defensive try/except-log-and-swallow discipline, as the existing 'NAIVE ORGAN asks:' block/run_naive_organ_step() it sits beside) -- verified fully defensive (a synthetic render failure is logged and swallowed, never breaks publishing) and idempotent (re-render replaces the block in place, never duplicates it). CLI extended: `python3 -m tools.effort_calibration --remaining-effort / --estimate-vs-actual / --xl-flags`. Ran against the REAL live map (2026-07-16, no atom carries `size:` yet): remaining-effort correctly falls back to per-lane actuals for all 30 below-target atoms (14 sized via lane fallback, 16 unsized -- lanes with zero calibrated actuals, e.g. brand-new lanes), total ~234h; estimate-vs-actual correctly reports 'insufficient_data' for every lane (honest -- no atom has an estimate side yet); xl_decompose_flags() returns [] (no real atom is sized XL yet) and runs cleanly end-to-end without raising. 69 new tests: tests/tools/test_effort_calibration.py gains fallback-chain unit tests (real-size-calibration precedence, anchor fallback, lane fallback, unknown, XL-never-sized), remaining-effort aggregation (below-target inclusion/exclusion incl. missing level_target), per-lane estimate-vs-actual (delta/direction/insufficient-data/XL-exclusion), and the XL soft gate (fires/silent-when-idle/silent-when-decomposed/silent- with-exception-basis/never-fires-on-non-XL/sanity-against-the-real-live- map). tests/background/test_effort_digest.py (new) covers the digest render end-to-end against a synthetic git repo carrying FIXTURE atoms with `size`/`level_target`/`depends_on` (does NOT depend on real atoms being sized), the no-below-target-atoms degrade, the unreadable-map degrade, and the process_run_complete.py block-append/replace/never- raises wiring. Remaining for the orchestrator to close full L2 (per this fork's brief, outside its file_scope): apply real `size:`/`size_basis:` values to representative real atoms in maturity_map.yaml (~8-10 proposed below, with one-line bases) and confirm the full L2 DoD once real size data starts flowing through the (already-live) mechanisms above. Proposed S/M/L/XL sizes for the orchestrator to apply (one-line basis each, informed by this repo's own real per-lane calibration + each atom's actual file_scope/lane/history):\n  G5_effort_sizing_discipline: L -- multi-file (tools/ + background/ +\n    two test files), crosses the calibration-tool/digest seam, L0->L1\n    alone took the H_harness lane's real ~24-28h band.\n  G6_method_lens_audit: M -- doc-only DISCOVER pass (audit table +\n    proposal-atom generation), one lane, one clear DoD, no runtime code.\n  A6_coupled_triad_gap_metric: L -- crosses the SIM/company wall by\n    design (the one layer allowed to hold both theta and b), multiple\n    metric families, feeds a shared ledger other atoms gate on.\n  H11_naive_organ: L -- new subprocess-isolation mechanism (Opus\n    `--tools=` sandboxing), 7 SYSTEM detectors, 2 modes x 3 targets, a\n    log format + a digest sink -- the real precedent this atom's own\n    digest wiring copied.\n  H15_publish_gate_failure_alert: M -- one state file + a threshold/\n    cooldown/fail-closed mutation-tested control, single file_scope\n    (background/process_run_complete.py), narrow DoD.\n  W2_customer_generator (typical W2_* atom): S -- this repo's own real\n    calibration shows this lane's median duration is ~0.27h, the\n    fastest lane measured; narrow, well-precedented generator tweaks.\n  C_customer_ops (typical C* atom): M -