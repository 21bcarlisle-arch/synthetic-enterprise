  provenance: proposal
  evidence: ["docs/staging/done/THE_NAIVE_ORGAN.md"]
  file_scope: [background/naive_organ.py]
  simplifications: ["2026-07-13 REGISTERED (THE_NAIVE_ORGAN.md, director-decided, P1 QUEUE rank HIGH). The director corrected the advisor's claim that the naive outside question is the irreplaceable HUMAN contribution: 'That doesn't require a human, far from it. This can be part of the process.' Mechanises COLD_EYES's own principle (VANTAGE not capability) pointed at the SYSTEM (its claims, state, stuck-ness) rather than at artefacts. SEVEN mechanisable triggers, each a real catch from this weekend, fire the organ on observable conditions: (1) flat metric while system reports healthy; (2) a TERMINAL-STATE claim ('exhausted'/'nothing to do'/'complete'/'no candidates'/'blocked') -- MUST independently check raw data (caught 'map exhausted' with 31 open atoms); (3) an INHERENCE claim ('physics'/'inherent'/'cannot be parallelised') -- fact or unchecked assumption? (caught 'build must be narrow' -- worktrees existed all along, cf H10); (4) a first-principles claim about a fast-moving external field made without checking published practice (cf G3 Finding 1); (5) sustained work in one category while the goal metric does not move (caught harness-grooming vs company backlog -- the treadmill); (6) claim-vs-data contradiction on any observable surface; (7) the same class of fix applied N times -- is the class defined correctly? DESIGN (the discipline that makes it work): DELIBERATELY AMNESIAC -- no memory, no accumulated context, no codebase, no CLAUDE.md, no access to the system's rationalisations (a naive agent that accumulates context stops being naive and inherits the assumptions it exists to break) -- the structural INVERSE of director_twin.py's isolation, and enforced the same process way (separate invocation, no context carryover, PROVE it). Inputs ONLY: the goal, observable state (metrics, raw data files, the map AS DATA), and the system's own CLAIMS -- never its reasoning. Output = QUESTIONS not fixes (land in digest + Director door + back to the agent as findings to answer WITH EVIDENCE; 'no, that was true because X' is a fine answer, 'that's just how it is' is not). Opus-tier (a good naive question is judgment). ANTI-CAPTURE: never tuned by the system it questions, never learns house norms, never told which questions were 'unhelpful' -- its hit-rate is a diagnostic for US, not a training signal for IT (this is Law-B-shaped, same as the twin's no-learn rule). Does NOT replace PURPOSE: it can ASK 'should this company optimise for EV?' but cannot CARE -- the Epoch-4 fitness function and every values decision stay the director's (he is the only one who WANTS). DoD: organ live with the 7 triggers wired, firing on real conditions; questions logged + answered with evidence; amnesia enforced structurally (prove no context carryover); hit-rate tracked; questions+answers surfaced in digest and on the site; SEED TEST -- replay this weekend and independently rediscover >=3 of the 7 catches. loop_stage idle: DISCOVER/FRAME (design the trigger detectors, the amnesia-isolation mechanism, the seed replay) workable NOW; BUILD ranks HIGH for the next slot (twin-approvable within the open epoch per canon v2 3a -- a self-audit organ, not a one-way door). 2026-07-13 DISCOVER/FRAME LANDED (doc-only, Lane-3, no level move): full buildable design at docs/design/NAIVE_ORGAN_DESIGN.md -- all 7 trigger detectors mechanised (concrete files/regex/thresholds, each traced to its real weekend commit), amnesia-isolation as the structural inverse of director_twin (same process defences: --tools=, scratch cwd, no bypass; ONLY inputs = goal+raw observable state+claim, proven by 3 process-level tests PA-1 canary/PA-2 empty-cwd/PA-3 payload-closure), output contract (naive_organ_log.jsonl, QUESTIONS not fixes, answer-with-evidence loop that REJECTS empty evidence, Law-B no-learn anti-capture), seed replay test replaying this weekend's frozen state to rediscover >=3 of 7 catches, Opus-tier fires-on-triggers-not-timer with debounce, ordered 10-step BUILD list + 4 open questions (biggest: the organ catches INCOHERENCE not COHERENT delusion -- log as R10 named simplification at build).", "2026-07-13 DIRECTOR AMENDMENT (commit 0685dd26 [ADVISOR-STAGED], the directive is in the commit MESSAGE; scope-expands this atom, MUST shape the build): ONE ORGAN, do not proliferate -- a separate 'devil's advocate' is the SAME organ, do not add another sceptic. TWO MODES: interrogate (question a claim) / falsify (try to break a plan/claim). THREE TARGETS: (1) the SYSTEM's own claims/state (the original 7 triggers); (2) THE ADVISOR'S staged docs BEFORE the agent acts on them -- the advisor is the LEAST-PROTECTED seat (full context, writes the plans AND reviews the outcomes, 3x R9 breaches in 3 days, has no evaluator of its own), so the organ runs a FALSIFY pass on an advisor-staged doc before action and THE AGENT MAY CITE A FALSIFY PASS TO PUSH BACK ON THE ADVISOR, AND SHOULD; (3) the DIRECTOR's factual/strategic CLAIMS (falsifiable statements of fact/strategy). THE LINE (non-negotiable): it questions CLAIMS and PLANS from ANYONE, but NEVER questions PURPOSE -- values / the fitness function are the director's and are NOT falsifiable (same wall as canon Law B / R13). META-TASK (DISCOVER/FRAME, do first): AUDIT our own existing doubt machinery (director_twin approver, phase-close-evaluator/Expert-Hour, cold-eyes walk, this organ) for OVERLAP before building -- 'adding another sceptic is not the same as being more sceptical'; the organ must be the ONE consolidated doubt mechanism, not a fourth parallel one. Build consequence: the NAIVE_ORGAN_DESIGN.md needs a revision pass folding in the 2-modes/3-targets/THE-LINE structure + the advisor-falsify target (a new input source: advisor-staged docs read before action) + the doubt-machinery overlap audit, BEFORE the organ is built.", "2026-07-13 BUILT L0->L1 (worktree fork, commit 29ba79c3, merged to main 1f305d5b; orchestrator-verified 14/14 tests + epistemic PASS on merged main). background/naive_organ.py built to the DIRECTOR AMENDMENT: TWO modes (MODE_INTERROGATE/MODE_FALSIFY, one ask_organ differing only by rubric -- ONE organ); THREE targets (SYSTEM via detect_t1..t7/run_system_organ; ADVISOR via falsify_advisor_doc(doc_ref,doc_text) running a FALSIFY pass on a staged doc BEFORE the agent acts, cite-able to push back; DIRECTOR via interrogate_claim); THE LINE via is_purpose_claim() which declines any purpose/values/fitness claim BEFORE any Opus call (verdict declined_purpose, zero model spend, tested). DOUBT-MACHINERY AUDIT (design section 8.0): the organ is the standing claim/plan FALSIFIER (amnesiac, attacks truth); the twin is the director-canon APPROVER (max context, rules on authority) -- structural inverses; phase-close-evaluator/cold-eyes are artefact-scoped+episodic; no existing mechanism did the organ job = it is the ONE consolidated doubt mechanism, not a fourth sceptic. AMNESIA proven structurally (PA-1 canary never reaches payload; PA-2 --tools= empty-cwd scratch outside repo; PA-3 build_prompt pure over its 4 args); answer-rejects-empty-evidence (EmptyEvidenceRejected); anti-capture (no prior Q/A, thresholds are source constants). HONEST L1 not L2: run_system_organ exists but NOTHING in the running daemons calls it yet (not wired to fire in the live digest/supervisor loop), no frozen weekend fixture + real-Opus seed replay (replay is inline/stubbed), no digest NAIVE-ORGAN-asks surface. L2 NEXT: wire run_detectors+ask_organ into the digest build + phase/atom close + supervisor terminal-state/idle hooks (QUEUE per SELF_INTERRUPT_DISCIPLINE), build the frozen weekend fixture + real-Opus smoke test, add the digest section. L3 = habitual firing + seed-replay rediscovering >=3 weekend catches with real Opus. R10 SIMPLIFICATION to log: the organ catches INCOHERENCE not COHERENT delusion (a false world where data+claims agree needs an external oracle = the director). loop_stage build.", "2026-07-13 BUILT L1->L2, habitual firing WIRED (worktree fork, commit 489960be, merged to main 8b184678; orchestrator-verified: 18 organ tests pass, epistemic PASS, process_run_complete compiles after a clean auto-merge with Door 6). The organ now FIRES in the live loop: process_run_complete.py::_process() calls run_organ_cycle(max_new=3) right after append_run_history() (so flat-metric detectors see the new run), runs all 7 SYSTEM detectors, asks the amnesiac Opus organ once per NEW fired contradiction (debounced), writes questions to docs/observability/naive_organ_log.jsonl + refreshes a NAIVE ORGAN asks: block in LATEST.md. Fully try/excepted (never breaks publishing), PYTEST-guarded (suite never spawns real Opus), NAIVE_ORGAN_DISABLE=1 kill switch. VERIFIED firing on real current state: run_detectors(load_state()) fires T3_inherence + T6_claim_vs_data (26 open atoms). TARGET-2 advisor-falsify wired as a real callable entry point (falsify_staged_doc / CLI). SEED-REPLAY test passes: loads the frozen tests/fixtures/naive_organ/weekend_20260711/ snapshot and rediscovers ALL 7 catch families (>=3 required incl. T2/T3/T7), T2 recomputing the open count from the fixture map not hardcoded. HONEST L2 not L3: L3 residual = (1) real-Opus smoke (the actual claude -p organ call is stubbed/guarded under pytest, so real question-wording over real cycles is unobserved here); (2) habitual firing proven over accumulated real-run log evidence; (3) a SITE surface consuming naive_organ_log.jsonl (a separate Lane-2 atom, out of scope). loop_stage build."]
