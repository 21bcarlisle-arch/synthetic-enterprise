  simplifications: ['2026-07-17 SUB-STEP 4 DONE-LIVE (authoritative state for any agent that draws this atom, so it cannot mis-read what is already built): sub-steps 1-4 are COMPLETE, MIGRATED, VERIFIED live. (1) console-sanctity marker G-L1; (2) declared-set manifest + reconciler G-L2/G-R3; (3) scheduling-into-repo G-L2 (file-api on systemd, crontab empty); (4) systemd-hybrid single-supervisor G-L3/G-L4 PLUS the full serial-autonomy go-live: worker-seat + supervisor + deadmans ALL migrated tmux->systemd (state enabled, launched_by systemd), reconcile-watch drift control live on a 5-min timer, .build_executor_enabled ON. NEXT BUILD is sub-step 5 (deployment-by-construction G-D1/G-D2: each daemon writes AND reconciles its own booted git SHA), then 6 (one notification contract) and 7 (test-isolation subprocess/tmux/fs guards). DO NOT re-run the migration, DO NOT touch the DARK executor or the base-infra daemons (base-infra tmux->systemd is a separate director-gated pass). Confirm live state first with: python3 -m background.process_reconciler (expect 0 drift; worker-seat-manager, supervisor, deadmans-switch all OK).', '2026-07-17 DESIGN DELIVERABLE LANDED (level 1): docs/design/OPERATIONAL_LAYER_DESIGN.md -- the written operational design the P0 mandate asks for FIRST (purpose/guarantees/why per the five subsystems: process/session lifecycle, deployment committed=running, notifications, test isolation, recovery; conflict resolutions; known-good baseline keep/revert/rebuild per mechanism reconciled against a read-only inventory pass; IaC addendum + reconstruct-from-repo test). Implementation (code follows design) is the level 2->3 work, deliberately NOT rushed in the recovery turn that wrote the design -- a rushed rebuild would be the very accretion the mandate forbids. Sequenced sub-steps in the design ss6: (1) console-sanctity positive marker G-L1 [highest safety value], (2) declared-set manifest + reconcile-vs-ps G-L2, (3) scheduling into repo / delete OS crontab [done: crontab empty], (4) single health-gated supervisor G-L3/G-L4, (5) deployment-by-construction booted-SHA G-D1/G-D2, (6) one notification contract, (7) test-isolation subprocess/tmux/fs guards G-T. Each sub-step deletes/absorbs the patch it replaces. KEY BASELINE FINDING: central lifecycle files (session_watchdog, executor_*, start_worker) born in accretion, no clean revert point -> rebuild-to-design; conftest + deadman commit-clock are keep-as-fixed anchors.', '2026-07-17 SUB-STEPS 1-2 BUILT (level held at 1 -- honest: the layer is not fully rebuilt-to-design until all 7 sub-steps land AND deploy). SUB-STEP 1 (G-L1 console-sanctity marker, commit 6d2e7f758): positive PID+start-time marker replaces inference, console-kill impossible by construction and tmux-independent, mutation-tested; deployment deliberately HELD pending director review (running watchdog still on prior code, R2). SUB-STEP 2 (G-L2 declared-set manifest + reconcile, this commit): background/process_manifest.yaml is now the SINGLE declared process set; health_check.EXPECTED_PANES DERIVES from it (hand-maintained dict deleted); background/process_reconciler.py reports declared-vs-actual drift, REPORT-ONLY with no kill path by construction (G-R3); an anti-drift test binds manifest == start_worker.sh launch set. REAL DRIFT FOUND + FIXED: old EXPECTED_PANES was missing naive-organ so the health check was blind to it; executor-daemon (dark, correct-to-be-absent) now classified health_checked:false. OPERATIONAL FINDING while building this: deadmans-switch (the independent safety net) was DOWN -- restarted it (reversible); live reconcile now clean. 10 new reconciler tests + 956 background tests pass; epistemic PASS. NEXT: sub-step 3 (scheduling into repo, crontab already empty) or 4 (single health-gated supervisor).', '2026-07-17 FRAME PROGRESS (LANE 3): rebuild re-framed vs the live tree. LANDED: sub-step 1 (G-L1 console-sanctity marker 6d2e7f758), 2 (G-L2 manifest + reconciler), 3 (scheduling into repo -- schedule_manifest.yaml + generate_units.py + systemd service units + install_schedule.sh; crontab retired), 4 (single-supervisor systemd migration -- worker-seat-manager + supervisor + deadmans all launched_by systemd), PLUS OPS1_tmux_target_qualification at target. REMAINING to L3: sub-step 5 (deployment-by-construction booted-SHA, G-D1/G-D3, closes the imported-module-drift gap), 6 (one typed notification contract G-N1/G-N2), 7 (test-isolation subprocess/tmux/fs guards G-T). PLUS registered follow-ons: transport-failure-loud (FRAMED, design section 9), session_watchdog collapse, governance-refusal mutation test. Level held at 1 -- honest: not fully rebuilt+deployed until 5-7 land; each is its own BUILD-gated atom drawn one at a time (checkpoint discipline).', '2026-07-17 SUB-STEP 5 BUILT (deployment-by-construction, G-D1/G-D3; rank #3 of the director-opened gates). background/boot_sha.py stamps the git HEAD each systemd daemon boots from; generate_units.py adds an ExecStartPre stamp to every generated unit (committed units regenerated, still == regenerate()); background/process_reconciler.boot_sha_drift() (pure, mutation-tested) flags a RUNNING daemon whose stamped boot-SHA != current HEAD as stale -- GENERALISING the old own-script-mtime check to catch imported-module drift (any HEAD advance past the boot SHA is stale). health_check gains a deployment-drift line; boot records gitignored. 6 new tests; 1061 background pass; epistemic PASS. Fail-safe: no stamp / git unavailable -> nothing flagged. NOT YET LIVE: the mechanism activates when the units are reinstalled + daemons restart (the G-D2 deploy step) -- until then evaluate_boot_sha_drift reads stale=[] (no stamps yet), correct. REMAINING to L3: sub-step 6 (one notification contract), sub-step 7 (test-isolation guards). Level held at 1 -- honest: not fully rebuilt+deployed until 6-7 land and the systemd units deploy.', '2026-07-17 SUB-STEP 6 CONTRACT BUILT + halt-and-show on scope (notification model, G-N1/G-N2; rank #4 of the director-opened gates). background/notify.py is the ONE typed notification contract: kind (real_alarm|digest|director_echo|test_fixture, G-N2 structural tag) + transition-only dedup (G-N1/R5 -- one persisted transition store replacing the per-daemon hand-rolled _last_*_ts) + structural test_fixture suppression. 9 mutation tests (unchanged status suppressed; changed sends; test_fixture never pages; untyped forbidden). MAKE_IT_STICK: a grep-guard (test_notify_contract.py) fails if any NEW file calls send_ntfy directly -- the 19-file allowlist is the SHRINKING migration checklist. SURPRISING-SCOPE FINDING (halt-and-show): the full collapse the design calls for is 17 EXISTING send_ntfy callers across the LIVE alerting system (incl. the deadman safety net + supervisor) -- NOT safe as one mega-turn on an interdependent release rung (the checkpoint-discipline warning). So the CONTRACT + enforcement landed this turn; the 17 caller migrations are the explicit next increment(s), tracked by the allowlist, done a few-at-a-time behaviour-preservingly. The PARALLEL rung stays gated until the collapse COMPLETES; parallel-readiness picture deferred to then (director notified). Level held at 1.', '2026-07-17 SUB-STEP 7 BUILT (test/isolation boundary, G-T1/G-T2/G-T3; rank #5 of the director-opened gates) at a safe scope + tracked debt. tests/conftest.py gains two central autouse guards making the boundary hold by CONSTRUCTION (MAKE_IT_STICK, not per-test discipline): G-T1 no-real-session-spawn (subprocess.Popen raising on tmux/claude/systemctl argv, opt-out @real_subprocess) and G-T2 no-real-state-write (Path.write_text/write_bytes/open-write raising on the runtime CONTROL-STATE files -- the kill switch .build_executor_enabled, the .pull_loop_health.json the deadman alarms on [the proven leak], the notify dedup store, the .daemon_boot records -- opt-out @real_state_write). G-T3: tests/test_isolation_guards.py (8) attempt each forbidden action and assert the block;