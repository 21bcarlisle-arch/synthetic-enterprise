  simplifications: ['2026-07-16 AUTHORED AS PROPOSAL (G6 output, Agile/INVEST lens). We build ad-hoc level gates that ARE Definition-of-Ready/Done unnamed; name them + make DoR a soft BUILD-eligibility check (folds with G5 XL->decompose). DISCOVER/FRAME workable now; director ranks.', '2026-07-16 H17 Lane-3 FRAME L0->L1 (doc-only, BUILD-gated so no code): named our existing unnamed Agile gates — the L0-L5 level ''to enter, must have...'' statements ARE a per-transition Definition of Done, and the loop_stage idle->workable transition IS an (unchecked) Definition of Ready; specified a concrete DoR BUILD-eligibility checklist (framed/scoped/sized/exit-test-defined) where ''sized'' CALLS G5''s xl_decompose_flags rather than duplicating it and ''exit-test-defined'' requires R15 mutation-testability. GUARDRAIL (prominent): the DoR is a SOFT DIAL that orders/flags readiness and can NEVER zero the feasible set (Rule 0 — empty feasible set is a defect in the dials; not-ready => draw-and-flag, never block) and ''ready'' is a diagnostic never a target (R12). Folds into ONE FRAME-time verdict with G5''s XL->decompose gate (as a sub-check) and the director-twin BUILD-open call (route_blocking_decision, as the escalation edge) — three names, one mechanism, not three gates. NOT BUILT HERE: the mechanised dor_check() soft-check + its FRAME-workflow call site + digest/Method-door surface are an explicitly-named later BUILD slice (the missing FRAME-time caller G5''s XL gate already needs), mutation-tested per R15, no draw-path change and no new map schema fields.', '2026-07-17 FRAME refinement (Lane-3 DISCOVER, doc-only, BUILD-gated — file_scope docs/design). Live-evidenced mirror gap added as DEFINITION_OF_READY_GATE.md section 9: the DoR names BUILD-eligibility but nothing mirrored HARDEN-eligibility. Four consecutive Rule-0 self-refill HARDEN draws in one director-gated-idle window (two hit harness/control atoms and found real fail-silent bugs; one a settled domain atom re-verified clean; one hit THIS atom — level-1 FRAME-only, no control/exit-test/invariant to harden) showed the self-refill draws at-target atoms uniformly with no harden-able-surface check, degrading HARDEN on a FRAME-only atom into make-work (the SELF_INTERRUPT_DISCIPLINE treadmill; R15 forbids a manufactured test on a non-existent control). Principle (the DoR mirror): an at-target atom is HARDEN-DRAWABLE only when it has something to harden — level_current>=2 or an evidence entry pointing at runnable tests; a FRAME-only/idle atom''s honest idle-lane work is DISCOVER/FRAME, never HARDEN. Same SOFT-DIAL/Rule-0 guardrail (deprioritise, never zero the set), harden-ability a diagnostic never a target (R12). NOT BUILT (BUILD-gated like dor_check()): the skip/ordering lives in supervisor.py''s HARDEN self-refill and folds into ONE readiness organ (ready-to-BUILD and ready-to-HARDEN). Registered as this atom''s next BUILD increment; no draw-path change this pass, level unchanged (FRAME).', '2026-07-17 BUILD (the HARDEN-eligibility half of this atom''s registered increment; twin-APPROVED via director_twin.route_blocking_decision item G10_harden_ability_gate_build, high confidence, proceed-and-log — BUILD-open on a FRAMED registered increment inside open Epoch 2 is exactly the §3a delegation, priority-within-a-dial, adds no atoms + moves no target levels so R13 not triggered). Motivation was the SAME treadmill now proven across EIGHT consecutive uniform HARDEN draws (both real fail-silent bugs were H_harness/control atoms; the domain draws W2_8/C1/W3_1 all re-verified clean; G10 itself had no control to harden). BUILT in background/supervisor.py::_rule0_harden_draw: module-level _harden_at_target (unchanged base eligibility lc==lt>0), _has_harden_surface (level_current>=2 AND evidence points at a runnable test — a FRAME-only or doc-only atom has no control to re-verify), _harden_criticality_weight (structural: harness lanes lane.startswith(H) get 3x, others 1x). The draw now PREFERS harden-able atoms and BIASES toward harness/control lanes, folded into the existing dial-weighted-random pick. TWIN GUARDRAIL HONOURED (its R12 note): keyed on STRUCTURAL properties ONLY (level, presence of runnable tests, lane) — NEVER on bug-history/outcome, which would make harden-ability a target. RULE-0 GUARDRAIL: if NO atom qualifies the pool falls back to the full at-target set so the draw stays NON-EMPTY (a genuinely-empty draw would false-trip the LOOP_STALE/LOOP_BROKEN transport alarm) — never zeroes the feasible set. R15: 7 mutation tests (tests/background/test_harden_ability_gate.py) — neuter the surface filter -> FRAME-only/doc-only atoms wrongly drawn (RED); neuter the criticality weight -> harness no longer preferred (RED, assertion h>2*d); break the fallback -> only-non-harden-able returns None (RED); all GREEN restored. LIVE-verified on the real map: 0 None draws, 100% of draws now hit a harden-able atom (25 of 80 at-target), 64% harness-lane share (preferred not exclusive). 179 background tests + epistemic PASS. HONEST REMAINING (still FRAME/BUILD-gated): the OTHER half of dor_check() — the BUILD-eligibility DoR soft-check at FRAME-time + its digest/Method-door surface — is NOT built here; level stays 1 (this is the HARDEN-eligibility slice, a real mechanism but not the whole readiness organ). NOTE FOR DIRECTOR REVIEW (twin-flagged, not a block): keep the shipped mechanism keyed on structural criticality only; if a future increment weights by observed bug-hit rate that crosses into goal-seek (R12) and must be refused.']
