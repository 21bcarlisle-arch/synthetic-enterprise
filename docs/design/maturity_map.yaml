isis-year relationship (2020 rate 3.33, 2022 rate 4.23) -- fixed as a class-level correction (R10: rate-based comparison, robust to population-composition differences between years), not a loosened threshold. Verified: 14/14 tests pass, epistemic verifier PASS. The underlying sim run then published successfully (net margin GBP1,505,286, a real, modest, legitimate shift from GBP1,524,058 -- expected per R13, baseline changes for fidelity reasons may shift historical figures).", "2026-07-13 FRAME pass on the remaining L3 blocker (self-refill draw, no BUILD code -- deliberately sizing before attempting, not rushing a design decision). Investigated what wiring company/crm/life_events.py's orphaned taxonomy to a real detection consumer would actually require. Checked for an existing detection-pattern precedent to reuse rather than invent one: found NONE -- company/crm/vulnerability_register.py's own VulnerabilityFlag enum (the closest structurally-similar mechanism, real severity weights + recommended actions) is ALSO entirely orphaned, zero external callers anywhere in the codebase (grepped directly). This means wiring the life-event taxonomy is NOT a small 'connect existing signal to existing taxonomy' task -- it requires DESIGNING a genuinely new detection heuristic from scratch: what OBSERVABLE company-side signals (payment-behaviour changes, contact/complaint patterns, address changes) could legitimately proxy for illness/divorce/serious-illness without reading SIM ground truth directly (the epistemic wall applies here as much as anywhere), and there is no existing real-world-anchored research in this project on which observable signals correlate with which life events at what confidence. This is a materially bigger, genuinely greenfield design question than the SIM-side illness/divorce addition was -- correctly NOT attempted this pass. Honest conclusion: this atom has reached a solid, real, twice-Expert-Hour-verified, live-run-verified L2 state; the remaining L3 work needs its own dedicated DISCOVER pass (real-world research on observable vulnerability-detection signals, likely overlapping with W2_7_willingness_classification's own classify-under-uncertainty scope) before any BUILD attempt, not an incremental wiring task.", "2026-07-13 DISCOVER pass on the dedicated question just named above (self-refill draw, no BUILD code). Real, current UK anchors found for observable vulnerability-detection signals: real energy-sector practice names 'a series of missed bills, reduced engagement, changed usage patterns' as the genuine observable proxies suppliers use -- i.e. payment-pattern change, contact/engagement drop-off, and consumption anomaly, all epistemic-wall-compliant (none require reading SIM ground truth). [L] Ofgem's own PSR framework confirms the regulatory OBLIGATION side: suppliers 'must take all reasonable steps to identify customers in vulnerable situations' from day-to-day interactions, not wait for self-disclosure -- 'customers rarely flag vulnerability proactively', reinforcing this atom's own C/F framing that detection is a genuine company-side inference task, not a lookup. [L] Real, current, quantified stakes anchor: Ovo Energy was required to pay GBP11.5m over failings in support for vulnerable customers -- a real, named, current enforcement precedent for exactly the 'missed detection is a harm event' framing this atom's own registration already asserts, not a hypothetical. Real primary source named for the eventual FRAME/BUILD pass to consult directly (not yet read in full this pass): Energy UK's 2025 Vulnerability Commitment Good Practice Guide. Honest gap, not resolved here: no specific quantified confidence/threshold mapping (e.g. 'N consecutive missed payments implies X% probability of illness vs divorce vs simple hardship') was found -- the real anchors ground WHICH signals are legitimate, not HOW to combine them into a detector; that remains real FRAME/BUILD work, correctly deferred.", "2026-07-13 IDLE-HOLE