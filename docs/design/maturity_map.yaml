  simplifications: ['2026-07-13 REGISTERED (RETRO_WHY_WE_MISSED_IT.md, director-requested ''let''s remember this learning'', QUEUE -- these are IP, not housekeeping). Five method findings + a meta-finding, each a general law with its evidence: (F1) SEARCH THE FIELD WHEN YOU HIT A WALL -- any structural wall = an immediate check of published practice BEFORE theorising (''we are stuck on X'' is the strongest signal someone published the answer to X); the epoch-boundary harness re-check is too slow for a field turning over monthly. (F2) A REVIEW ONLY ANSWERS THE QUESTION YOU ASKED -- when a review comes back clean, ask what it did NOT ask; add a standing ''what was out of scope, and why?'' section to every review artefact. (F3) FIRST-PRINCIPLES REASONING IS NOT EVIDENCE (R9, advisor edition) -- a confident derivation about a fast-moving field is a HYPOTHESIS, verify against published reality before acting (''BUILD is inherently narrow / physics'' was wrong in a checkable way). (F4) BOTTLENECKS ARE ONIONS -- empty draw->cap1->livelock->BUILD-gated->map-contention, each fix revealed the next; the first diagnosis of a slow system is almost never the real one. (F5) THE ARCHITECTURE WORK AND THE VELOCITY WORK ARE THE SAME WORK -- when a structural fix keeps getting deferred as ''architecture'', check whether it also caps throughput; if so it is now, not later. (META) THE OUTSIDE QUESTION IS THE HIGHEST-VALUE INPUT -- every one of the last five structural findings came from the DIRECTOR''s naive-sounding question, not the machine''s self-audit or the advisor''s analysis; protect the director''s ability to ask naive questions -- the human seat that cannot be automated away. DoD: findings recorded in the method/casebook lane (site Method door); F1 wired as a real trigger (structural wall -> published-practice check, before theorising) WITH a test it fires; F2 added as a required section in every review-artefact template. DISCOVER/FRAME workable now.', '2026-07-16 FRAME (H17 Lane-3 governed fork, DISCOVER/FRAME only, no BUILD code, no map edit — F1). Consolidated the RETRO_WHY_WE_MISSED_IT.md prose into a checkable BUILD bar: docs/design/frame/G3_method_ip_worktree_retro_FRAME.md. Key FRAME judgement — the six findings SPLIT by mechanisability: only F1 (structural-wall → published-practice-check-before-theorising) and F2 (review ''what did it NOT ask'' section) are genuinely mechanisable; F3/F4/F5/META are judgement/cultural laws whose ''enforcement'' by a checker would be R15 theatre (FAIL-SILENT/TAUTOLOGY) — casebook-IP only, and BUILD may NOT claim a mechanised-count for them. Named 4 mutation-testable invariants (G3-A1 F1 fires, G3-A2 F1 orders check-before-theorise, G3-A3 F2 fails-closed on a missing/blank section, G3-A4 asserts the judgement findings carry NO fake gate). C-S2 deterministic, portability-clean, R13 declared N/A (harness atom, no baseline/curriculum). BUILD file_scope proposed disjoint from world/company lanes. Level HELD at 0 (Epoch-2 BUILD-gated).']
