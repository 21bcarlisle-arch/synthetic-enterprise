  file_scope: [company/billing/pre_bill_validation.py, company/compliance/domain_invariants.py]
  simplifications: ['2026-07-13 REGISTERED (INVARIANT_LIBRARY_REDTEAM.md confirmed gaps 2-4+6). No arithmetic footing (a GBP999,999 total on an GBP88 bill passes -- line items are never asserted to sum to the total); no sign/non-negativity check AND the gate fails OPEN when subtotal<=0 (a zero/negative bill skips validation entirely); unguarded temporal impossibility (a reversed-date bill is silently clamped to 1 day instead of rejected); and the Qwen internal-audit backstop FAILS SILENT -- returns ''clean'' when Ollama is unreachable, i.e. on effectively every autonomous run (false assurance). FIX (class): add load-bearing structural invariants -- line-items-sum-to-total footing, non-negativity with FAIL-CLOSED on non-positive subtotal, start<=end temporal sanity that REJECTS not clamps; and make the audit backstop fail-CLOSED/flag when the model is unreachable. loop_stage idle: rank for BUILD.', '2026-07-16 F6 HARDEN (Rule-0 self-refill, dial yielded, L2->L2 at target). Two findings, both closed. (1) R15 kill-list gap: the three load-bearing Tier-1 STRUCTURAL controls (check_bill_foots / check_bill_line_items_non_negative / check_bill_period_sane) were F6 evidence at L2 but had firing tests ONLY in the atom''s own test files -- absent from the central mutation-test apparatus (tests/controls/test_control_mutation.py + control_registry.json), so the published kill-list count did not include them (an R15 honesty gap: ''no control counts unless a mutation test proves it fires'' applied unevenly). NOW registered + mutation-tested there; all three FIRE; cumulative kill list 29->32 tested / 28->31 fired / 1 theatre unchanged. (2) RED-TEAM FINDING + FIX: check_bill_period_sane -- the ''temporal sanity'' control -- checked start<=end ONLY, so an ORDERED-but-multi-decade service period (e.g. 2024-01-01 -> 2099-12-31) passed the very absurdity class it is named for (FAIL-OPEN). Fixed as a CLASS invariant (R10): a span > _MAX_BILL_PERIOD_DAYS (731; ~24x the 30-day observed real-data max; back-billing recovery windows use the SEPARATE catchup_period_* fields so no legitimate catch-up is touched) now also fails CLOSED. Verified outcome-safe: real bill-period max across all data is 30 days, annual-bill regression guard passes. NAMED RESIDUAL (R10, not built): a wholly-future normal-span period is not caught because the predicate is intentionally clock-free (C-S2 replay-safe, pure/deterministic) -- catching it needs a caller-supplied as-of/issue date; registered as follow-up rather than smuggling a wall-clock read into an invariant. Tests: tests/company/compliance/test_domain_invariants.py (unit: fires on absurd span, passes an annual bill), tests/company/billing/test_pre_bill_validation.py (gate: HELD on absurd span, annual passes), tests/controls/test_control_mutation.py (mutation, registered).', '2026-07-16 F6 HARDEN (Rule-0 self-refill, dial yielded, L2->L2 at target). Two findings, both closed. (1) R15 kill-list gap: the three load-bearing Tier-1 STRUCTURAL controls (check_bill_foots / check_bill_line_items_non_negative / check_bill_period_sane) were F6 evidence at L2 but had firing tests ONLY in the atom''s own test files -- absent from the central mutation-test apparatus (tests/controls/test_control_mutation.py + control_registry.json), so the published kill-list count did not include them (an R15 honesty gap). NOW registered + mutation-tested there; all three FIRE; cumulative kill list 29->32 tested / 28->31 fired / 1 theatre unchanged. (2) RED-TEAM FINDING + FIX: check_bill_period_sane -- the temporal-sanity control -- checked start<=end ONLY, so an ORDERED-but-multi-decade service period (e.g. 2024-01-01 -> 2099-12-31) passed the very absurdity class it is named for (FAIL-OPEN). Fixed as a CLASS invariant (R10): a span > _MAX_BILL_PERIOD_DAYS (731; ~24x the 30-day observed real-data max; back-billing recovery windows use the SEPARATE catchup_period_* fields) now also fails CLOSED. Verified outcome-safe: 1587 real bills, 0 newly HE