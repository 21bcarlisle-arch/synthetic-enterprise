act 'how many' into a concrete, scoped target: the synthetic per-run draw's most valuable and clearly-bounded first job is filling this exact gap (continuing new-customer acquisitions through 2021-2025 at a plausible rate matching the hand-authored cast's own established 2017-2020 trickle cadence), not an unscoped 'vary everything' goal. This also gives the eventual BUILD a natural, falsifiable success criterion: does the post-build book show acquisitions continuing through 2025, not stopping dead in 2020.", "2026-07-13 BUILD OPENED (loop_stage idle->build) by DIRECTOR_TWIN approval -- the director delegated BUILD-within-the-open-epoch to the twin in-console (DIRECTOR_CANON.md v2 section 3a); ask_twin returned APPROVED, confidence high, for all six ranked Epoch-2 candidates (director_twin_log.jsonl entry 2026-07-13T07:33:20). Now BUILD-eligible for the supervisor's BUILD-tier draw. W1 built first; the rest concurrent where file_scopes are disjoint.", "2026-07-13 BUILT L0->L1 (sim-engineer fork, commit 1debe9e7 pushed; orchestrator-verified per R1: 19/19 tests pass, epistemic_verifier PASS 498 files, grep-confirmed zero company/saas imports in the new module). New simulation/population_draw.py: an ADDITIVE per-run stochastic draw (per the atom's own FRAME decision -- keeps the 24 hand-authored core untouched so all 370 dependent customer_id references survive, R13 no-baseline-edit) that draws a synthetic SYN-* cohort filling the FRAME-found gap (the book stops acquiring at 2020; zero acquisitions 2021-2025), continuing acquisitions through 2021-2025 at the cast's own 2017-2020 trickle cadence. Architectural constraints all honoured and tested: own NAMED SEEDED substream (C-S2 -- SHA-256(stream+seed)->isolated Random, never touches global random, with a test proving a draw here cannot shift another subsystem's sequence -- the direct 01:09Z-incident lesson); deterministic replay (same seed->identical population, tested); event-arrival tolerance (C-S1 -- acquisitions mo