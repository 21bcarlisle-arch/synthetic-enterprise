  simplifications: ["2026-07-12 REGISTERED, NOT BUILT (AFFORDABILITY_AS_SIM_PHYSICS.md item 3, director-decided). The business-side twin of the household budget: sector shocks, insolvency events (bad debt PLUS a lost supply point, not just a write-off), and structural late-payment culture. Anchors: Companies House / Insolvency Service insolvency statistics; late-payment-culture surveys [L]. Note the segment T&C overlay differs materially for business (statutory late-payment interest applies -- see W2_9_segment_debt_tnc). Build in M3.", "2026-07-12 DISCOVER pass (self-refill draw, no BUILD code). All three named anchors verified with real, current (2026) data. Insolvency is genuinely sector-concentrated, not uniform: construction (17% of UK insolvencies), wholesale/retail (15%), accommodation/food (14%) dominate -- a real anchor for a sector-weighted hazard model over a flat rate. Insolvency procedure mix is 76% CVL (voluntary wind-down) vs court-forced routes -- plausibly correlates with a longer visible-distress run-up, a real detection opportunity echoing sibling atom W2_7's classify-under-uncertainty framing. Late-payment culture: ~GBP11bn/year UK economic cost, ~14,000 business closures/year linked to late payment (economy-wide, not energy-sector-specific -- flagged as an honest gap, not conflated). Statutory late-payment interest confirmed at 11.75% (base 3.75% + 8pts, mid-2026) -- directly anchors W2_9_segment_debt_tnc's T&C overlay. Live regulatory change found, not stable background: a Bill (introduced 19 May 2026) would cap B2B payment terms at 60 days and make statutory interest mandatory, in force no earlier than 2027 -- named as a live fact to revisit, not hardcoded as settled. 'Lost supply point, not just a write-off' mechanism confirmed with real UK practice (distinct from the different real mechanism of a SUPPLIER going bust/SoLR, deliberately not conflated): a vacated business tenancy's energy account liability transfers to the LANDLORD, continuing to accrue standing charges during vacancy -- the company's real loss is the customer relationship itself, not just unpaid balance; the meter transfers to a different, often less profitable counterparty rather than going dark. Named next FRAME question (not decided here): whether the hazard model needs a third hidden state ('vacant, landlord-liable') beyond a binary insolvent/trading flag. Full findings: docs/market_research/sme_distress_twin_w2_6.md.", "2026-07-13 DISCOVER addendum, closes the write-off-rate gap named above (self-refill draw, no BUILD code). Real, current (2026) figures found: total SME energy debt GBP1.3bn-1.8bn, up 9% year-on-year; unsecured debt per SME debtor up 13%, aged debt up 15% -- a real, current, worsening trend. Decisive write-off rate anchor: suppliers themselves estimate GBP1.1bn-1.7bn of historic SME debt -- UP TO A THIRD -- is never paid and is written off, directly confirming this atom's own 'bad debt PLUS a lost supply point' framing (energy suppliers are typically a low-priority creditor on insolvency, absorbing a large, not marginal, write-off share). Honest limit, not a gap in this pass's own effort: supplier-level/I&C-specific write-off rates are confirmed NOT publicly disclosed anywhere -- the ~33% aggregate is the best real anchor that exists, not an under-researched question. Remaining open item: the precise late-payment-to-insolvency overlap specifically for energy-sector SME accounts (the GBP11bn/14,000 figures are economy-wide, not energy-specific).", "2026-07-13 REAL, ACTIVE DEFECT FOUND (self-refill draw, DISCOVER/FRAME only per epoch gating -- registering the finding, not fixing it; the fix lives in simulation/life_events.py, W2_5_life_event_stream's own file_scope, not this atom's, and is BUILD code either way). Checked directly whether SME/I&C customers currently go through the SAME residential life-event generator as households, rather than assuming a segment gate exists: confirmed via live code execution (simulation