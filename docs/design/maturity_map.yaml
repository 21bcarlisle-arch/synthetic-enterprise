rved by R13. CONSEQUENCE: W2_2 HELD AT L1 by governance, not by missing capability -- the mechanism is complete and verified; its live activation awaits the director authoring that curriculum change. The agent may STAGE the integration but must not flip it on. Surfaced to the director as a ready-when-you-are curriculum decision (not a blocker -- ample other work)."]
