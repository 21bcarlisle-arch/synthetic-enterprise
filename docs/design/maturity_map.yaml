ur review suggested a future migration should move DirectDebitBook's callers onto company/billing/dd_mandate_register.py::DDMandateRegister, given its cleaner as_of point-in-time discipline. Investigated directly rather than deferred again: that direction is not a clean migration -- DDMandateRegister has NO attempt-tracking concept at all (its own docstring: 'this module tracks the mandate, not individual payments'), so migrating onto it would still need a second, bolted-on structure for collection attempts, not actually eliminating the duplication. FIXED instead, the other direction: DirectDebitMandate gained last_status_change_date, and cancel_mandate()/reinstate_mandate() gained optional as_of parameters that stamp it -- folding DDMandateRegister's real advantage into the module that already has a live caller and already tracks attempts, additive and backward-compatible (no as_of passed = identical behaviour to before). dd_mandate_register.py's own docstring corrected with this finding and a go-forward retirement recommendation (not carried out this pass -- deleting real historical work is a bigger, more consequential step than enriching the live module, left as an explicit future action). The duplication is NOT fully resolved (dd_mandate_register.py itself is not deleted, still exists, still unused) but the underlying REASON it mattered -- DirectDebitBook lacking a real point-in-time discipline -- is now closed. 6 new tests, epistemic PASS.", "2026-07-12 THIRD PASS: the last named L3 blocker (mandate setup not genuinely gating the collection it precedes) fixed. The prior reasoning for leaving this open twice -- 'risks changing ground-truth arrears/bad-debt outcomes' -- was re-examined precisely rather than re-asserted, and found to conflate two independent things: payment_outcome()'s success/fail decision (compute_emergent_bad_debt()'s own ground truth) is drawn from the shared rng BEFORE any date logic runs and takes no date as an input at all, so gating a coll