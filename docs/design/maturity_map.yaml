- id: OPS1_transport_failure_must_be_loud
  name: Turn-transport failure must be a first-class alarm (broken pull loop != healthy idle worker)
  lane: H_harness
  value_stream: close_to_learn
  epoch: 2
  level_current: 3
  level_target: 3
  loop_stage: build
  dial_inherited: 3
  provenance: proposal
  evidence:
  - .claude/hooks/pull_next_work.py
  - docs/design/OPERATIONAL_LAYER_DESIGN.md
  file_scope:
  - .claude/hooks/pull_next_work.py
  - background/process_reconciler.py
  - background/health_check.py
  simplifications:
  - 'REGISTERED HARDENING (2026-07-17, director-required at the serial-autonomy maiden-turn watch, R15 class): a turn transport that CANNOT DRAW must be LOUD. The pull loop was silently broken for a day -- pull_next_work.py raised ModuleNotFoundError(background) on every fire (no repo root on sys.path) AND find_work polluted the hook stdout with log lines; both made it fail-safe to allow-stop, so a BROKEN loop was indistinguishable from a HEALTHY idle worker. Same fail-silent family as the deadman that could not fire and the six-days-dead file-api. Both instance bugs are fixed + regression-tested; THIS atom is the CLASS fix (R10: extend the invariant, don''t just patch the instance). REQUIREMENTS: (1) transport failure is a FIRST-CLASS alarm -- transition-only (R5), typed (G-N2) -- fired when the Stop hook logs a draw error / cannot import / cannot deliver, not buried in pull-loop-log.md. (2) the reconcile OR health layer must DISTINGUISH ''idle because no work was granted'' (healthy quiescence) from ''idle because the loop is broken'' (fault) -- they are different states and MUST read differently (e.g. correlate: flag ON + queued work exists + hook logging draw-errors + no continuation in N min => LOOP BROKEN alarm). (3) mutation-test it: inject a broken draw and assert the alarm fires (a transport-health control that never fires is the very disease). Consider a hook self-check that verifies find_work is importable+callable at load and alarms if not.'
  - 'FRAME DELIVERED (2026-07-17, LANE 3 DISCOVER/FRAME, doc-only, BUILD-gated per EPOCH_GATING Rule 1 — no BUILD code written): the CLASS design is now docs/design/OPERATIONAL_LAYER_DESIGN.md section 9. It specifies (1) a first-class typed transport-health signal the Stop hook writes every fire (.pull_loop_health.json: outcome in DREW/ALLOW_STOP_NO_WORK/ALLOW_STOP_DISABLED/DRAW_ERROR + detail), (2) a hook load-time self-check that background.supervisor.find_work is importable+callable, (3) the correlation predicate distinguishing healthy quiescence (enable ON + no drawable work) from a broken loop (enable ON + drawable work exists + last outcome DRAW_ERROR or no continuation in N min) => transition-only LOOP_BROKEN alarm in health_check/process_reconciler, (4) the R15 mutation test (inject a broken draw, assert the alarm fires; assert silence under healthy quiescence). Stays idle/BUILD-gated; a later BUILD turn implements section 9. Level unchanged (FRAME, not BUILD).'
  - '2026-07-17 FRAME RE-CONFIRMED (LANE 3, doc-only): FRAME already complete -- OPERATIONAL_LAYER_DESIGN.md section 9 (delivered the prior granted turn) covers the typed transport-health signal, the hook load-time self-check, the healthy-quiescence-vs-broken-loop correlation predicate, and the R15 mutation-test requirement. Nothing further to FRAME; BUILD-gated, awaiting a BUILD turn to implement section 9 in pull_next_work.py + health_check/process_reconciler. No BUILD code written.'
  - '2026-07-17 BUILT (level 0->3, rank #1 of the director-opened BUILD gates). Implements design section 9. (1) .claude/hooks/pull_next_work.py writes a typed .pull_loop_health.json on every WORKER-seat fire -- DREW / ALLOW_STOP_NO_WORK / ALLOW_STOP_DISABLED / DRAW_ERROR -- plus a load-time self-check that records DRAW_ERROR if the worker_seat import (the gate before every draw) fails. (2) background/process_reconciler.pull_loop_status() is the PURE predicate: DRAW_ERROR+enabled => LOOP_BROKEN (alarm); ALLOW_STOP_* => HEALTHY_IDLE (no alarm) -- so idle-because-no-grant reads DIFFERENTLY from idle-because-broken, the director requirement. (3) FIRING wired into background/deadmans_switch.py (the only RUNNING periodic safety-net daemon -- run_health_check is on no timer; justified scope expansion beyond the atom file_scope), transition-only (R5) with its own _last_loop_broken_ts + hourly re-escalate, catching the fast typed case the 45-90min commit-clock tiers miss (a loop that fires but errors every draw, incl. a MAP-only queue that [BLOCKED] never sees). (4) health_check.run_health_check() gains an on-demand transport line. R15 mutation tests (tests/background/test_transport_failure_loud.py, 12): inject a broken draw -> alarm FIRES; healthy quiescence -> SILENT; transition-only proven. 1029 background tests pass; epistemic PASS. Deploys immediately -- the Stop hook runs fresh each fire; the deadman picks it up on its next 5min cycle (systemd, current code).'
  - '2026-07-17 HARDEN (Rule-0 self-refill draw, at-target red-team): red-teamed the classifier for a residual fail-silent path and found one -- pull_loop_status was TIME-BLIND, classifying purely on the last outcome string and ignoring the record ts. So a dead/hung worker whose Stop hook stops firing entirely (crash, hook exception before the health write, session-id mismatch) leaves .pull_loop_health.json FROZEN at its last DREW and reads HEALTHY_DREW forever -- the exact day-long fail-silent this atom exists to kill, arriving via staleness instead of an error outcome. The named backstops cannot cover it: the deadman commit-clock reads a legitimate director-gated idle (no commits, healthy) the SAME as a dead worker, and the process reconciler MISSING check only sees process existence, not transport liveness (the process can be UP with only its Stop-hook transport dead). FIX (background/process_reconciler.py): added a FRESHNESS dimension -- pull_loop_status(health, enable_on, *, now=None, stale_after=3600) returns a new LOUD status LOOP_STALE when a healthy record is older than stale_after WHILE ENABLED; evaluate_pull_loop passes now=time.time() so the live deadman/health path gains it. Strictly more-conservative (adds an alarm, removes none -- not a safety-reducing change); now=None keeps the predicate pure and time-blind for back-compat (all prior 2-arg tests unchanged). R15 mutation-proven: neutering the freshness gate turns the two stale tests RED, restoring turns them GREEN (tests/background/test_transport_failure_loud.py +5: stale-while-enabled alarms; stale-while-disabled silent; missing-ts no false alarm; no-clock time-blind; live evaluate_pull_loop flags an ancient on-disk record). 93 reconciler/transport/notify tests pass; epistemic PASS.'
