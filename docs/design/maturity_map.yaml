  simplifications: ['2026-07-15 REGISTERED (RETRO_ACTIONS ATOM 3, QUEUE, constitutional). All five themes (fail-silent, shared-domain, local-vs-global, prose-decay, transport-vs-content) are one failure at different altitudes: trusting an internal signal as external truth. Name it as a law alongside the epistemic wall.', '2026-07-16 CONSTITUTIONAL DOC AUTHORED (docs/design/EXTERNAL_TRUTH_WALL.md). Law named (S0): no component''s self-report counts as evidence of its own success; every success claim must be verifiable by a signal the component cannot itself generate. Test stated (S2): is this signal internally-derived or externally-verified. Related to the epistemic wall as an orthogonal axis -- visibility vs. provenance (S3). R1/R9/R11/R15, the naive organ, and director_twin''s read-only proof indexed as FACETS of this one wall rather than five separate rules (S4), closing the T4 prose-decay pattern this atom itself is about. F1/F2 map-reconciliation (docs/design/MAP_TRUTH_RECONCILIATION.md) walked as the concrete just-built instance (S5). Enforcement table (S6) ties each existing mechanism to the law. Open items logged honestly, not silently deferred: CLAUDE.md pointer-line left to the orchestrator (file at 34,766/35,000 chars, no headroom this wave, out of this atom''s file_scope-safe edit this pass); naive-organ T8 trigger recommended but NOT implemented (H11_naive_organ''s own BUILD ownership, docs/design/NAIVE_ORGAN_DESIGN.md not touched); extending tools.epistemic_verifier''s remit beyond SIM/company to this wall''s general pattern logged as a follow-on BUILD slice, not done here. L0->L2 DoD met: law named + designed + tied to enforcing mechanisms, per this atom''s own HONESTY WALL test given in its task grant.']
