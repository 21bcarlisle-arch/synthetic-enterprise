dget) dependency directly: genuinely met (loop_stage=idle), and this session's own W2_4 FRAME pass identified the real integration point (simulation/household.py's Household dataclass, currently only a coarse income_stress categorical). This pass traces WHERE income_stress is actually consumed today and finds a precise, decisive asymmetry: simulation/arrears_engine.py consumes income_stress_trajectory to drive the residential DIRECT-DEBIT DEFAULT pathway (a household under stress falls behind on payment, real, already wired, real DCA-placement logic downstream) -- confirmed via grep this is the ONLY behavioural consumer of income_stress anywhere in the codebase. There is ZERO consumption-suppression response to income_stress anywhere in simulation/demand_model.py, household_demand.py, or hh_consumption.py -- consumption today is driven purely by physical/occupancy factors (EPC, EV, solar), completely decoupled from the household's economic hardship state. This means self-rationing's defining behaviour (perfect payment record WHILE consumption collapses) is not merely unmodeled by omission -- it is the STRUCTURAL OPPOSITE of the only response path income_stress currently drives (default on payment, consumption untouched), not an adjacent gap. FRAME conclusion: this atom's real generation mechanism is a SECOND behavioural branch on the same hardship state W2_4/arrears_engine.py already models -- some stressed households route to arrears (already built), others route to self-rationing (this atom's own scope) -- rather than a wholly separate hidden-state mechanism. Reuses the existing income_stress/W2_4-budget substrate and the codebase's own established archetype pattern (simulation/household_segments.py's engagement/payment-channel/tenure archetypes) for the branch-selection probability, rather than inventing a new mechanism shape. Next BUILD question (not decided here, epoch-gated): what branches a household toward self-rationing vs arrears when both share the same underlying discretionary-margin deficit -- plausibly correlated with the same archetype traits (e.g. bill-shock aversion, payment-channel type) already anchored elsewhere in this codebase."]
