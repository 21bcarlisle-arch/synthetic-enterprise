r on this new code is needed before an L3 claim. level_current stays 2 (this closes one of two named blockers, not the whole bar) -- loop_stage stays harden pending that fresh review.', '2026-07-13 R1/R11 LIVE VERIFICATION, real downstream confound found and fixed (self-refill draw). The next real sim run built on the illness/divorce BUILD hit a real test failure before publishing (correctly caught by process_run_complete.py''s own gate, not silently pushed through): tests/tools/test_year_spotlight.py::test_crisis_year_2022_worse_than_2020 failed (organic_bill_shock_count 2022=55 < 2020=60). Diagnosed directly (R4), not assumed: adding illness/divorce draws to the shared econ_rng stream legitimately shifted per-customer churn timing (expected PRNG behaviour, same class already anticipated by this atom''s own file_scope), which changed ACTIVE ACCOUNT COUNTS per year (18 in 2020 vs 13 in 2022 in this run) independent of real market severity -- a second, different population-composition confound from the one D3''s own 2026-07-12 Expert Hour already fixed (closure-timing). Normalizing to organic shocks PER ACTIVE ACCOUNT restored the real crisis-year relationship (2020 rate 3.33, 2022 rate 4.23) -- fixed as a class-level correction (R10: rate-based comparison, robust to population-composition differences between years), not a loosened threshold. Verified: 14/14 tests pass, epistemic verifier PASS. The underlying sim run then published successfully (net margin GBP1,505,286, a real, modest, legitimate shift from GBP1,524,058 -- expected per R13, baseline changes for fidelity reasons may shift historical figures).', '2026-07-13 FRAME pass on the remaining L3 blocker (self-refill draw, no BUILD code -- deliberately sizing before attempting, not rushing a design decision). Investigated what wiring company/crm/life_events.py''s orphaned taxonomy to a real detection consumer would actually require. Checked for an existing detection-pattern precedent to reuse rather than invent