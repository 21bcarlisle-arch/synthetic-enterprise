  file_scope: [docs/design]
  simplifications: ['2026-07-13 REGISTERED (WEATHER_PHYSICS_HIERARCHY.md, director P1, QUEUE -- DISCOVER/FRAME workable now, BUILD gated to Epoch 3 with W1_2_generate_futures). L2, conditional on L1. Spatial correlation: neighbouring regions covary (Cornwall and Aberdeen are NOT independent draws) -- a distance-keyed covariance field. AGGREGATION CONSISTENCY is the feasible-test and MUST be an invariant true BY CONSTRUCTION (project/rescale regional deviations so the demand-weighted aggregate == national), not by luck: a world where every region freezes while national is mild is impossible by construction. R15 mutation test: perturb one region off-manifold and assert the reconciliation invariant FIRES (residual > tol). Regional weather is COMPANY-KNOWABLE (genuinely public) -- lives on the public side of the wall. loop_stage idle: FRAME design authored this session (docs/design/WEATHER_PHYSICS_HIERARCHY_DESIGN.md); BUILD opens in Epoch 3. Anchoring rule (anti-marking-own-homework): GENERATOR anchors (real historical weather/demand) and VALIDATOR anchors (independent published sub-national consumption stats / regional degree-days / published system demand) MUST be different sources; the company never validates against SIM ground truth.', '2026-07-15 DISCOVER pass, the same uncredited-capability finding continues into L2 (self-refill draw, DISCOVER/FRAME only, no BUILD code). sim/weather_engine.py Pass 2 (regional micro-climates) ALREADY models each location''s daily deviation from the national series via a Cholesky-decomposed cross-location covariance matrix, preserving real spatial correlation and bound to the national front -- the spatially-correlated regional field this atom describes substantially EXISTS, not greenfield. THE PRECISE REMAINING GAP is exactly the one this atom''s DoD makes load-bearing and the existing code does NOT provide: aggregation-consistency is asserted in the docstring as deviations being ''physically bound to the national front'' (level-setting), but there is NO demand-weighted reconciliation invariant (demand-weighted regional aggregate == national) enforced BY CONSTRUCTION and NO R15 mutation test that perturbs one region off-manifold and asserts the invariant FIRES -- grep of tests/sim + tests/simulation finds reconciliation invariants only for the billed/settlement clocks, none for regional-weather-to-national. So the real build scope is the projection/rescale step that makes the demand-weighted aggregate reconcile as an invariant + its mutation test, NOT the spatial-covariance field, which exists. FLAG (sole-map-writer respected, no self-write): level_current=0 appears mis-registered given the built Cholesky regional field -- candidate re-level to the orchestrator/director. No level change, no BUILD code.', '2026-07-16 DISCOVER pass (governed-discovery fork, docs/design/ scope only, no code/map changed). Confirmed the map''s 2026-07-15 finding: sim/weather_engine.py Pass 2 (fit_regional_cholesky/simulate_regional_deviations) already implements the spatially-correlated cross-location covariance mechanism, physically bound to the national front -- but keyed to only 4 hand-picked calibration points (C1-C4 = London/Manchester/Glasgow/Cotswolds), not any real GB administrative/settlement region, with no demand weight attached to any of them. Grounded the L2 target in real UK structure: GB''s 14 DNO licence areas (6 owning groups: UKPN/NGED/ENWL/Northern Powergrid/SPEN/SSEN) and the related GSP-Group settlement partition. Found company/market/duos_ledger.py::DNOArea already carries a 14-value real-UK-region enum, used today only for DUoS billing, entirely disconnected from weather -- flagged as a reusable single canonical region key rather than inventing a second weather-specific taxonomy (two of its value names, MERSEYRAIL and EAST_OF_SCOTLAND, look like naming slips against real DNO licence-area names; flagged unverified, not corrected, out of file_scope regardless). Confirmed the aggregation-consis