ssified turn -- this is verification/testing, not BUILD code, and closes the atom's own remaining named gap). Ran the deliberate test sequence prior passes could only observe incidentally: (1) captured the exact log line-count (7, having grown by one from a passive company-wall fire moments earlier) then made a genuine Read-tool call on company/crm/vulnerability_register.py (a file not yet opened via the Read tool this session, only via Bash sed/grep in earlier turns) -- the rule's content appeared immediately as a system-reminder injection in the SAME tool result, and the log grew to a confirmed new line at 02:17:28Z. (2) Immediately after, made a genuine Read-tool call on tests/company/governance/test_decision_rights.py (the atom's own named near-miss case: 'company/**/*.py' should NOT match a path starting 'tests/company/') -- no system-reminder fired, and the log stayed at the same line count. Both are real, controlled, before/after-verified results, not incidental. This also resolves the earlier 'deduplication-per-context-boundary' hypothesis as WRONG in its stated form, replacing it with a better-supported one: every prior 'missing fire' this atom logged was on a path read via Bash (sed -n/grep/cat), never via the actual Read tool -- checked directly: company/crm/home_registry.py, property_model.py, energy_profile.py, and company/compliance/domain_invariants.py were all read via Bash earlier this same session with zero corresponding log entries, while this pass's genuine Read-tool call on a sibling company/crm/*.py file fired instantly. The real mechanism is Read/Edit-tool-triggered path matching, not per-boundary deduplication -- a materially different and more useful fact for anyone relying on this hook (a Bash `cat`/`sed` of a wall-scoped file does NOT get the epistemic-wall reminder injected, only a Read/Edit tool call does). The two remaining named adversarial checks (nested/symlinked paths, multi-rule-match files) were checked for testability, not skippe