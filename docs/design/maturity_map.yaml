  file_scope: [site, tools, docs/design/BRAND_CONSTITUTION.md]
  simplifications: ["2026-07-13 REGISTERED (BRAND_CONSTITUTION.md, director-decided/ratified live 'love it', Tier 3 flag-and-proceed, QUEUE). Lane-2 SITE per THREE_LANES -- site/** + document templates, disjoint from BUILD, runs parallel, never gates an epoch; director-authorised to run alongside builds. The visual+verbal identity authority for EVERY Poesys surface (site, charts, bill PDFs, reports, board packs, decks, digests, NTFYs); sits ABOVE SITE_CONSTITUTION.md/POESYS_SITE_BRIEF.md and WINS on visual-identity conflicts (reconcile, don't fork). KEY CONSTRAINT: every Poesys artefact is AI-generated, so the brand book's consumer is the AGENT -- it must be machine-readable tokens + short testable rules + canonical exemplars, so any agent produces on-brand output BY CONSTRUCTION and drift is test-detectable. DECIDED (do not re-litigate): identity = radically plain/honest, 'the energy supplier that hides nothing', architectural simplicity, black+white carry all structure, no ornament; the company's existing honesty conventions (clock/basis labels, provisional badges, published misses) ARE the brand voice (formalise, invent nothing). PALETTE 'BRAG' = black+white + blue/red/amber/green each bright+soft (12 values), with fixed semantics: blue=verified-done (earned, expert-hour-passed/at-target, never self-declared), green=on-track, amber=at-risk/provisional/estimated, red=blocked/failing. 6 LAWS (colour is information never decoration; bright=live soft=historical/fill; soft never as text/thin-line; ONE neo-grotesque typeface, hierarchy via weight/size/space; glyphs are information not decoration, 6 is the ceiling; type-only identity, wordmark lowercase 'poesys.' WITH the full stop). GLYPH GRAMMAR (6, held absolutely, work in plain text incl NTFY/digest/commits): . =done/verified(blue), _ =in-build/on-track(green), ~ =estimated/provisional(amber), ! =blocked/failing(red), > =action/next/CTA, // =the working/basis/provenance. DELIVERABLES (required properties, impl is the agent's): (1) ONE machine-readable design-tokens JSON (W3C format) = the sole home of every colour/type/spacing value, every surface consumes tokens never raw values; (2) an agent-loaded brand-rules file (CLAUDE.md-style short imperative testable statements, referenced before generating any visual surface); (3) canonical exemplar preserved verbatim (the ratified §7 mock -- front door + customer bill + glyph grammar -- generation COPIES from it, never reinterprets); (4) enforcement testable in the harness (no raw colour value outside the token source; soft-colour-as-text detectable/blocked). DoD: token source is sole colour home + the LIVE site consumes it end-to-end (R11 rendered-pixel, director's eyes); rules file loaded by visual-surface generators; exemplar preserved + site front door and one real customer bill demonstrably follow it (BRAG chips, ~///> in live use); brand-compliance harness check passes. ROLLOUT of remaining surfaces (charts, PDFs, reports, decks, NTFY/digest glyph conventions) registers as FOLLOW-UP atoms -- batch honestly, no big-bang. OPEN (genuine, everything else decided): self-hosted typeface selection (agent proposes, DIRECTOR RATIFIES -- brand dial faces the director, same law as R13 curriculum; any palette/dial change is director-ratified only), enforcement mechanism design, token file location/format, rollout sequencing, reconciliation pass vs SITE_CONSTITUTION/POESYS_SITE_BRIEF so there is exactly one visual-identity authority. loop_stage idle: SITE-lane build (director-authorised, runs parallel), DISCOVER/FRAME (token schema, enforcement mechanism, typeface options) workable now; R11 live-pixel DoD needs the director's eyes (no autonomous network). The ratified exemplar is preserved verbatim inside docs/design/BRAND_CONSTITUTION.md §7 (established as the standing visual-identity authority, moved out of staging).", "2026-07-13 BUILT L0->L2 (worktree fork, commit 954cf6b0, merged to main aceed951; orchestrator-verified 9/9 brand-compliance tests + epistemic PASS on merged main). The 4 deliverables built: site/brand/tokens.json (W3C design-tokens, the 12 BRAG colours + b/w/greys + type/spacing/weights, sole colour home) + tokens.css (byte-pinned projection); docs/design/BRAND_RULES.md (agent-loaded, 6 laws + glyph grammar verbatim + typeface-is-a-director-dial note); site/brand/exemplar.html (the section-7 mock verbatim, drift-guarded byte-equal to the constitution); tools/brand_compliance.py + tests/tools/test_brand_compliance.py (9 assertions -- no raw hex outside the token source, soft-colour-as-text flagged, palette drift-guard vs constitution). proof.html demonstrates one surface consuming tokens with zero raw hex. Typeface + palette left as director dials (not self-decided, R13-shaped). HONEST L2 not L3: L3 needs the LIVE production site CSS refactored to consume the tokens end-to-end + R11 live-pixel verification (director eyes / no autonomous network) -- the CSS adoption is autonomously buildable (SITE-lane follow-up), the pixel is the director residual. loop_stage build (token-adoption rollout is real remaining build)."]

