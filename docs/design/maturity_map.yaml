_channel_dd_fail_contradiction (adjudicated-real) -- payment_channel and dd_fail state computed by two independent pipelines that were never cross-referenced. Anchor: Ofgem payment-method debt research [L]. Build in M3.", "2026-07-12 DISCOVER pass (self-refill draw, no BUILD code). Re-verified the 'live present-day relevance' citation directly against docs/observability/sanity_adjudication_ledger.json rather than trusting the reference -- coldwalk:payment_channel_dd_fail_contradiction is real, adjudicated-real, still open ('registered for a future consolidation pass, not fixed'): payment_channel (simulation.household_segments.payment_channel_for_customer(), a static per-customer profile) and dd_fail state (simulation.arrears_engine's payment_method()/payment_outcome(), a separate per-bill computation) are computed by two independently-dispatched pipelines never cross-referenced -- exactly this atom's own named trap, live in the actual codebase today, not hypothetical. External Ofgem-anchored evidence found, real and current (2026): 74% of UK consumers pay by direct debit, 13% standard credit, 13% prepayment; standard credit carries a HIGHER price cap specifically because it 'reflects the additional costs and risks in servicing' that payment-method cohort -- i.e. the REAL regulator's own price-cap methodology already treats payment-method cohorts as structurally different-risk populations by regulatory design, not an assumption this atom would be inventing. A real Ofgem statement found ('a generalised shift... to direct debit has reduced the numbers of customers who fell into arrears') is exactly the kind of surface-level correlation this atom's own trap warns against over-reading as pure causation without accounting for the migration-driven selection effect. No BUILD code, no level change.", "2026-07-13 FRAME pass sharpens the prior pass's own finding with a more precise root cause (self-refill draw, DISCOVER/FRAME only per epoch gating, no BUILD code). Read simulation/household_segments.py::payment_channel_for_customer() in full rather than trusting the prior pass's 'two pipelines never cross-referenced' framing at face value: it is a PURE function of (customer_id, fuel) via a deterministic hash-seeded RNG, with its own docstring stating it is 'stable for the account's WHOLE TENURE' -- zero dependency on payment history, arrears, or dd_fail state anywhere in its signature or body. This means the real gap is NOT that two pipelines compute related state without cross-referencing each other (implying a wiring fix could reconcile them) -- it is that payment_channel currently has NO MECHANISM to change at all, ever, for any customer, regardless of payment outcome. The confound this atom exists to model (failing payers drop OFF direct debit, landing their bad debt in the cash/credit cohort) structurally REQUIRES payment_channel to be a time-varying state that responds to a real dd_fail event -- but today it is a fixed archetype assigned once and never revisited. This reframes the eventual BUILD's real first step: not 'cross-reference payment_channel and dd_fail' (a data-join), but 'make payment_channel a genuinely time-varying, event-responsive state' (a structural change to household_segments.py itself) -- a materially bigger and more precise first step than the prior entries' framing implied. Natural architectural fit (checked, not assumed): this project's own established pattern for time-varying per-customer state driven by discrete events is exactly simulation/household.py's Household dataclass + life_events.py's apply_events() (already reused this session for W2_4/W2_8's own findings) -- payment_channel migration is a fourth real candidate for that same substrate, alongside income_stress, rather than a new bespoke mechanism. No BUILD code, no level change."]
