id: W1_9_dsr_flex_markets
append_evidence:
  - "docs/design/W1_9_DSR_FLEX_MARKETS_DISCOVER.md"
append_simplification:
  - "2026-07-16 DISCOVER pass (governed-discovery fork, docs/design/ scope only, no code changed). Found EXTENSIVE built-but-uncredited company-side DSR/flexibility revenue accounting -- nine modules in company/market/ (capacity_market.py, capacity_market_register.py, dsr_book.py, dsr_portfolio.py, flexibility_potential.py, flexibility_revenue_book.py, ic_flexibility_revenue.py, dso_flexibility_tender_register.py, flexible_asset.py), ~1,300 lines, fourteen matching test files, wired into a live run path (simulation/run_phase2b.py) and dashboard reporting -- same built-but-uncredited shape as W1_3's 2026-07-15 finding. HOWEVER the real gap against this atom's OWN lane (W1_market_weather, a world/SIM capability) is genuine and distinct from that accounting build: every rate/event-count/dispatch-cadence in those nine modules is a hardcoded constant (e.g. _DFS_RATE_GBP_PER_MWH=4.5, _DISPATCH_EVENTS_PER_YR=20, fixed CM clearing-price table) supplied by the caller, not discovered through company/interfaces/sim_interface.py (confirmed zero flex/DSR mentions there) or derived from any SIM-side system-stress signal -- it is handed to the company, not discovered by it, which is the actual epistemic-wall gap. depends_on: [W1_6_physics_price_signal] is physically correct: real DFS/BM dispatch frequency and price are driven by system tightness (the same cold-and-still low-margin conditions W1_3/W1_6 model), not a flat calendar rate -- building this atom's stress-linkage before W1_6 exists would hardcode the exact assumption the physics-hierarchy work is meant to replace. Grounded in real UK market structure: Balancing Mechanism (NESO, BOAs, BMUs, Elexon Insights Solution settlement data), Capacity Market (EMR 2014, T-4/T-1 auctions, DSR de-rating), NESO Demand Flexibility Service (launched winter 2022/23, continuation year-to-year is a live policy question -- NOT a settled indefinite scheme, code currently bakes in '20 events/year forever'), DNO/DSO locational flexibility tenders (Open Networks Programme, per-GSP not national pricing), the aggregator route (Ofgem independent-aggregator access reforms ~2018+), and triad avoidance's declining value under Ofgem's Targeted Charging Review. Numeric figures already embedded in code (DFS £4.5/MWh + 20 events/yr, CM clearing-price table by year, 20% aggregator fee) are UNVERIFIED this session (no network access in this fork) -- flagged for a discovery-agent pass against NESO/Elexon/Ofgem primary sources before any BUILD leans on them for calibration. Concrete remaining SIM-side scope named (none built): (A) a system-stress observable through the sim_interface seam driving dispatch probability instead of a flat constant, (B) locational grounding of DSO tenders against a regional weather/demand field (ties to W1_4), (C) stress-responsive price formation, (D) time-indexed DFS scheme lifecycle (effective_from/effective_to) rather than assumed-indefinite. Open question raised, not resolved: whether the existing accounting modules already satisfy L1/L2 with L3 reserved for the discovered-vs-handed gap, or whether 'discovered not handed' is itself the bar for any level above 0 here -- re-level is the orchestrator/director's call, not self-fixed (sole-map-writer discipline; maturity_map.yaml not edited by this pass). No level_current change -- DISCOVER does not move levels."
