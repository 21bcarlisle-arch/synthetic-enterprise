append_simplification:
  - "2026-07-16 DISCOVER pass (docs/design/W1_6_PHYSICS_PRICE_SIGNAL_DISCOVER.md, doc-only, no BUILD code). Repo-audited for overlap: sim/price_engine.py (Phase 3b merit-order engine -- gas_floor_price/system_margin_price/wind_power_output_fraction) already exists and is the exact engine the WEATHER_PHYSICS_HIERARCHY_DESIGN.md FRAME pass names for reuse at L4, but docs/calibration/price-engine.md records that its raw demand/renewable ratio form ALREADY FAILED calibration against real 2019/2022 SSP (~10x overestimate, correlation 0.20-0.24 at every gamma in the spec'd [1.5,2.5] range) and was formally superseded 2026-06-11 by a statistical OLS regression as the active Phase 3b/Regime 2 deliverable -- a fact the FRAME doc's own reuse table/open-questions section does not carry forward. Confirmed the FRAME doc's residual-demand-over-dispatchable-margin form (RD = D_national - G_wind - G_solar) is DIFFERENT from and has NOT itself been calibrated -- only the older raw-ratio form was tested and failed; this is the calibration gate's real next step, not yet done. Found a genuine unflagged gap via grep audit (zero hits across sim/, simulation/, docs/design/, docs/market_research/): no carbon price / UK ETS / emissions-factor term exists anywhere -- gas_floor_price() computes SRMC from gas price alone, omitting the real carbon-cost component of GB gas-plant marginal cost. Confirmed W1_3's own prior DISCOVER finding (sim/weather_engine.py::fit_national_macro_model's regime trigger is wind-residual-only, not joint cold-and-still) is inherited as a hard blocker here: W1_6's cold-and-still price-spike demonstration has no mechanistic guarantee until that lands, matching the existing depends_on. Identified THREE independently-built, uncoordinated price-adjustment mechanisms coexisting in the repo (sim/price_engine.py physics, sim/scenario/bimodal_generator.py distribution-fitted Dunkelflaute/negative-price/crisis-spike model, sim/weather_price_sensitivity.py backward-looking HDD-lookback multiplier) with no reconciliation argued anywhere -- flagged as an open BUILD-time design question (retire/merge/keep-as-CURRICULUM), not resolved here. Confirmed via direct read of company/interfaces/sim_interface.py::get_forward_price that the company-facing price observable reads only real historical Elexon SSP/NBP through 2025-06-07 with no branch for synthetic-future dates -- the concrete seam gap this atom (jointly with W1_2) must eventually close. Grounded the merit-order structure in real GB price formation (marginal-cost dispatch/N2EX/EPEX/BM clearing, gas-plant SRMC's fuel+carbon two-term real cost, renewables' near-zero-SRMC residual-demand role, interconnector/BM/CfD/Capacity-Market items correctly out of this atom's scope) -- all structural claims flagged [UNVERIFIED, no network this session] where a specific figure would be needed, no numbers fabricated. level_current NOT changed (DISCOVER only)."
