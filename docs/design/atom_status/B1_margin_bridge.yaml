  - "2026-07-16 H17 HARDEN (level 3->3, at target). RED-TEAM finding + fix on this atom's OWN named feature ('residual reconciliation'). Confirmed the residual is a pure CONSTRUCTION TAUTOLOGY (R15 killer pattern 1): net_margin_gbp is DEFINED as gross - policy - network - capital - bad_debt (simulation/hedged_settlement.py:124 + aggregation), so residual = net_delta - sum(named drivers) is ~0 by construction on all real 2016-2025 data (verified against docs/reports/run_output_latest.json: every transition residual < £0.5). 'residual == 0' therefore proved NOTHING and the residual was (a) never rendered and (b) never considered by dominant_driver -- so a future fail-open regression (a cost line entering net_margin_gbp without a matching bridge driver, or a renamed field silently read as 0.0 via .get(...,0.0)) would corrupt the attribution SILENTLY while the Driver column kept confidently naming a minority contributor. FIX (additive, no numeric change to current output): (1) residual_is_material() -- a control that CAN fail: fires when |residual| exceeds the £5k materiality floor AND strictly dominates every named driver (the exact symptom of a dropped driver); computed inline so it also works on the renderer's attribute-only reconstructed bridge objects. (2) dominant_driver() now reads 'other (unexplained)' instead of a false named attribution when the residual dominates -- the control's consumer effect (R11, no orphan). (3) Added a visible 'Residual Δ' column + reconciliation note to the Net Margin Bridge report section (saas/reporting/annual_report.py::_section_net_margin_bridge) so the identity is auditable on the surface, not hidden. R15 mutation-proven: neutering residual_is_material to a fail-open stub fails 3 of the new tests (control genuinely can fail). Verified: 42 bridge tests + full saas/reporting suite (889) green; epistemic verifier PASS (3 files); regenerated the report section in-process and read the rendered Residual Δ column (all +/-£0 on real data,