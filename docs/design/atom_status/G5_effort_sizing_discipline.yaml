id: G5_effort_sizing_discipline
# level_current intentionally NOT set here -- LEVEL HONESTY per this fork's
# brief: the orchestrator applies the real `size:` values to the map and
# confirms the full L2 DoD before moving the level. This fork built the
# MECHANISM half only (see append_simplification below for the honest split
# of what's built vs. what's still open).
append_evidence:
  - "tools/effort_calibration.py"
  - "background/effort_digest.py"
  - "tests/tools/test_effort_calibration.py"
  - "tests/background/test_effort_digest.py"
  - "docs/design/EFFORT_SIZING_DESIGN.md"
append_simplification:
  - >-
    2026-07-16 BUILD L2 MECHANISM half (the map-data half -- real `size:`
    values on real atoms -- is the orchestrator's, per brief; not done here).
    Four functions added to tools/effort_calibration.py, all additive and
    read-only (never mutate maturity_map.yaml, never block anything -- DIAL
    not a WALL, R12 anti-goal-seek):
    (1) expected_hours_for_atom() -- the honest fallback chain used by both
    functions below: a real per-size calibrated actual (once any atom has
    one) > the starting SIZE_BAND_ANCHOR_HOURS anchor (S=1h/M=12h/L=28h,
    derived from this repo's own real per-lane distribution) > a real
    per-lane calibrated actual (for atoms with no size yet) > unknown (never
    guessed as zero). XL never receives an hours figure (basis
    'xl_decompose_signal') -- sizing it would reward leaving it
    undecomposed.
    (2) remaining_effort_report() -- sums expected hours over below-target
    atoms (level_current < level_target), reporting n_sized/n_unsized
    honestly alongside the total so "0 sized yet" degrades visibly rather
    than silently.
    (3) estimate_vs_actual_by_lane() -- pairs each lane's real calibrated
    actual against an estimate built from its size-tagged atoms' anchors,
    reporting delta_hours + direction (under/overestimated) per lane, or
    'insufficient_data' rather than a fabricated delta when either side is
    empty. A LEARNING SIGNAL about the lane, never a stick against an atom
    (design doc section 5).
    (4) xl_decompose_flags() -- the XL -> decompose SOFT GATE: flags (never
    blocks) a BUILD-eligible atom sized XL that has neither a recorded child
    (another atom's depends_on pointing at it) nor an explicit size_basis
    exception.
    background/effort_digest.py (new, thin render layer only -- all
    computation stays in tools/effort_calibration.py) surfaces all three
    L2 views as an 'EFFORT SIZING' block in LATEST.md, wired into the live
    publish cycle via a new run_effort_digest_step() in
    background/process_run_complete.py (same block-managed-between-HTML-
    markers pattern, and same defensive try/except-log-and-swallow
    discipline, as the existing 'NAIVE ORGAN asks:' block/run_naive_organ_step()
    it sits beside) -- verified fully defensive (a synthetic render failure
    is logged and swallowed, never breaks publishing) and idempotent
    (re-render replaces the block in place, never duplicates it).
    CLI extended: `python3 -m tools.effort_calibration --remaining-effort
    / --estimate-vs-actual / --xl-flags`.
    Ran against the REAL live map (2026-07-16, no atom carries `size:` yet):
    remaining-effort correctly falls back to per-lane actuals for all 30
    below-target atoms (14 sized via lane fallback, 16 unsized -- lanes with
    zero calibrated actuals, e.g. brand-new lanes), total ~234h;
    estimate-vs-actual correctly reports 'insufficient_data' for every lane
    (honest -- no atom has an estimate side yet); xl_decompose_flags()
    returns [] (no real atom is sized XL yet) and runs cleanly end-to-end
    without raising.
    69 new tests: tests/tools/test_effort_calibration.py gains fallback-chain
    unit tests (real-size-calibration precedence, anchor fallback, lane
    fallback, unknown, XL-never-sized), remaining-effort aggregation
    (below-target inclusion/exclusion incl. missing level_target), per-lane
    estimate-vs-actual (delta/direction/insufficient-data/XL-exclusion), and
    the XL soft gate (fires/silent-when-idle/silent-when-decomposed/silent-
    with-exception-basis/never-fires-on-non-XL/sanity-against-the-real-live-
    map). tests/background/test_effort_digest.py (new) covers the digest
    render end-to-end against a synthetic git repo carrying FIXTURE atoms
    with `size`/`level_target`/`depends_on` (does NOT depend on real atoms
    being sized), the no-below-target-atoms degrade, the unreadable-map
    degrade, and the process_run_complete.py block-append/replace/never-
    raises wiring.
    Remaining for the orchestrator to close full L2 (per this fork's brief,
    outside its file_scope): apply real `size:`/`size_basis:` values to
    representative real atoms in maturity_map.yaml (~8-10 proposed below,
    with one-line bases) and confirm the full L2 DoD once real size data
    starts flowing through the (already-live) mechanisms above.
    Proposed S/M/L/XL sizes for the orchestrator to apply (one-line basis
    each, informed by this repo's own real per-lane calibration + each
    atom's actual file_scope/lane/history):
      G5_effort_sizing_discipline: L -- multi-file (tools/ + background/ +
        two test files), crosses the calibration-tool/digest seam, L0->L1
        alone took the H_harness lane's real ~24-28h band.
      G6_method_lens_audit: M -- doc-only DISCOVER pass (audit table +
        proposal-atom generation), one lane, one clear DoD, no runtime code.
      A6_coupled_triad_gap_metric: L -- crosses the SIM/company wall by
        design (the one layer allowed to hold both theta and b), multiple
        metric families, feeds a shared ledger other atoms gate on.
      H11_naive_organ: L -- new subprocess-isolation mechanism (Opus
        `--tools=` sandboxing), 7 SYSTEM detectors, 2 modes x 3 targets, a
        log format + a digest sink -- the real precedent this atom's own
        digest wiring copied.
      H15_publish_gate_failure_alert: M -- one state file + a threshold/
        cooldown/fail-closed mutation-tested control, single file_scope
        (background/process_run_complete.py), narrow DoD.
      W2_customer_generator (typical W2_* atom): S -- this repo's own real
        calibration shows this lane's median duration is ~0.27h, the
        fastest lane measured; narrow, well-precedented generator tweaks.
      C_customer_ops (typical C* atom): M -- one real observed transition at
        0.91h, but customer-ops atoms typically touch billing/compliance
        invariants (R10-class), one lane, one DoD, not single-file trivial.
      F5_vat_control_independent_signal / F5_ofgem_licence_readiness (the
        real short-code-ambiguity pair this tool's own tests document): M
        each -- single compliance-invariant addition apiece, one lane, but
        genuinely coupled to the regulation-commons doctrine's time-indexed
        invariant dataclasses (not a bare one-file fix).
      A hypothetical undecomposed multi-seam atom (the XL worked example
        this soft gate targets, e.g. the historical ARCH1/executor-shaped
        atom named in this atom's own design doc): XL -- multi-file AND
        multi-seam AND/OR scope not yet reducible to a one-line basis; the
        gate's own reason for existing.
