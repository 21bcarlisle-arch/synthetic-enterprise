  - "2026-07-16 QUEUED FINDING (H17 Lane-3 fork, SELF_INTERRUPT_DISCIPLINE -- registered NOT fixed on sight; no supervisor.py/guard edit this turn). The frame-saturation guard's `_atom_has_frame_doc` has a residual FALSE-NEGATIVE: it only recognises a per-atom FRAME doc under `docs/design/frame/` (the `startswith('docs/design/frame/')` filter). But several idle BUILD-gated atoms carry a COMPLETE per-atom FRAME doc under `docs/design/` DIRECTLY (non-canonical path) and are therefore mis-read as un-saturated and re-offered to the idle DISCOVER/FRAME draw indefinitely -- the exact treadmill this atom exists to stop, just relocated to a different atom set. CONFIRMED live this turn: `_self_refill_draw()` currently offers G4_unified_failure_register (has a full FRAME at docs/design/UNIFIED_FAILURE_REGISTER.md, per its own simplification[1] 2026-07-16) and W1_10_ev_heatpump_geography (has a full FRAME at docs/design/W1_10_FRAME.md, per its own simplification 2026-07-16 'FRAME LANDED') as un-saturated DISCOVER/FRAME candidates, when both are genuinely FRAME-complete. TWO documented remedies, either is low-risk and BOTH are H23/map-writer work (a Lane-3 doc fork cannot do them: F1 bars editing the map, and broadening a draw CONTROL is H_harness BUILD, not DISCOVER/FRAME): (a) set the guard's own documented explicit override `frame_saturated: true` on G4 and W1_10 (the docstring names this exact escape for 'a FRAME doc under a non-standard name') -- cheapest, but a per-atom manual step that must be remembered (MAKE_IT_STICK: a setter decays); or (b) broaden `_atom_has_frame_doc` to also recognise an atom's OWN FRAME doc under `docs/design/` (e.g. an evidence entry whose filename contains the atom id AND 'FRAME', existing on disk) -- computed, cannot decay, but must guard against a false-POSITIVE (a partial design doc marking an atom saturated prematurely), so it needs a mutation test (a genuinely-unframed atom with only a shared survey/design doc must still read un-saturated -- the existing survey-vs-FRAME distinction must survive). Recommend (b) with the mutation test, since (a) is the decay-prone prose-setter the whole H23 finding warns against. No level change to H23 (stays at its BUILT level); this is a scope note for the next H23 BUILD turn."
