FIED this fork (no network) -- flagged for a discovery-agent pass before any calibration leans on them. Ordered 7-step BUILD task list + proposed disjoint file_scope [sim/renewable_capacity_trend.py, sim/price_engine.py, tests/sim]. Level HELD at 0; DISCOVER/FRAME does not move an idle BUILD-gated atom's level. Drawn as a Rule-0 dial-yield: the H17 draw that spawned this turn was a STALE in-flight artifact listing 6 FRAME-saturated atoms (W1_9/W1_2/B4/B5/W4_2/W1_3, each already carrying its own docs/design/frame/<id>_FRAME.md); the live _self_refill_draw guard (H23) correctly excludes all 6 and offers genuinely-unframed idle atoms instead, of which W1_7 is one -- so this turn did real first-pass FRAME work rather than churning a 7th saturated-atom doc (SELF_INTERRUPT_DISCIPLINE, the treadmill H23 exists to stop)."
