append_simplification:
  - "2026-07-16 DISCOVER pass (governed-discovery fork, docs/design/ scope only, no code/map changed). Confirmed the map's 2026-07-15 finding: sim/weather_engine.py Pass 2 (fit_regional_cholesky/simulate_regional_deviations) already implements the spatially-correlated cross-location covariance mechanism, physically bound to the national front -- but keyed to only 4 hand-picked calibration points (C1-C4 = London/Manchester/Glasgow/Cotswolds), not any real GB administrative/settlement region, with no demand weight attached to any of them. Grounded the L2 target in real UK structure: GB's 14 DNO licence areas (6 owning groups: UKPN/NGED/ENWL/Northern Powergrid/SPEN/SSEN) and the related GSP-Group settlement partition. Found company/market/duos_ledger.py::DNOArea already carries a 14-value real-UK-region enum, used today only for DUoS billing, entirely disconnected from weather -- flagged as a reusable single canonical region key rather than inventing a second weather-specific taxonomy (two of its value names, MERSEYRAIL and EAST_OF_SCOTLAND, look like naming slips against real DNO licence-area names; flagged unverified, not corrected, out of file_scope regardless). Confirmed the aggregation-consistency invariant (I1) the atom's own DoD requires is still genuinely unbuilt (no projection/reconciliation code or test exists in sim/weather_engine.py or tests/sim/test_weather_engine.py) -- the FRAME doc (WEATHER_PHYSICS_HIERARCHY_DESIGN.md §1.2) already designs its mechanism; this pass does not duplicate it, only supplies the real region-partition and demand-weight grounding that doc left as 'BUILD's first decision'. Real regional temp/wind/solar variation and its demand/renewable-output consequences (north-south temperature gradient, Scotland/North Sea wind concentration, south-of-England solar gradient, non-uniform regional demand weight) named as well-documented structural facts requiring BUILD-time DESNZ/Met Office/NESO verification for any specific magnitude -- no numbers fabricated, no network access available to this fork. Level-current observation only (no self-write, sole-map-writer discipline respected): the spatial-correlation mechanism is real, but zero of the real-UK-region grounding (partition, weights, invariant, mutation test) exists -- consistent with, not contradicting, the map's existing under-registration flag. No level change, no BUILD code, no sim/company code written."
