  - "2026-07-16 HARDEN/red-team pass (H17 Rule-0 self-refill, dial yielded -- no below-target work; W2_5 at-target L3). Closed the atom's own QUEUED DEFECT ('generate_life_events() fires residential demographic events for SME/I&C too') as an R10 CLASS-LEVEL closure, not an instance fix. Finding first (evidence, not narrative): the defect is NOT currently live -- swept all 18 real roster customers x 200 seeds, ZERO SME/I&C accounts receive any demographic event (job_loss/income_recovery/new_baby/retirement_starts/illness/divorce); the pre-existing `if household.is_residential:` gate (present since 2026-07-01, commit f9f7f5b3d) already excludes them. The residual was a LATENT proxy hole: the gate keys on property_type (is_residential), used as a proxy for segment=='resi' because Household carries no `segment` field -- correct for the authored roster (every SME/I&C maps to a commercial/industrial property_type) but a semantic proxy that could silently diverge if a future roster placed a business in a residential dwelling (a real sole-trader case). Hardened WITHIN file_scope (simulation/life_events.py only; household.py out of scope, so no segment field added): (1) made the contract EXPLICIT -- named constant _RESIDENTIAL_ONLY_DEMOGRAPHIC_EVENTS (the six demographic types) + documented the property_type-as-segment-proxy and the invariant that locks it; (2) added CLASS-LEVEL control tests (R10): no business-property household emits any demographic event across all 5 business property_types x 300 seeds, business households emit only physical-adoption events, and a real-roster invariant asserting every SME/I&C-segment customer maps to a non-residential property_type AND leaks zero demographic events (fails loudly the moment a future roster breaks the proxy alignment); (3) proved the control is LOAD-BEARING and can FAIL on its named defect (R15 mutation test): with the is_residential gate disabled, SME C5 receives a 'divorce' event and all three business-exclusion controls fail; restored -> green. Verified: 137/137 related tests pass (was 111), epistemic verifier PASS (510 files), no runtime behaviour change (gate logic byte-identical; additions are a constant + comments + tests). Level stays L3 (HARDEN, no promotion); the W2_6 QUEUED-DEFECT note is now discharged as a tested class-level invariant rather than an open queue item."
