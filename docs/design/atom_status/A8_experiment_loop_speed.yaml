append_simplification:
  - "2026-07-16 BUILD (fork, file_scope tools/tournament_runner.py + its own
    tests only): the L2->L3 lever actually owned by THIS atom, not ARCH1's --
    ARCH1's typed mock (RecordedSimInterface) remains UNWIRED into any run
    path (docs/design/MAP_TRUTH_RECONCILIATION.md: zero run-path callers as
    of 2026-07-15), so composing with it is not yet available. Before this
    change, unlocking real parallelism required a HUMAN to already know the
    true per-life RSS and pass it as per_life_rss_bytes -- with no such
    measurement, the conservative 6 GB default degrades
    memory_safe_worker_cap to a single worker even when the real footprint is
    far smaller. Built: run_tournament() now runs a small PROBE wave (default
    1 life) under the conservative cap, MEASURES the real child RSS via
    resource.getrusage(RUSAGE_CHILDREN) (an actual number, not a guess), and
    recomputes the worker cap for the remaining lives from that measurement.
    An explicit caller workers= is honoured verbatim (calibration never
    overrides an instruction); serial=True always stays pure serial.
    MEASURED, real, reproducible before/after (2026-07-16, this box: 16
    cores, ~10 GB avail; two GENUINELY FRESH `python3 -m
    tools.tournament_runner run --lives 4 --end-year 2016` subprocess
    invocations, same 6 GB starting guess in both): UNCALIBRATED
    (--no-calibrate) -> workers=1, wall_clock_s=165.10 (serial, 4x ~22-46s
    lives). CALIBRATED (default) -> probe measured 783,654,912 bytes
    (~0.73 GB, matching the documented ~0.77 GB/life figure), recomputed to
    workers=3 for the remaining 3 lives, wall_clock_s=47.18. Real delta: 1->3
    workers, 3.5x wall-clock reduction, ZERO manual per-life-mb tuning;
    fitness/determinism unaffected (both variants produced byte-identical
    total_net_gbp across their lives -- verified in the E2E test). 30 tests
    added/passing (21 fast + 3 skipped-by-default E2E made to run + kept),
    full tests/tools + tests/background: 2027 passed, 1 pre-existing failure
    UNRELATED to this change (test_generate_dashboard_mgmt.py::
    test_mgmt_accounts_in_dashboard_json, a dashboard/insights consistency
    gate on docs/reports/run_output_latest.json -- confirmed via `git stash`
    that it fails identically on the pre-edit committed code, so it predates
    and is independent of this change; out of this atom's file_scope
    (tools/generate_dashboard_data.py), not touched). Epistemic verifier PASS
    (509 files scanned).
    NAMED LIMITATION (R10, found by real measurement, not asserted):
    ru_maxrss is a per-process MONOTONIC high-water mark. It gives an
    accurate delta for the FIRST life reaped by a given process (the real CLI
    shape -- a fresh `python3 -m tools.tournament_runner run ...` process per
    tournament invocation) and for every life run by a FRESH
    ProcessPoolExecutor worker (each forked worker has its own zeroed
    counter -- measured directly: the 3 parallel workers above each
    independently reported ~773 MB). It does NOT reliably re-measure a life
    run sequentially after a similar-or-larger one IN THE SAME process (the
    watermark is already at/above the new peak -- observed directly: lives
    2-4 of an all-serial run showed near-zero deltas after life 1 correctly
    measured ~0.77 GB). A caller invoking run_tournament() repeatedly inside
    one long-lived process (rather than the CLI's fresh-process-per-invocation
    shape -- e.g. a future H17 in-process frontend) would only calibrate on
    its first ever call; later calls fail closed to the caller's
    per_life_rss_bytes rather than mis-measuring -- never a false low number,
    but a real remaining gap for that usage shape, flagged for whoever wires
    H17/tournament_runner together.
    HONESTY: level_current left UNCHANGED (stays 2). This closes a real,
    measured, secondary lever within A8's own scope, but the atom's own
    registered simplification names the MOCK COMPOSITION (owned by ARCH1) as
    the biggest lever for the ~8-10x feasibility gap, and that dependency is
    still unwired -- this increment alone does not close that gap, only a
    genuine, bounded, honestly-disclosed slice of it. No explicit L3 DoD text
    exists for this atom to check off; per the honesty wall, level_current is
    left at 2 rather than claimed."
