arget returned zero findings (a genuine FAIL-OPEN bypass of the H12/KL-2 AST scan, which only inspects ast.Import/ast.ImportFrom nodes, not ast.Call). FIX: tools/epistemic_verifier.py -- new _dynamic_import_target() (matches importlib.import_module(...) both the attribute and bare-name-imported forms, and __import__(...), literal string-constant argument only; a variable/f-string/concatenated target is a documented heuristic limit per the module's own new docstring, not a false-clear) wired into _scan_source's existing ast.walk loop (reusing the same _module_is_forbidden/APPROVED_ORCHESTRATION exemption logic, zero duplication) plus a regex fallback (_DYNAMIC_IMPORT_CALL_RE) in _scan_lines for the SyntaxError/unparseable-file path, matching the existing literal-import fallback discipline. R15 MUTATION-TESTED per the killer-pattern doctrine: test_verifier_fires_on_dynamic_import_of_sim_internals injects the exact defect (5 dynamic-import forms: attribute call, bare-name call, __import__, nested-in-function, sim vs simulation root) and asserts each FIRES; test_verifier_dynamic_import_pre_fix_baseline_did_not_fire PINS the regression by directly re-running the OLD ast.Import/ast.ImportFrom-only walk against the same source and asserting it found nothing (proves the control COULD fail before this fix, not just asserts the new behaviour); test_verifier_dynamic_import_does_not_false_fire_on_lookalikes_or_variables proves outcome-safety (simplejson/similarity lookalikes, the approved seam, approved orchestration, an unresolvable variable target -- all correctly clear); test_verifier_dynamic_import_syntaxerror_fallback_still_catches_it proves the regex fallback path also fires, not just the AST-primary path. 5 new tests, all in tests/controls/test_control_mutation.py (the file H12/KL-2 already established as this control's own mutation-test home): 67 passed + 1 xfail (was 62+1 before this pass), zero regressions. tools/epistemic_verifier.py run directly against the live rep