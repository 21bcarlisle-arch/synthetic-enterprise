# Operational process manifest — the SINGLE committed declaration of what should run.
# OPS1 sub-step 2, guarantee G-L2 (docs/design/OPERATIONAL_LAYER_DESIGN.md §2.1).
#
# This is the sole source of truth for the intended process set, replacing the two
# prior disagreeing declarations (start_worker.sh's _start_session list and
# health_check.EXPECTED_PANES). Reconciled against actual (tmux/ps) by
# background/process_manifest.py::reconcile(); drift is REPORTED, never silently
# "fixed" by resurrecting whatever was there (the 2026-07-17 incident, design §8).
#
# state (each entry):
#   enabled  — MUST be running. Absent => MISSING (failure, alarm).
#   held     — intentionally down now. Absent => HELD (silent). Running => HELD_VIOLATED (alarm).
#   dark     — present but a no-op unless its flag; exits when dark. Absent => OK. Running => DARK_ACTIVE (report).
#   retired  — must never run. Running => RETIRED_RUNNING (alarm).
#
# EVERY non-enabled entry MUST carry `reason` and `flip` (enforced by the loader).
# A state without its reason is archaeology in three weeks — the reason is
# behaviour-determining and belongs in the readable repo (IaC principle).
version: 1

processes:
  # ── HELD: the autonomy/governance layer, deliberately down for the OPS1 rebuild ──
  - name: session-watchdog
    tmux: session-watchdog
    command: python3 background/session_watchdog.py
    owner: start_worker.sh
    state: held
    reason: "OPS1 governance rebuild in flight — as the worker-seat's respawner, an ungoverned watchdog re-seats the auto-advancing worker (2026-07-17 incident, §8)"
    flip: "after sub-step 4 (single supervisor + restart authority, G-L3/G-L4) lands verified → enabled, respawning only under the declared holds"

  - name: worker-seat
    tmux: claude
    command: "claude --dangerously-skip-permissions --model claude-opus-4-8 (dedicated session 22080be5)"
    owner: session-watchdog
    state: held
    reason: "OPS1 governance rebuild in flight — the worker's recovery seed auto-advances director-gated work (2026-07-17 incident, §8, G-R4)"
    flip: "after sub-step 4 lands verified → re-seated under new governance with a seed that does NOT auto-advance director-gated work"

  - name: supervisor
    tmux: supervisor
    command: python3 background/supervisor.py
    owner: start_worker.sh
    state: held
    reason: "OPS1 governance rebuild — single-supervisor authority (G-L4) not yet built; running the old supervisor now would grant turns to the held worker seat"
    flip: "on sub-step 4 (single governed supervisor) landing verified → enabled"

  - name: deadmans-switch
    tmux: deadmans-switch
    command: python3 background/deadmans_switch.py
    owner: start_worker.sh
    state: held
    reason: "OPS1 governance rebuild — held with the supervisor; a stall alarm is meaningless while the worker seat is deliberately down"
    flip: "on OPS1 completion (autonomy re-seated) → enabled"

  # ── DARK: present as a daemon but a no-op unless its flag; director-gated ──
  - name: executor-daemon
    tmux: executor-daemon
    command: python3 background/executor_daemon.py
    owner: start_worker.sh
    state: dark
    reason: "director gate — headless build loop; a bare launch is a safe no-op (exits) unless docs/observability/.build_executor_enabled is present"
    flip: "un-dark ONLY by explicit director instruction, never inferred and never automatic — the director's alone"

  # ── RETIRED: must never run ──
  - name: autonomous-runner
    tmux: autonomous-runner
    command: python3 background/autonomous_runner.py
    owner: (none — launcher commented out in start_worker.sh)
    state: retired
    reason: "superseded by the Stop-hook pull-loop + executor stack; its _start_session line is commented out in start_worker.sh"
    flip: "does not flip — retired; reviving would require a fresh director decision, not a restart"

  # ── ENABLED: base infrastructure, must always be running ──
  - name: staging-watcher
    tmux: staging-watcher
    command: python3 background/staging_watcher.py
    owner: start_worker.sh
    state: enabled

  - name: ntfy-responder
    tmux: ntfy-responder
    command: python3 background/ntfy_responder.py
    owner: start_worker.sh
    state: enabled

  - name: dispatcher
    tmux: dispatcher
    command: python3 background/dispatcher.py
    owner: start_worker.sh
    state: enabled

  - name: discovery-daemon
    tmux: discovery-daemon
    command: python3 background/discovery_agent.py --daemon
    owner: start_worker.sh
    state: enabled

  - name: sim-runner
    tmux: sim-runner
    command: python3 background/sim_runner.py
    owner: start_worker.sh
    state: enabled

  - name: sanity-daemon
    tmux: sanity-daemon
    command: python3 background/sanity_daemon.py
    owner: start_worker.sh
    state: enabled

  - name: director-comments
    tmux: director-comments
    command: python3 background/director_comments.py
    owner: start_worker.sh
    state: enabled

  - name: naive-organ
    tmux: naive-organ
    command: python3 -m background.naive_organ daemon
    owner: start_worker.sh
    state: enabled

  - name: token-proxy
    tmux: token-proxy
    command: python3 -m background.token_proxy
    owner: start_worker.sh
    state: enabled

  - name: file-api
    tmux: file-api
    command: python3 -m uvicorn background.file_api:app --host 0.0.0.0 --port 8765
    owner: start_worker.sh
    state: enabled

  - name: background-worker
    tmux: background-worker
    command: python3 background/background_worker.py
    owner: start_worker.sh
    state: enabled

# The director's interactive console (tmux session `work`, and any console started via
# background/console.sh) is NOT a managed process — it is the director's, excluded from
# reconciliation by its G-L1 sanctity marker (a session backing a sanctified pid is never
# flagged UNEXPECTED). It is recorded here for readers, not managed.
director_console:
  tmux: work
  note: "director-owned; excluded from reconcile via console_sanctity (G-L1). Never reaped, never managed, never alarmed."
