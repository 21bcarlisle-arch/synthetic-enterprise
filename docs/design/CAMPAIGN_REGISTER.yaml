# CAMPAIGN_REGISTER.yaml -- machine-readable open-campaign register.
#
# DIRECTOR RULING 2026-07-23 (DIRECTOR_RULING_CAMPAIGN_CONTINUATION_AND_SITE_VERDICT), the
# SEVENTH CLASS -- campaign continuation: "an open campaign in PRIORITIES with unfinished items
# IS drawable work -- finishing surface N rolls directly into surface N+1, no doorbell required."
# A seventh rest-while-work-exists class is an R10 breach of R17; the fix is to R17's enumeration,
# not a special case.
#
# THIS FILE is the authority the draw reads (R16: the ledger is authority, not PRIORITIES prose --
# the 14:03Z stall happened because the campaign lived only as a comment block whose "<-- NEXT"
# marker the draw could not see). `background/supervisor.py::_open_campaign_draw` parses THIS file;
# an OPEN campaign with any OPEN item forbids rest and is enumerated in the authorized set.
#
# DISCIPLINE (mirrors the maturity map's own level moves):
#   * Mark an item `landed` in the SAME commit its surface lands live + passes its Expert Hour.
#     A DEPLOYED-but-verdict-FAILED surface is NOT landed -- its job is not done, so it stays open
#     (e.g. surface 1 below: MVP live at 87ce1b980 but axis-1 = FAIL, iterate against the rubric).
#   * When EVERY item of a campaign is `landed`, set the campaign `status: closed` -- only then does
#     this campaign stop forbidding rest (the "all items landed permits rest" half of the R15 pair).
#   * A campaign the director has cancelled: `status: cancelled` (leaves the drawable set, no rest-forbid).
# R15 both ways is proven in tests/background/test_open_campaign_draw.py.

