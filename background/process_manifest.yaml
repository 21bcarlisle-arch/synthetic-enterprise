# Declared process set — the SINGLE authoritative manifest of what SHOULD be running.
# OPS1 sub-step 2 (G-L2), docs/design/OPERATIONAL_LAYER_DESIGN.md §2.1.
#
# This is the sole source of truth for the intended process set. Everything else DERIVES
# from it — there is no second list to drift:
#   - health_check.EXPECTED_PANES  = process_reconciler.health_checked_map()  (state==enabled)
#   - start_worker.sh's launch set = process_reconciler.startlist()           (owner==start_worker.sh, state in enabled|dark)
# The prior scattered declarations (start_worker's hardcoded _start_session block and
# health_check's hand-maintained EXPECTED_PANES) are DELETED — they had silently drifted
# (naive-organ was missing from the health check entirely).
#
# state (the disease-curing field — distinguishes intended-down from failed):
#   enabled  — MUST run. Absent => MISSING (fault). Health-checked.
#   held     — intentionally down now. Absent => HELD (silent). Running => HELD_VIOLATED (fault).
#   dark     — present but a no-op unless its flag; exits when dark. Absent => OK. Running => DARK_ACTIVE (report).
#   retired  — must never run. Running => RETIRED_RUNNING (fault).
# EVERY non-enabled entry MUST carry `reason` and `flip` (loader-enforced) — a state without
# its reason is archaeology in three weeks; the reason is behaviour-determining (IaC).
#
# Runtime state (which processes are actually up) is NOT in git. The DECLARATION is;
# process_reconciler.py reconciles the two and REPORTS drift. It has no kill path by
# construction (reaping-by-inference killed the director's console in the blackout).
#
# Fields: session · command (full launch) · match (ps token) · owner · state [· reason · flip · purpose]
version: 2

# `launched_by` (owner==systemd entries): which mechanism ACTUALLY launches the daemon NOW,
# during the staged one-at-a-time tmux→systemd migration (director-ruled 2026-07-17). Absent =>
# 'tmux' (start_worker.sh still launches it; the pre-migration default). 'systemd' => MIGRATED
# (its unit is installed+started; it has LEFT start_worker's tmux launch set — never two
# launchers). Each daemon's cutover flips this field + its state in ONE atomic change, so the
# manifest never lies about what is running or how. When the last flips to systemd, start_worker's
# tmux-launch is empty and retired.
processes:
  # ── MIGRATED (OPS1 sub-step 4 release, worker-seat first — director-gated 2026-07-17): live
  #    under systemd, verified seeding-by-id + idle + console-untouched before this flip ──
  - session: worker-seat-manager
    command: python3 background/worker_seat.py
    match: worker_seat.py
    owner: systemd
    launched_by: systemd   # MIGRATED 2026-07-17 → out of start_worker's tmux set (never two launchers)
    state: enabled
    purpose: "Thin worker-seat manager: seed-by-id + keep-alive + report status ONLY (no reap, no auto-advance) — the one bespoke process, itself a systemd unit. Migrated live 2026-07-17: verified seeding by dedicated --session-id (not a console latch), worker idle/holding, reaper retired, console untouched."

  - session: claude   # the worker seat's tmux session name is `claude`
    command: "claude --dangerously-skip-permissions --model claude-opus-4-8 (dedicated session 22080be5)"
    match: __worker_seat__   # sentinel: detect via the `claude` tmux session only (NOT a systemd unit)
    owner: worker-seat-manager
    state: enabled
    purpose: "The interactive worker seat, seeded by worker-seat-manager against the dedicated WORKER_SESSION_ID (never `claude -c`). Live 2026-07-17; seat liveness is worker-seat-manager's keep-alive job."

  - session: supervisor
    command: python3 background/supervisor.py
    match: supervisor.py
    owner: systemd
    launched_by: systemd   # MIGRATED 2026-07-17 (serial-autonomy go-live) → out of start_worker's tmux set
    state: enabled
    purpose: "Escalation watchdog over the pull-loop transport (G-L4-as-mapped: find_work is the sole DRAW authority; the Stop hook delivers; this daemon polls every 2min and escalates stuck/map-exhausted, ZERO pane writes / ZERO turn delivery). Migrated live 2026-07-17 as step 3 of the serial-autonomy go-live."

  - session: deadmans-switch
    command: python3 background/deadmans_switch.py
    match: deadmans_switch.py
    owner: systemd
    state: held
    reason: "OPS1 serial-autonomy go-live — the LAST migration gate (director-ruled): held until the worker-seat + supervisor migrations are proven live and the first autonomous turn creates a FRESH commit clock, so the deadman starts against a moving clock, not a stale one"
    flip: "director gate, after the first autonomous turn commits → enabled + launched_by:systemd, against the fresh commit clock"
    purpose: "Independent stall alarm (commit-clock-alone liveness signal — the fail-silent fix)"

  # ── DARK: present as a daemon but a no-op unless its flag; director-gated ──
  - session: executor-daemon
    command: python3 background/executor_daemon.py
    match: executor_daemon.py
    owner: systemd
    state: dark
    reason: "director gate — headless build loop; a bare launch is a safe no-op (exits) unless docs/observability/.build_executor_enabled is present"
    flip: "un-dark ONLY by explicit director instruction, never inferred and never automatic — the director's alone"
    purpose: "Self-continuing headless build loop (dark)"

  # ── RETIRED: must never run ──
  - session: autonomous-runner
    command: python3 background/autonomous_runner.py
    match: autonomous_runner.py
    owner: (none — launcher commented out in start_worker.sh)
    state: retired
    reason: "superseded by the Stop-hook pull-loop + executor stack; its _start_session line is commented out in start_worker.sh"
    flip: "does not flip — retired; reviving would require a fresh director decision, not a restart"
    purpose: "RETIRED legacy autonomous loop"

  # ── ENABLED: base infrastructure, must always run ──
  - session: background-worker
    command: python3 background/background_worker.py
    match: background_worker.py
    owner: systemd
    state: enabled
    purpose: "Qwen task queue + leftover run_complete-marker sweep; off-peak"

  - session: staging-watcher
    command: python3 background/staging_watcher.py
    match: staging_watcher.py
    owner: systemd
    state: enabled
    purpose: "NTFY on new docs/staging/ files"

  - session: ntfy-responder
    command: python3 background/ntfy_responder.py
    match: ntfy_responder.py
    owner: systemd
    state: enabled
    purpose: "Acks inbound NTFY, writes to staging/"

  - session: dispatcher
    command: python3 background/dispatcher.py
    match: dispatcher.py
    owner: systemd
    state: enabled
    purpose: "Classifies from_rich_*.md URGENT/NORMAL/FYI"

  - session: discovery-daemon
    command: python3 background/discovery_agent.py --daemon
    match: discovery_agent.py
    owner: systemd
    state: enabled
    purpose: "Validates sim assumptions every 6h via Qwen"

  - session: sim-runner
    command: python3 background/sim_runner.py
    match: sim_runner.py
    owner: systemd
    state: enabled
    purpose: "Continuous simulation loop; writes run_complete markers"

  - session: sanity-daemon
    command: python3 background/sanity_daemon.py
    match: sanity_daemon.py
    owner: systemd
    state: enabled
    purpose: "Population-level statistical sanity checks every 30min"

  - session: director-comments
    command: python3 background/director_comments.py
    match: director_comments.py
    owner: systemd
    state: enabled
    purpose: "Polls the comments-only ntfy topic, PIN-validated"

  - session: naive-organ
    command: python3 -m background.naive_organ daemon
    match: naive_organ
    owner: systemd
    state: enabled
    purpose: "Independent outside-view skeptic on its own timer (was MISSING from the old EXPECTED_PANES)"

  - session: token-proxy
    command: python3 -m background.token_proxy
    match: background.token_proxy
    owner: systemd
    state: enabled
    purpose: "Local token-usage proxy"

  # NOTE: file-api is NOT here — it is a systemd-owned service (director-access
  # infrastructure, must survive reboot independent of the stack), declared in
  # background/schedule_manifest.yaml and reconciled there. It is deliberately NOT a
  # tmux daemon and NOT launched by start_worker.sh (2026-07-17, OPS1 sub-step 3).

# The director's interactive console (tmux `work`, or any console started via
# background/console.sh) is NOT a managed process — excluded from reconciliation by its
# G-L1 sanctity marker (a session backing a sanctified pid is never flagged undeclared).
director_console:
  tmux: work
  note: "director-owned; excluded from reconcile via console_sanctity (G-L1). Never reaped, never managed, never alarmed."
