{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block maxwidth %}400px{% endblock %}
{% block content %}
  <h1 style="margin-top:80px">Customer Portal</h1>
  {% if error %}<div class="banner banner-danger">{{ error }}</div>{% endif %}
  <form method="post" action="/login">
    <label>Account Number</label>
    <input type="text" name="account_id" placeholder="e.g. C1" required autofocus />
    <button type="submit" class="btn" style="width:100%;margin-top:14px">Sign in</button>
  </form>
{% endblock %}
