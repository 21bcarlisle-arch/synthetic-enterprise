<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poesys -- Glossary</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<style>
:root {
  --bg: #f9f9f7; --surface: #fcfcfb; --surface2: #f0efec;
  --border: #e1e0d9; --text: #0b0b0b; --muted: #52514e;
  --green: #0ca30c; --red: #d03b3b; --amber: #fab219;
  --blue: #2a78d6; --teal: #1baf7a; --purple: #4a3aa7;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #14140f; --surface: #1c1c17; --surface2: #26261f;
    --border: #33332b; --text: #f2f1ea; --muted: #a8a79e;
    --green: #3cc93c; --red: #e56b6b; --amber: #fab219;
    --blue: #6aa8ee; --teal: #35c795; --purple: #9a8aea;
  }
}
:root[data-theme="dark"] {
  --bg: #14140f; --surface: #1c1c17; --surface2: #26261f;
  --border: #33332b; --text: #f2f1ea; --muted: #a8a79e;
  --green: #3cc93c; --red: #e56b6b; --amber: #fab219;
  --blue: #6aa8ee; --teal: #35c795; --purple: #9a8aea;
}
:root[data-theme="light"] {
  --bg: #f9f9f7; --surface: #fcfcfb; --surface2: #f0efec;
  --border: #e1e0d9; --text: #0b0b0b; --muted: #52514e;
  --green: #0ca30c; --red: #d03b3b; --amber: #fab219;
  --blue: #2a78d6; --teal: #1baf7a; --purple: #4a3aa7;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; font-size: 14px; line-height: 1.5; }
.site-nav { background: var(--surface); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 20px; height: 48px; gap: 8px; flex-wrap: wrap; }
.nav-logo { font-weight: 700; color: var(--teal); text-decoration: none; margin-right: 16px; font-size: 15px; }
.nav-link { color: var(--muted); text-decoration: none; padding: 6px 12px; border-radius: 6px; font-size: 13px; }
.nav-link:hover, .nav-link.active { color: var(--text); background: var(--surface2); }
.wrap { max-width: 1000px; margin: 0 auto; padding: 40px 20px; }
.hero-h { font-size: 26px; font-weight: 800; letter-spacing: -0.4px; margin-bottom: 10px; }
.hero-p { font-size: 14px; line-height: 1.7; color: var(--muted); max-width: 760px; }
.controls { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin: 26px 0 6px; }
.search { flex: 1 1 240px; min-width: 0; background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 10px 12px; color: var(--text); font-size: 13px; font-family: inherit; }
.search:focus { outline: none; border-color: var(--blue); }
.filters { display: flex; flex-wrap: wrap; gap: 6px; }
.chip { background: var(--surface2); border: 1px solid var(--border); border-radius: 999px;
  padding: 6px 12px; font-size: 12px; color: var(--muted); cursor: pointer; user-select: none; }
.chip.active { color: var(--text); border-color: var(--blue); background: var(--surface); font-weight: 600; }
.count { font-size: 11px; color: var(--muted); margin: 10px 0 18px; }
.glist { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 14px; }
.gterm { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 18px; }
.gterm-head { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; margin-bottom: 4px; }
.gterm-name { font-size: 16px; font-weight: 700; letter-spacing: -0.2px; }
.gterm-abbr { font-family: ui-monospace, monospace; font-size: 11px; font-weight: 700; color: var(--blue);
  background: var(--surface2); border-radius: 5px; padding: 1px 6px; }
.gterm-cat { font-size: 9px; text-transform: uppercase; letter-spacing: .05em; color: var(--muted);
  border: 1px solid var(--border); border-radius: 4px; padding: 1px 5px; margin-left: auto; }
.gterm-def { font-size: 13px; line-height: 1.65; color: var(--text); margin: 8px 0 12px; }
.gterm-see { font-size: 11px; color: var(--muted); }
.gterm-see a { color: var(--blue); text-decoration: none; border-bottom: 1px dashed var(--border); }
.gterm-see a:hover { border-bottom-color: var(--blue); }
.empty { color: var(--muted); font-size: 13px; padding: 24px 0; }
@media (max-width: 640px) {
  .wrap { padding: 28px 16px; }
  .glist { grid-template-columns: 1fr; }
  .gterm-cat { margin-left: 0; }
}
</style>
</head>
<body>
<nav class="site-nav">
  <a href="../" class="nav-logo">&#9889; Poesys</a>
  <a href="../" class="nav-link">Home</a>
  <a href="../sim/" class="nav-link">SIM</a>
  <a href="../world/" class="nav-link">World</a>
  <a href="../supplier/" class="nav-link">Supplier</a>
  <a href="../customers/" class="nav-link">Customers</a>
  <a href="../platform/" class="nav-link">Platform</a>
  <a href="../method/" class="nav-link">Method</a>
  <a href="../proof/" class="nav-link">Proof</a>
  <a href="../tours/" class="nav-link">Tours</a>
  <a href="../glossary/" class="nav-link active">Glossary</a>
</nav>
<div class="wrap">

  <div class="hero-h" id="hero-h">Glossary</div>
  <p class="hero-p" id="hero-p">Loading...</p>

  <div class="controls">
    <input class="search" id="search" type="search" placeholder="Search terms and definitions..." aria-label="Search glossary">
    <div class="filters" id="filters"></div>
  </div>
  <div class="count" id="count"></div>

  <div class="glist" id="glist"><div class="empty">Loading...</div></div>

</div>
<script>
function esc(s){return (s==null?"":String(s)).replace(/[&<>]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;"}[c];});}

var STATE = { data: null, cat: "all", q: "" };

function catLabel(d, id){
  var c = (d.categories||[]).filter(function(x){return x.id===id;})[0];
  return c ? c.label : id;
}

function renderIntro(d){
  var m = d.meta||{};
  document.getElementById("hero-h").textContent = m.title || "Glossary";
  document.getElementById("hero-p").textContent = m.intro || "";
}

function renderFilters(d){
  var cats = d.categories||[];
  var html = '<span class="chip' + (STATE.cat==="all"?" active":"") + '" data-cat="all">All</span>';
  html += cats.map(function(c){
    return '<span class="chip' + (STATE.cat===c.id?" active":"") + '" data-cat="' + esc(c.id) + '">' + esc(c.label) + '</span>';
  }).join("");
  document.getElementById("filters").innerHTML = html;
}

function matches(t){
  if (STATE.cat !== "all" && t.category !== STATE.cat) return false;
  if (!STATE.q) return true;
  var hay = ((t.term||"") + " " + (t.abbr||"") + " " + (t.definition||"")).toLowerCase();
  return hay.indexOf(STATE.q) !== -1;
}

function renderTerms(d){
  var terms = (d.terms||[]).slice().sort(function(a,b){
    return (a.term||"").localeCompare(b.term||"");
  });
  var shown = terms.filter(matches);
  document.getElementById("count").textContent =
    shown.length + " of " + terms.length + " term" + (terms.length===1?"":"s");
  if (!shown.length){
    document.getElementById("glist").innerHTML = '<div class="empty">No terms match.</div>';
    return;
  }
  document.getElementById("glist").innerHTML = shown.map(function(t){
    var abbr = t.abbr ? '<span class="gterm-abbr">' + esc(t.abbr) + '</span>' : "";
    var see = t.see ? '<div class="gterm-see">Where it lives: <a href="' + esc(t.see_url||"#") + '">' + esc(t.see) + ' &rarr;</a></div>' : "";
    return '<div class="gterm">' +
      '<div class="gterm-head"><span class="gterm-name">' + esc(t.term) + '</span>' + abbr +
        '<span class="gterm-cat">' + esc(catLabel(d, t.category)) + '</span></div>' +
      '<div class="gterm-def">' + esc(t.definition) + '</div>' +
      see +
    '</div>';
  }).join("");
}

function renderGlossary(d){
  STATE.data = d;
  renderIntro(d);
  renderFilters(d);
  renderTerms(d);
}

function wireEvents(){
  var s = document.getElementById("search");
  if (s) s.addEventListener("input", function(e){
    STATE.q = (e.target.value||"").toLowerCase().trim();
    if (STATE.data) renderTerms(STATE.data);
  });
  var f = document.getElementById("filters");
  if (f) f.addEventListener("click", function(e){
    var chip = e.target.closest ? e.target.closest(".chip") : null;
    if (!chip) return;
    STATE.cat = chip.getAttribute("data-cat") || "all";
    if (STATE.data){ renderFilters(STATE.data); renderTerms(STATE.data); }
  });
}

if (typeof document !== "undefined" && document.addEventListener) {
  document.addEventListener("DOMContentLoaded", function(){
    wireEvents();
    fetch("../data/glossary.json")
      .then(function(r){ return r.json(); })
      .then(renderGlossary)
      .catch(function(){
        document.getElementById("glist").innerHTML = '<div class="empty">Could not load glossary data.</div>';
      });
  });
}
</script>
<footer style="margin-top:48px;padding:20px 0;border-top:1px solid var(--border);text-align:center;font-size:11px;color:var(--muted);">&copy; 2026 Poesys Platforms. All rights reserved.</footer>
</body>
</html>
