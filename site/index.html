<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poesys — Synthetic Enterprise Dashboard</title>
<meta name="description" content="Live dashboard for the Synthetic Enterprise autonomous energy simulation">
<meta name="robots" content="noindex, nofollow">
<link rel="canonical" href="https://poesys.net/">
<meta property="og:title" content="Poesys Dashboard">
<meta property="og:url" content="https://poesys.net">
<meta property="og:description" content="Synthetic Enterprise autonomous energy simulation dashboard">
<link rel="icon" type="image/svg+xml" href="./favicon.svg">
<link rel="apple-touch-icon" href="./apple-touch-icon.png">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<style>
.site-nav { background: var(--surface); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 16px; height: 40px; gap: 4px; }
.site-nav-logo { font-weight: 700; color: var(--teal); text-decoration: none; margin-right: 12px; font-size: 14px; }
.site-nav-link { color: var(--muted); text-decoration: none; padding: 4px 10px; border-radius: 5px; font-size: 12px; }
.site-nav-link:hover { color: var(--text); background: var(--surface2); }
.site-nav-link.dim { opacity: 0.4; cursor: default; pointer-events: none; }
:root {
  --bg: #f9f9f7; --surface: #fcfcfb; --surface2: #f0efec;
  --border: #e1e0d9; --text: #0b0b0b; --muted: #52514e;
  --green: #0ca30c; --red: #d03b3b; --amber: #fab219;
  --blue: #2a78d6; --purple: #4a3aa7; --teal: #1baf7a;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5; }

/* ── Header ── */
header { position: sticky; top: 0; z-index: 100; background: var(--bg);
  border-bottom: 1px solid var(--border); padding: 10px 16px;
  display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.logo { font-size: 16px; font-weight: 700; letter-spacing: -0.3px; white-space: nowrap; }
.logo span { color: var(--blue); }
.run-meta { font-size: 11px; color: var(--muted); text-align: right; line-height: 1.4; }
.run-meta a { color: var(--blue); text-decoration: none; }
.badge { display: inline-block; padding: 1px 7px; border-radius: 10px; font-size: 10px;
  font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; }
.badge-green { background: rgba(63,185,80,.15); color: var(--green); border: 1px solid rgba(63,185,80,.3); }

/* ── Tab nav ── */
.tab-nav { display: flex; background: var(--surface); border-bottom: 1px solid var(--border);
  overflow-x: auto; scrollbar-width: none; position: sticky; top: 53px; z-index: 99; }
.tab-nav::-webkit-scrollbar { display: none; }
.tab-btn { flex: 1; min-width: 70px; padding: 10px 6px; background: none; border: none;
  color: var(--muted); font-size: 12px; font-weight: 500; cursor: pointer;
  border-bottom: 2px solid transparent; white-space: nowrap; transition: color .15s; }
.tab-btn.active { color: var(--text); border-bottom-color: var(--blue); }
.tab-btn:hover { color: var(--text); }

/* ── Main content ── */
main { padding: 16px; max-width: 960px; margin: 0 auto; padding-bottom: 32px; }
.view { display: none; }
.view.active { display: block; }

/* ── Sections ── */
.section { margin-bottom: 24px; }
.section-title { font-size: 11px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.5px; color: var(--muted); margin-bottom: 10px; }

/* ── Metric cards ── */
.cards { display: grid; gap: 10px; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); margin-bottom: 20px; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px 14px 10px; }
.card-label { font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.4px; color: var(--muted); margin-bottom: 5px; }
.card-value { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; line-height: 1.1; }
.card-sub { font-size: 11px; color: var(--muted); margin-top: 4px; }
.pos { color: var(--green); } .neg { color: var(--red); }
.neu { color: var(--blue); } .warn { color: var(--amber); }

/* ── Chart containers ── */
.chart-box { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px; margin-bottom: 12px; }
.chart-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; color: var(--muted); margin-bottom: 12px; }
.chart-wrap { position: relative; height: 240px; }
.chart-wrap.tall { height: 300px; }

/* ── Tables ── */
.tbl-box { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; margin-bottom: 12px; }
.tbl-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; color: var(--muted); padding: 12px 14px 8px; }
table { width: 100%; border-collapse: collapse; font-size: 12px; }
th { padding: 6px 10px; text-align: right; color: var(--muted); font-weight: 500; font-size: 10px;
     text-transform: uppercase; letter-spacing: 0.3px; border-bottom: 1px solid var(--border); }
th:first-child { text-align: left; }
td { padding: 5px 10px; text-align: right; border-bottom: 1px solid rgba(48,54,61,.5); }
td:first-child { text-align: left; font-weight: 500; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--surface2); }

/* ── Heatmap ── */
.heatmap-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
.heatmap { display: grid; gap: 2px; width: max-content; padding: 2px; }
.hm-row { display: contents; }
.hm-cell { padding: 4px 6px; font-size: 10px; border-radius: 3px; text-align: center; min-width: 44px; cursor: default; }
.hm-label { background: none; color: var(--muted); font-weight: 600; text-align: left; min-width: 56px; }
.hm-year-hdr { background: none; color: var(--muted); font-size: 10px; font-weight: 600; }
.hm-great { background: #d7f3d1; color: #046b04; }
.hm-good  { background: #e3f6e0; color: #0ca30c; }
.hm-ok    { background: #eef2ea; color: #4c7a4c; }
.hm-nil   { background: #f0efec; color: var(--muted); }
.hm-warn  { background: #fef0d1; color: #a66a00; }
.hm-poor  { background: #fbe4d8; color: #b84f28; }
.hm-bad   { background: #fbe7e7; color: #d03b3b; }

/* ── Event list ── */
.event-list { list-style: none; display: flex; flex-direction: column; gap: 4px; padding: 10px 14px; }
.ev-item { display: flex; align-items: baseline; gap: 8px; font-size: 12px; padding: 4px 0;
  border-bottom: 1px solid rgba(48,54,61,.4); }
.ev-item:last-child { border-bottom: none; }
.ev-date { color: var(--muted); font-size: 11px; min-width: 82px; }
.ev-tag { padding: 1px 6px; border-radius: 3px; font-size: 10px; font-weight: 600; text-transform: uppercase; white-space: nowrap; }
.tag-churned   { background: rgba(248,81,73,.2); color: var(--red); }
.tag-renewed   { background: rgba(63,185,80,.12); color: var(--green); }
.tag-retention { background: rgba(210,153,34,.2); color: var(--amber); }
.tag-acquired  { background: rgba(88,166,255,.15); color: var(--blue); }

/* ── Loading ── */
#loading { padding: 40px; text-align: center; color: var(--muted); }

/* ── System health panel ── */
.agent-grid { display: flex; flex-direction: column; gap: 8px; }
.agent-row { background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
  padding: 12px 14px; display: grid; grid-template-columns: 10px 1fr auto; gap: 8px; align-items: start; }
.agent-dot { width: 10px; height: 10px; border-radius: 50%; margin-top: 4px; flex-shrink: 0; }
.dot-green  { background: var(--green); box-shadow: 0 0 4px var(--green); }
.dot-amber  { background: var(--amber); box-shadow: 0 0 4px var(--amber); }
.dot-red    { background: var(--red);   box-shadow: 0 0 4px var(--red); }
.dot-grey   { background: var(--muted); }
.agent-body {}
.agent-name { font-weight: 600; font-size: 13px; }
.agent-role { font-size: 11px; color: var(--muted); margin-top: 1px; }
.agent-action { font-size: 11px; color: var(--text); margin-top: 5px; }
.agent-anomaly { font-size: 11px; color: var(--red); margin-top: 3px; }
.agent-ts { font-size: 10px; color: var(--muted); white-space: nowrap; padding-top: 3px; }
.status-badge { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 10px;
  font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; margin-left: 6px; }
.sb-running { background: rgba(63,185,80,.15); color: var(--green); }
.sb-idle    { background: rgba(125,133,144,.12); color: var(--muted); }
.sb-working { background: rgba(88,166,255,.15); color: var(--blue); }
.sb-error   { background: rgba(248,81,73,.15); color: var(--red); }

@media (min-width: 600px) {
  .cards { grid-template-columns: repeat(4, 1fr); }
  .chart-wrap { height: 260px; }
  .chart-wrap.tall { height: 340px; }
}
.year-btns{display:flex;flex-wrap:wrap;gap:6px;margin:12px 0 8px}
.year-btn{background:#fcfcfb;border:1px solid #e1e0d9;color:#52514e;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:11px;font-family:inherit}
.year-btn:hover{border-color:#2a78d6;color:#0b0b0b}
.year-btn.active{background:#dbe9f9;border-color:#2a78d6;color:#2a78d6;font-weight:600}
.query-input{width:100%;background:#f9f9f7;border:1px solid #e1e0d9;color:#0b0b0b;padding:9px 12px;
  border-radius:6px;font-size:13px;font-family:inherit;outline:none}
.query-input:focus{border-color:#2a78d6}
.query-submit{background:#dbe9f9;border:1px solid #2a78d6;color:#2a78d6;padding:9px 18px;
  border-radius:6px;font-size:12px;cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0}
.query-submit:hover{background:#cde2fb}
.query-submit:disabled{opacity:.5;cursor:not-allowed}
.query-example{background:#fcfcfb;border:1px solid #e1e0d9;color:#52514e;padding:3px 10px;
  border-radius:4px;font-size:11px;cursor:pointer;font-family:inherit}
.query-example:hover{border-color:#2a78d6;color:#0b0b0b}
.query-bubble{background:#fcfcfb;border:1px solid #e1e0d9;border-radius:6px;padding:14px;margin-bottom:10px}
.query-q{font-size:13px;font-weight:600;color:#2a78d6;margin-bottom:8px}
.query-a{font-size:13px;line-height:1.65;white-space:pre-wrap}
.query-err{font-size:12px;color:#d03b3b}
.spotlight{background:#fcfcfb;border:1px solid #e1e0d9;border-radius:6px;padding:16px;margin-top:12px}
.sp-title{font-size:13px;font-weight:600;margin-bottom:12px}
.sp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
.sp-kpi .val{font-size:16px;font-weight:700;margin-top:2px}
.sp-kpi .lbl{color:#52514e;font-size:11px}
.kpi-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px 14px 10px;flex:1;min-width:120px}
.view-header{margin-bottom:16px}
.view-header h2{font-size:16px;font-weight:600;margin-bottom:6px}
.view-sub{font-size:12px;color:var(--muted);line-height:1.5;margin-bottom:12px}
.section-head{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin:16px 0 8px}
</style>
</head>
<body>

<nav class="site-nav">
  <a href="./" class="site-nav-logo">&#9889; Poesys</a>
  <a href="./" class="site-nav-link" style="color:var(--text)">Supplier</a>
  <a href="./customers/" class="site-nav-link">Customers</a>
  <a href="./project/" class="site-nav-link">Project</a>
  <a href="./sim/" class="site-nav-link">SIM</a>
</nav>

<header>
  <div class="logo">Poesys<span>.</span>net</div>
  <div class="run-meta" id="run-meta">Loading…</div>
</header>

<nav class="tab-nav" id="tab-nav">
  <button class="tab-btn active" data-tab="overview"  onclick="switchTab('overview')">Overview</button>
  <button class="tab-btn"        data-tab="financial" onclick="switchTab('financial')">Financial</button>
  <button class="tab-btn"        data-tab="accounts"  onclick="switchTab('accounts')">Accounts</button>
  <button class="tab-btn"        data-tab="trading"   onclick="switchTab('trading')">Trading</button>
  <button class="tab-btn"        data-tab="customers" onclick="switchTab('customers')">Customers</button>
  <button class="tab-btn"        data-tab="insights"  onclick="switchTab('insights')">Insights</button>
  <button class="tab-btn"        data-tab="monthly"   onclick="switchTab('monthly')">Monthly</button>
  <button class="tab-btn"        data-tab="query"     onclick="switchTab('query')">Query</button>
  <button class="tab-btn"        data-tab="market"    onclick="switchTab('market')">Market</button>
  <button class="tab-btn"        data-tab="regulatory" onclick="switchTab('regulatory')">Regulatory</button>
  <button class="tab-btn"        data-tab="capabilities" onclick="switchTab('capabilities')">Capabilities</button>
</nav>

<main>
  <div id="loading">Loading dashboard data…</div>

  <div id="tab-overview"  class="view active"></div>
  <div id="tab-financial" class="view"></div>
  <div id="tab-accounts"  class="view"></div>
  <div id="tab-trading"   class="view"></div>
  <div id="tab-customers" class="view"></div>
  <div id="tab-insights"  class="view"></div>
  <div id="tab-monthly"   class="view"></div>
  <div id="tab-query"     class="view"></div>
  <div id="tab-market"    class="view"></div>
  <div id="tab-regulatory" class="view"></div>
  <div id="tab-capabilities" class="view"></div>
</main>

<script>
// ── Config ──────────────────────────────────────────────────────────────────
const C = {
  bg:'#f9f9f7', surface:'#fcfcfb', border:'#e1e0d9', text:'#0b0b0b',
  muted:'#52514e', green:'#0ca30c', red:'#d03b3b', amber:'#fab219',
  blue:'#2a78d6', purple:'#4a3aa7', teal:'#1baf7a'
};

Chart.defaults.color = C.muted;
Chart.defaults.borderColor = C.border;
Chart.defaults.font.family = '-apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif';
Chart.defaults.font.size = 11;

// ── State ───────────────────────────────────────────────────────────────────
let D = null;
const rendered = {};
let YEAR_FILTER = null;

// ── Helpers ─────────────────────────────────────────────────────────────────
const gbp = (v, d=0) => {
  const n = Math.abs(v);
  const s = n >= 1e6 ? (n/1e6).toFixed(1)+'M' : n >= 1e3 ? (n/1e3).toFixed(0)+'k' : n.toFixed(d);
  return (v < 0 ? '-' : '') + '£' + s;
};
const pct = (v, d=1) => (v >= 0 ? '+' : '') + v.toFixed(d) + '%';
const cls = v => v > 0 ? 'pos' : v < 0 ? 'neg' : 'neu';
const el = id => document.getElementById(id);
const mkChart = (id, cfg) => {
  const existing = Chart.getChart(id);
  if (existing) existing.destroy();
  return new Chart(document.getElementById(id), cfg);
};

function kpi(label, value, _unused, sub) {
  return '<div class="kpi-card"><div class="card-label">' + label + '</div>' +
    '<div class="card-value">' + value + '</div>' +
    (sub ? '<div class="card-sub">' + sub + '</div>' : '') +
    '</div>';
}

function card(label, value, sub='', klass='neu') {
  return `<div class="card"><div class="card-label">${label}</div>
    <div class="card-value ${klass}">${value}</div>
    ${sub ? `<div class="card-sub">${sub}</div>` : ''}</div>`;
}

function yearBtnsHtml() {
  const ALL_YRS = [2016,2017,2018,2019,2020,2021,2022,2023,2024,2025];
  return '<div class="year-btns">' +
    ALL_YRS.map(function(y) { return '<button class="year-btn' + (YEAR_FILTER===y?' active':'') + '" data-yr="' + y + '" onclick="selectYear(' + y + ')">' + y + '</button>'; }).join('') +
    '<button class="year-btn' + (YEAR_FILTER===null?' active':'') + '" onclick="selectYear(null)">All</button>' +
    '</div>';
}

function baseLineOpts(title) {
  return {
    responsive: true, maintainAspectRatio: false,
    plugins: { legend: { display: true, position: 'bottom', labels: { boxWidth: 10, padding: 12 } },
               title: { display: false }, tooltip: { mode: 'index', intersect: false } },
    scales: {
      x: { grid: { color: 'rgba(48,54,61,.4)' }, ticks: { maxRotation: 45 } },
      y: { grid: { color: 'rgba(48,54,61,.4)' } }
    }
  };
}

// ── Tab switching ────────────────────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  el('tab-' + name).classList.add('active');
  document.querySelector(`[data-tab="${name}"]`).classList.add('active');
  if (!rendered[name]) { renderTab(name); if (D) rendered[name] = true; }
}

function renderTab(name) {
  if (!D) return;
  if (name === 'overview')  renderOverview();
  if (name === 'financial') renderFinancial();
  if (name === 'accounts')  renderAccounts();
  if (name === 'trading')   renderTrading();
  if (name === 'customers') renderCustomers();
  if (name === 'insights')  renderInsights();
  if (name === 'monthly')   renderMonthly();
  if (name === 'query')     renderQuery();
  if (name === 'market')    renderMarket();
  if (name === 'regulatory') renderRegulatory();
  if (name === 'capabilities') renderCapabilities();
}

function ageLabel(ts) {
  if (!ts) return 'unknown';
  const secs = (Date.now() - new Date(ts).getTime()) / 1000;
  if (secs < 120)   return Math.round(secs) + 's ago';
  if (secs < 3600)  return Math.round(secs/60) + 'm ago';
  if (secs < 86400) return (secs/3600).toFixed(1) + 'h ago';
  return (secs/86400).toFixed(1) + 'd ago';
}

function ageDot(ts, status) {
  if (!ts) return 'dot-grey';
  const hours = (Date.now() - new Date(ts).getTime()) / 3600000;
  if (status === 'error') return 'dot-red';
  if (hours > 6) return 'dot-red';
  if (hours > 1) return 'dot-amber';
  return 'dot-green';
}


// ── Header ───────────────────────────────────────────────────────────────────
function updateHeader() {
  const m = D.meta;
  const p = D.portfolio;
  const netCls = p.net_margin_gbp >= 0 ? 'color:' + C.green : 'color:' + C.red;
  el('run-meta').innerHTML =
    `<span style="${netCls};font-weight:700">${gbp(p.net_margin_gbp)} net</span> &nbsp;·&nbsp; ` +
    `git <a href="https://github.com/21bcarlisle-arch/synthetic-enterprise/commit/${m.git_commit}" target="_blank">${m.git_commit.slice(0,7)}</a> &nbsp;·&nbsp; ` +
    `<span class="badge badge-green">Live</span>`;
}


// -- Year Spotlight --
function selectYear(yr) {
  YEAR_FILTER = (YEAR_FILTER === yr) ? null : yr;
  document.querySelectorAll('.year-btn').forEach(function(b) {
    if (b.dataset.yr) {
      b.classList.toggle('active', parseInt(b.dataset.yr) === YEAR_FILTER);
    } else {
      b.classList.toggle('active', YEAR_FILTER === null);
    }
  });
  const sp = document.getElementById('year-spotlight');
  if (sp) renderSpotlight(sp);
  ['financial', 'trading', 'customers'].forEach(function(tab) {
    delete rendered[tab];
    if (el('tab-' + tab).classList.contains('active')) {
      renderTab(tab); rendered[tab] = true;
    }
  });
}

function renderSpotlight(container) {
  if (!YEAR_FILTER) { container.innerHTML = ''; return; }
  const yr = YEAR_FILTER;
  const fa = D.financial.annual.find(r => r.year == yr) || {};
  const ba = (D.customers.book_annual || []).find(r => r.year == yr) || {};
  const ha = (D.trading.hedge_annual || []).find(r => r.year == yr) || {};
  const isCrisis = yr === 2021 || yr === 2022;
  const crBadge = isCrisis ? '<span style="background:#fbe7e7;color:#d03b3b;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;margin-left:8px">CRISIS YEAR</span>' : '';
  const ncls = (fa.net_gbp||0) >= 0 ? 'pos' : 'neg';
  const kpi = (lbl, val) => '<div class="sp-kpi"><div class="lbl">' + lbl + '</div><div class="val">' + val + '</div></div>';
  container.innerHTML = '<div class="spotlight">' +
    '<div class="sp-title">' + yr + ' Year Spotlight' + crBadge + '</div>' +
    '<div class="sp-grid">' +
    kpi('Net Margin', '<span class="' + ncls + '">' + gbp(fa.net_gbp||0) + '</span>') +
    kpi('Gross Margin', gbp(fa.gross_gbp||0)) +
    kpi('Revenue', gbp(fa.revenue_gbp||0)) +
    kpi('Treasury (end)', gbp(fa.treasury_end_gbp||0)) +
    kpi('Bill Shocks', '<span style="color:var(--amber)">' + (ba.bill_shock_count||0) + '</span>') +
    kpi('Worst Shock', '<span style="color:var(--amber)">' + ((ba.worst_shock_pct||0)*100).toFixed(0) + '%</span>') +
    kpi('Active Elec', ba.active_elec||'-') +
    kpi('Avg Hedge %', ((ha.avg_hf||0)*100).toFixed(0) + '%') +
    '</div></div>';
}

// ── OVERVIEW ─────────────────────────────────────────────────────────────────
function renderOverview() {
  const p = D.portfolio;
  const fa = D.financial.annual;
  const build = D.build || {};

  el('tab-overview').innerHTML = `
    <div class="cards">
      ${card('Net Margin', gbp(p.net_margin_gbp), '10-year total', cls(p.net_margin_gbp))}
      ${card('Gross Margin', gbp(p.gross_margin_gbp), 'wholesale spread', cls(p.gross_margin_gbp))}

// ── CUSTOMERS ────────────────────────────────────────────────────────────────
function renderCustomers() {
  const cu = D.customers;
  const baAll = cu.book_annual;
  const ba = YEAR_FILTER ? baAll.filter(r => r.year === YEAR_FILTER) : baAll;
  const yrs = ba.map(r=>r.year);

  // Build heatmap
  const allCids = Object.keys(cu.per_year_net).sort();
  const allYears = YEAR_FILTER
    ? [String(YEAR_FILTER)]
    : [...new Set(baAll.map(r=>String(r.year)))].sort();

  function hmColor(v) {
    if (v === null || v === undefined) return 'hm-nil';
    if (v >  2000) return 'hm-great';
    if (v >   200) return 'hm-good';
    if (v >     0) return 'hm-ok';
    if (v > -200)  return 'hm-warn';
    if (v > -2000) return 'hm-poor';
    return 'hm-bad';
  }

  const hmCols = allCids.length + 1;
  let hmHtml = `<div class="heatmap-wrap"><div class="heatmap" style="grid-template-columns:56px repeat(${allYears.length},44px)">`;

  // Header row
  hmHtml += `<div class="hm-cell hm-label">Cust</div>`;
  allYears.forEach(yr => { hmHtml += `<div class="hm-cell hm-year-hdr">${yr.slice(2)}</div>`; });

  // Data rows
  allCids.forEach(cid => {
    hmHtml += `<div class="hm-cell hm-label">${cid}</div>`;
    allYears.forEach(yr => {
      const v = cu.per_year_net[cid]?.[yr];
      const lbl = v !== undefined ? (Math.abs(v) >= 1000 ? gbp(v,0) : (v < 0 ? '-£'+Math.abs(Math.round(v)) : '£'+Math.round(v))) : '—';
      hmHtml += `<div class="hm-cell ${hmColor(v)}" title="${cid} ${yr}: ${v !== undefined ? gbp(v,0) : 'n/a'}">${lbl}</div>`;
    });
  });
  hmHtml += '</div></div>';

  // Events list (last 40 most recent, filtered by year if selected)
  const _sortedEvents = [...cu.events].sort((a,b) => b.date.localeCompare(a.date));
  const events = (YEAR_FILTER
    ? _sortedEvents.filter(e => e.date.startsWith(String(YEAR_FILTER)))
    : _sortedEvents).slice(0, 40);
  function evTag(type, retention) {
    if (type === 'churned') return '<span class="ev-tag tag-churned">churned</span>';
    if (retention) return '<span class="ev-tag tag-retention">offered</span>';
    return '<span class="ev-tag tag-renewed">renewed</span>';
  }

  el('tab-customers').innerHTML = yearBtnsHtml() + `
    <div class="chart-box">
      <div class="chart-title">Customer Book Size by Year</div>
      <div class="chart-wrap"><canvas id="ch-book"></canvas></div>
    </div>
    <div class="chart-box">
      <div class="chart-title">Bill Shock Events by Year</div>
      <div class="chart-wrap"><canvas id="ch-shock"></canvas></div>
    </div>
    <div class="tbl-box">
      <div class="tbl-title">Net Margin per Customer per Year (£) — heatmap</div>
      ${hmHtml}
    </div>
    <div class="tbl-box">
      <div class="tbl-title">Lifetime P&amp;L by Customer</div>
      <table>
        <tr><th>Customer</th><th>Segment</th><th>Tariff</th><th>Revenue</th><th>Gross</th><th>Net</th></tr>
        ${Object.entries(cu.lifetime).sort((a,b)=>b[1].net_gbp-a[1].net_gbp).map(([cid,c])=>`
          <tr><td>${cid}</td><td style="color:var(--muted)">${c.segment}</td>
          <td style="color:var(--muted)">${c.tariff_type||'fixed'}</td>
          <td>${gbp(c.revenue_gbp)}</td>
          <td class="${cls(c.gross_gbp)}">${gbp(c.gross_gbp)}</td>
          <td class="${cls(c.net_gbp)}">${gbp(c.net_gbp)}</td></tr>`).join('')}
      </table>
    </div>
    <div class="tbl-box">
      <div class="tbl-title">Recent Lifecycle Events</div>
      <ul class="event-list">
        ${events.map(e=>`<li class="ev-item">
          <span class="ev-date">${e.date}</span>
          <strong>${e.customer_id}</strong>
          ${evTag(e.type, e.retention_offered)}
          <span style="color:var(--muted);font-size:11px">sim ${(e.sim_churn_p*100).toFixed(0)}% co ${(e.company_est*100).toFixed(0)}%</span>
        </li>`).join('')}
      </ul>
    </div>
    <div class="tbl-box">
      <div class="tbl-title">Retention Offers &amp; Outcomes</div>
      <table>
        <tr><th>Customer</th><th>Date</th><th>Est %</th><th>Discount</th><th>Cost</th><th>Outcome</th></tr>
        ${(YEAR_FILTER ? cu.retention.filter(r=>r.date.startsWith(String(YEAR_FILTER))) : cu.retention).map(r=>`<tr>
          <td>${r.customer_id}</td><td>${r.date}</td>
          <td>${(r.company_est*100).toFixed(0)}%</td>
          <td>${(r.discount_pct*100).toFixed(1)}%</td>
          <td>${gbp(r.cost_gbp)}</td>
          <td class="${r.outcome==='retained'?'pos':'neg'}">${r.outcome}</td>
        </tr>`).join('')}
      </table>
    </div>`;

  mkChart('ch-book', {
    type: 'bar',
    data: {
      labels: yrs,
      datasets: [
        { label: 'Electricity accounts', data: ba.map(r=>r.active_elec),
          backgroundColor:'rgba(88,166,255,.7)', borderRadius:2, stack:'a' },
        { label: 'Gas accounts', data: ba.map(r=>r.active_gas),
          backgroundColor:'rgba(188,140,255,.6)', borderRadius:2, stack:'a' },
      ]
    },
    options: { ...baseLineOpts(), scales: {
      x:{grid:{color:'rgba(48,54,61,.4)'},stacked:true},
      y:{grid:{color:'rgba(48,54,61,.4)'},stacked:true,ticks:{stepSize:1}} } }
  });

  mkChart('ch-shock', {
    type: 'bar',
    data: {
      labels: yrs,
      datasets: [
        { label: 'Bill shock events', data: ba.map(r=>r.bill_shock_count),
          backgroundColor:'rgba(248,81,73,.6)', borderRadius:2 },
      ]
    },
    options: { ...baseLineOpts(), scales: {
      x:{grid:{color:'rgba(48,54,61,.4)'}},
      y:{grid:{color:'rgba(48,54,61,.4)'},ticks:{stepSize:5}} } }
  });
}

const QUERY_STORAGE_KEY = 'poesys_query_log';
const QUERY_GAP_PATTERNS = ['unable to', "can't", 'cannot', 'not available', 'insufficient data',
  "don't have", 'do not have', 'no data for', 'not enough', 'outside the scope',
  'not captured', 'not modelled', 'no information', 'no records'];

function qLoadHistory() {
  try { return JSON.parse(localStorage.getItem(QUERY_STORAGE_KEY) || '[]'); }
  catch(e) { return []; }
}
function qSaveHistory(hist) {
  localStorage.setItem(QUERY_STORAGE_KEY, JSON.stringify(hist.slice(-100)));
}
function qIsGap(answer) {
  const lo = (answer || '').toLowerCase();
  return QUERY_GAP_PATTERNS.some(function(p) { return lo.includes(p); });
}
function qClearHistory() {
  localStorage.removeItem(QUERY_STORAGE_KEY);
  rendered['query'] = false;
  switchTab('query');
}

const QUERY_EXAMPLES = [

function renderQuery() {
  const container = el('tab-query');

  const hist = qLoadHistory();
  const gaps = hist.filter(function(e) { return e.is_gap; });
  const histHtml = hist.slice().reverse().map(function(e) {

  }).join('');

  const gapsHtml = gaps.length ? (
    '<div class="section" style="margin-top:16px">' +

    gaps.map(function(e, i) {
      return '<div style="padding:6px 0;' + (i < gaps.length-1 ? 'border-bottom:1px solid var(--border)' : '') + '">' +
        '<div style="font-size:12px;color:var(--text)">' + escHtml(e.q) + '</div>' +

    }).join('') +

  ) : '';

  container.innerHTML =

    '<p style="font-size:12px;color:var(--muted);margin-bottom:14px">Ask questions about the simulation in plain English. Answers generated by Qwen3 on Skynet. Questions are saved locally to build a learning log — gaps show questions the system could not answer.</p>' +
    '<div style="display:flex;gap:8px;margin-bottom:12px">' +
    '<input id="query-input" class="query-input" type="text" placeholder="e.g. Which customers were unprofitable in 2022?" ' +
    'onkeydown="if(event.key===\'Enter\' && !event.shiftKey){event.preventDefault();submitQuery()}">' +
    '<button id="query-btn" class="query-submit" onclick="submitQuery()">Ask &rarr;</button>' +
    '</div>' +
    '<div style="display:flex;flex-wrap:wrap;gap:6px">' + exBtns + '</div>' +
    '</div>' +
    '<div id="query-history">' + histHtml + '</div>' +
    (hist.length ? '<div style="text-align:right;margin-top:8px"><button class="query-example" onclick="qClearHistory()" style="color:var(--red)">Clear history</button></div>' : '') +
    gapsHtml +
    '</div>';

function setQueryText(q) {
  var inp = el('query-input');
  if (inp) { inp.value = q; inp.focus(); }
}

async function submitQuery() {
  var inp = el('query-input');
  var btn = el('query-btn');
  if (!inp) return;
  var question = inp.value.trim();
  if (!question) return;

  inp.value = '';
  if (btn) { btn.disabled = true; btn.textContent = 'Asking…'; }

  var history = el('query-history');
  var bubble = document.createElement('div');
  bubble.className = 'query-bubble';
  var uid = 'qa-' + Date.now();
  bubble.innerHTML = '<div class="query-q">Q: ' + escHtml(question) + '</div>' +
    '<div class="query-a" id="' + uid + '" style="color:var(--muted)">Thinking…</div>';
  history.insertBefore(bubble, history.firstChild);

  var answer = '';
  var isGap = false;
  try {
    var ctx = D && D.query_context ? D.query_context : '';
    var resp = await fetch('https://skynet-1.taila062fa.ts.net/query', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ question: question, queryContext: ctx })
    });
    var data = await resp.json();
    var ansEl = document.getElementById(uid);
    if (data.answer) {
      answer = data.answer;
      isGap = qIsGap(answer);
      ansEl.style.color = 'var(--text)';
      ansEl.textContent = answer;
      if (isGap) {
        var gapBadge = document.createElement('span');
        gapBadge.style.cssText = 'background:rgba(248,81,73,.15);color:var(--red);font-size:9px;padding:1px 5px;border-radius:8px;margin-left:6px;font-weight:600';
        gapBadge.textContent = 'GAP';
        ansEl.parentNode.querySelector('.query-q').appendChild(gapBadge);
      }
    } else {
      answer = 'Error: ' + (data.error || 'Unknown error');
      ansEl.className = 'query-err';
      ansEl.textContent = answer;
    }
  } catch (err) {
    var ansEl = document.getElementById(uid);
    answer = 'Could not reach Skynet: ' + err.message;
    if (ansEl) { ansEl.className = 'query-err'; ansEl.textContent = answer; }
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = 'Ask →'; }
    if (answer && !answer.startsWith('Could not reach')) {
      var hist = qLoadHistory();
      hist.push({ q: question, a: answer, is_gap: isGap, ts: Date.now() });
      qSaveHistory(hist);
    }
  }
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
