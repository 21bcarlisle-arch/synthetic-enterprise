<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poesys - Customer Portal</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg: #f9f9f7; --surface: #fcfcfb; --surface2: #f0efec;
  --border: #e1e0d9; --text: #0b0b0b; --muted: #52514e;
  --green: #0ca30c; --red: #d03b3b; --amber: #fab219;
  --blue: #2a78d6; --teal: #1baf7a;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; min-height: 100vh; }
.site-nav { background: var(--surface); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 20px; height: 48px; gap: 8px; }
.nav-logo { font-weight: 700; color: var(--teal); text-decoration: none; margin-right: 16px; font-size: 15px; }
.nav-link { color: var(--muted); text-decoration: none; padding: 6px 12px; border-radius: 6px; font-size: 13px; }
.nav-link:hover, .nav-link.active { color: var(--text); background: var(--surface2); }
.login-wrap { display: flex; align-items: center; justify-content: center; min-height: calc(100vh - 48px); }
.login-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 40px; width: 400px; max-width: 95vw; }
.login-card h1 { font-size: 22px; margin-bottom: 8px; }
.login-card p { color: var(--muted); font-size: 13px; margin-bottom: 28px; line-height: 1.5; }
.login-card label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 6px; }
.login-card input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; color: var(--text); font-size: 14px; outline: none; }
.login-card input:focus { border-color: var(--blue); }
.hint { font-size: 11px; color: var(--muted); margin-top: 6px; line-height: 1.6; }
.btn { width: 100%; background: var(--blue); color: #000; font-weight: 600; border: none; border-radius: 8px; padding: 11px; font-size: 14px; cursor: pointer; margin-top: 20px; }
.btn:hover { opacity: 0.85; }
.error-msg { color: var(--red); font-size: 12px; margin-top: 10px; }
.account-wrap { max-width: 860px; margin: 0 auto; padding: 28px 20px 48px; }
.account-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 24px; gap: 16px; flex-wrap: wrap; }
.account-id { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
.account-meta { display: flex; gap: 6px; margin-top: 8px; align-items: center; flex-wrap: wrap; }
.logout-btn { background: none; border: 1px solid var(--border); color: var(--muted); padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 12px; }
.logout-btn:hover { border-color: var(--text); color: var(--text); }
.sec-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin: 22px 0 10px; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px 18px; margin-bottom: 12px; }
.kpi-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); gap: 10px; margin-bottom: 12px; }
.kpi { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px; }
.kpi-label { font-size: 10px; color: var(--muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.05em; }
.kpi-value { font-size: 20px; font-weight: 700; }
.kpi-sub { font-size: 11px; color: var(--muted); margin-top: 3px; }
.risk-bar { height: 5px; border-radius: 3px; margin-top: 7px; background: var(--border); }
.risk-fill { height: 100%; border-radius: 3px; }
.green { color: var(--green); } .red { color: var(--red); } .amber { color: var(--amber); }
.blue { color: var(--blue); } .muted { color: var(--muted); }
.badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
.br { background: #dbe9f9; color: var(--blue); }
.bi { background: #fef0d1; color: #a66a00; }
.be { background: #e3f6e0; color: var(--green); }
.bg { background: #ece9fb; color: #4a3aa7; }
.bdf { background: #e0f5ee; color: #158563; }
.row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
.row:last-child { border-bottom: none; }
.rl { color: var(--muted); }
table { width: 100%; border-collapse: collapse; font-size: 12px; }
th { padding: 7px 10px; text-align: right; color: var(--muted); font-weight: 500; font-size: 10px; text-transform: uppercase; letter-spacing: 0.3px; border-bottom: 1px solid var(--border); }
th:first-child { text-align: left; }
td { padding: 6px 10px; text-align: right; border-bottom: 1px solid rgba(225,224,217,.4); }
td:first-child { text-align: left; }
tr:last-child td { border-bottom: none; }
tr.crisis-row td { background: rgba(208,59,59,.04); }
.year-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--muted); padding: 4px 10px; border-radius: 6px; font-size: 12px; cursor: pointer; }
.year-btn.yactive { background: var(--blue); color: #000; border-color: var(--blue); font-weight: 600; }
.year-btns { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
.bill-sum { display: flex; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
.bill-kpi { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; }
.bill-kv { font-size: 16px; font-weight: 700; margin-top: 2px; }
.no-inv { color: var(--muted); font-size: 13px; font-style: italic; padding: 12px 0; }
.df-card { background: linear-gradient(135deg,rgba(27,175,122,.05) 0%,rgba(42,120,214,.05) 100%);
  border: 1px solid rgba(27,175,122,.22); border-radius: 10px; padding: 16px 18px; margin-bottom: 12px; }
.df-header { font-size: 11px; font-weight: 600; color: var(--teal); margin-bottom: 14px; text-transform: uppercase; letter-spacing: 0.06em; }
.df-grid { display: grid; grid-template-columns: repeat(3,1fr); }
.df-cell { text-align: center; padding: 0 10px; }
.df-cell + .df-cell { border-left: 1px solid var(--border); }
.df-lbl { font-size: 10px; color: var(--muted); margin-bottom: 4px; }
.df-val { font-size: 20px; font-weight: 700; }
.chart-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px 18px; margin-bottom: 12px; }
.overlay-row { display: flex; justify-content: flex-end; gap: 8px; margin-bottom: 8px; align-items: center; }
.overlay-row select { font-size: 12px; padding: 4px 10px; border: 1px solid var(--border); border-radius: 6px; background: var(--surface2); color: var(--text); cursor: pointer; }
.usage-hint { font-size: 11px; color: var(--muted); margin-top: 8px; }
.usage-daily-wrap { display: none; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
.load-shape-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 16px; }
.load-shape-cell-label { font-size: 11px; color: var(--muted); margin-bottom: 6px; }
</style>
</head>
<body>
<nav class="site-nav">
  <a href="../" class="nav-logo">&#9889; Poesys</a>
  <a href="../" class="nav-link">Supplier</a>
  <a href="../customers/" class="nav-link active">Customers</a>
  <a href="../project/" class="nav-link">Project</a>
  <a href="../sim/" class="nav-link">SIM</a>
</nav>
<div id="app"></div>
<script>
var ACC=null,BILL_YEAR=null;
function gbp(n){if(n==null)return"-";var s=Math.abs(n).toLocaleString("en-GB",{minimumFractionDigits:0,maximumFractionDigits:0});return(n<0?"-":"")+"\u00a3"+s;}
function pct(v){return(v*100).toFixed(0)+"%";}
function nc(v){return v>=0?"green":"red";}
function churnColour(p){return p>=0.5?"red":p>=0.3?"amber":"green";}
function churnLabel(p){return p>=0.5?"High risk":p>=0.3?"Medium risk":"Low risk";}
function showLogin(err){
  document.getElementById("app").innerHTML=
    "<div class=\"login-wrap\"><div class=\"login-card\">"+
    "<h1>Customer Portal</h1>"+
    "<p>Log in with your Poesys account number to view your account, bills, and value metrics.</p>"+
    "<label for=\"acc\">Account number</label>"+
    "<input type=\"text\" id=\"acc\" placeholder=\"e.g. C1, C_IC1, C1g\" autocomplete=\"off\" />"+
    "<div class=\"hint\">Electricity: C1\u2013C9, C_IC1\u2013C_IC4<br>Gas: C1g\u2013C4g, C_IC3g</div>"+
    (err?"<div class=\"error-msg\">"+err+"</div>":"")+
    "<button class=\"btn\" onclick=\"doLogin()\">Sign in</button>"+
    "</div></div>";
  var inp=document.getElementById("acc");
  if(inp){inp.focus();inp.onkeydown=function(e){if(e.key==="Enter")doLogin();};}
}
function doLogin(){
  var id=(document.getElementById("acc").value||"").trim();
  if(!id)return;
  fetch("../data/customers/"+id+".json")
    .then(function(r){if(!r.ok)throw new Error("Account not found: "+id);return r.json();})
    .then(function(d){ACC=d;renderAccount();})
    .catch(function(e){showLogin(e.message);});
}
function renderBills(){
  var d=ACC,invoices=d.invoices||[];
  var filtered=BILL_YEAR?invoices.filter(function(i){return i.date.indexOf(BILL_YEAR)===0;}):invoices;
  var years=[];
  invoices.forEach(function(i){var y=i.date.slice(0,4);if(years.indexOf(y)<0)years.push(y);});
  years.sort();
  var btns="<div class=\"year-btns\"><button class=\"year-btn"+((!BILL_YEAR)?" yactive":"")+"\" onclick=\"filterBillYear(null)\">All</button>"+
    years.map(function(y){return "<button class=\"year-btn"+(BILL_YEAR===y?" yactive":"")+"\" onclick=\"filterBillYear(\+y+\)\">"+y+"</button>";}).join("")+"</div>";
  var total=0,unpaid=0;
  filtered.forEach(function(i){total+=i.amount_gbp;if(i.status==="UNPAID")unpaid+=i.amount_gbp;});
  var summary="<div class=\"bill-sum\">"+
    "<div class=\"bill-kpi\"><div style=\"color:var(--muted);font-size:11px\">Total ("+filtered.length+" bills)</div>"+
    "<div class=\"bill-kv\">"+gbp(total)+"</div></div>"+
    (unpaid>0?"<div class=\"bill-kpi\"><div style=\"color:var(--muted);font-size:11px\">Outstanding</div><div class=\"bill-kv red\">"+gbp(unpaid)+"</div></div>":"")+
    "</div>";
  var list=filtered.length
    ?filtered.slice().reverse().map(function(i){var c=i.status==="UNPAID"?"amber":"muted";
        return "<div class=\"row\"><span class=\"rl\">"+i.date+"</span><span>"+gbp(i.amount_gbp)+"</span><span class=\""+c+"\">"+i.status+"</span></div>";
      }).join("")
    :"<div class=\"no-inv\">No bills for "+(BILL_YEAR||"this period")+".</div>";
  document.getElementById("bills-section").innerHTML=btns+summary+"<div class=\"card\">"+list+"</div>";
}
function filterBillYear(y){BILL_YEAR=y;renderBills();}
function renderAccount(){
  var d=ACC;
  var commSplitHtml="";
  var cs=d.commodity_split||{};
  var csE=cs.electricity,csG=cs.gas;
  if(csE||csG){
    var csRows="";
    if(csE){var cec=nc(csE.net_gbp);csRows+="<div class=\"row\"><span class=\"rl\">Electricity — Revenue</span><span>"+gbp(csE.revenue_gbp)+"</span></div><div class=\"row\"><span class=\"rl\">Electricity — Net Margin</span><span class=\""+cec+"\">"+gbp(csE.net_gbp)+"</span></div>";}
    if(csG){var cgc=nc(csG.net_gbp);csRows+="<div class=\"row\"><span class=\"rl\">Gas — Revenue</span><span>"+gbp(csG.revenue_gbp)+"</span></div><div class=\"row\"><span class=\"rl\">Gas — Net Margin</span><span class=\""+cgc+"\">"+gbp(csG.net_gbp)+"</span></div>";}
    commSplitHtml="<div class=\"sec-title\">Commodity Split</div><div class=\"card\">"+csRows+"</div>";
  }
  var netActs=d.lifetime_net_after_cts_gbp||0;
  var segLabel=d.segment==="I&C"?"I&C":d.segment==="sme"?"SME":"Residential";
  var segBadge=d.segment==="I&C"?"<span class=\"badge bi\">I&amp;C</span>":"<span class=\"badge br\">Residential</span>";
  var comBadge=d.commodity==="gas"?"<span class=\"badge bg\">Gas</span>":"<span class=\"badge be\">Electricity</span>";
  var dfBadge=d.is_dual_fuel?"<span class=\"badge bdf\">Dual Fuel</span>":"";
  var net=d.lifetime_net_gbp||0;
  var clv=d.clv_gbp||0;
  var churnP=d.churn_probability||0;
  var expYrs=d.expected_lifetime_periods||0;
  var cc=churnColour(churnP);
  BILL_YEAR=null;
  var dfHtml="";
  if(d.is_dual_fuel&&d.dual_fuel_combined){
    var df=d.dual_fuel_combined,dfNet=df.combined_net_gbp;
    dfHtml="<div class=\"sec-title\">Dual-Fuel Combined View</div>"+
      "<div class=\"df-card\"><div class=\"df-header\">&#9881; "+d.account_id+" + "+df.gas_account_id+"</div>"+
      "<div class=\"df-grid\">"+
      "<div class=\"df-cell\"><div class=\"df-lbl\">Combined Revenue</div><div class=\"df-val blue\">"+gbp(df.combined_revenue_gbp)+"</div></div>"+
      "<div class=\"df-cell\"><div class=\"df-lbl\">Combined Net Margin</div><div class=\"df-val "+nc(dfNet)+"\">"+gbp(dfNet)+"</div></div>"+
      "<div class=\"df-cell\"><div class=\"df-lbl\">Gas Net Margin</div><div class=\"df-val muted\">"+gbp(df.gas_lifetime_net_gbp)+"</div></div>"+
      "</div></div>";
  }
  var annHtml="";
  if(d.annual_pnl&&d.annual_pnl.length){
    var rows=d.annual_pnl.filter(function(r){return r.gross_gbp!==0||r.net_gbp!==0;}).map(function(r){
      var crisis=r.year===2021||r.year===2022;
      var tariff=(r.tariff_min&&r.tariff_max)?r.tariff_min.toFixed(0)+"–"+r.tariff_max.toFixed(0)+" p/MWh":"—";
      return "<tr"+(crisis?" class=\"crisis-row\"":"")+"><td>"+r.year+(crisis?" ⚠":"")+"</td>"+
        "<td class=\""+nc(r.gross_gbp)+"\">"+gbp(r.gross_gbp)+"</td>"+
        "<td class=\""+nc(r.net_gbp)+"\">"+gbp(r.net_gbp)+"</td>"+
        "<td style=\"color:var(--muted);font-size:11px\">"+tariff+"</td></tr>";
    }).join("");
    annHtml="<div class=\"sec-title\">Annual P&amp;L</div>"+
      "<div class=\"card\" style=\"padding:0;overflow:hidden\">"+
      "<table><tr><th>Year</th><th>Gross Margin</th><th>Net Margin</th><th>Tariff Range</th></tr>"+rows+"</table></div>";
  }
  var pa=d.pricing_action||{},paFlag=pa.flag||"OK";
  var paColor=paFlag==="URGENT_REPRICE"?"red":paFlag==="REPRICE"?"amber":paFlag==="MONITOR"?"blue":"green";
  var paText="<span class=\""+paColor+"\">"+paFlag+"</span>";
  var paSub=pa.recommended_uplift_pct?"Uplift: "+(pa.recommended_uplift_pct*100).toFixed(1)+"%":"";
  document.getElementById("app").innerHTML=
    "<div class=\"account-wrap\">"+
    "<div class=\"account-header\"><div>"+
    "<div class=\"account-id\">"+d.account_id+"</div>"+
    "<div class=\"account-meta\">"+segBadge+" "+comBadge+" "+dfBadge+"</div>"+
    "</div><button class=\"logout-btn\" onclick=\"doLogout()\">Sign out</button></div>"+
    "<div class=\"sec-title\">Customer Value</div>"+
    "<div class=\"kpi-grid\">"+
    "<div class=\"kpi\"><div class=\"kpi-label\">Lifetime Net Margin</div><div class=\"kpi-value "+nc(net)+"\">"+gbp(net)+"</div></div>"+
    "<div class=\"kpi\"><div class=\"kpi-label\">Customer Lifetime Value</div><div class=\"kpi-value blue\">"+gbp(clv)+"</div><div class=\"kpi-sub\">CLV projection</div></div>"+
    "<div class=\"kpi\"><div class=\"kpi-label\">Lifetime Revenue</div><div class=\"kpi-value\">"+gbp(d.lifetime_revenue_gbp)+"</div></div>"+
    "<div class=\"kpi\"><div class=\"kpi-label\">Cost to Serve</div><div class=\"kpi-value muted\">"+gbp(d.cost_to_serve_gbp)+"</div></div>"+
    "<div class=\"kpi\"><div class=\"kpi-label\">Net after CTS</div><div class=\"kpi-value "+nc(netActs)+"\">"+gbp(netActs)+"</div><div class=\"kpi-sub\">after cost to serve</div></div>"+
    "</div>"+
    "<div class=\"sec-title\">Retention &amp; Risk</div>"+
    "<div class=\"kpi-grid\">"+
    "<div class=\"kpi\"><div class=\"kpi-label\">Churn Probability</div>"+
    "<div class=\"kpi-value "+cc+"\">"+pct(churnP)+"</div>"+
    "<div class=\"kpi-sub\">"+churnLabel(churnP)+"</div>"+
    "<div class=\"risk-bar\"><div class=\"risk-fill\" style=\"width:"+pct(churnP)+";background:var(--"+cc+")\"></div></div></div>"+
    "<div class=\"kpi\"><div class=\"kpi-label\">Expected Lifetime</div><div class=\"kpi-value\">"+expYrs.toFixed(1)+" yrs</div></div>"+
    "<div class=\"kpi\"><div class=\"kpi-label\">Pricing Action</div>"+
    "<div class=\"kpi-value\" style=\"font-size:14px\">"+paText+"</div>"+
    (paSub?"<div class=\"kpi-sub\">"+paSub+"</div>":"")+
    "</div></div>"+
    dfHtml+annHtml+commSplitHtml+
    "<div class=\"sec-title\">Account Details</div>"+
    "<div class=\"card\">"+
    "<div class=\"row\"><span class=\"rl\">Account ID</span><span>"+d.account_id+"</span></div>"+
    "<div class=\"row\"><span class=\"rl\">Segment</span><span>"+segLabel+"</span></div>"+
    "<div class=\"row\"><span class=\"rl\">Commodity</span><span>"+d.commodity+"</span></div>"+
    "<div class=\"row\"><span class=\"rl\">Tariff</span><span>"+d.tariff_name+"</span></div>"+
    "<div class=\"row\"><span class=\"rl\">Meter</span><span>"+d.meter_type+"</span></div>"+
    "<div class=\"row\"><span class=\"rl\">Customer since</span><span>"+d.acquisition_date+"</span></div>"+
    "</div>"+
    "<div class=\"sec-title\">Usage</div>"+
    "<div id=\"usage-section\"></div>"+
    "<div class=\"sec-title\">Billing History</div>"+
    "<div id=\"bills-section\"></div>"+
    "</div>";
  renderBills();
  renderUsage();
}
var usageMonthlyChart=null,usageDailyChart=null,usageWkdayChart=null,usageSeasonChart=null;
var usageWeatherMonthly=null;
var MONTH_NAMES=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
function fmtMonth(m){var p=m.split("-");return MONTH_NAMES[parseInt(p[1],10)-1]+" "+p[0];}
function periodLabels(){
  var labels=[];
  for(var p=1;p<=48;p++){var mins=(p-1)*30,h=Math.floor(mins/60),mi=mins%60;labels.push((h<10?"0":"")+h+":"+(mi===0?"00":"30"));}
  return labels;
}
function renderPeriodComparison(monthly){
  if(!monthly||monthly.length<2)return"";
  var last=monthly[monthly.length-1],prev=monthly[monthly.length-2];
  function pctChange(a,b){return b?((a-b)/b*100):null;}
  function chip(pct){
    if(pct==null)return "<span class=\"muted\">n/a</span>";
    var sign=pct>0?"+":"";
    return "<span class=\""+(pct>0?"red":"green")+"\">"+sign+pct.toFixed(1)+"%</span>";
  }
  var momPct=pctChange(last.kwh,prev.kwh);
  var yp=last.month.split("-"),lastYearMonth=(parseInt(yp[0],10)-1)+"-"+yp[1];
  var yoyEntry=null;
  for(var i=0;i<monthly.length;i++){if(monthly[i].month===lastYearMonth){yoyEntry=monthly[i];break;}}
  var yoyPct=yoyEntry?pctChange(last.kwh,yoyEntry.kwh):null;
  return "<div class=\"kpi-grid\">"+
    "<div class=\"kpi\"><div class=\"kpi-label\">"+fmtMonth(last.month)+"</div><div class=\"kpi-value\">"+last.kwh.toFixed(0)+" kWh</div></div>"+
    "<div class=\"kpi\"><div class=\"kpi-label\">vs "+fmtMonth(prev.month)+"</div><div class=\"kpi-value\" style=\"font-size:16px\">"+chip(momPct)+"</div></div>"+
    "<div class=\"kpi\"><div class=\"kpi-label\">vs "+fmtMonth(lastYearMonth)+" (YoY)</div><div class=\"kpi-value\" style=\"font-size:16px\">"+(yoyEntry?chip(yoyPct):"<span class=\"muted\">no data</span>")+"</div></div>"+
    "</div>";
}
function buildUsageMonthlyChart(overlayType){
  var cons=ACC.consumption;
  var labels=cons.monthly.map(function(m){return m.month;});
  var data=cons.monthly.map(function(m){return m.kwh;});
  var datasets=[{label:"Consumption (kWh)",data:data,backgroundColor:"rgba(42,120,214,0.6)",borderRadius:2,yAxisID:"y"}];
  var scales={
    x:{ticks:{color:"#52514e",maxTicksLimit:12,maxRotation:0},grid:{color:"rgba(225,224,217,0.4)"}},
    y:{min:0,ticks:{color:"#52514e",callback:function(v){return v+" kWh";}},grid:{color:"rgba(225,224,217,0.4)"}}
  };
  if(overlayType!=="none"&&usageWeatherMonthly){
    var wByMonth={};usageWeatherMonthly.forEach(function(w){wByMonth[w.month]=w;});
    var overlayData,overlayLabel;
    if(overlayType==="temp"){
      overlayData=labels.map(function(m){var w=wByMonth[m];return w?w.mean_temp_c:null;});
      overlayLabel="Mean Temp (°C)";
    }else{
      overlayData=labels.map(function(m){var w=wByMonth[m];return w?w.hdd:null;});
      overlayLabel="Heating Degree Days";
    }
    datasets.push({label:overlayLabel,data:overlayData,type:"line",borderColor:"#d03b3b",backgroundColor:"transparent",borderWidth:2,pointRadius:0,tension:0.3,yAxisID:"y2"});
    scales.y2={position:"right",grid:{drawOnChartArea:false},ticks:{color:"#d03b3b"}};
  }
  var ctx=document.getElementById("usage-monthly-chart").getContext("2d");
  if(usageMonthlyChart)usageMonthlyChart.destroy();
  usageMonthlyChart=new Chart(ctx,{
    type:"bar",
    data:{labels:labels,datasets:datasets},
    options:{
      responsive:true,
      plugins:{legend:{display:overlayType!=="none",labels:{color:"#52514e",boxWidth:12,font:{size:11}}}},
      scales:scales,
      onClick:function(evt,elements){
        if(!ACC.consumption.has_hh_data)return;
        if(!elements||!elements.length)return;
        showDailyForMonth(labels[elements[0].index]);
      }
    }
  });
}
function onUsageOverlayChange(v){
  if(v==="none"){buildUsageMonthlyChart("none");return;}
  if(usageWeatherMonthly){buildUsageMonthlyChart(v);return;}
  fetch("../data/weather.json").then(function(r){return r.json();}).then(function(w){
    usageWeatherMonthly=w.monthly||[];
    buildUsageMonthlyChart(v);
  }).catch(function(){buildUsageMonthlyChart("none");});
}
function showDailyForMonth(month){
  var cons=ACC.consumption,daily=cons.daily_kwh||{};
  var days=Object.keys(daily).filter(function(k){return k.indexOf(month)===0;}).sort();
  var wrap=document.getElementById("usage-daily-wrap");
  wrap.style.display="block";
  var labels=days.map(function(k){return k.slice(8);});
  var data=days.map(function(k){return daily[k];});
  var ctx=document.getElementById("usage-daily-chart").getContext("2d");
  if(usageDailyChart)usageDailyChart.destroy();
  usageDailyChart=new Chart(ctx,{
    type:"bar",
    data:{labels:labels,datasets:[{label:"Daily kWh — "+fmtMonth(month),data:data,backgroundColor:"rgba(27,175,122,0.6)",borderRadius:2}]},
    options:{responsive:true,plugins:{legend:{display:false}},
      scales:{x:{ticks:{color:"#52514e",maxTicksLimit:16}},y:{min:0,ticks:{color:"#52514e",callback:function(v){return v+" kWh";}}}}}
  });
}
function buildLoadShapeCharts(shape){
  if(!shape)return;
  var labels=periodLabels();
  var ctx1=document.getElementById("usage-wkday-chart").getContext("2d");
  if(usageWkdayChart)usageWkdayChart.destroy();
  usageWkdayChart=new Chart(ctx1,{
    type:"line",
    data:{labels:labels,datasets:[
      {label:"Weekday",data:shape.weekday_avg_kwh,borderColor:"#2a78d6",backgroundColor:"transparent",borderWidth:2,pointRadius:0,tension:0.3},
      {label:"Weekend",data:shape.weekend_avg_kwh,borderColor:"#fab219",backgroundColor:"transparent",borderWidth:2,pointRadius:0,tension:0.3}
    ]},
    options:{responsive:true,plugins:{legend:{labels:{color:"#52514e",boxWidth:12,font:{size:11}}}},
      scales:{x:{ticks:{color:"#52514e",maxTicksLimit:8,maxRotation:0}},y:{min:0,ticks:{color:"#52514e",callback:function(v){return v+" kWh";}}}}}
  });
  var seasonColors={winter:"#2a78d6",spring:"#1baf7a",summer:"#fab219",autumn:"#d03b3b"};
  var seasonKeys=["winter","spring","summer","autumn"];
  var seasonal=shape.seasonal_avg_kwh||{};
  var ctx2=document.getElementById("usage-season-chart").getContext("2d");
  if(usageSeasonChart)usageSeasonChart.destroy();
  usageSeasonChart=new Chart(ctx2,{
    type:"line",
    data:{labels:labels,datasets:seasonKeys.map(function(s){
      return {label:s.charAt(0).toUpperCase()+s.slice(1),data:seasonal[s]||[],borderColor:seasonColors[s],backgroundColor:"transparent",borderWidth:2,pointRadius:0,tension:0.3};
    })},
    options:{responsive:true,plugins:{legend:{labels:{color:"#52514e",boxWidth:12,font:{size:11}}}},
      scales:{x:{ticks:{color:"#52514e",maxTicksLimit:8,maxRotation:0}},y:{min:0,ticks:{color:"#52514e",callback:function(v){return v+" kWh";}}}}}
  });
}
function renderUsage(){
  var d=ACC,cons=d.consumption;
  if(!cons||!cons.monthly||!cons.monthly.length){
    document.getElementById("usage-section").innerHTML="<div class=\"card\"><div class=\"no-inv\">No usage data available for this account.</div></div>";
    return;
  }
  var hasHH=!!cons.has_hh_data;
  var html="<div class=\"chart-wrap\">"+
    "<div class=\"overlay-row\"><label style=\"font-size:12px;color:var(--muted)\">Weather overlay</label>"+
    "<select id=\"usage-overlay-select\" onchange=\"onUsageOverlayChange(this.value)\">"+
    "<option value=\"none\">None</option><option value=\"temp\">Mean Temperature</option><option value=\"hdd\">Heating Degree Days</option>"+
    "</select></div>"+
    "<canvas id=\"usage-monthly-chart\" height=\"220\"></canvas>"+
    (hasHH?"<div class=\"usage-hint\">Click a bar to see the daily profile for that month.</div>":"")+
    "<div id=\"usage-daily-wrap\" class=\"usage-daily-wrap\"><canvas id=\"usage-daily-chart\" height=\"160\"></canvas></div>"+
    "</div>"+
    renderPeriodComparison(cons.monthly);
  if(hasHH){
    html+="<div class=\"sec-title\">Load Shape</div>"+
      "<div class=\"chart-wrap\"><div class=\"load-shape-grid\">"+
      "<div><div class=\"load-shape-cell-label\">Weekday vs weekend (avg daily profile)</div><canvas id=\"usage-wkday-chart\" height=\"180\"></canvas></div>"+
      "<div><div class=\"load-shape-cell-label\">Seasonal shape (avg daily profile)</div><canvas id=\"usage-season-chart\" height=\"180\"></canvas></div>"+
      "</div></div>";
  }else{
    html+="<div class=\"sec-title\">Load Shape</div><div class=\"card\"><div class=\"no-inv\">Half-hourly data not available for this account — monthly totals only.</div></div>";
  }
  document.getElementById("usage-section").innerHTML=html;
  buildUsageMonthlyChart("none");
  if(hasHH)buildLoadShapeCharts(cons.load_shape);
}
function doLogout(){ACC=null;showLogin(null);}
showLogin(null);
</script>
</body>
</html>
