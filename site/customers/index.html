<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poesys - Customer Portal</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<style>
:root {
  --bg: #f9f9f7; --surface: #fcfcfb; --surface2: #f0efec;
  --border: #e1e0d9; --text: #0b0b0b; --muted: #52514e;
  --green: #0ca30c; --red: #d03b3b; --amber: #fab219;
  --blue: #2a78d6; --teal: #1baf7a;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; min-height: 100vh; }
.site-nav { background: var(--surface); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 20px; height: 48px; gap: 8px; }
.nav-logo { font-weight: 700; color: var(--teal); text-decoration: none; margin-right: 16px; font-size: 15px; }
.nav-link { color: var(--muted); text-decoration: none; padding: 6px 12px; border-radius: 6px; font-size: 13px; }
.nav-link:hover, .nav-link.active { color: var(--text); background: var(--surface2); }
.login-wrap { display: flex; align-items: center; justify-content: center; padding: 40px 20px 8px; }
.login-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 40px; width: 400px; max-width: 95vw; }
.login-card h1 { font-size: 22px; margin-bottom: 8px; }
.login-card p { color: var(--muted); font-size: 13px; margin-bottom: 28px; line-height: 1.5; }
.login-card label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 6px; }
.login-card input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; color: var(--text); font-size: 14px; outline: none; }
.login-card input:focus { border-color: var(--blue); }
.hint { font-size: 11px; color: var(--muted); margin-top: 6px; line-height: 1.6; }
.btn { width: 100%; background: var(--blue); color: #000; font-weight: 600; border: none; border-radius: 8px; padding: 11px; font-size: 14px; cursor: pointer; margin-top: 20px; }
.btn:hover { opacity: 0.85; }
.error-msg { color: var(--red); font-size: 12px; margin-top: 10px; }
.account-wrap { max-width: 900px; margin: 0 auto; padding: 28px 20px 48px; }
.account-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 18px; gap: 16px; flex-wrap: wrap; }
.account-id { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
.account-id .hh-label { font-size: 13px; font-weight: 500; color: var(--muted); margin-left: 8px; }
.account-meta { display: flex; gap: 6px; margin-top: 8px; align-items: center; flex-wrap: wrap; }
.logout-btn { background: none; border: 1px solid var(--border); color: var(--muted); padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 12px; }
.logout-btn:hover { border-color: var(--text); color: var(--text); }
.sec-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin: 22px 0 10px; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px 18px; margin-bottom: 12px; }
.kpi-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); gap: 10px; margin-bottom: 12px; }
.kpi { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px; }
.kpi-label { font-size: 10px; color: var(--muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.05em; }
.kpi-value { font-size: 20px; font-weight: 700; }
.kpi-sub { font-size: 11px; color: var(--muted); margin-top: 3px; }
.risk-bar { height: 5px; border-radius: 3px; margin-top: 7px; background: var(--border); }
.risk-fill { height: 100%; border-radius: 3px; }
.green { color: var(--green); } .red { color: var(--red); } .amber { color: var(--amber); }
.blue { color: var(--blue); } .muted { color: var(--muted); }
.badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
.br { background: #dbe9f9; color: var(--blue); }
.bi { background: #fef0d1; color: #a66a00; }
.bs { background: #f3e3fb; color: #7a2ea6; }
.be { background: #e3f6e0; color: var(--green); }
.bg { background: #ece9fb; color: #4a3aa7; }
.bdf { background: #e0f5ee; color: #158563; }
.row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
.row:last-child { border-bottom: none; }
.rl { color: var(--muted); }
table { width: 100%; border-collapse: collapse; font-size: 12px; }
th { padding: 7px 10px; text-align: right; color: var(--muted); font-weight: 500; font-size: 10px; text-transform: uppercase; letter-spacing: 0.3px; border-bottom: 1px solid var(--border); }
th:first-child { text-align: left; }
td { padding: 6px 10px; text-align: right; border-bottom: 1px solid rgba(225,224,217,.4); }
td:first-child { text-align: left; }
tr:last-child td { border-bottom: none; }
tr.crisis-row td { background: rgba(208,59,59,.04); }
tr.deeplink-row td { background: rgba(42,120,214,.10); box-shadow: inset 3px 0 0 var(--blue); }
.year-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--muted); padding: 4px 10px; border-radius: 6px; font-size: 12px; cursor: pointer; }
.year-btn.yactive { background: var(--blue); color: #000; border-color: var(--blue); font-weight: 600; }
.year-btns { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
.bill-sum { display: flex; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
.bill-kpi { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; }
.bill-kv { font-size: 16px; font-weight: 700; margin-top: 2px; }
.no-inv { color: var(--muted); font-size: 13px; font-style: italic; padding: 12px 0; }
.closed-notice { background: rgba(208,59,59,.06); border: 1px solid rgba(208,59,59,.25); color: var(--red); font-size: 12px; padding: 8px 12px; border-radius: 6px; margin: 8px 0 12px; }
.df-card { background: linear-gradient(135deg,rgba(27,175,122,.05) 0%,rgba(42,120,214,.05) 100%);
  border: 1px solid rgba(27,175,122,.22); border-radius: 10px; padding: 16px 18px; margin-bottom: 12px; }
.df-header { font-size: 11px; font-weight: 600; color: var(--teal); margin-bottom: 14px; text-transform: uppercase; letter-spacing: 0.06em; }
.df-grid { display: grid; grid-template-columns: repeat(3,1fr); }
.df-cell { text-align: center; padding: 0 10px; }
.df-cell + .df-cell { border-left: 1px solid var(--border); }
.df-lbl { font-size: 10px; color: var(--muted); margin-bottom: 4px; }
.df-val { font-size: 20px; font-weight: 700; }
.chart-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px 18px; margin-bottom: 12px; }
.overlay-row { display: flex; justify-content: flex-end; gap: 8px; margin-bottom: 8px; align-items: center; }
.overlay-row select { font-size: 12px; padding: 4px 10px; border: 1px solid var(--border); border-radius: 6px; background: var(--surface2); color: var(--text); cursor: pointer; }
.usage-hint { font-size: 11px; color: var(--muted); margin-top: 8px; }
.usage-daily-wrap { display: none; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
.load-shape-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 16px; }
.load-shape-cell-label { font-size: 11px; color: var(--muted); margin-bottom: 6px; }
.tab-nav { display: flex; gap: 4px; border-bottom: 1px solid var(--border); margin-bottom: 18px; flex-wrap: wrap; }
.tab-btn { background: none; border: none; color: var(--muted); padding: 9px 14px; font-size: 13px; font-weight: 600; cursor: pointer; border-bottom: 2px solid transparent; }
.tab-btn:hover { color: var(--text); }
.tab-btn.active { color: var(--blue); border-bottom-color: var(--blue); }
.fuel-select-row { display: flex; gap: 6px; margin-bottom: 14px; }
.fuel-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--muted); padding: 5px 14px; border-radius: 6px; font-size: 12px; cursor: pointer; font-weight: 600; }
.fuel-btn.factive.fbe { background: var(--be); border-color: var(--green); color: var(--green); }
.fuel-btn.factive.fbg { background: #ece9fb; border-color: #4a3aa7; color: #4a3aa7; }
.accounts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 14px; }
.account-card-title { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; font-size: 14px; font-weight: 700; }
.rollup-toggle { display: flex; align-items: center; gap: 8px; margin: 16px 0 4px; cursor: pointer; font-size: 12px; color: var(--muted); user-select: none; }
.rollup-toggle input { cursor: pointer; }
.rollup-panel { display: none; }
.timeline-list { position: relative; padding-left: 22px; }
.timeline-item { position: relative; padding-bottom: 18px; font-size: 13px; }
.timeline-item:last-child { padding-bottom: 0; }
.timeline-item::before { content: ""; position: absolute; left: -22px; top: 4px; width: 9px; height: 9px; border-radius: 50%; background: var(--blue); }
.timeline-item.life::before { background: var(--teal); }
.timeline-item.churned::before { background: var(--red); }
.timeline-item::after { content: ""; position: absolute; left: -18px; top: 13px; bottom: -18px; width: 1px; background: var(--border); }
.timeline-item:last-child::after { display: none; }
.timeline-date { color: var(--muted); font-size: 11px; }
.timeline-detail { margin-top: 2px; }
.timeline-effect { margin-top: 3px; font-size: 11px; color: var(--blue); }
.no-account-note { font-size: 12px; color: var(--muted); font-style: italic; }
.cs-wrap { max-width: 900px; margin: 0 auto; padding: 8px 20px 48px; }
.cs-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 12px; text-align: center; }
.cs-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 12px; }
.cs-card { display: block; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; text-decoration: none; color: var(--text); transition: border-color .15s; }
.cs-card:hover { border-color: var(--blue); }
.cs-cat { font-size: 10px; font-weight: 700; color: var(--blue); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 6px; }
.cs-acc { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
.cs-headline { font-size: 12px; color: var(--muted); line-height: 1.4; }
</style>
</head>
<body>
<nav class="site-nav">
  <a href="../" class="nav-logo">&#9889; Poesys</a>
  <a href="../" class="nav-link">Home</a>
  <a href="../company/" class="nav-link">Company</a>
  <a href="../world/" class="nav-link">World</a>
  <a href="../proof/" class="nav-link">Proof</a>
  <a href="../method/" class="nav-link">Method</a>
  <a href="../project/" class="nav-link">Journey</a>
  <a href="../simplified/" class="nav-link">Simplified</a>
</nav>
<div id="app"></div>
<script>
var HH={elec:null,gas:null,base:null};
var ACTIVE_TAB="overview",BILL_FUEL="elec",CONS_FUEL="elec",BILL_YEAR=null,ROLLUP_OPEN=false,DEEPLINK_YEAR=null,EXPANDED_BILL_ID=null,BILL_VIEW="bills",CASH_SCOPE="combined";
var CUSTOMER_GROUPS=null; // lazy-fetched ordered list of household ids, for prev/next cycling
function fetchCustomerGroups(){
  if(CUSTOMER_GROUPS)return Promise.resolve(CUSTOMER_GROUPS);
  return fetch("../data/customers.json").then(function(r){return r.json();}).then(function(d){
    CUSTOMER_GROUPS=(d.customers||[]).map(function(c){
      var legs=c.legs||{};
      var loginId=(legs.electricity&&legs.electricity.cid)||(legs.gas&&legs.gas.cid)||c.customer_group;
      return {group:c.customer_group,loginId:loginId};
    });
    return CUSTOMER_GROUPS;
  }).catch(function(){return [];});
}
function cycleCustomer(dir){
  fetchCustomerGroups().then(function(groups){
    if(!groups.length)return;
    var idx=groups.findIndex(function(g){return g.group===HH.base;});
    if(idx<0)idx=0;
    var next=groups[(idx+dir+groups.length)%groups.length];
    var params=new URLSearchParams(location.search);
    params.set("acc",next.loginId);
    params.delete("year");
    history.replaceState(null,"","?"+params.toString());
    loadHousehold(next.loginId).then(function(){
      // Director page comment (2026-07-10): "Please keep the same tab when
      // we scroll between customers" -- ACTIVE_TAB deliberately NOT reset
      // here (was "overview" every time); fuel/bill-view sub-state still
      // resets since those depend on the new household's own fuel mix.
      BILL_FUEL=HH.elec?"elec":"gas";CONS_FUEL=BILL_FUEL;ROLLUP_OPEN=false;
      BILL_VIEW="bills";CASH_SCOPE=(HH.elec&&HH.gas)?"combined":BILL_FUEL;
      renderHousehold();
    });
  });
}
function gbp(n){if(n==null)return"-";var s=Math.abs(n).toLocaleString("en-GB",{minimumFractionDigits:0,maximumFractionDigits:0});return(n<0?"-":"")+"£"+s;}
function pct(v){return(v*100).toFixed(0)+"%";}
function nc(v){return v>=0?"green":"red";}
function churnColour(p){return p>=0.5?"red":p>=0.3?"amber":"green";}
function churnLabel(p){return p>=0.5?"High risk":p>=0.3?"Medium risk":"Low risk";}
function esc(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;");}
function showLogin(err){
  document.getElementById("app").innerHTML=
    "<div class=\"login-wrap\"><div class=\"login-card\">"+
    "<h1>Customer Portal</h1>"+
    "<p>Log in with your Poesys account number to view your household: electricity and gas accounts, usage, bills, and value metrics.</p>"+
    "<label for=\"acc\">Account number</label>"+
    "<input type=\"text\" id=\"acc\" placeholder=\"e.g. C1, C_IC1, C1g\" autocomplete=\"off\" />"+
    "<div class=\"hint\">Electricity: C1–C9, C_IC1–C_IC4<br>Gas: C1g–C4g, C_IC3g<br>Enter either fuel's number — we'll load the whole household.</div>"+
    (err?"<div class=\"error-msg\">"+esc(err)+"</div>":"")+
    "<button class=\"btn\" onclick=\"doLogin()\">Sign in</button>"+
    "</div></div>";
  var inp=document.getElementById("acc");
  if(inp){inp.focus();inp.onkeydown=function(e){if(e.key==="Enter")doLogin();};}
  loadCaseStudies();
}
var CASE_STUDIES=null;
function loadCaseStudies(){
  if(CASE_STUDIES){renderCaseStudies();return;}
  fetch("../data/case_studies.json").then(function(r){return r.ok?r.json():null;})
    .then(function(d){CASE_STUDIES=d;renderCaseStudies();})
    .catch(function(){});
}
function renderCaseStudies(){
  var app=document.getElementById("app");
  if(!app||!CASE_STUDIES||!CASE_STUDIES.cases||!CASE_STUDIES.cases.length)return;
  var cards=CASE_STUDIES.cases.map(function(c){
    var params=new URLSearchParams(c.link).toString();
    return "<a class=\"cs-card\" href=\"?"+params+"\">"+
      "<div class=\"cs-cat\">"+esc(c.category)+"</div>"+
      "<div class=\"cs-acc\">"+esc(c.account_id)+" &middot; "+esc(c.segment)+"</div>"+
      "<div class=\"cs-headline\">"+esc(c.headline)+"</div>"+
      "</a>";
  }).join("");
  var wrap=document.createElement("div");
  wrap.className="cs-wrap";
  wrap.innerHTML="<div class=\"cs-title\">Interesting customers to explore, auto-curated from the live run</div>"+
    "<div class=\"cs-grid\">"+cards+"</div>";
  app.appendChild(wrap);
}
function fetchAccount(id){
  return fetch("../data/customers/"+id+".json").then(function(r){
    if(!r.ok)throw new Error("Account not found: "+id);
    return r.json();
  });
}
function loadHousehold(id){
  return fetchAccount(id).then(function(d){
    var isGas=d.commodity==="gas";
    var elecId=isGas?d.base_account_id:d.account_id;
    var gasId=isGas?d.account_id:(d.is_dual_fuel&&d.dual_fuel_combined?d.dual_fuel_combined.gas_account_id:null);
    HH={elec:null,gas:null,base:d.base_account_id};
    if(isGas)HH.gas=d;else HH.elec=d;
    var need=[];
    if(!isGas&&gasId)need.push(fetchAccount(gasId).then(function(g){HH.gas=g;}));
    if(isGas)need.push(fetchAccount(elecId).then(function(e){HH.elec=e;}));
    return Promise.all(need);
  });
}
function doLogin(){
  var id=(document.getElementById("acc").value||"").trim();
  if(!id)return;
  loadHousehold(id).then(function(){
    ACTIVE_TAB="overview";BILL_FUEL=HH.elec?"elec":"gas";CONS_FUEL=BILL_FUEL;ROLLUP_OPEN=false;
    BILL_VIEW="bills";CASH_SCOPE=(HH.elec&&HH.gas)?"combined":BILL_FUEL;
    renderHousehold();
  }).catch(function(e){showLogin(e.message);});
}
function initFromUrl(){
  var params=new URLSearchParams(location.search);
  var acc=params.get("acc");
  if(!acc){showLogin(null);return;}
  var yr=params.get("year");
  var tab=params.get("tab");
  loadHousehold(acc).then(function(){
    ACTIVE_TAB=(tab&&TABS.some(function(t){return t[0]===tab;}))?tab:"accounts";
    BILL_FUEL=HH.elec?"elec":"gas";CONS_FUEL=BILL_FUEL;ROLLUP_OPEN=false;
    BILL_VIEW="bills";CASH_SCOPE=(HH.elec&&HH.gas)?"combined":BILL_FUEL;
    DEEPLINK_YEAR=yr?parseInt(yr,10):null;
    renderHousehold();
    if(DEEPLINK_YEAR){
      setTimeout(function(){
        var row=document.getElementById("dl-year-"+DEEPLINK_YEAR);
        if(row)row.scrollIntoView({behavior:"smooth",block:"center"});
      },50);
    }
  }).catch(function(e){showLogin("Account not found: "+acc);});
}
function doLogout(){HH={elec:null,gas:null,base:null};showLogin(null);}

function combinedTotals(){
  var e=HH.elec,g=HH.gas;
  return {
    revenue: (e?e.lifetime_revenue_gbp:0)+(g?g.lifetime_revenue_gbp:0),
    net: (e?e.lifetime_net_gbp:0)+(g?g.lifetime_net_gbp:0),
    net_after_cts: (e?e.lifetime_net_after_cts_gbp:0)+(g?g.lifetime_net_after_cts_gbp:0),
    clv: (e?e.clv_gbp:0)+(g?g.clv_gbp:0)
  };
}
function combinedLedgerTotals(){
  var e=HH.elec&&HH.elec.ledger,g=HH.gas&&HH.gas.ledger;
  return {
    balance: (e?e.current_balance_gbp:0)+(g?g.current_balance_gbp:0),
    billed: (e?e.total_billed_gbp:0)+(g?g.total_billed_gbp:0),
    collected: (e?e.total_collected_gbp:0)+(g?g.total_collected_gbp:0),
    written_off: (e?e.total_written_off_gross_gbp:0)+(g?g.total_written_off_gross_gbp:0),
    recovered: (e?e.total_recovered_gbp:0)+(g?g.total_recovered_gbp:0)
  };
}
function reconciliationLine(){
  var t=combinedLedgerTotals();
  var lhs=t.collected+t.balance+t.written_off;
  var ok=Math.abs(lhs-t.billed)<0.02;
  return "<div class=\"usage-hint\">Reconciliation (household, both fuels, all-in cash basis): Collected "+gbp(t.collected)+
    " + Outstanding "+gbp(t.balance)+" + Written off "+gbp(t.written_off)+" = "+gbp(lhs)+" "+(ok?"✓":"✗")+
    " vs Billed "+gbp(t.billed)+
    (t.recovered?" (of which "+gbp(t.recovered)+" was later recovered via DCA/debt sale after write-off -- informational, not double-counted in Collected).":".")+
    " Lifetime Revenue shown on the Accounts tab is a different, ex-VAT commodity-only accounting figure -- it excludes standing charge, network/levy pass-through and VAT, so it will not equal the all-in cash totals here.</div>";
}
function toggleRollup(){ROLLUP_OPEN=!ROLLUP_OPEN;renderTab();}
function rollupHtml(){
  var t=combinedTotals();
  return "<label class=\"rollup-toggle\"><input type=\"checkbox\" "+(ROLLUP_OPEN?"checked":"")+" onchange=\"toggleRollup()\"> Show combined household roll-up (electricity + gas summed)</label>"+
    "<div class=\"rollup-panel\" style=\"display:"+(ROLLUP_OPEN?"block":"none")+"\">"+
    "<div class=\"df-card\"><div class=\"df-header\">⚙ Household total — "+esc(HH.base)+"</div>"+
    "<div class=\"df-grid\">"+
    "<div class=\"df-cell\"><div class=\"df-lbl\">Combined Revenue</div><div class=\"df-val blue\">"+gbp(t.revenue)+"</div></div>"+
    "<div class=\"df-cell\"><div class=\"df-lbl\">Combined Net Margin</div><div class=\"df-val "+nc(t.net)+"\">"+gbp(t.net)+"</div></div>"+
    "<div class=\"df-cell\"><div class=\"df-lbl\">Combined CLV</div><div class=\"df-val muted\">"+gbp(t.clv)+"</div></div>"+
    "</div></div></div>";
}

/* BILL_CORRECTNESS_ADDENDUM.md Defect 1 (2026-07-08): this used to be a
   binary I&C-vs-everything-else check, so SME accounts (segment "SME")
   silently fell into the "Residential" branch -- e.g. C6, a true SME
   account correctly billed at 20% business VAT, rendered on the portal as
   "Household / Residential". Every real segment value (see
   site/data/customer_sample.json) must be listed explicitly here so a new
   segment can't silently fall through to Residential again. */
var SEGMENT_BADGE={"I&C":["bi","I&amp;C"],"SME":["bs","SME"],"resi":["br","Residential"]};
function segmentInfo(){
  var seg=(HH.elec||HH.gas).segment;
  return SEGMENT_BADGE[seg]||SEGMENT_BADGE["resi"];
}
function fuelBadges(){
  var b="";
  if(HH.elec)b+="<span class=\"badge be\">Electricity</span> ";
  if(HH.gas)b+="<span class=\"badge bg\">Gas</span> ";
  if(HH.elec&&HH.gas)b+="<span class=\"badge bdf\">Dual Fuel</span> ";
  var si=segmentInfo();

function chainLabel(e){

function chainColour(e){
  if(e.event_type==="retention_decision")return "blue";

  if(e.event_type==="journey_state")return e.outcome==="resentment_burned"?"red":"muted";

function mergedReactionChain(){
  var a=(HH.elec&&HH.elec.reaction_chain)||[],b=(HH.gas&&HH.gas.reaction_chain)||[];
  var seen={},out=[];
  a.concat(b).forEach(function(e){
    var key=e.date+"|"+e.event_type+"|"+e.description+"|"+e.amount_gbp+"|"+e.outcome;
    if(seen[key])return;
    seen[key]=true;out.push(e);
  });
  out.sort(function(x,y){return x.date<y.date?-1:x.date>y.date?1:0;});
  return out;
}

}

function mergeMonthly(out,m){
  Object.keys(m).forEach(function(k){
    out[k]=out[k]||{billed:0,collected:0};
    out[k].billed+=m[k].billed;out[k].collected+=m[k].collected;
  });
}
function monthlyLedgerSeries(scope){
  function monthly(d){
    var m={};
    ((d&&d.ledger&&d.ledger.entries)||[]).forEach(function(e){
      var mo=e.date.slice(0,7);
      m[mo]=m[mo]||{billed:0,collected:0};
      if(e.type==="invoice_raised")m[mo].billed+=e.amount_gbp;
      else if(e.type==="payment_received"||e.type==="arrears_resolved")m[mo].collected+=-e.amount_gbp;
    });
    return m;
  }
  var out={};
  if(scope!=="gas"&&HH.elec)mergeMonthly(out,monthly(HH.elec));
  if(scope!=="elec"&&HH.gas)mergeMonthly(out,monthly(HH.gas));
  return out;
}
function scopeCtsAndCollected(scope){
  var e=HH.elec,g=HH.gas,cts=0,collected=0,billed=0;
  if(scope!=="gas"&&e){cts+=e.cost_to_serve_gbp||0;collected+=(e.ledger?e.ledger.total_collected_gbp:0);billed+=(e.ledger?e.ledger.total_billed_gbp:0);}
  if(scope!=="elec"&&g){cts+=g.cost_to_serve_gbp||0;collected+=(g.ledger?g.ledger.total_collected_gbp:0);billed+=(g.ledger?g.ledger.total_billed_gbp:0);}
  return {cts:cts,collected:collected,billed:billed,net:collected-cts};
}

function round2(v){return Math.round(v*100)/100;}
function billWaterfall(cur,all){
  var idx=all.indexOf(cur);
  var prev=idx>0?all[idx-1]:null;
  var yoy=null;
  var curYear=parseInt(cur.period_start.slice(0,4),10),curMonth=cur.period_start.slice(5,7);
  var yoyPrefix=(curYear-1)+"-"+curMonth;
  for(var i=0;i<all.length;i++){if(all[i]!==cur&&all[i].period_start.indexOf(yoyPrefix)===0){yoy=all[i];break;}}
  return {prev:prev,yoy:yoy};
}
function decomposeBillDelta(cur,base){
  if(!base||cur.unit_rate_p_per_kwh==null||base.unit_rate_p_per_kwh==null)return null;
  var usageEffect=(cur.consumption_kwh-base.consumption_kwh)*base.unit_rate_p_per_kwh/100;
  var priceEffect=cur.consumption_kwh*(cur.unit_rate_p_per_kwh-base.unit_rate_p_per_kwh)/100;
  var delta=cur.amount_gbp-base.amount_gbp;
  var otherEffect=delta-usageEffect-priceEffect;
  return {delta:delta,usageEffect:usageEffect,priceEffect:priceEffect,otherEffect:otherEffect};
}
function waterfallChip(label,d){
  if(!d)return "";
  function fmt(v){var sign=v>0?"+":"";return "<span class=\""+(v>0?"red":v<0?"green":"muted")+"\">"+sign+gbp(v)+"</span>";}
  return "<div class=\"row\"><span class=\"rl\">"+label+"</span><span>"+fmt(d.delta)+
    " (usage "+fmt(d.usageEffect)+", price "+fmt(d.priceEffect)+", other "+fmt(d.otherEffect)+")</span></div>";
}
/* BILL_CORRECTNESS_ADDENDUM.md Defect 3 (2026-07-09): usage rendered as one
   line per register/period (i.registers -- single-register "Anytime" today,
   but the array shape supports N so a future ToU tariff with Day/Night/Peak
   registers bills correctly here without a render-layer change). Falls back
   to the old single flat line if i.registers is absent (pre-Defect-3 data). */
function billUsageLinesHtml(i){
  var unitTag=i.commodity==="gas"?"p/kWh (gas)":"p/kWh (elec)";
  if(i.registers&&i.registers.length){
    return i.registers.map(function(r){
      var rate=r.consumption_kwh?(r.amount_gbp/r.consumption_kwh*100):null;
      var label=i.registers.length>1?("Usage ("+esc(r.label)+")"):"Usage";
      return rate!=null
        ?"<div class=\"row\"><span class=\"rl\">"+label+"</span><span>"+r.consumption_kwh.toFixed(1)+" kWh &times; "+rate.toFixed(2)+unitTag+" = "+gbp(r.amount_gbp)+"</span></div>"
        :"<div class=\"row\"><span class=\"rl\">"+label+"</span><span>"+gbp(r.amount_gbp)+"</span></div>";
    }).join("");
  }
  if(i.unit_rate_p_per_kwh!=null){
    return "<div class=\"row\"><span class=\"rl\">Usage</span><span>"+i.consumption_kwh.toFixed(1)+" kWh &times; "+i.unit_rate_p_per_kwh.toFixed(2)+unitTag+" = "+gbp(i.commodity_amount_gbp)+"</span></div>";
  }
  return "<div class=\"row\"><span class=\"rl\">Usage charge</span><span>"+gbp(i.commodity_amount_gbp)+"</span></div>";
}
function billEquationHtml(i){
  var parts=[billUsageLinesHtml(i)];
  // Calculation-transparency breakdown (2026-07-10, director page comment:
  // "Days x standing charges... explain the maths properly") -- both fields
  // were already computed internally to derive standing_charge_gbp, just
  // never exposed until now (saas/bill_generator.py).
  var scLabel=(i.days_in_period!=null&&i.standing_charge_gbp_per_day!=null)
    ?("+ Standing charge ("+i.days_in_period+" days &times; £"+i.standing_charge_gbp_per_day.toFixed(2)+"/day)")
    :"+ Standing charge";
  parts.push("<div class=\"row\"><span class=\"rl\">"+scLabel+"</span><span>"+gbp(i.standing_charge_gbp)+"</span></div>");
  if(i.non_commodity_amount_gbp)parts.push("<div class=\"row\"><span class=\"rl\">+ Network &amp; environmental</span><span>"+gbp(i.non_commodity_amount_gbp)+"</span></div>");

  return parts.join("");

/* BILL_CORRECTNESS_ADDENDUM.md Defect 2 (2026-07-09): every bill must show

// Real downloadable bill PDF (2026-07-10, director page comment: "should we
// produce a bill pdf for each month" -- director picked "a real downloadable
// PDF"). Generated client-side via jsPDF from the exact same invoice data
// already on the page -- no server-side PDF store needed for a static site,
// and the numbers can never drift from what's shown on-screen since it's
// the same object.
function downloadBillPdf(i){
  if(!window.jspdf){alert("PDF library still loading -- try again in a moment.");return;}
  var doc=new window.jspdf.jsPDF();
  var y=20;
  doc.setFontSize(18);doc.text("Poesys",20,y);
  doc.setFontSize(10);doc.setTextColor(120);doc.text("Energy Statement",20,y+7);
  doc.setTextColor(0);y+=20;
  doc.setFontSize(11);
  doc.text("Account: "+HH.base,20,y);y+=6;
  doc.text("Invoice: "+i.id,20,y);y+=6;
  doc.text("Billing period: "+i.period_start+" to "+i.period_end,20,y);y+=6;
  doc.text("Commodity: "+(i.commodity||(i===HH.gas?"gas":"electricity")),20,y);y+=10;
  doc.setDrawColor(200);doc.line(20,y,190,y);y+=10;
  doc.setFontSize(12);doc.text("Charges",20,y);y+=8;
  doc.setFontSize(10);
  function line(label,amount){
    doc.text(label,20,y);
    doc.text(gbp(amount),190,y,{align:"right"});
    y+=7;
  }
  if(i.consumption_kwh!=null&&i.commodity_amount_gbp!=null){
    var rateNote=i.unit_rate_p_per_kwh!=null?(" @ "+i.unit_rate_p_per_kwh.toFixed(2)+"p/kWh"):"";
    line("Usage: "+i.consumption_kwh.toFixed(1)+" kWh"+rateNote,i.commodity_amount_gbp);
  }
  var scLabel=(i.days_in_period!=null&&i.standing_charge_gbp_per_day!=null)
    ?("Standing charge ("+i.days_in_period+" days x £"+i.standing_charge_gbp_per_day.toFixed(2)+"/day)")
    :"Standing charge";
  line(scLabel,i.standing_charge_gbp);
  if(i.non_commodity_amount_gbp)line("Network & environmental",i.non_commodity_amount_gbp);
  if(i.vat_gbp)line("VAT",i.vat_gbp);
  doc.setDrawColor(200);doc.line(20,y,190,y);y+=8;
  doc.setFontSize(12);doc.setFont(undefined,"bold");
  doc.text("Total due",20,y);doc.text(gbp(i.amount_gbp),190,y,{align:"right"});
  doc.setFont(undefined,"normal");y+=12;
  doc.setFontSize(9);doc.setTextColor(120);
  if(i.meter_serial)doc.text("Meter serial: "+i.meter_serial,20,y),y+=5;
  if(i.mpan)doc.text("MPAN: "+i.mpan,20,y),y+=5;
  if(i.mprn)doc.text("MPRN: "+i.mprn,20,y),y+=5;
  doc.text("Status: "+i.status,20,y);y+=10;
  doc.setFontSize(8);doc.text("Generated from live account data -- synthetic simulation, not a real bill.",20,y);
  doc.save("Poesys_Bill_"+HH.base+"_"+i.period_end+".pdf");
}

function toggleBillExpand(id){EXPANDED_BILL_ID=(EXPANDED_BILL_ID===id?null:id);renderBills(BILL_FUEL==="elec"?HH.elec:HH.gas);}
function closedAccountNotice(d, invoices){
  var tl=d.timeline||[];
  var churned=null;
  for(var k=0;k<tl.length;k++){if(tl[k].type==="churned")churned=tl[k];}
  if(!churned||!invoices.length)return "";
  var last=invoices[invoices.length-1];
  var settleTxt="";
  if(d.ledger){
    if(d.ledger.current_balance_gbp>0.005)settleTxt=" Final balance: "+gbp(d.ledger.current_balance_gbp)+" outstanding.";
    else if(d.ledger.total_written_off_gross_gbp>0.005)settleTxt=" Account settled to zero (net of "+gbp(d.ledger.total_written_off_gross_gbp)+" written off).";
    else settleTxt=" Account settled to zero.";
  }
  return "<div class=\"closed-notice\">Account closed "+churned.date+" — final bill "+last.id+"."+settleTxt+"</div>";
}
function renderBills(d){
  var section=document.getElementById("bills-section");
  if(!section)return;
  if(!d){section.innerHTML="<div class=\"no-inv\">No account.</div>";return;}
  var invoices=d.invoices||[];
  var filtered=BILL_YEAR?invoices.filter(function(i){return i.date.indexOf(BILL_YEAR)===0;}):invoices;
  var years=[];
  invoices.forEach(function(i){var y=i.date.slice(0,4);if(years.indexOf(y)<0)years.push(y);});
  years.sort();
  var btns="<div class=\"year-btns\"><button class=\"year-btn"+((!BILL_YEAR)?" yactive":"")+"\" onclick=\"filterBillYear(null)\">All</button>"+
    years.map(function(y){return "<button class=\"year-btn"+(BILL_YEAR===y?" yactive":"")+"\" onclick=\"filterBillYear('"+y+"')\">"+y+"</button>";}).join("")+"</div>";
  var total=0,unpaid=0;
  // ADVISOR_STEER_BILL_ARITHMETIC.md Defect 2: a WRITTEN_OFF invoice is a
  // realised credit loss, not outstanding debt -- excluded from the per-bill
  // "Outstanding" sum so this figure reconciles with the household ledger's
  // current_balance_gbp (which already nets written-off debt to zero via
  // total_written_off_gross_gbp). Previously any non-PAID status counted here,
  // so a written-off bill showed as still owed alongside the header's
  // "Account settled to zero (net of ... written off)" -- a same-page
  // contradiction.
  filtered.forEach(function(i){total+=i.amount_gbp;if(i.status!=="PAID"&&i.status!=="WRITTEN_OFF")unpaid+=i.amount_gbp;});
  var summary="<div class=\"bill-sum\">"+
    "<div class=\"bill-kpi\"><div style=\"color:var(--muted);font-size:11px\">Total ("+filtered.length+" bills)</div>"+
    "<div class=\"bill-kv\">"+gbp(total)+"</div></div>"+
    (unpaid>0?"<div class=\"bill-kpi\"><div style=\"color:var(--muted);font-size:11px\">Outstanding</div><div class=\"bill-kv red\">"+gbp(unpaid)+"</div></div>":"")+
    "</div>";
  var list=filtered.length
    ?filtered.slice().reverse().map(function(i){
        var c=i.status==="PAID"?"muted":i.status==="DISPUTED"?"red":i.status==="WRITTEN_OFF"?"muted":"amber";
        var statusLabel=i.status==="WRITTEN_OFF"?"WRITTEN OFF":i.status;
        var row="<div class=\"row\" style=\"cursor:pointer\" onclick=\"toggleBillExpand('"+i.id+"')\"><span class=\"rl\">"+i.date+"</span><span>"+gbp(i.amount_gbp)+"</span><span class=\""+c+"\">"+statusLabel+"</span></div>";
        if(EXPANDED_BILL_ID===i.id)row+=billExpandHtml(i,invoices);
        return row;
      }).join("")
    :"<div class=\"no-inv\">No bills for "+(BILL_YEAR||"this period")+".</div>";
  section.innerHTML=btns+closedAccountNotice(d,invoices)+summary+"<div class=\"card\">"+list+"</div>"+
    "<div class=\"usage-hint\">Click a bill to see the usage &times; rate + standing charge equation, and how it changed vs the previous bill and the same month last year.</div>";
}

function renderPeriodComparison(monthly){
  if(!monthly||monthly.length<2)return"";
  var last=monthly[monthly.length-1],prev=monthly[monthly.length-2];
  function pctChange(a,b){return b?((a-b)/b*100):null;}
  function chip(pct){
    if(pct==null)return "<span class=\"muted\">n/a</span>";
    var sign=pct>0?"+":"";
    return "<span class=\""+(pct>0?"red":"green")+"\">"+sign+pct.toFixed(1)+"%</span>";
  }
  var momPct=pctChange(last.kwh,prev.kwh);
  var yp=last.month.split("-"),lastYearMonth=(parseInt(yp[0],10)-1)+"-"+yp[1];
  var yoyEntry=null;
  for(var i=0;i<monthly.length;i++){if(monthly[i].month===lastYearMonth){yoyEntry=monthly[i];break;}}
  var yoyPct=yoyEntry?pctChange(last.kwh,yoyEntry.kwh):null;

    "<div class=\"kpi\"><div class=\"kpi-label\">"+fmtMonth(last.month)+"</div><div class=\"kpi-value\">"+last.kwh.toFixed(0)+" kWh</div></div>"+
    "<div class=\"kpi\"><div class=\"kpi-label\">vs "+fmtMonth(prev.month)+"</div><div class=\"kpi-value\" style=\"font-size:16px\">"+chip(momPct)+"</div></div>"+
    "<div class=\"kpi\"><div class=\"kpi-label\">vs "+fmtMonth(lastYearMonth)+" (YoY)</div><div class=\"kpi-value\" style=\"font-size:16px\">"+(yoyEntry?chip(yoyPct):"<span class=\"muted\">no data</span>")+"</div></div>"+

      scales:{x:{ticks:{color:"#52514e",maxTicksLimit:8,maxRotation:0}},y:{min:0,ticks:{color:"#52514e",callback:function(v){return v+" kWh";}}}}}
  });
  var seasonColors={winter:"#2a78d6",spring:"#1baf7a",summer:"#fab219",autumn:"#d03b3b"};
  var seasonKeys=["winter","spring","summer","autumn"];
  var seasonal=shape.seasonal_avg_kwh||{};
  var ctx2=document.getElementById("usage-season-chart").getContext("2d");
  if(usageSeasonChart)usageSeasonChart.destroy();
  usageSeasonChart=new Chart(ctx2,{
    type:"line",
    data:{labels:labels,datasets:seasonKeys.map(function(s){
      return {label:s.charAt(0).toUpperCase()+s.slice(1),data:seasonal[s]||[],borderColor:seasonColors[s],backgroundColor:"transparent",borderWidth:2,pointRadius:0,tension:0.3};
    })},
    options:{responsive:true,plugins:{legend:{labels:{color:"#52514e",boxWidth:12,font:{size:11}}}},
      scales:{x:{ticks:{color:"#52514e",maxTicksLimit:8,maxRotation:0}},y:{min:0,ticks:{color:"#52514e",callback:function(v){return v+" kWh";}}}}}
  });
}
function renderUsage(d){
  var section=document.getElementById("usage-section");
  if(!section)return;
  if(!d){section.innerHTML="<div class=\"card\"><div class=\"no-inv\">No account.</div></div>";return;}
  var cons=d.consumption;
  if(!cons||!cons.monthly||!cons.monthly.length){
    section.innerHTML="<div class=\"card\"><div class=\"no-inv\">No usage data available for this account.</div></div>";
    return;
  }
  var hasHH=!!cons.has_hh_data;
  var html="<div class=\"chart-wrap\">"+
    "<div class=\"overlay-row\"><label style=\"font-size:12px;color:var(--muted)\">Weather overlay</label>"+
    "<select id=\"usage-overlay-select\" onchange=\"onUsageOverlayChange(this.value,ACC_CONS)\">"+
    "<option value=\"none\">None</option><option value=\"temp\">Mean Temperature</option><option value=\"hdd\">Heating Degree Days</option>"+
    "</select></div>"+
    "<canvas id=\"usage-monthly-chart\" height=\"220\"></canvas>"+
    (hasHH?"<div class=\"usage-hint\">Click a bar to see the daily profile for that month.</div>":"")+
    "<div id=\"usage-daily-wrap\" class=\"usage-daily-wrap\"><canvas id=\"usage-daily-chart\" height=\"160\"></canvas></div>"+
    "</div>"+
    renderPeriodComparison(cons.monthly);
  if(hasHH){
    html+="<div class=\"sec-title\">Load Shape</div>"+
      "<div class=\"chart-wrap\"><div class=\"load-shape-grid\">"+
      "<div><div class=\"load-shape-cell-label\">Weekday vs weekend (avg daily profile)</div><canvas id=\"usage-wkday-chart\" height=\"180\"></canvas></div>"+
      "<div><div class=\"load-shape-cell-label\">Seasonal shape (avg daily profile)</div><canvas id=\"usage-season-chart\" height=\"180\"></canvas></div>"+
      "</div></div>";
  }else{
    // Director page comment (2026-07-10): "C2 is smart meter, but no smart
    // data and shape" -- a real distinction that wasn't explained anywhere.
    // CORRECTED same day after a second director challenge to this exact
    // claim: a smart meter sending reads to its OWN supplier for BILLING is
    // NOT a rarely-taken opt-in (DESNZ Q4 2024: ~90% of installed smart
    // meters do this by default) -- only a separate, narrower, real
    // settlement-purpose HH-data consent regime is opt-in-like, and its
    // real uptake rate is unpublished (see docs/market_research/
    // ASSUMPTIONS.md "Smart Meter Half-Hourly Data Access: Billing vs.
    // Settlement Consent"). This account's missing half-hourly shape here
    // reflects a simulation data-availability choice, not a modelled
    // customer consent decision.
    var _smartNote=(d.meter_type&&d.meter_type.toLowerCase().indexOf("smart")>=0)
      ?" This account has a smart meter installed; the half-hourly load shape below isn't simulated for every account (a data-availability choice, not a customer consent gate) -- monthly totals are always real regardless."
      :"";
    html+="<div class=\"sec-title\">Load Shape</div><div class=\"card\"><div class=\"no-inv\">Half-hourly data not available for this account — monthly totals only."+_smartNote+"</div></div>";
  }
  section.innerHTML=html;
  window.ACC_CONS=cons;
  buildUsageMonthlyChart("none",cons);
  if(hasHH)buildLoadShapeCharts(cons.load_shape);
}
initFromUrl();
