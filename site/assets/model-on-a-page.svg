<svg xmlns="http://www.w3.org/2000/svg" width="880" height="1930" viewBox="0 0 880 1930" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#16181D"/>
    </marker>
    <marker id="arrG" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1F9D55"/>
    </marker>
  </defs>

  <!-- paper -->
  <rect width="880" height="1930" fill="#FAFAF8"/>

  <!-- ============ HEADER ============ -->
  <text x="48" y="66" font-size="34" font-weight="700" fill="#16181D" letter-spacing="-0.5">poesys.</text>
  <text x="48" y="98" font-size="15" fill="#16181D">An autonomous UK energy supplier, run inside a faithful simulation of the real market.</text>
  <text x="48" y="120" font-size="15" fill="#16181D">Mission: cut carbon through personalisation — measured in <tspan font-weight="700">£ per tonne of CO₂e saved</tspan>.</text>
  <text x="48" y="146" font-size="14" fill="#5A5E66" font-style="italic">The test on every line: could a real supplier know this?</text>

  <!-- ============ THE GOVERNANCE ============ -->
  <rect x="40" y="170" width="800" height="112" rx="10" fill="#FFFFFF" stroke="#16181D" stroke-width="1.5"/>
  <text x="64" y="200" font-size="13" font-weight="700" fill="#5A5E66" letter-spacing="2">THE GOVERNANCE — ONE HUMAN, THE REST IS AI</text>

  <g>
    <rect x="64" y="214" width="180" height="52" rx="8" fill="#16181D"/>
    <text x="78" y="236" font-size="13" font-weight="700" fill="#FFFFFF">Director</text>
    <text x="78" y="254" font-size="11.5" fill="#D5D7DB">the human · mission · Tier-1</text>

    <rect x="256" y="214" width="180" height="52" rx="8" fill="#EFEFEC"/>
    <text x="270" y="236" font-size="13" font-weight="700" fill="#16181D">Board <tspan font-size="10" fill="#8A8E96">AI</tspan></text>
    <text x="270" y="254" font-size="11.5" fill="#40444C">six stances in tension</text>

    <rect x="448" y="214" width="180" height="52" rx="8" fill="#EFEFEC"/>
    <text x="462" y="236" font-size="13" font-weight="700" fill="#16181D">Builders <tspan font-size="10" fill="#8A8E96">AI</tspan></text>
    <text x="462" y="254" font-size="11.5" fill="#40444C">design, build, test, deploy</text>

    <rect x="640" y="214" width="180" height="52" rx="8" fill="#EFEFEC"/>
    <text x="654" y="236" font-size="13" font-weight="700" fill="#16181D">Harness</text>
    <text x="654" y="254" font-size="11.5" fill="#40444C">gates · rules · maturity</text>
  </g>

  <line x1="440" y1="282" x2="440" y2="304" stroke="#16181D" stroke-width="2" marker-end="url(#arr)"/>
  <text x="456" y="298" font-size="11.5" fill="#5A5E66" font-style="italic">builds and steers everything below</text>

  <!-- ============ THE WORLD ============ -->
  <rect x="40" y="310" width="800" height="296" rx="10" fill="#EFEFEC"/>
  <text x="64" y="344" font-size="13" font-weight="700" fill="#5A5E66" letter-spacing="2">THE WORLD — SIM GROUND TRUTH, BEHIND THE WALL</text>

  <rect x="64" y="362" width="310" height="72" rx="8" fill="#FFFFFF" stroke="#C9C9C3"/>
  <text x="80" y="388" font-size="15" font-weight="700" fill="#16181D">Real market physics</text>
  <text x="80" y="408" font-size="13" fill="#40444C">Weather → half-hourly price + demand</text>
  <text x="80" y="425" font-size="13" fill="#40444C">2016–25 record · 168k periods · the crisis</text>

  <rect x="390" y="362" width="310" height="72" rx="8" fill="#FFFFFF" stroke="#C9C9C3"/>
  <text x="406" y="388" font-size="15" font-weight="700" fill="#16181D">A drawn population</text>
  <text x="406" y="408" font-size="13" fill="#40444C">Households drawn fresh every run —</text>
  <text x="406" y="425" font-size="13" fill="#40444C">coupled hidden traits, a metered life</text>

  <rect x="716" y="362" width="100" height="72" rx="8" fill="#F3F3F0" stroke="#C9C9C3" stroke-dasharray="4 3"/>
  <text x="766" y="392" font-size="12.5" font-weight="700" fill="#5A5E66" text-anchor="middle">competitors</text>
  <text x="766" y="412" font-size="11.5" fill="#8A8E96" text-anchor="middle" font-family="'SF Mono', Menlo, Consolas, monospace">~ not yet</text>

  <text x="64" y="470" font-size="13" fill="#5A5E66">The world moves ahead of the books: settlement lands months late. Ground truth never crosses the wall.</text>

  <!-- why we don't need millions -->
  <line x1="64" y1="488" x2="816" y2="488" stroke="#C9C9C3" stroke-width="1"/>
  <text x="64" y="512" font-size="12" font-weight="700" fill="#5A5E66" letter-spacing="2">WHY WE DON'T NEED MILLIONS</text>

  <rect x="64" y="524" width="368" height="62" rx="8" fill="#FFFFFF" stroke="#C9C9C3"/>
  <text x="80" y="546" font-size="13" font-weight="700" fill="#16181D">Value, not volume</text>
  <text x="80" y="563" font-size="11.5" fill="#40444C">Cohorts drawn for learning value, not headcount.</text>
  <text x="80" y="578" font-size="11.5" fill="#40444C">Coverage knees measured: ~200 homes, ~12 segments.</text>

  <rect x="448" y="524" width="368" height="62" rx="8" fill="#FFFFFF" stroke="#C9C9C3"/>
  <text x="464" y="546" font-size="13" font-weight="700" fill="#16181D">Repetition, not scale</text>
  <text x="464" y="563" font-size="11.5" fill="#40444C">A fresh population every run; lives rerun across worlds</text>
  <text x="464" y="578" font-size="11.5" fill="#40444C">until segments × scenarios are sampled — tails included.</text>

  <!-- flows crossing toward / from the wall -->
  <line x1="180" y1="614" x2="180" y2="652" stroke="#16181D" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="400" y1="614" x2="400" y2="652" stroke="#16181D" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="620" y1="614" x2="620" y2="652" stroke="#16181D" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="780" y1="652" x2="780" y2="614" stroke="#16181D" stroke-width="2" marker-end="url(#arr)"/>
  <text x="796" y="638" font-size="11" fill="#5A5E66">out</text>

  <!-- ============ THE WALL (signature) ============ -->
  <rect x="40" y="658" width="800" height="180" fill="#16181D"/>
  <text x="64" y="690" font-size="15" font-weight="700" fill="#FAFAF8" letter-spacing="2">THE WALL</text>
  <text x="64" y="712" font-size="13" fill="#B9BCC2">Ground truth never crosses. Everything else is an interface flow — in one of two directions.</text>

  <!-- IN row -->
  <text x="64" y="752" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="12" font-weight="700" fill="#FAFAF8">IN ↓</text>
  <g font-size="11.5" fill="#FAFAF8">
    <rect x="112" y="732" width="100" height="28" rx="14" fill="none" stroke="#FAFAF8"/>
    <text x="162" y="750" text-anchor="middle">market feeds</text>
    <rect x="220" y="732" width="122" height="28" rx="14" fill="none" stroke="#FAFAF8"/>
    <text x="281" y="750" text-anchor="middle">forecasts ± error</text>
    <rect x="350" y="732" width="98" height="28" rx="14" fill="none" stroke="#FAFAF8"/>
    <text x="399" y="750" text-anchor="middle">meter reads</text>
    <rect x="456" y="732" width="86" height="28" rx="14" fill="none" stroke="#FAFAF8"/>
    <text x="499" y="750" text-anchor="middle">payments</text>
    <rect x="550" y="732" width="142" height="28" rx="14" fill="none" stroke="#FAFAF8"/>
    <text x="621" y="750" text-anchor="middle">complaints &amp; replies</text>
    <rect x="700" y="732" width="120" height="28" rx="14" fill="none" stroke="#FAFAF8"/>
    <text x="760" y="750" text-anchor="middle">settlement (late)</text>
  </g>

  <!-- OUT row -->
  <text x="64" y="800" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="12" font-weight="700" fill="#FAFAF8">OUT ↑</text>
  <g font-size="11.5" fill="#FAFAF8">
    <rect x="122" y="780" width="64" height="28" rx="14" fill="none" stroke="#FAFAF8" stroke-dasharray="4 3"/>
    <text x="154" y="798" text-anchor="middle">bills</text>
    <rect x="194" y="780" width="70" height="28" rx="14" fill="none" stroke="#FAFAF8" stroke-dasharray="4 3"/>
    <text x="229" y="798" text-anchor="middle">offers</text>
    <rect x="272" y="780" width="94" height="28" rx="14" fill="none" stroke="#FAFAF8" stroke-dasharray="4 3"/>
    <text x="319" y="798" text-anchor="middle">messages</text>
  </g>
  <text x="384" y="798" font-size="12" fill="#B9BCC2" font-style="italic">— the company touches the world only through what it sends</text>

  <text x="64" y="826" font-size="12" fill="#8A8E96" font-style="italic">Forecast error is the wall on the future · discovery-through-behaviour is the wall on the customer</text>

  <!-- flows into / out of the company -->
  <line x1="200" y1="838" x2="200" y2="876" stroke="#16181D" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="780" y1="876" x2="780" y2="838" stroke="#16181D" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ============ THE COMPANY ============ -->
  <rect x="40" y="884" width="800" height="388" rx="10" fill="#FFFFFF" stroke="#16181D" stroke-width="2"/>
  <text x="64" y="918" font-size="13" font-weight="700" fill="#5A5E66" letter-spacing="2">THE COMPANY — SEES ONLY THROUGH THE WALL</text>

  <!-- operating loop, serpentine, row 1 -->
  <g font-size="13.5" font-weight="600" fill="#16181D">
    <rect x="64"  y="938" width="130" height="42" rx="8" fill="#DCF2E4"/>
    <text x="129" y="964" text-anchor="middle">acquire</text>
    <rect x="222" y="938" width="130" height="42" rx="8" fill="#DCF2E4"/>
    <text x="287" y="964" text-anchor="middle">forecast book</text>
    <rect x="380" y="938" width="130" height="42" rx="8" fill="#DCF2E4"/>
    <text x="445" y="964" text-anchor="middle">price tariffs</text>
    <rect x="538" y="938" width="130" height="42" rx="8" fill="#DCF2E4"/>
    <text x="603" y="964" text-anchor="middle">hedge forward</text>
    <rect x="696" y="938" width="120" height="42" rx="8" fill="#DCF2E4"/>
    <text x="756" y="964" text-anchor="middle">bill out</text>
  </g>
  <g stroke="#16181D" stroke-width="2">
    <line x1="194" y1="959" x2="216" y2="959" marker-end="url(#arr)"/>
    <line x1="352" y1="959" x2="374" y2="959" marker-end="url(#arr)"/>
    <line x1="510" y1="959" x2="532" y2="959" marker-end="url(#arr)"/>
    <line x1="668" y1="959" x2="690" y2="959" marker-end="url(#arr)"/>
  </g>
  <!-- drop to row 2 -->
  <path d="M 756 980 L 756 1004" stroke="#16181D" stroke-width="2" fill="none" marker-end="url(#arr)"/>

  <!-- row 2 (right to left) -->
  <g font-size="13.5" font-weight="600" fill="#16181D">
    <rect x="696" y="1010" width="120" height="42" rx="8" fill="#DCF2E4"/>
    <text x="756" y="1036" text-anchor="middle">collect</text>
    <rect x="480" y="1010" width="160" height="42" rx="8" fill="#DCF2E4"/>
    <text x="560" y="1036" text-anchor="middle">settle (late)</text>
    <rect x="250" y="1010" width="180" height="42" rx="8" fill="#1F9D55"/>
    <text x="340" y="1036" text-anchor="middle" fill="#FFFFFF">learn from true-up</text>
  </g>
  <g stroke="#16181D" stroke-width="2">
    <line x1="690" y1="1031" x2="646" y2="1031" marker-end="url(#arr)"/>
    <line x1="474" y1="1031" x2="436" y2="1031" marker-end="url(#arr)"/>
  </g>
  <!-- learn loops back up to forecast -->
  <path d="M 250 1031 L 190 1031 L 190 998 L 287 998 L 287 986" stroke="#1F9D55" stroke-width="2" fill="none" marker-end="url(#arrG)"/>

  <!-- serve & converse: always-on layer -->
  <rect x="64" y="1068" width="752" height="38" rx="19" fill="#F0FAF3" stroke="#1F9D55" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="440" y="1092" font-size="13" font-weight="600" fill="#16181D" text-anchor="middle">serve &amp; converse — always on, woven through every step: sales · queries · care · collections</text>

  <text x="64" y="1132" font-size="12.5" fill="#5A5E66">One integrated, fully agentic stack grown end to end — trading · finance · billing · CRM · operations · debt.</text>

  <text x="64" y="1154" font-size="13" fill="#40444C">Bills run on <tspan font-weight="700">three clocks</tspan> — billed / settled / banked — and the truth arrives months behind the money.</text>

  <!-- discovery loop note -->
  <rect x="64" y="1168" width="752" height="60" rx="8" fill="#D7E5FB"/>
  <text x="80" y="1189" font-size="13" font-weight="700" fill="#16181D">Discovery loop</text>
  <text x="80" y="1206" font-size="13" fill="#16181D">The company clusters its book from observables only, scored on worst-cell belief-vs-truth.</text>
  <text x="80" y="1222" font-size="13" fill="#16181D">It forms beliefs, prices against them, and must live with being wrong.</text>

  <text x="64" y="1256" font-size="14" font-weight="700" fill="#D64545">It can be wrong, and it can die.</text>

  <line x1="440" y1="1272" x2="440" y2="1304" stroke="#16181D" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ============ THE SCORE ============ -->
  <rect x="40" y="1310" width="800" height="122" rx="10" fill="#EFEFEC"/>
  <text x="64" y="1342" font-size="13" font-weight="700" fill="#5A5E66" letter-spacing="2">THE SCORE</text>

  <rect x="64" y="1358" width="238" height="56" rx="8" fill="#FFFFFF" stroke="#D64545" stroke-width="2"/>
  <text x="80" y="1382" font-size="15" font-weight="700" fill="#D64545">SURVIVE</text>
  <text x="80" y="1402" font-size="12.5" fill="#40444C">hard constraint · judged worst-case</text>

  <rect x="322" y="1358" width="238" height="56" rx="8" fill="#FFFFFF" stroke="#1F6FEB" stroke-width="2"/>
  <text x="338" y="1382" font-size="15" font-weight="700" fill="#1F6FEB">EARN</text>
  <text x="338" y="1402" font-size="12.5" fill="#40444C">expected value · probability-weighted</text>

  <rect x="580" y="1358" width="236" height="56" rx="8" fill="#FFFFFF" stroke="#1F9D55" stroke-width="2"/>
  <text x="596" y="1382" font-size="15" font-weight="700" fill="#1F9D55">ABATE</text>
  <text x="596" y="1402" font-size="12.5" fill="#40444C">grid intensity × HH use → £/tCO₂e</text>

  <!-- ============ TWO TIMEFRAMES ============ -->
  <!-- NOW column -->
  <rect x="40" y="1460" width="392" height="380" rx="10" fill="#FFFFFF" stroke="#1F9D55" stroke-width="2"/>
  <rect x="40" y="1460" width="392" height="40" rx="10" fill="#1F9D55"/>
  <rect x="40" y="1484" width="392" height="16" fill="#1F9D55"/>
  <text x="64" y="1486" font-size="14" font-weight="700" fill="#FFFFFF" letter-spacing="1.5">NOW — WHAT THE MACHINE RUNS ON</text>

  <g font-family="'SF Mono', Menlo, Consolas, monospace" font-size="12.5">
    <text x="64" y="1528" fill="#1F6FEB">.</text><text x="82" y="1528" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" fill="#16181D">Real 9-year record; weather→price proven</text>
    <text x="64" y="1556" fill="#1F6FEB">.</text><text x="82" y="1556" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" fill="#16181D">Curriculum-drawn cohorts, protected tails</text>
    <text x="64" y="1584" fill="#1F6FEB">.</text><text x="82" y="1584" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" fill="#16181D">UK-compliant billing on three clocks · collections</text>
    <text x="64" y="1612" fill="#1F6FEB">.</text><text x="82" y="1612" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" fill="#16181D">Tier-1 bill accuracy · assets on anchored S-curves</text>
    <text x="64" y="1640" fill="#1F9D55">_</text><text x="82" y="1640" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" fill="#16181D">Conversations v1: write, respond, score the gap</text>
    <text x="64" y="1668" fill="#1F9D55">_</text><text x="82" y="1668" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" fill="#16181D">Naive forward belief it must outgrow</text>
    <text x="64" y="1696" fill="#D97706">~</text><text x="82" y="1696" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" fill="#16181D">Carbon ledger designed, not yet instrumented</text>
    <text x="64" y="1724" fill="#1F6FEB">.</text><text x="82" y="1724" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" fill="#16181D">The harness itself — a product in its own right</text>
  </g>
  <g font-family="'SF Mono', Menlo, Consolas, monospace" font-size="11.5" fill="#5A5E66">
    <text x="64" y="1772">. done   _ in build   ~ honest gap</text>
  </g>
  <text x="64" y="1806" font-size="12.5" fill="#5A5E66" font-style="italic">Anything claimed as working carries its proof —</text>
  <text x="64" y="1823" font-size="12.5" fill="#5A5E66" font-style="italic">level, test, or gap named.</text>

  <!-- EVOLUTION column -->
  <rect x="448" y="1460" width="392" height="380" rx="10" fill="#F3F3F0" stroke="#C9C9C3" stroke-width="2"/>
  <rect x="448" y="1460" width="392" height="40" rx="10" fill="#5A5E66"/>
  <rect x="448" y="1484" width="392" height="16" fill="#5A5E66"/>
  <text x="472" y="1486" font-size="14" font-weight="700" fill="#FFFFFF" letter-spacing="1.5">EVOLVES INTO — NOT YET TRUE</text>

  <g font-family="'SF Mono', Menlo, Consolas, monospace" font-size="12.5" fill="#5A5E66">
    <text x="472" y="1528">~</text><text x="490" y="1528" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" fill="#40444C">Scenario worlds: crisis-replay, glut, tail-heavy</text>
    <text x="472" y="1556">~</text><text x="490" y="1556" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" fill="#40444C">Traded product ladder — and live competitors</text>
    <text x="472" y="1584">~</text><text x="490" y="1584" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" fill="#40444C">Collateral→cash death loop (2021–22 replay)</text>
    <text x="472" y="1612">~</text><text x="490" y="1612" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" fill="#40444C">Customer state layer: moves, births, shocks</text>
    <text x="472" y="1640">~</text><text x="490" y="1640" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" fill="#40444C">Price-sensitivity discovered, never tagged</text>
    <text x="472" y="1668">~</text><text x="490" y="1668" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" fill="#40444C">Holdout-measured uplift: proven, not asserted</text>
    <text x="472" y="1696">~</text><text x="490" y="1696" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" fill="#40444C" font-weight="700">£/tCO₂e on the front page — the headline</text>
    <text x="472" y="1724">~</text><text x="490" y="1724" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" fill="#40444C">Endgame: whole lives rerun to death or endpoint</text>
  </g>
  <text x="490" y="1742" font-size="13" fill="#40444C">— EV is fitness, mortality is selection.</text>

  <text x="472" y="1806" font-size="12.5" fill="#5A5E66" font-style="italic">Anything here stated as present tense anywhere</text>
  <text x="472" y="1823" font-size="12.5" fill="#5A5E66" font-style="italic">on the site is a claim-status defect.</text>

  <!-- footer provenance -->
  <text x="48" y="1888" font-family="'SF Mono', Menlo, Consolas, monospace" font-size="11" fill="#8A8E96">// THE_MODEL_ON_A_PAGE.md · director-canon 2026-07-23 · v4: depth over volume · one human · poesys.</text>
</svg>
