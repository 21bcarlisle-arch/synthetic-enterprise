name: Set DNS TTL for poesys.net

on:
  workflow_dispatch:

jobs:
  set-ttl:
    runs-on: ubuntu-latest
    steps:
      - name: Get zone ID for poesys.net
        id: zone
        run: |
          ZONE=$(curl -s "https://api.cloudflare.com/client/v4/zones?name=poesys.net" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}")
          ZONE_ID=$(echo "$ZONE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['result'][0]['id'] if d['result'] else '')")
          echo "zone_id=$ZONE_ID" >> $GITHUB_OUTPUT
          echo "Zone ID: $ZONE_ID"

      - name: Find root CNAME/A record
        id: record
        run: |
          RECORDS=$(curl -s "https://api.cloudflare.com/client/v4/zones/${{ steps.zone.outputs.zone_id }}/dns_records" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}")
          echo "All records:"
          echo "$RECORDS" | python3 -c "import sys,json; [print(r['id'], r['type'], r['name'], r.get('ttl'), r.get('proxied')) for r in json.load(sys.stdin)['result']]"
          RECORD_ID=$(echo "$RECORDS" | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          root = [r for r in d['result'] if r['name'] in ('poesys.net','@')]
          print(root[0]['id'] if root else '')
          ")
          RECORD_TYPE=$(echo "$RECORDS" | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          root = [r for r in d['result'] if r['name'] in ('poesys.net','@')]
          print(root[0]['type'] if root else '')
          ")
          RECORD_CONTENT=$(echo "$RECORDS" | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          root = [r for r in d['result'] if r['name'] in ('poesys.net','@')]
          print(root[0].get('content','') if root else '')
          ")
          echo "record_id=$RECORD_ID" >> $GITHUB_OUTPUT
          echo "record_type=$RECORD_TYPE" >> $GITHUB_OUTPUT
          echo "record_content=$RECORD_CONTENT" >> $GITHUB_OUTPUT
          echo "Record ID: $RECORD_ID, Type: $RECORD_TYPE"

      - name: Set TTL to 60 seconds
        if: steps.record.outputs.record_id != ''
        run: |
          RESULT=$(curl -s -X PATCH \
            "https://api.cloudflare.com/client/v4/zones/${{ steps.zone.outputs.zone_id }}/dns_records/${{ steps.record.outputs.record_id }}" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data "{\"ttl\": 60}")
          echo "Update result:"
          echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); print('success:', d['success']); [print('error:', e) for e in d.get('errors',[])]"
          echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); r=d.get('result',{}); print('New TTL:', r.get('ttl'))"
