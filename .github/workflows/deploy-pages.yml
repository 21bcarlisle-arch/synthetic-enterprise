name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - site/**
      - docs/PROJECT_STATE.md

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v5

      - name: Deploy site/ to Cloudflare Pages
        run: npx wrangler pages deploy site --project-name=poesys-net --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Purge Cloudflare cache (whole zone)
        # Found 2026-07-11 (R11, chasing a stale poesys.net/data/dashboard.json
        # after a successful deploy): the old step purged an explicit, hardcoded
        # file list scoped ONLY to /state/* and /shadow/* -- it never covered
        # /data/*.json (dashboard.json, customers.json, maturity_map.json, etc.)
        # or index.html itself, so every deploy touching those paths succeeded
        # but the edge cache could still serve stale content, silently, for
        # every future site/data or index.html change, not just this one. An
        # explicit list also requires remembering to add every new file --
        # exactly the maintenance gap that caused this. purge_everything is
        # simple, robust against new files by construction, and cheap for a
        # site this size (traffic is low; correctness matters more than the
        # extra cache-warming cost of a full purge).
        run: |
          curl -s -X POST "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}' \
          | python3 -c "import sys,json; d=json.load(sys.stdin); print('Purge', 'OK' if d.get('success') else 'FAILED', d.get('errors',''))"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
