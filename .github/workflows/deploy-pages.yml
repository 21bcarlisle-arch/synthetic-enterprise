name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - site/**
      - docs/PROJECT_STATE.md

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - name: Sync PROJECT_STATE.md to site/state/PROJECT_STATE.txt
        run: |
          mkdir -p site/state
          cp docs/PROJECT_STATE.md site/state/PROJECT_STATE.txt

      - name: Deploy site/ to Cloudflare Pages
        run: npx wrangler pages deploy site --project-name=poesys-net --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
