name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - site/**
      - docs/PROJECT_STATE.md

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - name: Deploy site/ to Cloudflare Pages
        run: npx wrangler pages deploy site --project-name=poesys-net --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Purge Cloudflare cache for /state/* and /shadow/*
        run: |
          curl -s -X POST "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"files":["https://poesys.net/state/PROJECT_STATE.txt","https://poesys.net/state/customer_sample.json","https://poesys.net/state/billing_ledger.json","https://poesys.net/state/population_anchoring.json","https://poesys.net/state/live_portfolio.json","https://poesys.net/state/live_decisions_latest.json","https://poesys.net/shadow/","https://poesys.net/shadow/index.html","https://poesys.net/shadow/customers/index.html","https://poesys.net/shadow/supplier/index.html","https://poesys.net/shadow/sim/index.html","https://poesys.net/shadow/project/index.html"]}' \
          | python3 -c "import sys,json; d=json.load(sys.stdin); print('Purge', 'OK' if d.get('success') else 'FAILED', d.get('errors',''))"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
