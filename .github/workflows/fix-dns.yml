name: Fix Cloudflare DNS for poesys.net

on:
  workflow_dispatch:

jobs:
  fix-dns:
    runs-on: ubuntu-latest
    steps:
      - name: Get zone ID for poesys.net
        id: zone
        run: |
          ZONE=$(curl -s -X GET "https://api.cloudflare.com/client/v4/zones?name=poesys.net" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json")
          echo "Zone response: $ZONE"
          ZONE_ID=$(echo $ZONE | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['result'][0]['id'] if d['result'] else '')")
          echo "zone_id=$ZONE_ID" >> $GITHUB_OUTPUT
          echo "Zone ID: $ZONE_ID"

      - name: List existing DNS records
        id: records
        run: |
          RECORDS=$(curl -s -X GET "https://api.cloudflare.com/client/v4/zones/${{ steps.zone.outputs.zone_id }}/dns_records" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json")
          echo "Existing records:"
          echo $RECORDS | python3 -c "import sys,json; [print(r['type'], r['name'], r.get('content',''), r.get('proxied','')) for r in json.load(sys.stdin)['result']]"

          # Check if CNAME for @ already exists
          HAS_ROOT=$(echo $RECORDS | python3 -c "import sys,json; d=json.load(sys.stdin); print(any(r['name'] in ('poesys.net','@') and r['type'] in ('CNAME','A') for r in d['result']))")
          echo "has_root=$HAS_ROOT" >> $GITHUB_OUTPUT

      - name: Add CNAME record if missing
        if: steps.records.outputs.has_root == 'False'
        run: |
          echo "Root record missing — creating CNAME..."
          curl -s -X POST "https://api.cloudflare.com/client/v4/zones/${{ steps.zone.outputs.zone_id }}/dns_records" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{
              "type": "CNAME",
              "name": "@",
              "content": "poesys-net.pages.dev",
              "ttl": 1,
              "proxied": true
            }' | python3 -c "import sys,json; d=json.load(sys.stdin); print('Created:', d['success'], d.get('result',{}).get('id',''))"

      - name: Verify DNS after change
        run: |
          sleep 5
          python3 -c "import socket; print(socket.gethostbyname('poesys.net'))" || echo "Still not resolving (may need a moment)"
