name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    # 2026-07-11 (REPO_PRIVATE_AND_IP.md Phase 1 audit, docs/design/
    # REPO_PRIVATE_AND_IP_PHASE1_FINDINGS.md): this workflow had no path
    # filter at all, unlike its sibling deploy-pages.yml -- measured
    # ~4,120 runs/month (206% of the private-repo Actions free quota),
    # root-caused to firing on every push regardless of whether anything
    # actually served by this Pages mirror changed. `docs/` holds far more
    # than the served content (observability logs, staging files, market
    # data caches, internal design docs) that churns on nearly every
    # commit. paths-ignore (not an inclusive whitelist) chosen deliberately
    # to be conservative -- excludes only the clearly-non-served, clearly
    # high-churn directories, so nothing genuinely served by the mirror
    # (docs/PROJECT_OVERVIEW.md, docs/status/, docs/reports/,
    # docs/retrospectives/, docs/market_research/, docs/shadow/) can be
    # silently missed.
    paths-ignore:
      - docs/observability/**
      - docs/staging/**
      - docs/market_data/**
      - docs/state/**
      - docs/snapshots/**
      - docs/design/**
      - docs/instructions/**
      - docs/claude/**
      - docs/domain_artefact_library/**
      - docs/context-handshake-latest.md
      - docs/review_gates/**
  workflow_dispatch:

# PAGES_CONCURRENCY_FIX.md (2026-07-05): the automatic "pages build and
# deployment" workflow GitHub manages for "Deploy from a branch" mode has no
# concurrency control -- a push burst (e.g. the advisor staging several
# commits close together) throttles concurrent builds, and the superseded
# ones report FAILED (with a failure email) even though the build always
# succeeds and the next deploy self-heals. This explicit workflow replaces
# it: cancel-in-progress means a superseded run reports CANCELLED, not
# FAILED -- no more failure emails for ordinary push bursts.
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload docs/ as Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
